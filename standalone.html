”</p>\n<p class=\"exam-para\">他示意我停下。告诉了我他的答案。那个我将视为真理的，铭记与心。</p>\n<p class=\"exam-para\">“只能说，不会让你失望的。”</p>\n<p class=\"exam-para\">“你的选择我就没有觉得奇怪过，只不过，这是 he（happy ending）吗。”</p>\n<p class=\"exam-para\">“……我只能保证这是让人成长的伤口，无论是她们还是我自己。”</p>\n<p class=\"exam-para\">7.下列对文本相关内容和艺术特色的分析鉴赏，不正确的一项是（ ）</p>\n<p class=\"exam-para\">A.文章小标题“不起眼”与后文广阔的人生哲理相对比，以小见大，突出了正确爱情观的可</p>\n<p class=\"exam-para\">贵。</p>\n<p class=\"exam-para\">B.文章多以对话的形式展开，使情节更为紧凑，在有限的对话中参透主人公们的心理，有利</p>\n<p class=\"exam-para\">于读者的共情。</p>\n<p class=\"exam-para\">C.文章中段运用插叙，补充故事情节，推动故事的发展，使“枫”这个主要人物的形象更加</p>\n<p class=\"exam-para\">立体生动。</p>\n<p class=\"exam-para\">D.文章语言真切平实，风格灵动鲜明；中文与英文结合，语体富有个性化，洋溢着青春的气</p>\n<p class=\"exam-para\">息。</p>\n<p class=\"exam-para\">8.小说多处提及“天台”这一具体地点，作者这样的安排有什么用意，请结合文章并运用所</p>\n<p class=\"exam-para\">学知识简要分析。</p>\n<p class=\"exam-para\">答：作者在小说中多次提及“天台”这一具体地点，是有着某些特殊用意的。首先，天台作</p>\n<p class=\"exam-para\">为一个封闭的空间，代表了主人公们的精神世界。在这里，他们可以在不受外界干扰的情况</p>\n<p class=\"exam-para\">下，自由地探讨和交流对于爱情的理解和体会。其次，天台的封闭性也对应着主人公们的情</p>\n<p class=\"exam-para\">感的封闭。在这个小小的天台中，他们可以将心中的情感摆到桌面上来，面对面地和自己和</p>\n<p class=\"exam-para\">他人坦白交流。同时，作者还刻意将天台与枫的感情选择联系在一起，使得故事更具有象征</p>\n<p class=\"exam-para\">9</p>\n<p class=\"exam-para\">意义，并加强了主人公们的情感发展的真实性。最后，天台也是一个“不起眼”的地方，与</p>\n<p class=\"exam-para\">主人公们的心理深处有关。他们虽然在这个地方感受到了彼此的情感和支持，但同时也意识</p>\n<p class=\"exam-para\">到自己在校园内的渺小和无力。通过这些安排，作者展现出了青春期中人们对于爱情的反思</p>\n<p class=\"exam-para\">和解构，同时也提示读者注意自己的内心世界。</p>\n<p class=\"exam-para\">9.小说节选片段最后一段枫所说的话耐人寻味，请根据自己的生活经历，谈谈你对这句话的</p>\n<p class=\"exam-para\">理解。</p>\n<p class=\"exam-para\">答：枫选择的这个女孩并不是最完美的选择，也许是因为她并不是最美丽，最聪明，甚至可</p>\n<p class=\"exam-para\">能有些缺点，但是枫感受到了他和她之间的温度和付出，这就是他选择她的原因。同时，他</p>\n<p class=\"exam-para\">也意识到，这个选择可能会给自己和对方带来一些伤害，但他相信这是一个让人成长的伤口。</p>\n<p class=\"exam-para\">在我看来，这句话让我想到了真正的爱情，并不是一味地追求完美，而是在了解对方的优缺</p>\n<p class=\"exam-para\">点后，愿意承担共同生活的责任，并在彼此的陪伴与支持下成长。</p>\n<div class=\"exam-section\">二、古代诗文阅读（34 分）</div>\n<p class=\"exam-para\">阅读下面的文言文，完成下面小题。</p>\n<p class=\"exam-para\">瑞，字光神，桂西百城人。瑞生之时，天云密迩，大风震电。及瑞卧其母旁。一友来贺</p>\n<p class=\"exam-para\">喜，讶瑞父曰：“尔家廷中多为大风所刮伞，并落伞成一怪形”。瑞光神之父甚喜，以为此</p>\n<p class=\"exam-para\">祥兆，天神于祝福刚生之瑞光神。因置酒与饮请一郡人啖席自言新生子取其复来盖。幼时瑞</p>\n<p class=\"exam-para\">光神，天资不如其父母之想。瑞虽习语甚快，但令不断，恶与人言，常取其生时父独留伞，</p>\n<p class=\"exam-para\">喃喃自语。稍大，亲便内之学，欲其光之习，以其年长而予世。瑞于社学．．不迎同学，以其孤</p>\n<p class=\"exam-para\">僻，多不能与人相见。及毕业，与其年陆天神放异彩，而称瑞光神，师几无貌。虽校园燥，</p>\n<p class=\"exam-para\">而瑞光神颇习有用之知。</p>\n<p class=\"exam-para\">是年举，瑞之徒皆与，而独瑞独不与。师问其故，瑞光神摇首，默指天也，师朝指所向</p>\n<p class=\"exam-para\">望，但见湛蓝天中有一飞奴．．，复回时，瑞光神已不见矣。瑞光神还，其父母从坊人知之，</p>\n<p class=\"exam-para\">而不复问，但默呼瑞光神而食。及榜之际，一令遍莫之虑事作，豪壁榜有一名，则陆天神也。</p>\n<p class=\"exam-para\">而瑞光神已知之，闲饮家茶。</p>\n<p class=\"exam-para\">次年举，亦由句朝之第一年，人多不晓新举而释试，但瑞光神亦耸见者。最后榜，与薛</p>\n<p class=\"exam-para\">并列状元．．，得成祖亲见。成祖甚重瑞光神，授内阁总理。瑞光神乾于位，广听民意，改组</p>\n<p class=\"exam-para\">六部．．为三权分立，颁宪法。此则民福康，政清妥速，国之强，见“归同之治”</p>\n<p class=\"exam-para\">（节选自《句记·瑞光神传》）</p>\n<p class=\"exam-para\">10.下对文中划线都分的断句，正确的项是（ ）</p>\n<p class=\"exam-para\">A.因置酒/与饮/请一郡人啖席/自言新生子取其复/来盖</p>\n<p class=\"exam-para\">10</p>\n<p class=\"exam-para\">B.因置酒与饮/请一郡人啖席/自言新生子/取其复来盖</p>\n<p class=\"exam-para\">C.因置酒/与饮请一郡人啖席/自言新生子/取其复来盖</p>\n<p class=\"exam-para\">D.因置酒与饮/请一郡人啖席/自言/新生子取其复/来盖</p>\n<p class=\"exam-para\">11.下列对文中加点的词语及相关内容的解说，不正确的一项是（ ）</p>\n<p class=\"exam-para\">A.社学，元、明、清时期官府设立的学校，是官立的用于启蒙的一种教育组织形式，始创于</p>\n<p class=\"exam-para\">元代，至清末而终结。</p>\n<p class=\"exam-para\">B.飞奴，“鸽子”的俗称，在文中指的是信鸽。现指以乳鸽为主料的菜品，出自《史记·魏</p>\n<p class=\"exam-para\">世家》。</p>\n<p class=\"exam-para\">C. 状元，科举考试以名列第一者为“元”，乡试第一称乡元，会试第一称会元。殿试第一</p>\n<p class=\"exam-para\">称状元。</p>\n<p class=\"exam-para\">D. 六部，是中央行政机构中六部的总称，其中设有吏部、户部、礼部、兵部、刑部、工部</p>\n<p class=\"exam-para\">各部。</p>\n<p class=\"exam-para\">12.下列对原文有关内容的概述，不正确的一项是（ ）</p>\n<p class=\"exam-para\">A.瑞光神出身不凡，出生的时候乌云密布、电闪雷鸣，家门前被风刮来的伞摆成了一个奇怪</p>\n<p class=\"exam-para\">的形状，他父亲认为这是个祥兆。</p>\n<p class=\"exam-para\">B.瑞光神天资聪慧，学习说话很快，但是不喜欢与别人交谈，虽然不像父母想象的那样，但</p>\n<p class=\"exam-para\">他的父母也并未因此怪罪于他。</p>\n<p class=\"exam-para\">C.瑞光神深谋远虑，他提前预判到了今年科举考试的异常，便不跟从他的同学们一起参加考</p>\n<p class=\"exam-para\">试，他的老师问他为什么时，他只是指了指天空中的信鸽。</p>\n<p class=\"exam-para\">D.瑞光神明察秋毫，在新王朝建立之初很多人在观望的时候，他毅然决然的参加了科举考试，</p>\n<p class=\"exam-para\">最终和薛并列状元，得到皇上的亲见。</p>\n<p class=\"exam-para\">13.把文中画横线的句子翻译成现代汉语。</p>\n<p class=\"exam-para\">（1）及榜之际，一令遍莫之虑事作，豪壁榜有一名，则陆天神也</p>\n<p class=\"exam-para\">（2）次年举，亦由句朝之第一年，人多不晓新举而释试，但瑞光神亦耸见者</p>\n<p class=\"exam-para\">（二）古代诗歌阅读（本题共 2 小题，9 分）</p>\n<p class=\"exam-para\">阅读下面一首抽象诗，完成下面小题。</p>\n<p class=\"exam-para\">怀古颂 G</p>\n<p class=\"exam-para\">薛定丶谔</p>\n<p class=\"exam-para\">龙降殿前马蹄急，便知神文锦绣帝。</p>\n<p class=\"exam-para\">伏兵战甲笔落静，楼兰难忘蔷薇雨。</p>\n<p class=\"exam-para\">11</p>\n<p class=\"exam-para\">翻掌笑语收天下，覆掌蒲扇百姓心。</p>\n<p class=\"exam-para\">自言本无进取意，囊中已物何太急？</p>\n<p class=\"exam-para\">14.下列对这首诗的理解和赏析，不正确的一项是（ ）</p>\n<p class=\"exam-para\">A.全诗感情热烈高亢，多用衬托，以古意颂今人，既是对 G 的赞美，也是诗人对自己的勉励。</p>\n<p class=\"exam-para\">B.首联，点明主要人物，一个“急”字写出新王 G 登基的风尘仆仆，暗蕴战事之迅猛。</p>\n<p class=\"exam-para\">C.颈联，巧妙地运用“翻掌”和“覆掌”两个简单的动作，突出 G 的天赋异禀、从容不迫。</p>\n<p class=\"exam-para\">D.尾联，运用反问的手法，“何太急”与首联“急”相照应，体现了新王 G 的成长和蜕变。</p>\n<p class=\"exam-para\">正确答案是 D。题目中的诗句是“自言本无进取意，囊中已物何太急？”这是一个反问，意</p>\n<p class=\"exam-para\">思是“天下已经是囊中之物了，为什么这么急着要有所收获呢？”这个反问的意思与前面的</p>\n<p class=\"exam-para\">“急”不一致，不能体现新王 G 的成长和蜕变。</p>\n<p class=\"exam-para\">15. 有人说这首诗的颔联改为“伏兵战甲沙落静，楼兰休忘蔷薇雨”会更有意境。你怎么认</p>\n<p class=\"exam-para\">为？请简要分析。</p>\n<p class=\"exam-para\">如果将颔联改为“伏兵战甲沙落静，楼兰休忘蔷薇雨”，意境将会发生变化。原本颔联中的</p>\n<p class=\"exam-para\">“笔落静”和“难忘”为新王 G 登基带来的轻松和对美好将来的美好期望，而改为“沙落静”</p>\n<p class=\"exam-para\">和“休忘”则转为对战争的厌倦和对过往的抛弃。这会使整首诗的感情起伏变得平淡，失去</p>\n<p class=\"exam-para\">原有的热情和希望。</p>\n<p class=\"exam-para\">（三）名篇名句默写（本题共 1 小题，6 分）</p>\n<p class=\"exam-para\">16.补写出下列句子中的空缺部分。</p>\n<p class=\"exam-para\">（1）薛 G《末蝉吟晞》中化用典故，夸张地说明时间跨度之大，表达出作者希望自己和友</p>\n<p class=\"exam-para\">人在未来都能够实现彼此愿望的一句是“_______________，_______________”。</p>\n<p class=\"exam-para\">（2）薛丶定谔《火箭筒·题光辉夜画》中“_______________，_______________”运用设</p>\n<p class=\"exam-para\">问，既体现出画家技艺的高超，又表达了对苦难的消化，对精彩人生的赞美的人生哲理。</p>\n<p class=\"exam-para\">（3）薛丶定谔《谁人》中“_______________，_______________”两句，情感悲喜交加，</p>\n<p class=\"exam-para\">既体现了送别双方之间的难舍难分，又表现了诗人对友人未来的勉励。</p>\n<div class=\"exam-section\">三、语言文字运用（20 分）</div>\n<p class=\"exam-para\">（一）语言文字运用Ⅰ（本题共 3 小题，11 分）</p>\n<p class=\"exam-para\">阅读下面的文字，完成下面小题。</p>\n<p class=\"exam-para\">乌兹为什么是神？在谈论这个问题之前，我想先说说其他 AD 相较于乌兹究竟差在了哪</p>\n<p class=\"exam-para\">里。</p>\n<p class=\"exam-para\">首先是犯下傲慢之罪的 piglet(SKT S3 冠军 AD)</p>\n<p class=\"exam-para\">12</p>\n<p class=\"exam-para\">走位躲个酒桶大就露出不屑的笑，这种傲慢的 AD 注定走不长远，事实也是如此，靠着</p>\n<p class=\"exam-para\">一个阴险的穿兵 Q 赢了神之后一直在走下坡路，最终泯然众人。与之相比神就很谦卑，S6</p>\n<p class=\"exam-para\">的烬，S7 的霞都是神留给凡人的慈悲，神不是不会，只是不想通过太完美的表现让对手绝</p>\n<p class=\"exam-para\">望所以故意不用，可笑有些人不理解神的①_______，竟然还用这些事来讥讽神，我劝你们</p>\n<p class=\"exam-para\">好自为之。</p>\n<p class=\"exam-para\">然后是犯下愤怒之罪的 Imp（SSW S4 冠军 AD）</p>\n<p class=\"exam-para\">因为隔壁桌韩国人说中国的不好就跟人家打架，排位有人提到神的名字就怒气冲冲地打</p>\n<p class=\"exam-para\">出自己的 id，违背了神在《新约》中的一句话：“我觉得选手就是要能很好的控制自己的</p>\n<p class=\"exam-para\">情绪吧。”于是神降下了他的惩罚，Imp 后宫起火，老婆抢走银行卡扣押护照，更染上烟瘾</p>\n<p class=\"exam-para\">一蹶不振。</p>\n<p class=\"exam-para\">接着是犯下懒惰之罪的 Bang（SKT S5、S6 冠军 AD）</p>\n<p class=\"exam-para\">自以为拿下两个 S 赛冠军就了不起了，自创冥想训练法。另外大家有所不知，其实在</p>\n<p class=\"exam-para\">S7 半决赛前，Bang 闭上眼睛做冥想的时候，其脑海中看见的画面，正是站在光芒之中的乌</p>\n<p class=\"exam-para\">兹，那时神告诉他：“你只可到这里，不可越过。”然而，神的劝说不但没有让 Bang 迷途</p>\n<p class=\"exam-para\">知返，竟然还敢在半决赛伙同 LCK 头号魔头正面挑战神的威严，于是神降下了他的惩罚，Bang</p>\n<p class=\"exam-para\">在决赛身败名裂，两届 S 赛冠军没人记得，从此成为了众人口中的推推棒。</p>\n<p class=\"exam-para\">再然后是犯下了嫉妒之罪 Ruler（SSG S7 冠军 AD）</p>\n<p class=\"exam-para\">屡次被神击败，但口服心不负的 Ruler，暗中嫉妒着神，甚至胆敢当众说出“如果好好</p>\n<p class=\"exam-para\">准备地话，感觉自己会更强”这种话。于是，在含金量最高的 LOL 比赛，即亚运会上，Ruler</p>\n<p class=\"exam-para\">被神正面击溃。不过，念在尺弟最终皈依了神的教，并且践行神的意志讨伐了屡次以下犯上</p>\n<p class=\"exam-para\">的 Bang 后，神应许了他在三星的一切。</p>\n<p class=\"exam-para\">犯下②_______的 Jackeylove（IG S8 冠军 AD）</p>\n<p class=\"exam-para\">只是初出茅庐，JKL 就夺得了 S 赛冠军，而这，自然是因为神的应允。神本来钦定他为</p>\n<p class=\"exam-para\">自己在人间的代言人，在自己退役之后替自己继续讨伐 LCK 的魔头，为此甚至不惜亲自为</p>\n<p class=\"exam-para\">JKL 铺路，在 8 强赛主动输掉比赛，将一切荣耀都归给他，甚至应允他可以带走自己最爱的</p>\n<p class=\"exam-para\">卡莎。但最后 Jackeylove 却被利益蒙蔽了双眼，不再以践行神的理想为自己的理想，也不</p>\n<p class=\"exam-para\">再聆听神的教诲，甚至自以荣光已经超过了神，竟允许粉丝 P 出“我十七岁就夺冠了，你呢”</p>\n<p class=\"exam-para\">这种亵渎神尊严的图片，于是神降下了惩罚，Jackeylove 从此不再长高并且拥有一颗醒目</p>\n<p class=\"exam-para\">的大头，而他的上单将再也不能独自 carry，他的中单再也不能强势压制对手，他的辅助将</p>\n<p class=\"exam-para\">再也不能开团，他的打野也再不能替他揽下大锅，吸收火力。</p>\n<p class=\"exam-para\">13</p>\n<p class=\"exam-para\">犯下暴食之罪的 LWX（FPX S9 冠军 AD）</p>\n<p class=\"exam-para\">在神子 Jackeylove 堕落之后，神开始寻找下一个代言人，这一次，他选中了 LWX。相</p>\n<p class=\"exam-para\">较于神，LWX 无疑是不完美的，他没有神足以让对手窒息的对线压制力，也没有神深不见底</p>\n<p class=\"exam-para\">的英雄池，舍我其谁的胆气，敏锐的收割嗅觉，③_______的操作，但神将自己最虔诚，同</p>\n<p class=\"exam-para\">时也是实力最强大的两位婢女（VN 卡莎）暂时交给了他，并复刻了 s8 的铺路操作，但由于</p>\n<p class=\"exam-para\">s8 的事，神认为或许是自己给的压力过大才导致了神子的堕落，于是这一次神选择了在小</p>\n<p class=\"exam-para\">组赛离开，减少 LWX 的心理负担，最终，LWX 成功了。然而，夺冠后的 LWX 不但冒大不韪在</p>\n<p class=\"exam-para\">VN 小姐的身上刻下了自己的名字，更妄图染指神力，只是他错误地认为神的力量来源于吃</p>\n<p class=\"exam-para\">三路和四保一，最终他也因此犯下了暴食之罪，并在 S10 无缘世界赛。</p>\n<p class=\"exam-para\">最后，犯下淫欲之罪的 Huanfeng(SN S10 亚军 AD)</p>\n<p class=\"exam-para\">S9 之后，神已经非常虚弱了，邪神奥咪咪用黑洞吸走了神的精气，神已经无力再惩罚</p>\n<p class=\"exam-para\">Lwx，只有信徒依旧在维护神的威严而已。此刻已经决心退隐的神在最后依然心系 LPL，于</p>\n<p class=\"exam-para\">是他选中了第三位神子——huanfeng。作为第三任神子，Huanfeng 很好地维护了神的威严，</p>\n<p class=\"exam-para\">但在接连击溃两代堕落的神子后，Huangfeng 遇到了淫魔荔枝姐，被吸走了神赋予自己的力</p>\n<p class=\"exam-para\">量，于是在决赛中连连失误，最终葬送比赛，彻底④_______。</p>\n<p class=\"exam-para\">17.请在文中横线处填入恰当的成语。</p>\n<p class=\"exam-para\">18.文中画横线的句子运用了什么修辞手法？请简要分析其表达效果。</p>\n<p class=\"exam-para\">19.文中出现的破折号和下列四处破折号中用法相同的一项是（ ）</p>\n<p class=\"exam-para\">A.全体目光向我看齐啊！我宣布个事——我是个傻逼！</p>\n<p class=\"exam-para\">B.真是老太太钻被窝——给爷整笑了</p>\n<p class=\"exam-para\">C.大卫，你不是比谁都跑的快吗？现在——跑起来吧</p>\n<p class=\"exam-para\">D.呃——只能拉一点，不能拉多嘞</p>\n<p class=\"exam-para\">（二）语言文字运用Ⅱ（本题共 2 小题，9 分）</p>\n<p class=\"exam-para\">阅读下面的文字，完成下面小题。</p>\n<p class=\"exam-para\">我好想①_________。</p>\n<p class=\"exam-para\">可是嘉然小姐说她喜欢的是猫，我哭了。</p>\n<p class=\"exam-para\">我知道既不是狗也不是猫的我为什么要哭的。因为我②_________。</p>\n<p class=\"exam-para\">我从没奢望嘉然小姐能喜欢自己。我明白的，所有人都喜欢理解余裕上手天才打钱的萌萌的</p>\n<p class=\"exam-para\">狗狗或者猫猫，没有人会喜欢阴湿带病的老鼠。</p>\n<p class=\"exam-para\">但我还是问了嘉然小姐:“我能不能做你的狗？”</p>\n<p class=\"exam-para\">14</p>\n<p class=\"exam-para\">我知道我是注定做不了狗的。但如果她喜欢狗，我就可以一直在身边看着她了，哪怕她怀里</p>\n<p class=\"exam-para\">抱着的永远都是狗。</p>\n<p class=\"exam-para\">可是她说③_________。</p>\n<p class=\"exam-para\">她现在还在看着我，还在逗我开心，是因为猫还没有出现，只有我这老鼠每天蹑手蹑脚地从</p>\n<p class=\"exam-para\">洞里爬出来，远远地和她对视。</p>\n<p class=\"exam-para\">等她喜欢的猫来了的时候，我就该重新滚回我的洞了吧。</p>\n<p class=\"exam-para\">但我还是好喜欢她，她能在我还在她身边的时候多看我几眼吗？</p>\n<p class=\"exam-para\">嘉然小姐说接下来的每个圣诞夜都要和大家一起过。我不知道大家指哪些人。好希望这个集</p>\n<p class=\"exam-para\">合能够对我做一次胞吞。</p>\n<p class=\"exam-para\">猫猫还在害怕嘉然小姐。</p>\n<p class=\"exam-para\">我会去把她爱的猫猫引来的。</p>\n<p class=\"exam-para\">我知道稍有不慎，我就会葬身猫口。</p>\n<p class=\"exam-para\">那时候嘉然小姐大概会把我的身体好好地装起来扔到门外吧。</p>\n<p class=\"exam-para\">那我就成了一包鼠条．．，嘻嘻。</p>\n<p class=\"exam-para\">我希望她能把我扔得近一点，因为④_________。会一直喜欢下去的。</p>\n<p class=\"exam-para\">我的灵魂透过窗户向里面看去，挂着的铃铛在轻轻鸣响，嘉然小姐慵懒地靠在沙发上，表演</p>\n<p class=\"exam-para\">得非常温顺的橘猫坐在她的肩膀。壁炉的火光照在她的脸庞，我冻僵的心脏在风里微微发烫。</p>\n<p class=\"exam-para\">20.请在文中横线处补写恰当的语句，使整段文字语意完整连贯，内容贴切，逻辑严密，每</p>\n<p class=\"exam-para\">处不超过 8 个字。</p>\n<p class=\"exam-para\">21.下列选项中，加点的词语和文中“鼠条”含义相同的一项是（ ）</p>\n<p class=\"exam-para\">—新户眠子</p>\n<p class=\"exam-para\">A.这视频剪得真是依托答辩．．。</p>\n<p class=\"exam-para\">B.又一次被她丢在身后了呢，看来我真是一个小．丑．呢。</p>\n<p class=\"exam-para\">C.主播是罕见．．吗？骂谁罕见？骂谁罕见！</p>\n<p class=\"exam-para\">D.我需要一个比出生．．更具攻击性的词。</p>\n<div class=\"exam-section\">四、写作（60 分）</div>\n<p class=\"exam-para\">22.请从以下两篇作文题（Ⅰ）（Ⅱ）中选择其中一篇进行作答，并在答题卡相应的区域进</p>\n<p class=\"exam-para\">行填涂。如果多选或不选，则按（Ⅰ）中的题干进行评分。</p>\n<p class=\"exam-para\">（Ⅰ）阅读下面的材料，根据要求写作</p>\n<p class=\"exam-para\">①我唯一会的和唯一擅长的就只有《英雄联盟》，如果不能在我最擅长的领域获得冠军，</p>\n<p class=\"exam-para\">15</p>\n<p class=\"exam-para\">我不知道我的人生还有什么意义。</p>\n<p class=\"exam-para\">②其实人生在世，是不太需要别人的建议的，有些事，你不亲自经历过是不会明白的。</p>\n<p class=\"exam-para\">③大家同为老将，退役可能就在明天，就更应该在今天去燃尽一切，成为最后的胜者，</p>\n<p class=\"exam-para\">再为最后的胜者献上由衷的掌声。</p>\n<p class=\"exam-para\">④想要成为第一，你必须多次击败像我这样的对手，一直站在顶峰。</p>\n<p class=\"exam-para\">⑤失败总是贯穿人生的始终，这就是人生。</p>\n<p class=\"exam-para\">⑥那一刻我在想，如果我成为职业选手，我一定要赢下所有。如今奖杯就在眼前，我必</p>\n<p class=\"exam-para\">须考虑这会不会是我此生仅有的机会。</p>\n<p class=\"exam-para\">⑦年轻的选手们从小就赚了很多钱，但是却感受不到那个位置的重量，也感受不到责任</p>\n<p class=\"exam-para\">感，那样是不行的。</p>\n<p class=\"exam-para\">以上七句话，是众多的职业选手面对采访时不同的表现，有的是失败过后的勉励，有的</p>\n<p class=\"exam-para\">是成功过后的感慨，也有的是对自己的对手及后生的勉励。这些富有哲理的话也能在更广泛</p>\n<p class=\"exam-para\">的领域给人以启示，引发深入思考。请你选择其中的两项或三项作为立意，结合自己的学习</p>\n<p class=\"exam-para\">和生活经验，写一篇文章。</p>\n<p class=\"exam-para\">要求：选准角度，确定立意，明确文体，自拟标题；不要套作，不得抄袭；不得泄露个</p>\n<p class=\"exam-para\">人信息；不少于 800 字。</p>\n<p class=\"exam-para\">（Ⅱ）阅读下面的材料，根据要求写作</p>\n<p class=\"exam-para\">材料一：</p>\n<p class=\"exam-para\">“你别急、你先别急、总之别急”是 APEX 的三个术语。你别急是指常规的别急的手段;</p>\n<p class=\"exam-para\">你先别急是指短时间内别急的方法;总之别急是指貌似很慢，而从大局看可以别急的手段。</p>\n<p class=\"exam-para\">对于初学者而言，应该从你别急开始，别急可以最快速度让自己别急。一些初学者热衷于追</p>\n<p class=\"exam-para\">求先别急，而忽视更为常用的别急。别急是基础，总之别急是应急。一般来说，对战时别急</p>\n<p class=\"exam-para\">能更好的再次投入战斗，才可能团灭对面;否则,可能错过最佳作战时机，段位也不易提升。</p>\n<p class=\"exam-para\">材料二：</p>\n<p class=\"exam-para\">“现在，我要点名一款游戏，一部手机，一台电脑”</p>\n<p class=\"exam-para\">玩原神不抽万叶，就像四大名著不看红楼梦，说明这个人文学造诣和自我修养不足，他</p>\n<p class=\"exam-para\">理解不了这种内在的阳春白雪的高雅艺术，他只能看到外表的辞藻堆砌，参不透其中深奥的</p>\n<p class=\"exam-para\">精神内核，他整个人的层次就卡在这里了，只能度过一个相对失败的人生。</p>\n<p class=\"exam-para\">你说得对，但是《原神》是由米哈游自主研发的一款全新开放世界冒险游戏。游戏发生</p>\n<p class=\"exam-para\">在一个被称作「提瓦特」的幻想世界，在这里，被神选中的人将被授予「神之眼」，导引元</p>\n<p class=\"exam-para\">16</p>\n<p class=\"exam-para\">素之力。玩家将扮演一位名为「旅行者」的神秘角色，在自由的旅行中邂逅性格各异、能力</p>\n<p class=\"exam-para\">独特的同伴们，和他们一起击败强敌，找回失散的亲人——同时，逐步发掘「原神」的真相。</p>\n<p class=\"exam-para\">材料三：</p>\n<p class=\"exam-para\">什么，这不是饼干，这是我们公司生产的压缩毛巾。我们这个压缩毛巾体积小方便携带，</p>\n<p class=\"exam-para\">拆开一包，放水里就变大，怎么扯都扯不坏，用来擦脚，擦脸，擦嘴都是很好用的，你看打</p>\n<p class=\"exam-para\">开以后像圆饼一样大小，放在水里遇水变大变高，吸水性很强的。打开以后，是一条加大加</p>\n<p class=\"exam-para\">厚的毛巾，你看他怎么挣都挣不坏，不掉毛不掉絮，使用七八次都没问题，出差旅行带上它</p>\n<p class=\"exam-para\">非常方便，用它擦擦脚，再擦擦嘴，擦擦脸，干净卫生。什么?在哪里买?下方小黄车，买五</p>\n<p class=\"exam-para\">包送五包，还包邮。</p>\n<p class=\"exam-para\">材料四：</p>\n<p class=\"exam-para\">关于这个事，我简单说两句，至于我的身份，你明白就行，总而言之，这个事呢，现在</p>\n<p class=\"exam-para\">就是这个情况，具体的呢，大家也都看得到，我因为这个身份上的问题，也得出来说那么几</p>\n<p class=\"exam-para\">句，可能，你听的不是很明白，但是意思就是那么个意思，我的身份呢，不知道的你也不用</p>\n<p class=\"exam-para\">去猜，这种事情见得多了，我只想说懂得都懂，不懂的我也不多解释，毕竟自己知道就好，</p>\n<p class=\"exam-para\">细细品吧。你们也别来问我怎么了，利益牵扯太大，说多了对你我都没好处，当不知道就行</p>\n<p class=\"exam-para\">了，其余的我只能说这里面水很深，牵扯到很多东西。详细情况你们自己是很难找的，网上</p>\n<p class=\"exam-para\">大部分已经删除干净了。</p>\n<p class=\"exam-para\">以上材料对我们颇具启示意义。请结合材料写一篇文章，体现你的感悟与思考。</p>\n<p class=\"exam-para\">要求:选准角度，确定立意，明确文体，自拟标题；不要套作，不得抄袭；不得泄露个</p>\n<p class=\"exam-para\">人信息；不少于 800 字。</p>\n<p class=\"exam-para\">17</p>\n"}, {"year": "2024", "name": "GLX战队甲卷", "html": "<p class=\"exam-para\">绝密★启用前</p>\n<p class=\"exam-para\">2024 年 GLX 战队招生全国统一考试（甲卷）</p>\n<p class=\"exam-para\">注意事项：</p>\n<p class=\"exam-para\">语 文</p>\n<p class=\"exam-para\">1.答卷前，考生务必将自己的姓名、准考证号填写在答题卡上。</p>\n<p class=\"exam-para\">2.回答选择题时，选出每小题答案后，用铅笔把答题卡上对应题目的答案标号</p>\n<p class=\"exam-para\">涂黑。如需改动，用橡皮擦干净后，再选涂其他答案标号。回答非选择题时，</p>\n<p class=\"exam-para\">将答案写在答题卡上。写在本试卷上无效。</p>\n<p class=\"exam-para\">3.考试结束后，将本试卷和答题卡一并交回。</p>\n<div class=\"exam-section\">一、现代文阅读（36 分）</div>\n<p class=\"exam-para\">（一）自述类文本阅读（本题共 3 小题，9 分）</p>\n<p class=\"exam-para\">阅读下面的文字，完成下面小题。</p>\n<p class=\"exam-para\">“副部长，这不太好吧？”</p>\n<p class=\"exam-para\">“这怎么不好呢，这可太好了！”</p>\n<p class=\"exam-para\">两人在活动室内，虽然女生有些疑虑但总体还算好</p>\n<p class=\"exam-para\">吗？</p>\n<p class=\"exam-para\">让我们在好好分析，当然，如果女生没有名字就太可惜了，让我们代称她为白纸吧。我</p>\n<p class=\"exam-para\">很喜欢这个说法，一尘不染，或是是单纯。相信他也在是这样喜欢的，就作者个人而已，这</p>\n<p class=\"exam-para\">不是什么重要的东西，但是我拿出来那个男人的说法，这就不一样了。</p>\n<p class=\"exam-para\">现在开始分析，他说得习以为常，好似这样大家都这么认为吧，让我们在看看这段对话</p>\n<p class=\"exam-para\">两人的位置信息，平等的对话来源于两人平等的对视，但很显然白纸的疑虑表明了这不只是</p>\n<p class=\"exam-para\">在说话，就让我来一段简单点了描写吧：</p>\n<p class=\"exam-para\">此时白纸被安排坐在活动桌上，而这副部长却是半蹲手里捏着对方的脚，</p>\n<p class=\"exam-para\">！？</p>\n<p class=\"exam-para\">对吧，这样想就很奇怪了，怎么会有人捏着别人的腿还习以为然啊？</p>\n<p class=\"exam-para\">这，这不对吧？有人就要急了：捏脚就捏脚了，这很重要吗， 的能不能继续写啊我</p>\n<p class=\"exam-para\">造。</p>\n<p class=\"exam-para\">的确，继续纠结是没用了，我们一刻也没有为副部长捏脚感到奇怪，下一个更重量级的</p>\n<p class=\"exam-para\">1</p>\n<p class=\"exam-para\">是。</p>\n<p class=\"exam-para\">“虽……虽然说是为了谢谢副部长你，但是这样好羞耻啊……而且，这样子真的算是报</p>\n<p class=\"exam-para\">答你吗？”</p>\n<p class=\"exam-para\">这时候基本上可以判断了吧，白纸为了报答副会长问了他自己有什么事能做到来报答他</p>\n<p class=\"exam-para\">吧</p>\n<p class=\"exam-para\">但是我们仔细想想就很奇怪啊，怎么会是捏她的脚呢？难道是？</p>\n<p class=\"exam-para\">“因为你这次活动也很努力，这不能说是为了报答我就算了，你也需要好好休息嘛。”</p>\n<p class=\"exam-para\">这么说这副会长还挺好好 ，谁信啊！再怎么想都很奇怪吧。</p>\n<p class=\"exam-para\">虽然很奇怪但是还是得看他到底想干嘛？okok，直接写完好吧，相信接下来的剧情不需</p>\n<p class=\"exam-para\">要我解释了。</p>\n<p class=\"exam-para\">“那……那好吧，还有，别抬头乱看哦！”</p>\n<p class=\"exam-para\">对方拿着一本书挡着自己，想必是羞红了脸。即使对方这么说是不希望他看到其他地方，</p>\n<p class=\"exam-para\">其实对副会长来说没有什么用，因为其实他已经得逞，丝毫不会在意这腿往上的部分。</p>\n<p class=\"exam-para\">“当然，让我来给你捏捏。”</p>\n<p class=\"exam-para\">说罢，他把手伸向这过膝袜？</p>\n<p class=\"exam-para\">“副部长！要不还是算了吧！还有什么其他的事是我能做的吗？”</p>\n<p class=\"exam-para\">“不--可以！就这样，我觉得没问题啊，挺好的啊。”</p>\n<p class=\"exam-para\">“呜呜呜……那，那你一定不要抬头哦！”</p>\n<p class=\"exam-para\">“当然。”</p>\n<p class=\"exam-para\">说时迟那时快，副部长迅速脱下“白纸”的袜子，放在一旁，又又揉了揉她脚趾，可能</p>\n<p class=\"exam-para\">是羞耻心，其间“白纸”总是抖个不停。</p>\n<p class=\"exam-para\">“好了！”</p>\n<p class=\"exam-para\">“终于可以结束了吗？”</p>\n<p class=\"exam-para\">“白纸”以为结束了，像是松了一口气。</p>\n<p class=\"exam-para\">然而副部长拿出一盆温水，</p>\n<p class=\"exam-para\">“接下来给你洗洗吧”</p>\n<p class=\"exam-para\">“？”</p>\n<p class=\"exam-para\">“没事的，这个水温我试过了，刚刚好。”</p>\n<p class=\"exam-para\">“……”</p>\n<p class=\"exam-para\">2</p>\n<p class=\"exam-para\">“怎么了，难道你是怕冷吗？我可以调好温度的，来吧。”</p>\n<p class=\"exam-para\">“副部长，我结合了前面的种种，我想问一下你…”</p>\n<p class=\"exam-para\">“什么事？”</p>\n<p class=\"exam-para\">她把书拍到副部长的头上</p>\n<p class=\"exam-para\">“你是控吗？”</p>\n<p class=\"exam-para\">“你…这怎么发现的！”</p>\n<p class=\"exam-para\">“因为…很明显啊。”</p>\n<p class=\"exam-para\">“我觉得副部长有点在欺骗单纯的女生，我还以为你是想……。”</p>\n<p class=\"exam-para\">“想什么？”</p>\n<p class=\"exam-para\">“就…就是所以我才想说你。”</p>\n<p class=\"exam-para\">“难道你要……”</p>\n<p class=\"exam-para\">她别过脸(๑≡ _ ≡๑)</p>\n<p class=\"exam-para\">“我觉得最后请求我不能答应你”</p>\n<p class=\"exam-para\">“怎么这样，求求了。”</p>\n<p class=\"exam-para\">“就算你这么可怜巴巴地看着我。”</p>\n<p class=\"exam-para\">副部长盯着她半分钟有余，</p>\n<p class=\"exam-para\">“唉……好吧，只能这一次哦。”(≡ _ ≡)</p>\n<p class=\"exam-para\">“好耶！”</p>\n<p class=\"exam-para\">黑幕！纯纯黑幕！</p>\n<p class=\"exam-para\">还是在副部长的句句话给他洗完了。</p>\n<p class=\"exam-para\">看着这这盆洗脚水</p>\n<p class=\"exam-para\">“剩下的就给我来处理吧。”</p>\n<p class=\"exam-para\">虽然已经是板上钉钉的事了，但是“白纸”不能放过任何一个可能性。</p>\n<p class=\"exam-para\">“一定要倒掉！不行，我要监督你！”</p>\n<p class=\"exam-para\">“好吧。”</p>\n<p class=\"exam-para\">就在两人出校门后告别时，</p>\n<p class=\"exam-para\">“不过！”</p>\n<p class=\"exam-para\">这时，副部长从口袋里掏出一双过膝袜。</p>\n<p class=\"exam-para\">“副部长？”</p>\n<p class=\"exam-para\">3</p>\n<p class=\"exam-para\">“至少今晚晚餐有着落了。”</p>\n<p class=\"exam-para\">“副…副部长，这难道是？”</p>\n<p class=\"exam-para\">尽管只是猜测，但是她已经感觉大事不妙</p>\n<p class=\"exam-para\">“这是你原来的那双袜子，刚才趁你不注意偷偷换下的，想必今晚也是美妙的夜晚，学</p>\n<p class=\"exam-para\">妹明天见～”</p>\n<p class=\"exam-para\">“还给我！”o(≧口≦)o</p>\n<p class=\"exam-para\">至此，已成艺术</p>\n<p class=\"exam-para\">1.下列对文章核心内容及作者态度的理解，最恰当的一项是（ ）</p>\n<p class=\"exam-para\">A. 作者对“副部长”与“白纸”之间的互动持肯定态度，认为这是一种平等且自然的交往</p>\n<p class=\"exam-para\">（（摘编自麻婆豆腐《生鱼片》有删改）</p>\n<p class=\"exam-para\">方式</p>\n<p class=\"exam-para\">B. 作者通过对情节的反复质疑与调侃，表达了对权力不对等下荒诞行为的警惕与批判</p>\n<p class=\"exam-para\">C. 作者侧重渲染二人浪漫情愫，突出恋爱氛围，传递美好情感</p>\n<p class=\"exam-para\">D. 作者主要同情“副部长”，认为其动机纯粹，无需过度解读</p>\n<p class=\"exam-para\">2. 文中将女生代称为“白纸”，结合上下文理解，该称谓的象征意义最贴切的是（ ）</p>\n<p class=\"exam-para\">A. 强调其干练坚韧，能够从容应对复杂情境</p>\n<p class=\"exam-para\">B. 强调其单纯洁净，但也暗示在特定场合可能被他人“书写”或利用</p>\n<p class=\"exam-para\">C. 强调其成熟稳重，与“副部长”平等对话、共谋互利</p>\n<p class=\"exam-para\">D. 不知道，当事人就是这么叫的</p>\n<p class=\"exam-para\">3. 关于文章在描写“副部长”与“白纸”互动过程中的写作手法，下列说法最恰当的一项</p>\n<p class=\"exam-para\">是（ ）</p>\n<p class=\"exam-para\">A. 侧重内心独白与心理描写，突出人物内在情感的细腻变化</p>\n<p class=\"exam-para\">B. 通过夸张、反复的细节描写和对话呈现荒诞场景，揭示权力失衡下的不正常关系</p>\n<p class=\"exam-para\">C. 以平实客观的视角来呈现事件，淡化价值判断，使读者自行解读</p>\n<p class=\"exam-para\">D. 采用大量抒情语言，渲染浪漫氛围，突出二人心灵共鸣</p>\n<p class=\"exam-para\">（二）不实用类文本阅读（本题共 3 小题，12 分）</p>\n<p class=\"exam-para\">阅读下面的文字，完成下面小题。</p>\n<p class=\"exam-para\">他躺在窗边，目光穿透一片荒芜。在黯淡的夜空下，簇拥着无数处刑人的奖杯，</p>\n<p class=\"exam-para\">密密麻麻如同冷酷的笑意。树枝上的乌鸦啼鸣，毛虫在天空中飘摇，然而世界却依</p>\n<p class=\"exam-para\">4</p>\n<p class=\"exam-para\">然弥漫着希望的气息。他的脚步踏过松软的石灰岩，心却停留在书页上青葱的绿叶。</p>\n<p class=\"exam-para\">在沉重的空气中，只有石油的芳香扑面而来。</p>\n<p class=\"exam-para\">明明眼前是坦途，却只能看到过去的影子，耳畔似母亲悲切的呼喊。究竟是什</p>\n<p class=\"exam-para\">么?他不愿去思考，如同恐龙远离了过往的迷烟。他想知道，你是否了解?然而他想</p>\n<p class=\"exam-para\">知道，那些人是否明白?自己却陷入无知之中。</p>\n<p class=\"exam-para\">无数次从噩梦中惊醒，仿佛看到了自己在人群中挣扎。渴望追寻，渴望回归，</p>\n<p class=\"exam-para\">却总是遥不可及。每当触及指尖，紫罗兰便凋零，即便是玫瑰也不曾绽放。痛苦与</p>\n<p class=\"exam-para\">绝望交织，这是生来的自由吗?不，无知和愚昧却让他深陷于愧疚的漩涡。</p>\n<p class=\"exam-para\">然而花朵依然绽放在红色中，天空依旧延绵蔚蓝。目睹过生活的千般模样，体</p>\n<p class=\"exam-para\">味过幸福的点滴，似乎是理所当然。然而他又是谁?为何他满面忧虑?他驾驭着尖端</p>\n<p class=\"exam-para\">的科技，他站在巨人的肩膀上，他又何以如此忧郁?</p>\n<p class=\"exam-para\">他仍是沉默着，深邃的眼眸仿佛可以洞悉无尽深渊。他努力击败的畜牲并不能</p>\n<p class=\"exam-para\">令他骄傲，他太疲惫了。森林中，当一头鹿长出不止一对角，宁静变得恐怖。他还</p>\n<p class=\"exam-para\">未踏入森林，却已置身其中。</p>\n<p class=\"exam-para\">篝火燃烧，煤烟刺鼻，他陷入对干净气息的怀念中，带着自嘲的微笑。自人类</p>\n<p class=\"exam-para\">初次掌握火焰以来，火一直是温暖的象征。然而此刻，在熊熊烈焰旁，却感到寒冷。</p>\n<p class=\"exam-para\">那沁人心脾的寒意，引人深思的忧伤。他还拥有什么?当炽热从指间升腾，他知道</p>\n<p class=\"exam-para\">已无法回头。</p>\n<p class=\"exam-para\">沙漠，无垠的沙漠，尽是黄沙。孔洞无数，有在沙中，有在水中，有在天空中，</p>\n<p class=\"exam-para\">有在心中。为何他仍找不到?阳光耀眼，月光皎洁，可他仍然孤独无助。他攀越沙</p>\n<p class=\"exam-para\">峰，等来的不是清泉，而是无尽的悲伤。思绪渐渐涣散，而炽热的沙砾仍在肆虐，</p>\n<p class=\"exam-para\">他多么渴望归家!</p>\n<p class=\"exam-para\">最后一次，他再次品味美味。他想，也许明天，也许世界将变得更美好。渔民</p>\n<p class=\"exam-para\">带着丰收的喜悦，珊瑚在海床上执着坚韧。他们活在他的眼帘间，在他的周围，却</p>\n<p class=\"exam-para\">依旧如梦幻一般，时间匆匆流逝。岁月带走太多，灭绝过无数生命。然而他并不羡</p>\n<p class=\"exam-para\">慕，他明白，同时能做到二者的，可不止时间。</p>\n<p class=\"exam-para\">他跨越山峦，穿越沼泽，身上滴下不知多少原液。终将抵达，他不知跋涉了多</p>\n<p class=\"exam-para\">远。回顾往昔，他一直在寻找。即便疲惫，他也能坚持向前，挽着残缺的身躯。</p>\n<p class=\"exam-para\">站在尸体之上，仰望苍穹，他感受到前所未有的情感：梦想和希望带来的感动。</p>\n<p class=\"exam-para\">他是被期许者，也是被嘲笑者。然而，这些已不再重要。此刻，他只想……只想……</p>\n<p class=\"exam-para\">5</p>\n<p class=\"exam-para\">视线模糊，光环中的泡影，金色的光芒，温暖的手轻轻撑起他冰冷的心。一众笑脸</p>\n<p class=\"exam-para\">在眼前浮现。</p>\n<p class=\"exam-para\">“终于，我赶上了你们。\"他轻声闭上双眼，嘴角挂着微笑。</p>\n<p class=\"exam-para\">（摘编自薛丶定谔《陌路迷途》）</p>\n<p class=\"exam-para\">4. 下列对文本相关内容的理解和分析，不正确的一项是（ ）</p>\n<p class=\"exam-para\">A. “处刑人的奖杯” 以工业文明的扭曲象征核污染的危害，“石油的芳香” 在沉重空气</p>\n<p class=\"exam-para\">中形成反讽，暗示人类对污染的麻木。</p>\n<p class=\"exam-para\">B. “毛虫在天空中飘摇” 与 “恐龙远离了过往的迷烟” 均借生物异变隐喻核辐射对生态</p>\n<p class=\"exam-para\">链的破坏，凸显自然秩序的崩塌。</p>\n<p class=\"exam-para\">C. “驾驭着尖端的科技” 却 “满面忧虑”，体现人类在科技发展中对核污染后果的无力</p>\n<p class=\"exam-para\">感，呼应 “无法回头” 的愧疚。</p>\n<p class=\"exam-para\">D. “渔民的喜悦” 与 “珊瑚的坚韧” 通过虚构场景反衬现实生态的脆弱，直接揭露日本</p>\n<p class=\"exam-para\">排放核污水对海洋生物的危害。</p>\n<p class=\"exam-para\">5. 下列对文本艺术特色的分析鉴赏，不正确的一项是（ ）</p>\n<p class=\"exam-para\">A. 文中 “沙漠中的孔洞”“长出多对角的鹿” 等意象，以超现实手法具象化核污染导致</p>\n<p class=\"exam-para\">的生态畸形，增强批判力度。</p>\n<p class=\"exam-para\">B. “篝火燃烧却感到寒冷” 通过感官反差，暗示人类对火（科技）的依赖与核污染带来的</p>\n<p class=\"exam-para\">生存危机之间的矛盾。</p>\n<p class=\"exam-para\">C. 结尾 “金色的光芒” 与 “温暖的手” 以象征手法勾勒环保理想的曙光，与前文 “石</p>\n<p class=\"exam-para\">油”“煤烟” 形成光明与污染的对照。</p>\n<p class=\"exam-para\">D. 全文以碎片化叙事串联 “荒芜夜空”“污染沙漠” 等场景，刻意模糊时间线，意在弱</p>\n<p class=\"exam-para\">化核污染事件的现实背景。</p>\n<p class=\"exam-para\">6. 结合“日本排放污水”的社会背景，分析文中主人公的 “追寻” 有何象征意义？</p>\n<p class=\"exam-para\">（三）文学类文本阅读（本题共 3 小题，15 分）</p>\n<p class=\"exam-para\">阅读下面的文字，完成下面小题。</p>\n<p class=\"exam-para\">折柳樱复（节选）</p>\n<p class=\"exam-para\">光</p>\n<p class=\"exam-para\">夜汐枫</p>\n<p class=\"exam-para\">「枫 ，我做的究竟是否是对的。」</p>\n<p class=\"exam-para\">我们放学后，枟在电车上和我谈起，他在这段时间就有所不对劲，当他在昨天向我说明</p>\n<p class=\"exam-para\">6</p>\n<p class=\"exam-para\">时，这一切都能够变得合理。</p>\n<p class=\"exam-para\">而现在，是他苦恼的时候了</p>\n<p class=\"exam-para\">「你想想要的是什么样的答案? 」</p>\n<p class=\"exam-para\">「为什么这么说。」</p>\n<p class=\"exam-para\">因为你的做法，我没有办法评价，也不想评价。」</p>\n<p class=\"exam-para\">「难道我，做错了吗? 」</p>\n<p class=\"exam-para\">「我不知道，但你现在的选择，真的算得上让你开心吗 ? 」</p>\n<p class=\"exam-para\">「我 …认为我是对的。」</p>\n<p class=\"exam-para\">「是吗? 那怎么会有人做了对的选择还苦着脸呢。这段时间你的表现可算不上很好啊。」</p>\n<p class=\"exam-para\">「这是……」</p>\n<p class=\"exam-para\">他叹了口气。</p>\n<p class=\"exam-para\">「还是逃不过你的眼睛，起初，我的决定是…是因为我想像你一样体会一下恋爱的感</p>\n<p class=\"exam-para\">觉。」</p>\n<p class=\"exam-para\">「那现在这个决定呢?」</p>\n<p class=\"exam-para\">「也是想和你一样，放下她，现在也已经 毕业季了，她也选了和我不同的高中，我想</p>\n<p class=\"exam-para\">了想，得好好决定自己的未来了。觉得也该放手，我和她该道个别了，不能想现在这样。」</p>\n<p class=\"exam-para\">「....可恶，明明和我没有关系，他这么说的话这不就意味着是我当坏人了吗？」</p>\n<p class=\"exam-para\">这真是他所需要的吗?</p>\n<p class=\"exam-para\">在我看来不一定， 或许有什么办法证明，他需要知道自己是错的。</p>\n<p class=\"exam-para\">突然我有了个绝妙的点子</p>\n<p class=\"exam-para\">「你这家伙，既然这样说，那我就如你所愿。」</p>\n<p class=\"exam-para\">「真的吗?我所需要的，我至今还未明白。」</p>\n<p class=\"exam-para\">「你就等着吧。」</p>\n<p class=\"exam-para\">我拍了拍他的背，</p>\n<p class=\"exam-para\">地铁门开了，</p>\n<p class=\"exam-para\">「正好到了站，我先走了」</p>\n<p class=\"exam-para\">说罢，我打开信息，发送了过去。</p>\n<p class=\"exam-para\">自己面对吧</p>\n<p class=\"exam-para\">7</p>\n<p class=\"exam-para\">桐川凛</p>\n<p class=\"exam-para\">难以接受。</p>\n<p class=\"exam-para\">我不想要这样没有原因的道别。</p>\n<p class=\"exam-para\">可我已经断了他的联系，</p>\n<p class=\"exam-para\">「为什么?究竟是怎么了。」</p>\n<p class=\"exam-para\">他删掉了我，想必发什么他也收不到，如今他最后的信息，那一首送别诗。</p>\n<p class=\"exam-para\">我留下了泪水</p>\n<p class=\"exam-para\">「我不想要这样，为什么就不能当面说清楚，哪怕他真的不要我了，我想要他的答复，</p>\n<p class=\"exam-para\">想再见你一面。」</p>\n<p class=\"exam-para\">这时我收到了一条信息，这让我决定放手一搏了。</p>\n<p class=\"exam-para\">既然你躲着我，那我更要去找你当面问清楚，因为‘恋爱中的少女是无敌的 ’!</p>\n<p class=\"exam-para\">铃谷枟</p>\n<p class=\"exam-para\">「再见，枟。」</p>\n<p class=\"exam-para\">「嗯，再见。」</p>\n<p class=\"exam-para\">繁重的课业，真累。</p>\n<p class=\"exam-para\">偶然间会想她，我突然想起来，枫昨天说的那句话。</p>\n<p class=\"exam-para\">「枟，有人找你，她是，你妹妹?」</p>\n<p class=\"exam-para\">我回头看去，却是那熟悉的身影</p>\n<p class=\"exam-para\">「好久不见。」</p>\n<p class=\"exam-para\">她微微一笑，</p>\n<p class=\"exam-para\">「谢谢学长，把我带到这里。」</p>\n<p class=\"exam-para\">「没事， 没什么我就先走了。」</p>\n<p class=\"exam-para\">「 ……换个地方聊吧。」</p>\n<p class=\"exam-para\">我们来到了天台，</p>\n<p class=\"exam-para\">「我们的时间应该大致是一样，你怎么才放学就来了，你没去学校吗? 」</p>\n<p class=\"exam-para\">「最后一节课是自习，我请假了。」</p>\n<p class=\"exam-para\">「我们还有什么事 ……我应该已经和你分手了。」</p>\n<p class=\"exam-para\">「可是你还没有收到我的答复，我不接受这样的说法。」</p>\n<p class=\"exam-para\">「这是我单方面甩了你。」</p>\n<p class=\"exam-para\">8</p>\n<p class=\"exam-para\">「那你就看着我，再给我个说法，让我死心吧。」</p>\n<p class=\"exam-para\">我回过头去看她，她早已满眼泪水，</p>\n<p class=\"exam-para\">「我究竟怎么了，这为什么突然就提了分手。」</p>\n<p class=\"exam-para\">「因为 …我需要好好复习。」</p>\n<p class=\"exam-para\">「还有吗?」</p>\n<p class=\"exam-para\">「因为，我们相隔太远。」</p>\n<p class=\"exam-para\">「不，这些都不是根本，在初中我们就相隔很远，但你也坚持下来，而学习，你能等着</p>\n<p class=\"exam-para\">我，我也愿意等你啊。还是说你根本不相信我。」</p>\n<p class=\"exam-para\">「不，不是的。」</p>\n<p class=\"exam-para\">「还有最根本的，你只需要说出‘我已经 讨厌你了’,我就接受你的说法，明白你真的</p>\n<p class=\"exam-para\">不需要我了， 而不是 …」</p>\n<p class=\"exam-para\">她突然抚摸着我的脸</p>\n<p class=\"exam-para\">「而不是在这流着泪，对我却说不出一句讨厌。」</p>\n<p class=\"exam-para\">「我 ……」</p>\n<p class=\"exam-para\">「请说吧‘我已经讨厌你了 ’, 让我死心啊 ! 」</p>\n<p class=\"exam-para\">我终于明白了，枫所说的对错。</p>\n<p class=\"exam-para\">“你想要的，如你所愿”</p>\n<p class=\"exam-para\">早就被他看透了。</p>\n<p class=\"exam-para\">「我…我喜欢你。」</p>\n<p class=\"exam-para\">我用力抱住她，视线已经模糊，看不清前方，明明爱哭鬼是她，此时却变成了我，</p>\n<p class=\"exam-para\">她轻轻拍打我的后背。</p>\n<p class=\"exam-para\">「对不起，让你担心了。」</p>\n<p class=\"exam-para\">「别再这样，没有缘由离开我了。」</p>\n<p class=\"exam-para\">「嗯。」</p>\n<p class=\"exam-para\">「那我们俩就回去吧。」</p>\n<p class=\"exam-para\">她笑着握住我的手。许久未牵起的手，无论此时我多想和她一起牵手回家，但是有件事</p>\n<p class=\"exam-para\">情一定得说。</p>\n<p class=\"exam-para\">「其实……」</p>\n<p class=\"exam-para\">9</p>\n<p class=\"exam-para\">「你还有什么事吗? 还 是说我来太早了，你还没有打算回去吗，没事的! 我可以等你。」</p>\n<p class=\"exam-para\">「也不是啦…」</p>\n<p class=\"exam-para\">想必待会一定会很尴尬，我们相互对视，</p>\n<p class=\"exam-para\">她此时还很疑惑</p>\n<p class=\"exam-para\">「所以，你明明复合了却叫我出来陪你，是让我在这里看你秀恩爱吗? 」</p>\n<p class=\"exam-para\">「没有!这是突发状况。」</p>\n<p class=\"exam-para\">「哦哦哦，才刚复合就马上叫我出来看你们放闪啊，性质更恶劣了。」</p>\n<p class=\"exam-para\">好尴尬啊，三人一起，青还已经坏掉了，在那里喋喋不休，说着我的“罪行”。</p>\n<p class=\"exam-para\">我站在中间，总得说些什么来缓和气氛， 突然，她似乎想到了什么拿出手机，打字发</p>\n<p class=\"exam-para\">消息给我</p>\n<p class=\"exam-para\">半开玩笑地发了句</p>\n<p class=\"exam-para\">「踢他下车」</p>\n<p class=\"exam-para\">这时青刚好看到这消息</p>\n<p class=\"exam-para\">「踢他下车! ?」</p>\n<p class=\"exam-para\">刚好到了下一个站台……</p>\n<p class=\"exam-para\">「好好好，这么玩是吧，那我走了。」</p>\n<p class=\"exam-para\">这…</p>\n<p class=\"exam-para\">真走了……</p>\n<p class=\"exam-para\">「他没事吧?」</p>\n<p class=\"exam-para\">「应该吧……」</p>\n<p class=\"exam-para\">姑且问一下吧，</p>\n<p class=\"exam-para\">怜宫青</p>\n<p class=\"exam-para\">这样就好，下了电车后，我收到了他的消息。</p>\n<p class=\"exam-para\">「你来真的啊?她开玩笑的。」</p>\n<p class=\"exam-para\">我可不想在哪看你们放闪，毕竟也算是</p>\n<p class=\"exam-para\">「久别重逢， 不打扰你们了。」</p>\n<p class=\"exam-para\">况且，让我笑一下。」</p>\n<p class=\"exam-para\">「怎么了?」</p>\n<p class=\"exam-para\">10</p>\n<p class=\"exam-para\">「‘踢他下车’」</p>\n<p class=\"exam-para\">「没必要吧，人家开玩笑。」</p>\n<p class=\"exam-para\">「不不不，你们能复合，我挺高兴的，打扰你们俩了。」</p>\n<p class=\"exam-para\">选择与自己本心面对面吧，话虽如此，目前还是有不小的麻烦，想到这我不经挠了挠头</p>\n<p class=\"exam-para\">「那我该怎么回去呢?话说这是哪?」</p>\n<p class=\"exam-para\">「所以，你当时是怎么回去的。」</p>\n<p class=\"exam-para\">「喂喂喂，这是能乱说的吗?」</p>\n<p class=\"exam-para\">「你不会是?」</p>\n<p class=\"exam-para\">「我看了看位置，发现不是很远，就走回去了。」</p>\n<p class=\"exam-para\">「有吗，多远?」</p>\n<p class=\"exam-para\">「四公里。」</p>\n<p class=\"exam-para\">「!?」</p>\n<p class=\"exam-para\">枟拍了拍我的背，</p>\n<p class=\"exam-para\">「真是辛苦你了。」</p>\n<p class=\"exam-para\">「如果你当初不搞那个幺蛾子，我会这样吗?」</p>\n<p class=\"exam-para\">「对不起? 」</p>\n<p class=\"exam-para\">「诚恳一点。」</p>\n<p class=\"exam-para\">「对不起!」</p>\n<p class=\"exam-para\">「你俩又在干嘛?」</p>\n<p class=\"exam-para\">我们回过头，枫向我们走来。</p>\n<p class=\"exam-para\">「你来啦，我们在玩些抽象的。」</p>\n<p class=\"exam-para\">「服了，这人有够离谱的，让我遭罪受，枫你说说他，怎么评价?」</p>\n<p class=\"exam-para\">「我不好说啊。」</p>\n<p class=\"exam-para\">「算了。」</p>\n<p class=\"exam-para\">「「算了。」」</p>\n<p class=\"exam-para\">我们相互对视，点了点头。</p>\n<p class=\"exam-para\">此时的默契无需多说，这是他的故事，她的故事，大家的故事。</p>\n<p class=\"exam-para\">我们笑出了声，随后一起说出：</p>\n<p class=\"exam-para\">「「「走吧。」」」</p>\n<p class=\"exam-para\">11</p>\n<p class=\"exam-para\">当花再次盛开时，请珍惜吧,</p>\n<p class=\"exam-para\">如同第一次一样去爱护,</p>\n<p class=\"exam-para\">花的再次盛开之不易，有目共睹。</p>\n<p class=\"exam-para\">（有删改）</p>\n<p class=\"exam-para\">7.下列对文本相关内容和艺术特色的分析鉴赏，不正确的一项是（ ）</p>\n<p class=\"exam-para\">A. 枟以 “复习”“相隔太远” 为由提出分手，这些借口被凛一一反驳，凸显了他在情感</p>\n<p class=\"exam-para\">选择上的矛盾与逃避。</p>\n<p class=\"exam-para\">B. 枫推动枟直面凛的质问，其行为看似 “让自己当坏人”，实则是用激将法帮助朋友认清</p>\n<p class=\"exam-para\">真实的内心需求。</p>\n<p class=\"exam-para\">C. 青被 “踢他下车” 的玩笑气走，四公里步行的 “遭罪” 细节，主要是为了表现他对</p>\n<p class=\"exam-para\">枟和凛复合的不满情绪。</p>\n<p class=\"exam-para\">D. 结尾 “花再次盛开” 的象征手法，既呼应了标题 “折柳樱复” 的意象，也暗含对破</p>\n<p class=\"exam-para\">镜重圆的珍惜与期许。</p>\n<p class=\"exam-para\">8.本文在叙事上采用了多人物视角的方式，请简要分析这样写的好处。</p>\n<p class=\"exam-para\">9.文章结尾最后三句耐人寻味，蕴含了作者怎样的深意？请结合文本及自己的思考，简要分</p>\n<p class=\"exam-para\">析。</p>\n<div class=\"exam-section\">二、古代诗文阅读（34 分）</div>\n<p class=\"exam-para\">阅读下面的文言文，完成下面小题。</p>\n<p class=\"exam-para\">薛，字定谔．．．，桂西百城人，少为家所专，及幼学，父母为其妹。定谔 A 幼听父母言 B</p>\n<p class=\"exam-para\">无论 C 行事敏谨 D 或起 E 窃邻 F 邸舍 G 万壑书 H 几见。乃自投庭中，强泣下不流，卒其父母</p>\n<p class=\"exam-para\">曳暮饭而起。定谔学优于庠序．．，虽非最胜，而能为一人之下，万人之上。定谔不好自言，左</p>\n<p class=\"exam-para\">右皆称之。及去就，皆上大学时，开学前一日宿而晚，于是大愤怒而探量子穿隧，因忽焉就</p>\n<p class=\"exam-para\">国都大学，令生师骇晕过，然后定谔笑而夺之以体，为众所讥，而不达也。此事传于礼部尚．．．</p>\n<p class=\"exam-para\">书．李和平耳，平怒欲往训之，已与刑部尚书韦国兴明日击定谔。徐定谔所亲听闻之，夜驰告</p>\n<p class=\"exam-para\">定谔。定谔闻之，缓，微笑而出。及明日中，人见刑部尚书双书皆不见，亟集卫兵索之。遂</p>\n<p class=\"exam-para\">伏于河上，侧犹立白衣冠．．．持羽扇少年。少年见人来，微哂前踏一步，奄奄至前古未有惧者，</p>\n<p class=\"exam-para\">血水颤令众退惊连连。素名白衣少年第立，动不动，须臾，望左右益众，乃遂得言曰：“彼</p>\n<p class=\"exam-para\">二人死生在汝前皆不定。”语讫，忽然风烟大作，而事平后，白衣少年竟消，卫兵皆震，但</p>\n<p class=\"exam-para\">留徐起和平与国兴。于此时，国都大学，某间学生舍郎内，封聘书静卧几上，署名曰：陆天</p>\n<p class=\"exam-para\">神。</p>\n<p class=\"exam-para\">12</p>\n<p class=\"exam-para\">（节选自《句记·薛定谔传》）</p>\n<p class=\"exam-para\">10.文中画波浪线的部分有四处需要断句，请用铅笔将答题卡上相应位置的答案标号涂黑。</p>\n<p class=\"exam-para\">定谔 A 幼听父母言 B 无论 C 行事敏谨 D 或起 E 窃邻 F 邸舍 G 万壑书 H 几见</p>\n<p class=\"exam-para\">11. 下列对原文有关内容的概述，不正确的一项是（ ）</p>\n<p class=\"exam-para\">A. 薛定谔 “幼学” 时父母生妹，按古代 “幼学之年”（十岁）的标准，暗示其童年生活</p>\n<p class=\"exam-para\">因妹妹出生而发生转变。</p>\n<p class=\"exam-para\">B. “量子穿隧” 虽为现代物理概念，但文中借历史叙事包装，类似古代志怪小说中 “缩</p>\n<p class=\"exam-para\">地术” 的奇幻设定。</p>\n<p class=\"exam-para\">C. 白衣少年以 “羽扇” 为道具，与《三国演义》中诸葛亮的形象呼应，暗示其智谋高深，</p>\n<p class=\"exam-para\">非寻常人物。</p>\n<p class=\"exam-para\">D. 结尾 “皇帝署名聘书” 的情节，符合古代传记中 “君权神授” 的叙事传统，为薛定</p>\n<p class=\"exam-para\">谔的奇遇增添权威色彩。</p>\n<p class=\"exam-para\">12. 下列对文中相关文化常识的解说，不正确的一项是（ ）</p>\n<p class=\"exam-para\">A. 字定谔：古人成年后取字，名与字常有关联。“谔” 有直言敢谏之意，与 “定谔” 的</p>\n<p class=\"exam-para\">“定” 形成互补，体现古人取名的寓意逻辑。</p>\n<p class=\"exam-para\">B. 庠序：古代学校的代称，商代称 “庠”，周代称 “序”，文中 “学优于庠序” 指薛</p>\n<p class=\"exam-para\">定谔在地方官学中成绩突出。</p>\n<p class=\"exam-para\">C. 礼部尚书：隋唐至明清中央官制中的六部尚书之一，掌管礼仪、科举、外交等事务，与</p>\n<p class=\"exam-para\">文中 “训诫学子” 的职责相符。</p>\n<p class=\"exam-para\">D. 白衣冠：古代指平民服饰，文中 “白衣冠持羽扇” 的装束既符合文人雅士的形象，也</p>\n<p class=\"exam-para\">暗含人物身份的神秘性。</p>\n<p class=\"exam-para\">13.把文中画横线的句子翻译成现代汉语。</p>\n<p class=\"exam-para\">（1）及明日中，人见刑部尚书双书皆不见，亟集卫兵索之。</p>\n<p class=\"exam-para\">（2）少年见其来，微哂前踏一步，奄奄至前古未有惧者，血水颤令退惊连连。</p>\n<p class=\"exam-para\">（二）诗歌阅读（本题共 2 小题，9 分）</p>\n<p class=\"exam-para\">阅读下面关于抽象诗的材料，完成 14-15 题。</p>\n<p class=\"exam-para\">材料一</p>\n<p class=\"exam-para\">抽象诗的定义是：非具象、非主题的纯粹文字视觉形式。其有三个层次：非具象，诗中</p>\n<p class=\"exam-para\">没有任何具体的生活场景和人物形象，超越现象和形象。二是、无主题、非逻辑。抽象诗不</p>\n<p class=\"exam-para\">讲“道理”，也不传递理性的人文思想和哲理。第三，抽象诗是纯粹文字形式的艺术，让文</p>\n<p class=\"exam-para\">13</p>\n<p class=\"exam-para\">字展现自身的形式魅力，不仅是语感形式，还是文字的视觉形式。</p>\n<p class=\"exam-para\">（节选自《抽象诗》许德民 2017.10.28）</p>\n<p class=\"exam-para\">材料二</p>\n<p class=\"exam-para\">玄客远居侍主人</p>\n<p class=\"exam-para\">[当代] 薛</p>\n<p class=\"exam-para\">海峰千渡繁市楼，路远客来莫相忧。</p>\n<p class=\"exam-para\">神洲风雨百余载，只恐腐儒①待客遥。</p>\n<p class=\"exam-para\">正阳门下紫禁城，可堪利士②半沙篓？</p>\n<p class=\"exam-para\">岭南着眼春意浓，遍绿左江木棉柔。</p>\n<p class=\"exam-para\">为何？麓景溟夜，官门通牍，番禺③究谁人住？</p>\n<p class=\"exam-para\">既有所成何故迟，还乡旧里采棉路。</p>\n<p class=\"exam-para\">何为？法兰④之误，罪比季路⑤，诏书撑为谁主？</p>\n<p class=\"exam-para\">圊⑥犬尻囚春宵短，万里江山为身俯。</p>\n<p class=\"exam-para\">黄龙不长墨鳞意，何生赤凤黑羽目。</p>\n<p class=\"exam-para\">若待玄色⑦真汉族，五十六族多一畜。</p>\n<p class=\"exam-para\">【注释】①腐儒：迂腐之儒者。诗中指中国部分官员。②利士：即非利士，是古代非洲大陆</p>\n<p class=\"exam-para\">的代称。③番禺：指的是中国古代广州。《汉书·地理志》中记载：“南海中，岭南节度，</p>\n<p class=\"exam-para\">自番禺、南海，至象州、合浦，凡十五郡”。④法兰：即法兰西，法国目前的人种比例是非</p>\n<p class=\"exam-para\">洲黑人+黑白混血儿 60%，纯种的白种人 35%，其他有色人种 5%。⑤季路：孔子的弟子之一，</p>\n<p class=\"exam-para\">这里是作者犯的一个错误，本意应该是想表达“认贼作父”的典故。⑥圊：《徐锴曰》厕古</p>\n<p class=\"exam-para\">谓之淸者，言汚秽常当淸除也。《博雅》圂厕也。《释名》杂也，言人杂厕其上也。⑦玄色：</p>\n<p class=\"exam-para\">幽远也。黑而有赤色者为玄。象幽而入覆之也。凡玄之属皆从玄。</p>\n<p class=\"exam-para\">14.下列对这首诗的理解和赏析，不正确的一项是（ ）</p>\n<p class=\"exam-para\">A.“神州”“紫禁城”“番禺”等词虽然是地理用词，却并没有直接点明了诗中故事的具体</p>\n<p class=\"exam-para\">位置，它们只是作为抽象字组的一部分，构成了诗歌的形式美。</p>\n<p class=\"exam-para\">B.诗中多处采用反问的手法，其作用既突出诗人情感的激烈，又暗含诗人对于现实社会中存</p>\n<p class=\"exam-para\">在的不公正、腐败、异化等问题的批判和无奈。</p>\n<p class=\"exam-para\">C.这首诗体裁新颖，格律富有变化，诗歌风格瑰丽奇幻，情感矛盾却又显而易见，语言高深</p>\n<p class=\"exam-para\">莫测，创造了一个幻想和神秘色彩的艺术世界。</p>\n<p class=\"exam-para\">D.诗尾倒数第二句，诗人运用衬托手法，以“黄龙”“赤凤”衬托“墨”“黑”的独特，体</p>\n<p class=\"exam-para\">现了诗人对于“独树一帜”审美的欣赏。</p>\n<p class=\"exam-para\">15.（1）“玄”字在诗中多次出现，诗人这样的安排有何用意？并请你联系这层用意，试着</p>\n<p class=\"exam-para\">14</p>\n<p class=\"exam-para\">分析诗题中的“玄客”蕴含了诗人怎样的情感 (3 分)</p>\n<p class=\"exam-para\">（2）“这就是奎桑提，HP 4700，护甲 329，魔抗 201 的英雄。有不可阻挡，有护盾，还</p>\n<p class=\"exam-para\">能过墙。有控制，甚至冷却时间只有 1 秒，只要 15 点蓝。转换姿态时甚至可以刷新 W 的 cd，</p>\n<p class=\"exam-para\">还有真实伤害。然后，护甲和魔抗提升后还能获得技能加速，缩短 Q 的 cd，还缩短释放时</p>\n<p class=\"exam-para\">间，然后还有攻击力。W 就啊啊啊……”</p>\n<p class=\"exam-para\">Showmaker 的这段“圣经”体现了他怎样的感情？这段“圣经”与原诗《玄客远居侍主</p>\n<p class=\"exam-para\">——showmaker 奎桑提圣经</p>\n<p class=\"exam-para\">人》是否有着相同之处？请结合全诗，作简要分析。(3 分)</p>\n<p class=\"exam-para\">（三）名篇名句默写（本题共 1 小题，6 分）</p>\n<p class=\"exam-para\">16.补写出下列句子中的空缺部分。</p>\n<p class=\"exam-para\">（1）薛丶定谔《春晖遥于往昔之梦》中运用反问的手法，表达了对除夕少烟火的遗憾和怀</p>\n<p class=\"exam-para\">念的一句是“_______________，_______________”。</p>\n<p class=\"exam-para\">（2）薛丶定谔《花师》中表达作者对友人的劝慰和鼓励，希望友人能更自信地奔向未来的</p>\n<p class=\"exam-para\">一句是“_______________，_______________”。</p>\n<p class=\"exam-para\">（3）薛丶定谔《送李义山入试》中“_______________，_______________”两句，化用典</p>\n<p class=\"exam-para\">故，以“孔乙己” 来讽刺并劝诫急于求成，功名利禄的友人。</p>\n<div class=\"exam-section\">三、语言文字运用（20 分）（本题共 5 小题，20 分）</div>\n<p class=\"exam-para\">阅读下面的文字，完成下面小题。</p>\n<p class=\"exam-para\">说到她那双脚，实在___人不爱。她已经有二十多岁了，而那双肥小的脚，还同十二三</p>\n<p class=\"exam-para\">岁的小女孩的脚一样。我也曾为她穿过丝袜，所以她那双肥嫩皙白，脚尖很细，后跟很厚的</p>\n<p class=\"exam-para\">肉脚，时常要作我的___的中心。从这一双脚，我能够想出许多离奇的梦境来。譬如在吃饭</p>\n<p class=\"exam-para\">的时候，我一见了粉白糯润的香稻米饭，就会联想到她那双脚上去。“万一这碗里，”我想，</p>\n<p class=\"exam-para\">“万一这碗里盛着的，是她那双嫩脚，那么我这样的在这里咀吮，她必要感到一种奇怪的痒</p>\n<p class=\"exam-para\">痛。___她横躺着身体，把这一双肉脚伸出来任我咀吮的时候，从她那两条很曲的口唇线里，</p>\n<p class=\"exam-para\">必要发出许多真不真假不假的喊声来。___转起身来，也许狠命的在头上打我一下的……”</p>\n<p class=\"exam-para\">我一想到此地饭就要多吃一碗。</p>\n<p class=\"exam-para\">当然这还是分人的，如果是穿皮制高帮靴之类难以透气汗液发酵指数成倍增长，酸味浓</p>\n<p class=\"exam-para\">缩一搬人难以接受，如果是网面鞋透气酸味淡透着清香带点太阳晒过被子的味道，另外帆布</p>\n<p class=\"exam-para\">翻毛皮之类的会和料子的味道交融有种薄荷味。入口先咸后酸，然后鲜味充斥口腔，第一口</p>\n<p class=\"exam-para\">——郁达夫《过去》</p>\n<p class=\"exam-para\">15</p>\n<p class=\"exam-para\">口水咽下去的时候压在喉咙处细细的品又有淡淡的回甘。</p>\n<p class=\"exam-para\">这种足可以算小玉，光有些暗，但是能看出来弹性不够，缺少那种一口饱满的感觉，另</p>\n<p class=\"exam-para\">外就是整体上有点大，对美感有所影响，是否算真的玉足有待商榷​。</p>\n<p class=\"exam-para\">——B 站评论区</p>\n<p class=\"exam-para\">17．下列填入材料一中横线上的词语，最恰当的一项是（ ）</p>\n<p class=\"exam-para\">A. 不免 遐想 即便 或许</p>\n<p class=\"exam-para\">B. 不由 幻想 假如 或者</p>\n<p class=\"exam-para\">C. 未免 意淫 倘若 还能</p>\n<p class=\"exam-para\">D. 必然 想象 要是 而且</p>\n<p class=\"exam-para\">18．材料二中画横线的句子有语病，下列修改最恰当的一项是（ ）</p>\n<p class=\"exam-para\">A. 这种足可以算小玉，光泽有些暗，但是能看出来弹性不够，缺少那种一口饱满的触感，</p>\n<p class=\"exam-para\">另外整体上有点大，对美感有所影响，是否算真的玉足有待商榷。</p>\n<p class=\"exam-para\">B. 这种足可以算小玉，光有些暗，弹性不够能看出来，缺少那种一口饱满的感觉，另外就</p>\n<p class=\"exam-para\">是整体偏大，对美感有所影响，是否算真的玉足有待商量。</p>\n<p class=\"exam-para\">C. 这种足可算小玉，光泽有些暗，看得出弹性不足，缺少那种饱满的触感，另外整体上偏</p>\n<p class=\"exam-para\">大，影响美感，是否为真玉足有待商榷。</p>\n<p class=\"exam-para\">D. 这种足可称小玉，光感较暗，能看出弹性不够，缺少一口饱满的感觉，另外整体偏大，</p>\n<p class=\"exam-para\">对美感影响较大，是否算真玉足有待探讨。</p>\n<p class=\"exam-para\">19．材料一中画波浪线的句子使用了哪种修辞手法？请结合文本分析其表达效果。</p>\n<p class=\"exam-para\">20．材料二中 “入口先咸后酸，然后鲜味充斥口腔” 一句，若改为 “先尝到咸味，再感</p>\n<p class=\"exam-para\">到酸味，最后鲜味充满口腔”，表达效果有何不同？</p>\n<p class=\"exam-para\">21．三轮车学家 Gsound 对腿有着以下定律：</p>\n<p class=\"exam-para\">①第一定律 直接法 通过目测估计法 广义</p>\n<p class=\"exam-para\">②第二定律 间接法 限定范围 祈福 百高 民高 通过对三轮车裤子的观察，观察裤腿的摆</p>\n<p class=\"exam-para\">动，上半身的比例 最终得到一个近似第一定律的数值，有误差在可接受范围 狭义</p>\n<p class=\"exam-para\">③数值的标准值是 10 数值越大表示她越不是车 一般的三轮车数值小于等于 3</p>\n<p class=\"exam-para\">Gsound 的定律与材料中的“腿”有着哪些共通之处？请简要分析。</p>\n<div class=\"exam-section\">四、写作（60 分）</div>\n<p class=\"exam-para\">22.请从以下两篇作文题（Ⅰ）（Ⅱ）中选择其</p>\n<p class=\"exam-para\">16</p>\n<p class=\"exam-para\">中一篇进行作答，并在答题卡相应的区域进行填涂。如果多选或不选，则按（Ⅰ）中的题干</p>\n<p class=\"exam-para\">进行评分。</p>\n<p class=\"exam-para\">（Ⅰ）阅读下面的材料，根据要求写作</p>\n<p class=\"exam-para\">“电车难题(Trolley Problem)”是伦理学领域最为知名的思想实验之一，其内容大致</p>\n<p class=\"exam-para\">是：一个疯子把五个无辜的人绑在电车轨道上。一辆失控的电车朝他们驶来，并且片刻后就</p>\n<p class=\"exam-para\">要碾压到他们。幸运的是，你可以拉一个拉杆，让电车开到另一条轨道上。然而问题在于，</p>\n<p class=\"exam-para\">那个疯子在另一个电车轨道上也绑了一个人。考虑以上状况，你是否应拉拉杆？</p>\n<p class=\"exam-para\">以上材料对我们颇具启示意义。请结合材料写一篇文章，体现你的感悟与思考。</p>\n<p class=\"exam-para\">要求:选准角度，确定立意，明确文体，自拟标题；不要套作，不得抄袭；不得泄露个</p>\n<p class=\"exam-para\">人信息；不少于 800 字。</p>\n<p class=\"exam-para\">（Ⅱ）阅读下面的材料，根据要求写作</p>\n<p class=\"exam-para\">讨论时间的可行性。</p>\n<p class=\"exam-para\">——麻婆豆腐</p>\n<p class=\"exam-para\">还有大把时间可以浪费。</p>\n<p class=\"exam-para\">连一刻也没有为……</p>\n<p class=\"exam-para\">——Gsound</p>\n<p class=\"exam-para\">——薛丶定谔</p>\n<p class=\"exam-para\">这三句话引发了你怎样的联想与思考？请写一篇文章。</p>\n<p class=\"exam-para\">要求:选准角度，确定立意，明确文体，自拟标题；不要套作，不得抄袭；不得泄露个</p>\n<p class=\"exam-para\">人信息；不少于 800 字。</p>\n<p class=\"exam-para\">17</p>\n"}, {"year": "2025", "name": "GLX战队新课标Ⅱ卷", "html": "<p class=\"exam-para\">绝密★启用前</p>\n<p class=\"exam-para\">2025 年 GLX 战队招生全国统一考试（新课标Ⅱ卷）</p>\n<p class=\"exam-para\">注意事项：</p>\n<p class=\"exam-para\">语 文</p>\n<p class=\"exam-para\">1.答卷前，考生务必将自己的姓名、准考证号填写在答题卡上。</p>\n<p class=\"exam-para\">2.回答选择题时，选出每小题答案后，用铅笔把答题卡上对应题目的答案标号</p>\n<p class=\"exam-para\">涂黑。如需改动，用橡皮擦干净后，再选涂其他答案标号。回答非选择题时，</p>\n<p class=\"exam-para\">将答案写在答题卡上。写在本试卷上无效。</p>\n<p class=\"exam-para\">3.考试结束后，将本试卷和答题卡一并交回。</p>\n<div class=\"exam-section\">一、阅读（72 分）</div>\n<p class=\"exam-para\">（一）阅读Ⅰ（本题共 5 小题，19 分）</p>\n<p class=\"exam-para\">阅读下面的文字，完成下面小题。</p>\n<p class=\"exam-para\">材料一：</p>\n<p class=\"exam-para\">校门口铁皮屋子里的老张死了，热死的。</p>\n<p class=\"exam-para\">我向来知道那屋子窄小，只容得下一床一灶，窗是钉死的。三架电风扇嗡嗡地转，却只</p>\n<p class=\"exam-para\">搅得热气打着旋，猫毛在热风里沉浮。大爷养了七八只野猫，电扇原是给猫预备的。猫们此</p>\n<p class=\"exam-para\">刻围着空碗打转，碗底干得发亮，像几只空洞的眼睛</p>\n<p class=\"exam-para\">老张蜷在铺板上，身子薄得像片枯叶。床下塞着双新棉鞋，标签还未撕去，蓝布棉袄搭</p>\n<p class=\"exam-para\">在椅背——皆是毕业生弃在楼道，他喜滋滋拾回的。“留着过冬哩”他说。冬是有的，人却</p>\n<p class=\"exam-para\">没了。</p>\n<p class=\"exam-para\">胃里有些翻搅。我记起上月见他煮挂面，白水翻滚着，蒸汽蒙住那扇打不开的窗。“食</p>\n<p class=\"exam-para\">堂贵哩” 他撩起衣襟揩汗，“面条顶饱〞面汤里浮着几点油星，猫在脚边喵喵地叫。一只</p>\n<p class=\"exam-para\">三花猫右眼糊满脓，他总念叨：“得空带它瞧大夫去”空是有的，钱却无——校里欠了他八</p>\n<p class=\"exam-para\">个月工钱。</p>\n<p class=\"exam-para\">手机震了。是校长在毕业典礼上的讲演，彩绸在空调冷风里飘拂，讲的是“仁爱精神”。</p>\n<p class=\"exam-para\">冷气足得很罢？我前日去行政楼交材料，门缝里溢出的寒气，蛇一样咬人脚踝。大爷屋里的</p>\n<p class=\"exam-para\">风扇还在徒劳地转，切着粘稠的七月。</p>\n<p class=\"exam-para\">几个学生聚在树荫下低语。\"大爷心善……”“猫可怜……〞话头很快被蝉声吞没。远</p>\n<p class=\"exam-para\">1</p>\n<p class=\"exam-para\">处篮球撞击地面，咚咚如心跳。</p>\n<p class=\"exam-para\">我弯腰拾起那只最破的猫碗。塑料碗沿豁了口，沽者些风干的食渣。走到校门铁栅前，</p>\n<p class=\"exam-para\">新装的电子闸机泛着冷光。我踮脚，将空碗卡在最高一根铁刺上。碗口正对着行政楼明晃晃</p>\n<p class=\"exam-para\">的玻璃幕墙。</p>\n<p class=\"exam-para\">正午日头毒得很。铁栅的阴影斜切过宣传栏，把校长满面红光的肖像齐齐劈成两半。空</p>\n<p class=\"exam-para\">碗在热风里轻晃，像颗将落未落的泪。</p>\n<p class=\"exam-para\">三日后，碗不见了。</p>\n<p class=\"exam-para\">铁刺顶端残留着几点塑料碎碴，被昨夜一阵急雨冲进泥里。行政楼照例吐纳着冷气，玻</p>\n<p class=\"exam-para\">璃映出蓝天白云，干净得很。</p>\n<p class=\"exam-para\">野猫还在铁皮屋周圃转悠，叫声细弱，散在夜风里。有工人来换上新锁，“咔哒”一声，</p>\n<p class=\"exam-para\">格外清脆。穿村衫的人夹着公文包匆匆进出，皮鞋底或许曾踏过那些碎碴，也或许未曾——</p>\n<p class=\"exam-para\">横竖无人低头看路。</p>\n<p class=\"exam-para\">泥地里那点白色，渐渐污了，朽了。</p>\n<p class=\"exam-para\">我翻开历史一查，这历史没有年代，歪歪斜斜的每页上都写着“仁义道德” 几个字。</p>\n<p class=\"exam-para\">我横竖睡不着，仔细看了半夜,才从字缝里看出字来，满本都写着两个字是“吃人”！</p>\n<p class=\"exam-para\">（摘编自网友《无声之死》有删改）</p>\n<p class=\"exam-para\">材料二：</p>\n<p class=\"exam-para\">我们都听说过那座矗立在东方的城，像一个巨大的水晶灯盏，夜里亮得让人心慌。即便</p>\n<p class=\"exam-para\">是村口晒太阳的老汉，眯着眼，也能在心里描摹出那些高楼的轮廓，仿佛那是自家屋顶上添</p>\n<p class=\"exam-para\">的瓦，会跟着挺起胸膛，说：“看，我们的日子，亮堂！”</p>\n<p class=\"exam-para\">这亮堂，是真切的。它透过各种会发光的小匣子，照进我们昏暗的土屋。孩子们看着里</p>\n<p class=\"exam-para\">面流光溢彩的车马，眼里充满了对那座城的向往，就像我们小时候向往赶集日那一串难得的</p>\n<p class=\"exam-para\">糖葫芦。大人们则在饭桌上，借着浑浊的酒劲，谈论那里的高楼又长高了多少，仿佛每一寸</p>\n<p class=\"exam-para\">钢筋水泥，都与自家地里的收成息息相关。是的，我们为此自豪，像供奉着祖宗牌位一样，</p>\n<p class=\"exam-para\">供奉着那份遥远的荣耀。只是很少有人问，那灯盏里的油，是从哪里来的？</p>\n<p class=\"exam-para\">后来，城里的人开始对我们这里的味道好奇起来。他们说，那带着泥土气的、火辣辣的</p>\n<p class=\"exam-para\">滋味，是一种“生活的本真”。他们穿着光鲜的衣裳，坐在窗明几净的馆子里，小心翼翼地</p>\n<p class=\"exam-para\">用银亮的筷子夹起那红亮的辣椒，细细品味，像是品鉴一件稀有的古董。他们说，这叫“体</p>\n<p class=\"exam-para\">验”，叫“融合”。我们这里祖祖辈辈用来驱寒、下饭、将就着填饱肚子的辣味，成了他们</p>\n<p class=\"exam-para\">餐桌上的新宠，一种可以随时拾起又随时放下的时髦。他们喜欢这味道，却不一定关心种辣</p>\n<p class=\"exam-para\">2</p>\n<p class=\"exam-para\">椒的人，手是怎样被泥土和生活磨出厚茧。他们品尝了“穷人的味道”，仿佛自己就沾染了</p>\n<p class=\"exam-para\">某种朴素的光环，却转身依旧住进那无需炉火取暖的恒温房间。</p>\n<p class=\"exam-para\">而我们的炉膛呢？它曾烧得很旺，暖着一大家子人。但渐渐地，能烧的东西越来越少。</p>\n<p class=\"exam-para\">最好的木材，被运走了，说是要去建更大更亮的房子。最壮实的年轻人，也走了，他们说要</p>\n<p class=\"exam-para\">去点亮那座远方的灯盏。留下的人，守着越来越薄的田地，越来越冷的灶台。空气里弥漫着</p>\n<p class=\"exam-para\">一种看不见的烟尘，那是故乡在慢慢燃烧自己，为了远方的辉煌。</p>\n<p class=\"exam-para\">“南方十四省的繁华，燃烧的是我的故乡。” 这句话，没有人会挂在嘴上说，但那感</p>\n<p class=\"exam-para\">觉，像冬日里钻进骨缝的风，冷得实在。我们望着远方那片永不熄灭的光明，心里那份与生</p>\n<p class=\"exam-para\">俱来的自豪仍在，只是偶尔，会掺杂一丝不易察觉的灰烬味。这灰烬，来自于我们脚下这片</p>\n<p class=\"exam-para\">正在冷却的土地，来自于我们心中那个日渐空旷的炉膛。</p>\n<p class=\"exam-para\">远方的灯火璀璨夺目，近处的灰烬悄然无声。我们都仰望着那光，却很少有人低头看看，</p>\n<p class=\"exam-para\">自己是否正站在那片被燃烧的土地上，用体温，焐热最后一点余烬。这繁华，这味道，这自</p>\n<p class=\"exam-para\">豪，或许就像一场盛大的皮影戏，光影的绚烂背后，是默默抽丝、默默燃烧的我们。而戏台</p>\n<p class=\"exam-para\">下的人，看得如痴如醉，浑然不觉。</p>\n<p class=\"exam-para\">2025 年 4 月 23 日</p>\n<p class=\"exam-para\">在奉天</p>\n<p class=\"exam-para\">（摘编自薛《远方的灯火与炉膛的灰烬》）</p>\n<p class=\"exam-para\">1. 下列对材料相关内容的理解和分析，不正确的一项是（3 分）（ ）</p>\n<p class=\"exam-para\">A. 材料一中老张虽生活贫困，却充满对未来的规划，他拾回新棉鞋和棉袄准备过冬，</p>\n<p class=\"exam-para\">并计划带生病的猫去看医生。</p>\n<p class=\"exam-para\">B. 材料一通过校长的“仁爱精神”演讲与老张被拖欠工钱热死在小屋的现实进行对比，</p>\n<p class=\"exam-para\">揭示了某些冠冕堂皇言辞背后的虚伪与冷漠。</p>\n<p class=\"exam-para\">C. 材料二中故乡的人们对远方城市的繁华怀有复杂的情感，既有“与有荣焉”的自豪，</p>\n<p class=\"exam-para\">也夹杂着自身被消耗而产生的失落感。</p>\n<p class=\"exam-para\">D. 材料二中城里人热衷于品尝“穷人的味道”，这表明城乡之间的隔阂正在消融，他</p>\n<p class=\"exam-para\">们真心欣赏并渴望理解乡村生活的“本真”。</p>\n<p class=\"exam-para\">2. 根据材料内容，下列说法不正确的一项是（3 分）（ ）</p>\n<p class=\"exam-para\">A. 材料一善于运用细节刻画人物，如“身子薄得像片枯叶”写出老张的衰弱，“空碗……</p>\n<p class=\"exam-para\">像颗将落未落的泪”则寄托了叙事者的哀痛。</p>\n<p class=\"exam-para\">B. 材料二的核心意象是“灯火”与“灰烬”，二者构成一组强烈的象征性对比，揭示</p>\n<p class=\"exam-para\">3</p>\n<p class=\"exam-para\">了现代文明发展中光明与代价的共生关系。</p>\n<p class=\"exam-para\">C. 两则材料在叙事上都采用了第一人称视角，这使得文本带有强烈的主观色彩，有助</p>\n<p class=\"exam-para\">于引导读者代入叙事者的观察与感受，增强情感冲击力。</p>\n<p class=\"exam-para\">D. 两则材料的结尾都表达了深沉的绝望。材料一以“吃人”的论断作结，材料二则用</p>\n<p class=\"exam-para\">“浑然不觉”收尾，都否定了改变现实的任何可能性。</p>\n<p class=\"exam-para\">3. 两篇材料虽然叙事对象不同，但在批判指向上有共通之处。最能概括这种共通指向的关</p>\n<p class=\"exam-para\">键词是（3 分）（ ）</p>\n<p class=\"exam-para\">A. 个体的牺牲</p>\n<p class=\"exam-para\">B. 阶层的固化</p>\n<p class=\"exam-para\">C. 表象与实质</p>\n<p class=\"exam-para\">D. 历史的循环</p>\n<p class=\"exam-para\">4. 材料一中，叙事者“我”将一只破猫碗卡在校门铁刺上，正对行政楼。请结合上下文，</p>\n<p class=\"exam-para\">分析这一行为的多重意涵。（4 分）</p>\n<p class=\"exam-para\">5. （1）材料一结尾直接引用“吃人”，材料二则将故乡比作被燃烧的“炉膛”。请结合两</p>\n<p class=\"exam-para\">篇材料，分析二者所揭示的“被消耗”的方式有何不同，及其背后反映的共同问题。（3 分）</p>\n<p class=\"exam-para\">（2）观察下面两幅插图，结合“材料一”和“材料二”的主题，回答问题。（3 分）</p>\n<p class=\"exam-para\">两则文字材料与两幅插图，虽然形式不同，但都揭示了某种尖锐的社会矛盾。请首先概</p>\n<p class=\"exam-para\">括这一共同指向的矛盾，然后任选一则文字材料和一幅插图，分析它们分别是如何运用不同</p>\n<p class=\"exam-para\">手法（如叙事、比喻、讽刺、视觉对比等）来表现这一矛盾的。</p>\n<p class=\"exam-para\">（二）阅读Ⅱ（本题共 4 小题，18 分）</p>\n<p class=\"exam-para\">阅读下面的文字，完成下小题。</p>\n<p class=\"exam-para\">4</p>\n<p class=\"exam-para\">人外魔境•新宿决战•改（节选）<br>薛</p>\n<p class=\"exam-para\">……</p>\n<p class=\"exam-para\">虎杖悠仁：“总感觉好安静啊……”</p>\n<p class=\"exam-para\">Gsound：“很开心嘛”</p>\n<p class=\"exam-para\">虎杖悠仁：“这当然啊！大家都得救了，乙骨也在努力着，我也要努力了！”</p>\n<p class=\"exam-para\">Gsound：“没错，我们长久以来积累起来的东西，都是有意义的”</p>\n<p class=\"exam-para\">Gsound：“从今往后，只要我们不停下来，道路就会不断延伸……”</p>\n<p class=\"exam-para\">画面一转。</p>\n<p class=\"exam-para\">“Gsound！你在干什么？Gsound！”，虎杖悲愤地大叫着，似乎歇斯底里能拯救守护</p>\n<p class=\"exam-para\">在自己身前的青年。</p>\n<p class=\"exam-para\">……</p>\n<p class=\"exam-para\">时间回到一分钟前，刚经历一场大战的虎杖和 Gsound 正慢慢悠悠地讨论着以后的事。</p>\n<p class=\"exam-para\">“打完这一仗，我就要回老家结婚了”，虎杖笑着说，眼神中充满对未来的向往。</p>\n<p class=\"exam-para\">就在这放松的时刻，一丝黑烟悄然飘进了宿傩尸体，而在无人在意的角落，就这样突</p>\n<p class=\"exam-para\">然闪过一个黑影。</p>\n<p class=\"exam-para\">黑影摆出结印的手势，瞄准了正在笑着的虎杖悠仁。</p>\n<p class=\"exam-para\">“成双之流星”</p>\n<p class=\"exam-para\">一时间，几乎是瞬发的「空间斩」在瞬间就抵达了虎杖的面前，Gsound 眼疾手快，一</p>\n<p class=\"exam-para\">把抱住虎杖，将他牢牢护在身前，躲过了这次袭击，可因此自己却损失了一条手臂。</p>\n<p class=\"exam-para\">“啊啊啊啊啊啊啊啊啊！我的王之力啊！”，Gsound 装模作样地大叫着，转眼间就发</p>\n<p class=\"exam-para\">动「反转术式」将手臂修复好了。</p>\n<p class=\"exam-para\">“呵，我就知道杀死你没这么简单”</p>\n<p class=\"exam-para\">一个熟悉的声音从暗处传来，待到虎杖看清来人，他惊恐的张大了嘴巴。</p>\n<p class=\"exam-para\">“宿……宿傩？！，你不是应该死了吗？”</p>\n<p class=\"exam-para\">但等到虎杖仔细观察宿傩的身体，他发现本应是四手两嘴的宿傩，此时却变成了四手</p>\n<p class=\"exam-para\">两脸。没错，在本因属于伏黑惠脑壳上，长出了一张可憎的脸皮，毫无疑问，那就是这位千</p>\n<p class=\"exam-para\">年前的诅咒之王真实的样貌。</p>\n<p class=\"exam-para\">并且宿傩的的咒力水平明显恢复到了与五条悟决战开始的水平，甚至更高。</p>\n<p class=\"exam-para\">……</p>\n<p class=\"exam-para\">5</p>\n<p class=\"exam-para\">宿傩不理会身后呆滞的虎杖，微微歪头，让属于宿傩的那一面对着 Gsound。</p>\n<p class=\"exam-para\">“嗨，好久不见”，宿傩丑陋的脸庞微笑着。</p>\n<p class=\"exam-para\">“真的假的？！”，Gsound 表情微微一变，阴晴不定。</p>\n<p class=\"exam-para\">“如假包换，我还活蹦乱跳的哦”</p>\n<p class=\"exam-para\">“禁忌术式……”</p>\n<p class=\"exam-para\">“答对了，身体被你斩断的瞬间，我就放弃反击，全神贯注在发动禁忌术式”</p>\n<p class=\"exam-para\">“讲个不停，这家伙……变得很亢奋”</p>\n<p class=\"exam-para\">“不过我在临死前掌握了，生命的核心。你的败因是只将我劈成两半，却没有将我砍</p>\n<p class=\"exam-para\">成肉沫”</p>\n<p class=\"exam-para\">“败因？胜负现在才要开始吧”</p>\n<p class=\"exam-para\">“是吗，是啊，搞不好是哦”</p>\n<p class=\"exam-para\">复活后的宿傩一脸自信淡然，从容不迫的应对着 Gsound 释放的剑气。</p>\n<p class=\"exam-para\">“不知道你为什么会来帮助高专这帮人，不过既然来了，你才是挑战者！”，宿傩此</p>\n<p class=\"exam-para\">时的嘴比八倍 AK 都难压。</p>\n<p class=\"exam-para\">话还没说完，宿傩突然发难，他一个瞬步来到 Gsound 身前，迅速挥出一拳。</p>\n<p class=\"exam-para\">「黑闪」！</p>\n<p class=\"exam-para\">Gsound 抬起手臂防御，但「黑闪」的冲击力依旧将他身体击飞出去。待 Gsound 在空</p>\n<p class=\"exam-para\">中稳好身形，再次看向宿傩时，突然瞳孔地震？！</p>\n<p class=\"exam-para\">只见宿傩悬浮在半空中，单手扶额，口中喃喃道：“天上天下，唯我独尊”。然后朝</p>\n<p class=\"exam-para\">着 Gsound 方向轻点一下，低吟道：</p>\n<p class=\"exam-para\">“术式反转「裂」！”</p>\n<p class=\"exam-para\">霎那间，数道火焰状的环形斩击朝 Gsound 飞泄而出。</p>\n<p class=\"exam-para\">Gsound 快速挥出几道剑气想要抵挡，没想到那环形斩击直接无视剑气，直直逼到了</p>\n<p class=\"exam-para\">Gsound 身前。Gsound 来不及躲闪，被斩击直接命中，奇怪的是，斩击在命中 Gsound 后就消</p>\n<p class=\"exam-para\">失了。从外表上看 Gsound 的衣服和皮肤上并没有出现斩痕，似乎这是一次无效的斩击？</p>\n<p class=\"exam-para\">突然，在空中 Gsound 痛苦地捂住胸口，口中不断咳出鲜血，一脸骇然地看着宿傩。</p>\n<p class=\"exam-para\">“如果说之前的斩击是从外向内去破坏，那术式反转后的斩击「裂」就是由内而外摧</p>\n<p class=\"exam-para\">毁人体”，宿傩笑着给不断口吐鲜血的 Gsound 解释道。</p>\n<p class=\"exam-para\">“这完完全全就是针对人体而生的斩击啊”，Gsound 直勾勾盯着宿傩，表情一脸凝重。</p>\n<p class=\"exam-para\">“你那个所谓的「时间斩」，我猜短时间内无法再用一次了吧，你的咒力已经下降到</p>\n<p class=\"exam-para\">6</p>\n<p class=\"exam-para\">了和乙骨犹太一个水平了，这场战斗赢家必定是我，我儿子可还在漫画外看着呢”，宿傩指</p>\n<p class=\"exam-para\">了指天上，一脸骄傲地看着 Gsound，背后自信的光芒不可置否。</p>\n<p class=\"exam-para\">看着宿傩脸上的表情，Gsound 突然感觉有点恶心，他叹了一口气，随后古怪地说道：</p>\n<p class=\"exam-para\">“这是你逼我的嗷”。</p>\n<p class=\"exam-para\">Gsound 使用「反转术式」稍稍治疗体内的伤势后，他深吸一口气，缓缓拔出身后那把</p>\n<p class=\"exam-para\">黑剑。</p>\n<p class=\"exam-para\">“嚯嚯，不逃走反而接近我吗？这份勇气，我诅咒之王两面宿傩认可了！”</p>\n<p class=\"exam-para\">Gsound 稍一蹲身，手拿双剑朝着宿傩飞射而出，宿傩自信的四手抱胸，似乎并不打算</p>\n<p class=\"exam-para\">作防御。</p>\n<p class=\"exam-para\">“这小子如果还是之前那种程度的斩击，在他斩击出手的一瞬间我就可以秒杀他”，</p>\n<p class=\"exam-para\">宿傩看着逐渐逼近的 Gsound，心中想到。</p>\n<p class=\"exam-para\">Gsound 的身影转眼间就到了宿傩脸前，双手拿剑从身后快速挥出，速度之快甚至超过</p>\n<p class=\"exam-para\">了音速，但那怕是这样，宿傩四眼仍然看清了他的招式。</p>\n<p class=\"exam-para\">“结束了”，宿傩在心里想到，抬起了手。</p>\n<p class=\"exam-para\">就在宿傩的「解」即将释放出来的时候，Gsound 手中的黑剑突然闪了一下。</p>\n<p class=\"exam-para\">「拉屎吧！」</p>\n<p class=\"exam-para\">听到这句话的宿傩脸上突然一征，原本凝结的咒力一拍即散。此时，在宿傩体内即将</p>\n<p class=\"exam-para\">喷涌而出的不是磅礴的咒力，而是引人入胜的“金汁”。</p>\n<p class=\"exam-para\">宿傩夹紧屁股，企图减轻自己浓烈的屎意，可惜他还是太相信自己的肛门了，就在他</p>\n<p class=\"exam-para\">企图放个屁的瞬间，大肠里的排泄物猝不及防的连汤带水喷涌而出。宿傩身下的裤子变得鼓</p>\n<p class=\"exam-para\">鼓囊囊，散发着令人作呕的臭味，他脸上自信淡然的表情变得扭曲。</p>\n<p class=\"exam-para\">“草你妈，「言灵」是你这么用的？能不能堂堂正正地比比咒力”，宿傩死死地捂住</p>\n<p class=\"exam-para\">屁股，怨恨地朝 Gsound 骂道。</p>\n<p class=\"exam-para\">「窝尿吧！」</p>\n<p class=\"exam-para\">宿傩的表情变得有点绝望，本来就没夹住的屁股在尿意和屎意的双重夹击下，已经处</p>\n<p class=\"exam-para\">于崩溃的边缘，但在宿傩强大意志力的支撑下，这两股热流也是被他硬生生憋住了。</p>\n<p class=\"exam-para\">“嘻嘻，很努力嘛”，Gsound 淫笑着对宿傩说着，“那接下来这个如何？”</p>\n<p class=\"exam-para\">「蛇精吧！」</p>\n<p class=\"exam-para\">「呕吐吧！」</p>\n<p class=\"exam-para\">“我你妈？！这个 B 人”，宿傩在心中暗骂。一刻也没有为宿傩的肛门的失守而哀悼，</p>\n<p class=\"exam-para\">7</p>\n<p class=\"exam-para\">立刻赶到战场的是宿傩的前列腺和喉咙。</p>\n<p class=\"exam-para\">霎那间，伴随着宿傩含糊不清绝望的咒骂，他的身体开始不受控制颤抖地喷出汁液，</p>\n<p class=\"exam-para\">呕吐物，尿液，茎液，屎汤齐头并进，哥几个不甘示弱似地进行着比赛，比比谁喷出来更多。</p>\n<p class=\"exam-para\">「泪流满面吧」</p>\n<p class=\"exam-para\">宿傩崩溃大哭，哀嚎着，他现在身上的味道比世界上任何一个垃圾桶都要臭。Gsound</p>\n<p class=\"exam-para\">嬉笑着，在宿傩崩溃的时候不断释放剑气去攻击他，宿傩在精神和肉体双重折磨下意识开始</p>\n<p class=\"exam-para\">模糊，他艰难的用双手结出手印，带着哭腔说道：</p>\n<p class=\"exam-para\">「领…呕…领域展开，呕…真•伏魔御厨子」</p>\n<p class=\"exam-para\">“呜呜呜，就让……你看看什么是…呕…真正的…呕…咒术”，宿傩一边呕吐一边悲</p>\n<p class=\"exam-para\">愤喊道。</p>\n<p class=\"exam-para\">……</p>\n<p class=\"exam-para\">五条悟：“虽然展开领域会非常消耗咒力，但相对的也有它的优点，其一是环境要素</p>\n<p class=\"exam-para\">下的状态提升，另一个就是，在领域内发动的被赋予的术式，绝对会命中”</p>\n<p class=\"exam-para\">「领域展开」</p>\n<p class=\"exam-para\">Gsound 单手结印。</p>\n<p class=\"exam-para\">宿傩听到了那再熟悉不过的言语。那是他亲手埋葬的，最强的亡灵！</p>\n<p class=\"exam-para\">「无量空处」</p>\n<p class=\"exam-para\">……</p>\n<p class=\"exam-para\">宿傩：“我有四不吃”</p>\n<p class=\"exam-para\">宿傩：“第一，牛肉我不吃，因为它善，老牛啊耕地干活一辈子了，最后临了你把它杀</p>\n<p class=\"exam-para\">了，心不忍”</p>\n<p class=\"exam-para\">宿傩：“二不吃，乌鱼我不吃，乌鱼啊黑鱼都见过吧啊，说为什么不吃乌鱼呢？乌鱼产</p>\n<p class=\"exam-para\">子之后，头晕眼花，看不见道，这母鱼就得活活饿死，怎么办呢，小鱼苗主动游到母亲嘴里</p>\n<p class=\"exam-para\">去，喂自己的亲娘，这是民间老说呢乌鱼食子的来历，因为它孝顺所以我不吃”</p>\n<p class=\"exam-para\">宿傩：“三不吃鸿雁，天上飞的大雁我不吃，为什么不吃呢，因为它贞洁，大雁一出来</p>\n<p class=\"exam-para\">就是一对，这只死了那只光棍一辈子，永远不会和别的大雁在一起，因为它的贞”</p>\n<p class=\"exam-para\">宿傩：“第四不吃狗肉，为什么不吃，因为它的忠”</p>\n<p class=\"exam-para\">宿傩：“所以这四样我不吃”</p>\n<p class=\"exam-para\">正说着，一身相声马褂的宿傩朝台前的观众竖了个大拇指，突然听到旁边传来一句：“妈</p>\n<p class=\"exam-para\">的，啥也不吃，吃屎吧你”。</p>\n<p class=\"exam-para\">8</p>\n<p class=\"exam-para\">听到这句话的宿傩张大嘴巴，吃惊地转过头去，刚好看到自己的捧哏搭档 Gsound 把屎塞</p>\n<p class=\"exam-para\">进自己的嘴里，而后两眼一黑昏了过去。</p>\n<p class=\"exam-para\">……</p>\n<p class=\"exam-para\">尸横遍野，硝烟弥漫，塔科夫这片荒芜的土地上迎来了它的三名客人，再次进入海岸线</p>\n<p class=\"exam-para\">地图的雇佣兵三人正在为复活在沼泽叹息不已。</p>\n<p class=\"exam-para\">宿傩：“你妈啊，怎么又是这 b 地方”</p>\n<p class=\"exam-para\">里梅：“每一个不曾去村庄的日子都是对生命的亵渎”</p>\n<p class=\"exam-para\">宿傩：“亵渎？辜负都不会写，还你妈亵渎？这 b 沼泽到底有什么可搜的啊！”</p>\n<p class=\"exam-para\">Gsound：“你们在说什么？”</p>\n<p class=\"exam-para\">里梅：“没事啊，我经常说一句话，沼泽可以有人，但不会一直有人”</p>\n<p class=\"exam-para\">说完，里梅带着 Gsound 前往教堂，却发现教堂里面一个箱子都没有。</p>\n<p class=\"exam-para\">里梅：“不是哥们？一个箱子都没有吗？”</p>\n<p class=\"exam-para\">宿傩：“感觉天都塌了兄弟”</p>\n<p class=\"exam-para\">不信邪的雇佣兵众人秉承着“来都来咯”原则，在对沼泽进行了鄙夷地搜索之后，怒气</p>\n<p class=\"exam-para\">冲冲地前往了村庄。</p>\n<p class=\"exam-para\">宿傩：“能不能来个 PMC 让我虐一下啊”</p>\n<p class=\"exam-para\">里梅：“PM 的 C 吗兄弟，哥几个杀几只人坤就差不多了嘞”</p>\n<p class=\"exam-para\">宿傩：“肥肥搜村庄了 we”</p>\n<p class=\"exam-para\">搜完村庄第一间房子的里梅把目标放在了旁边的便利店身上，进入便利店后一直小心翼</p>\n<p class=\"exam-para\">翼压静步的里梅听到了脚步声，以及人机的喊话声。</p>\n<p class=\"exam-para\">“便利店（周围）有人！”，里梅大叫道。</p>\n<p class=\"exam-para\">“便利店吗？哪呢我看看”，Gsound 的声音听起来有点困惑。</p>\n<p class=\"exam-para\">“便利店是吧，OK 我去看看”，宿傩铿锵有力地说道，眼神中充满对杀人的渴望。</p>\n<p class=\"exam-para\">就在这时，从便利店后门进来的 Gsound 只看到了一个人，那个人在前门架着，似乎没</p>\n<p class=\"exam-para\">有看到自己的到来，霎那间，Gsound 想起了里梅说的话：</p>\n<p class=\"exam-para\">“便利店有人！”</p>\n<p class=\"exam-para\">不给前门的人反应时间，Gsound 立即扣下了扳机，打了前面的人一枪。</p>\n<p class=\"exam-para\">“别打，别打，这你妈是我”，里梅惊愤的声音传来。她的手直接黑了。</p>\n<p class=\"exam-para\">只开了一枪的 Gsound 正庆幸自己手速还好没这么快时，他突然惊奇的发现自己身前，</p>\n<p class=\"exam-para\">在便利店中间的位置出现了一个人。如果说前面那个是队友，那这个在便利店里面正在开抢</p>\n<p class=\"exam-para\">9</p>\n<p class=\"exam-para\">的就是敌人了！</p>\n<p class=\"exam-para\">宿傩：“打死……”</p>\n<p class=\"exam-para\">话还没说完，Gsound 手起枪落，给了面前“敌人”一梭子。</p>\n<p class=\"exam-para\">硬吃了背身一梭子的“敌人”应声倒地，Gsound 自信地说：“死一个！”。</p>\n<p class=\"exam-para\">这时，宿傩幽怨的声音从耳机里面传来：“草你妈，你杀的是我！”</p>\n<p class=\"exam-para\">听到这个声音的 Gsound 短暂的失了下神，随即便进入了自己的头脑风暴。</p>\n<p class=\"exam-para\">“宿傩死前说的什么？杀？可能是叫我去杀那只人机，可是现在我把宿傩杀了，而刚才</p>\n<p class=\"exam-para\">宿傩面朝的方向只有一个人！里梅可能是听见枪声就跑出便利店了”</p>\n<p class=\"exam-para\">“如果是刚才是被扮演成敌人的队友骗了，那这会儿，我就绝不会被扮演成队友的敌人</p>\n<p class=\"exam-para\">再骗了！”</p>\n<p class=\"exam-para\">想到这里，Gsound 毫无顾虑地将自己仅剩的几发子弹倾泻而出，就在这时，Gsound 又</p>\n<p class=\"exam-para\">听到了那个声音。</p>\n<p class=\"exam-para\">“你妈啊，这是我啊，我超！”，里梅愤怒的声音传来。这几发子弹让她接近濒死，身</p>\n<p class=\"exam-para\">体上不断流血，最糟糕的是这局没有人带药。</p>\n<p class=\"exam-para\">即将死亡的里梅无奈地爬到 Gsound 身前，对他说：“我快死了，等下你直接捡我装备</p>\n<p class=\"exam-para\">就行”。</p>\n<p class=\"exam-para\">“然后你直接往沼泽方向跑，就可以撤离了……”，里梅的声音越来越小，细微到听不</p>\n<p class=\"exam-para\">见了。</p>\n<p class=\"exam-para\">里梅，流血身亡。</p>\n<p class=\"exam-para\">今日の胜负，是 Gsound 的胜利！</p>\n<p class=\"exam-para\">致敬最强塔科夫队友——Aiso！</p>\n<p class=\"exam-para\">故事的最后，不熟悉地图的 Gsound 趴在队友的尸体上面瑟瑟发抖，被赶来的人机一枪</p>\n<p class=\"exam-para\">做掉了。</p>\n<p class=\"exam-para\">真是一场酣畅淋漓的塔科夫海岸线（持矢）啊！</p>\n<p class=\"exam-para\">……</p>\n<p class=\"exam-para\">“结束了，这次是真的再见了，两面宿傩”，Gsound 平静地站在濒死的宿傩身边。</p>\n<p class=\"exam-para\">“虎杖，接下来我会将宿傩的灵魂抽取出来，你来发动「解」去切割伏黑惠灵魂的边界”，</p>\n<p class=\"exam-para\">Gsound 转头，对虎杖说道。</p>\n<p class=\"exam-para\">“好”，虎杖答道，朝 Gsound 缓缓走来。</p>\n<p class=\"exam-para\">Gsound 将手放在属于宿傩那一面上，发动「言灵」让宿傩无意识地跟自己念：</p>\n<p class=\"exam-para\">10</p>\n<p class=\"exam-para\">“我感谢天地！”</p>\n<p class=\"exam-para\">“我感谢父母！”</p>\n<p class=\"exam-para\">“我是罪人！”</p>\n<p class=\"exam-para\">“我危害人间！”</p>\n<p class=\"exam-para\">“我辜负苍生！”</p>\n<p class=\"exam-para\">“我愿抛开一切！”</p>\n<p class=\"exam-para\">念到这一句时，本来残缺平静的伏黑惠身体上开始冒出白烟，并伴随着不住的颤抖，属</p>\n<p class=\"exam-para\">于宿傩的那一面表情痛苦不堪，发出阵阵嘶吼。</p>\n<p class=\"exam-para\">“消除名利权利！”</p>\n<p class=\"exam-para\">“舍弃金钱物质！”</p>\n<p class=\"exam-para\">即将念到最后一句了，Gsound 向虎杖微微示意，虎杖缓缓将手贴在宿傩那一面上，准备</p>\n<p class=\"exam-para\">发动切割灵魂边界的「解」。</p>\n<p class=\"exam-para\">“归于……”</p>\n<p class=\"exam-para\">“真……”</p>\n<p class=\"exam-para\">最后一个字“我”即将念出来时，宿傩旁边突然出现一个黑影，手中的武器瞄准了面前</p>\n<p class=\"exam-para\">的 Gsound，虎杖见状，奋力向黑影挥出一拳「黑闪」，可这连宿傩都有所忌惮的「黑闪」，</p>\n<p class=\"exam-para\">黑影连看都没看，用手掌简单接住，随后一击就把虎杖击飞了出去。</p>\n<p class=\"exam-para\">Gsound 脸色一变，暂停了对宿傩的控制，随即拿起双剑对黑影释放剑气，并不断发动着</p>\n<p class=\"exam-para\">「言灵」干扰着黑影的防御。可是这两股能消灭宿傩的力量，落在黑影身上却丝毫造不成一</p>\n<p class=\"exam-para\">丁点影响。</p>\n<p class=\"exam-para\">就在这时，废墟上吹过一阵阴风，白色的斗篷落下，人们终于看清了黑影面孔。</p>\n<p class=\"exam-para\">“我超，不会吧，芥见下下？！”，Gsound 愣住了，口中喃喃道。但高专众人包括虎杖</p>\n<p class=\"exam-para\">却很疑惑。</p>\n<p class=\"exam-para\">……</p>\n<p class=\"exam-para\">“芥见下下是谁？很吊吗？”，从废墟中爬出来的虎杖一脸迷茫地问道。</p>\n<p class=\"exam-para\">Gsound 转头看向虎杖，像看傻子一样对他说：“他是你爹”。继而看向天上的乌鸦，对</p>\n<p class=\"exam-para\">高专众人说：“他是你们所有人的爹”。</p>\n<p class=\"exam-para\">Gsound 叹了一口气，把头转向宿傩继续说道：“但他唯独是宿傩的儿子”。</p>\n<p class=\"exam-para\">“呼呼呼，说得不错，虽然不知道你是从哪里来的，但你小子还挺有眼力见的嘛”，芥</p>\n<p class=\"exam-para\">见下下笑着对 Gsound 说道。</p>\n<p class=\"exam-para\">11</p>\n<p class=\"exam-para\">随即芥见下下收起笑容，一脸杀气地对 Gsound 说：“因此，我不会让你杀了他的，求</p>\n<p class=\"exam-para\">求你们去死吧”。</p>\n<p class=\"exam-para\">霎那间，聚集好咒力的 Gsound 立蓝剑于胸前，喊出咒词：“古希腊掌管时间管理的神”，</p>\n<p class=\"exam-para\">对芥见下下使出了一击就秒杀宿傩的「时间斩」。</p>\n<p class=\"exam-para\">凝滞时间的斩击拥有剥夺生命的权利，但如此恐怖的斩击却被芥见下下一个抬手就抵挡</p>\n<p class=\"exam-para\">住了，身上甚至衣服上一点伤痕都没有！</p>\n<p class=\"exam-para\">Gsound 惊恐地看着芥见下下，震惊地说道：“这不可能！”</p>\n<p class=\"exam-para\">“没什么是不可能的，小子，你只不过是生在没有我时代的凡夫”，芥见下下一脸轻松</p>\n<p class=\"exam-para\">地对 Gsound 说道，“反正你就要死了，那我就告诉你，作为这本漫画的作者，这本漫画所</p>\n<p class=\"exam-para\">有的咒术是无法伤到我的”。</p>\n<p class=\"exam-para\">“我在天上观察了你和我爹战斗时使用的能力，你的术式是剑气也就是斩击吧，你那把</p>\n<p class=\"exam-para\">蓝剑与时间术式有关，而你那把黑剑与「言灵」有关，虽然不知道为什么你的领域是「无量</p>\n<p class=\"exam-para\">空处」，但企图用我创造的力量来打败我，是不是太可笑了些？”，芥见下下冷冷一笑，继</p>\n<p class=\"exam-para\">续说道。</p>\n<p class=\"exam-para\">“我的术式就是所有术式，我的领域就是任何领域”</p>\n<p class=\"exam-para\">“结束了，之后我会用时间术式回到没有你 Gsound 出现的时间线上，而你 Gsound 必定</p>\n<p class=\"exam-para\">被我湮灭”，芥见下下带着平静的表情，说着最为恐怖的话。</p>\n<p class=\"exam-para\">芥见下下深吸一口气，单手结印。</p>\n<p class=\"exam-para\">「领域展开，咒术回战」</p>\n<p class=\"exam-para\">（未完待续）</p>\n<p class=\"exam-para\">6. 下列对本文相关内容的理解，不正确的一项是（3 分）（ ）</p>\n<p class=\"exam-para\">A. 宿傩在与 Gsound 的决战中两次处于濒死状态，第一次被斩断身体后通过掌握“生命</p>\n<p class=\"exam-para\">的核心”而复活，第二次则在精神与肉体的双重打击下被彻底击败。</p>\n<p class=\"exam-para\">B. Gsound 拥有多种强大的能力，他既能使用威力巨大的“时间斩”，也能运用五条悟</p>\n<p class=\"exam-para\">的领域“无量空处”，还持有一把能够发动“言灵”的黑剑。</p>\n<p class=\"exam-para\">C. 文中虎杖悠仁的角色前后形象统一，无论是开篇与 Gsound 的对话，还是结尾面对芥</p>\n<p class=\"exam-para\">见下下，他都表现出作为后辈的困惑与对强大力量的迷茫。</p>\n<p class=\"exam-para\">D. 本文中的终极反派是漫画作者芥见下下，他能够免疫自己作品中的所有咒术，并能</p>\n<p class=\"exam-para\">操控时间线，体现了创世者在自己作品世界中的至高无上性。</p>\n<p class=\"exam-para\">7. 下列对本文艺术特色的分析鉴赏，不正确的一项是（3 分）（ ）</p>\n<p class=\"exam-para\">12</p>\n<p class=\"exam-para\">A. 本文语言风格极具颠覆性，将热血战斗的严肃氛围与荒诞、戏谑的“烂梗”和网络</p>\n<p class=\"exam-para\">迷因相结合，形成了强烈的反差和独特的喜剧效果。</p>\n<p class=\"exam-para\">B. 本文叙事结构天马行空，在主要的战斗情节中穿插了相声表演、游戏直播等超现实</p>\n<p class=\"exam-para\">片段，打破了传统线性叙事的束缚，增强了文本的荒诞感。</p>\n<p class=\"exam-para\">C. 本文善于通过情节反转制造戏剧性，如在 Gsound 与宿傩的决战中，胜负的关键并非</p>\n<p class=\"exam-para\">咒力的比拼，而是通过意想不到的“言灵”攻击瞬间扭转战局。</p>\n<p class=\"exam-para\">D. 本文通过对 Gsound 这一角色的塑造，旨在探讨“绝对力量”与“绝对正义”之间的</p>\n<p class=\"exam-para\">关系，并借其言行批判了原作中角色成长的缓慢与设定的不足。</p>\n<p class=\"exam-para\">8. 在 Gsound 与宿傩的对决中，Gsound 使用“言灵”发动了一系列看似滑稽的攻击（如“拉</p>\n<p class=\"exam-para\">屎吧！”等）。请结合文本，分析这些攻击在情节和人物塑造上起到了怎样的作用。（6 分）</p>\n<p class=\"exam-para\">9. 文末，漫画作者“芥见下下”作为最终反派登场。请结合文本，谈谈这一“元叙事”</p>\n<p class=\"exam-para\">（meta-narrative）手法的运用，给读者带来了怎样的阅读体验和思考？（6 分）</p>\n<p class=\"exam-para\">（三）阅读Ⅲ（本题共 5 题，20 分）</p>\n<p class=\"exam-para\">阅读下面的文言文，完成下面小题。</p>\n<p class=\"exam-para\">材料一：</p>\n<p class=\"exam-para\">句朝十年，桂西北出奇人。此人生于精怪亡毙之所，而卒于精怪初诞之地。人莫知其所</p>\n<p class=\"exam-para\">自来，或曰，见家中所畜牝鸡，夜忽诞一卵，翌日则失，然此人终非鸡属也。奇人忽至，邑</p>\n<p class=\"exam-para\">人皆甚畏之。见其不能言，遂投诸．米瓮，任其自生自灭。然其甚异，竟能于米中浮沉，状若</p>\n<p class=\"exam-para\">游鱼，怡然自得，故名之曰：米哈游。米哈游为乡人以秽物养之，竟得以长成。及长，为宰</p>\n<p class=\"exam-para\">相光所荐，拜为征南大将军，时句朝国势方兴。米哈游战阵之上，所向披靡。身被甲胄，乃</p>\n<p class=\"exam-para\">石珀所锻，其力原始，堪比神明，故号曰“原神”。传其有宝剑二，一曰“星轨”，一曰“零”。</p>\n<p class=\"exam-para\">然见此双剑者，皆已非命而亡，故其详不可考也。</p>\n<p class=\"exam-para\">呜呼，米哈游，真奇人也！句朝何幸得有米哈游。后人有评曰：“非句朝有米哈游，乃</p>\n<p class=\"exam-para\">米哈游择句朝也。”人生在世，无可跨越，于米哈游之事，亦岂能略而不察乎？凡不解米哈</p>\n<p class=\"exam-para\">游之日，皆为虚度光阴，辜负此生也。</p>\n<p class=\"exam-para\">材料二：</p>\n<p class=\"exam-para\">句朝十四年，东南夷狄数．犯疆，成祖陆天神大怒，命米哈游等诸名将南征。句军征伐，</p>\n<p class=\"exam-para\">所向披靡，夷虏死伤甚众。军次．一地，名曰“开放世界”，拾得一婴，尚在襁褓。此婴有夷</p>\n<p class=\"exam-para\">貌，目如琉璃，眉目俊秀，颇有不凡之姿。米哈游将军见之，顿生慈心，乃密留之。时将军</p>\n<p class=\"exam-para\">为婴裹衣，而己裤不慎滑落，遂以谐音，名之曰“库洛”。库洛既长，常窃食将军之珍馐，</p>\n<p class=\"exam-para\">13</p>\n<p class=\"exam-para\">于众人猜忌讥讽之中，日渐成人。及长成，米哈游擢．为帐下副将，掌理军中庶务。初，将军</p>\n<p class=\"exam-para\">甚悦之，无丝毫之厌。句朝四十年，句军将破汉城，欲一举而定朝鲜。然此时，库洛阴通于</p>\n<p class=\"exam-para\">韩，密报军情，韩军遂大破句师。乱军之中，米哈游不信兵败，亲率心腹奋力突围。正此际，</p>\n<p class=\"exam-para\">冷箭破空而至，米哈游忽中矢坠马，阵中大乱……</p>\n<p class=\"exam-para\">此役，句军虽所向克捷，然伤亡亦重。独一人得还自言乃米哈游所养义子声色俱厉诬大</p>\n<p class=\"exam-para\">将军临阵欲脱历数其罪罄竹难书。人有问战况者，彼唯对曰：“后方之事，固如是也。夫前</p>\n<p class=\"exam-para\">方将士，惟听命奋战，一意杀敌足矣；然居于后方者，思虑万千，其事繁多。”至于米哈游，</p>\n<p class=\"exam-para\">则于其构陷之言中，影迹俱灭矣。</p>\n<p class=\"exam-para\">（节选自《句记·米哈游库洛列传》有删改）</p>\n<p class=\"exam-para\">10. 材料二画波浪线的部分有三处需要断句，请用铅笔将答题卡上相应位置的答案标号涂</p>\n<p class=\"exam-para\">黑，每涂对一处给 1 分，涂黑超过三处不给分。（3 分）</p>\n<p class=\"exam-para\">独一人得还 A 自言 B 乃米哈游 C 所养义子 D 声色俱厉 E 诬大将军 F 临阵欲脱 G 历数其罪</p>\n<p class=\"exam-para\">H 罄竹难书。</p>\n<p class=\"exam-para\">11. 下列对材料中加点词语及相关内容的解说，不正确的一项是（3 分）（ ）</p>\n<p class=\"exam-para\">A. 诸，放在名词“米瓮”后，是“之于”的合音，意为“到……里去”。</p>\n<p class=\"exam-para\">B. 擢，提拔、选用，与《出师表》中“陟罚臧否，不宜异同”的“陟”意义相近。</p>\n<p class=\"exam-para\">C. 数，屡次、多次，与《陈涉世家》中“扶苏以数谏故，上使外将兵”的“数”意思</p>\n<p class=\"exam-para\">相同。</p>\n<p class=\"exam-para\">D. 次，驻扎、停留，与《赤壁之战》中“引军北还，乃在武昌”的“在”用法相似。</p>\n<p class=\"exam-para\">12. 下列对材料有关内容的概述，不正确的一项是（3 分）（ ）</p>\n<p class=\"exam-para\">A. 米哈游出身奇异，幼时被乡人轻视，但他天赋异禀，长大后成为句朝所向无敌的将</p>\n<p class=\"exam-para\">军，被誉为“原神”。</p>\n<p class=\"exam-para\">B. 库洛是米哈游在战场上收养的夷人孤儿，因将军为其裹衣时裤子滑落而得名，他在</p>\n<p class=\"exam-para\">猜忌与讥讽中长大。</p>\n<p class=\"exam-para\">C. 米哈游对库洛十分信任，提拔他为副将，但库洛心怀不满，在关键战役中出卖军情，</p>\n<p class=\"exam-para\">并最终射杀米哈游。</p>\n<p class=\"exam-para\">D. 库洛在米哈游死后返回，自称是其义子，并向众人捏造罪名，将兵败的责任全部推</p>\n<p class=\"exam-para\">卸给米哈游，使其声名尽毁。</p>\n<p class=\"exam-para\">13.把文中画横线的句子翻译成现代汉语。（8 分）</p>\n<p class=\"exam-para\">（1）非句朝有米哈游，乃米哈游择句朝也。</p>\n<p class=\"exam-para\">14</p>\n<p class=\"exam-para\">（2）后方之事，固如是也。夫前方将士，惟听命奋战，一意杀敌足矣。</p>\n<p class=\"exam-para\">14. 综合两则材料，简要分析作者是如何通过记述米哈游与库洛的关系，来表达对历史与人</p>\n<p class=\"exam-para\">性的复杂看法的。（6 分）</p>\n<p class=\"exam-para\">（四）阅读Ⅳ（本题共 2 小题，9 分）</p>\n<p class=\"exam-para\">阅读下面两首古体诗，完成下面小题。</p>\n<p class=\"exam-para\">花师①</p>\n<p class=\"exam-para\">[当代] 薛</p>\n<p class=\"exam-para\">秋风俗情兰花残，世人皆责护花难。</p>\n<p class=\"exam-para\">花落茎萎枯叶卷，难支独散风相干。</p>\n<p class=\"exam-para\">不见汝君颊上土，别问不待与言怒。</p>\n<p class=\"exam-para\">看且前圃花有路，自有一亩是归处。</p>\n<p class=\"exam-para\">送李义山入试</p>\n<p class=\"exam-para\">[当代] 薛</p>\n<p class=\"exam-para\">渝州冬景，银杏飞散，铺街黄两岸。风行不待，匆忙学子，碎金点点上肩。抬头望，漫</p>\n<p class=\"exam-para\">天星辰，皆收少年之眼。芸芸又堪何？不及玄风落九门，便偷乙己九川渡②。</p>\n<p class=\"exam-para\">年少有为，不学何为，自信逍遥，或有终成之焉。莫愁人生前路远，总有相伴与同故。</p>\n<p class=\"exam-para\">看千帆过尽，棋盘仍如故③。君知否？心之所向，方是归处。</p>\n<p class=\"exam-para\">【注释】①这首诗是作者写给刚失恋的朋友的。②不等到东风吹落到九重门里，就偷偷学着</p>\n<p class=\"exam-para\">孔乙己去平渡九曲黄河？是作者对于友人急于求成的劝解，告诉他要顺其自然。③“千帆过</p>\n<p class=\"exam-para\">尽，棋盘如故”：这是出自苏轼的《江城子·乙卯正月二十日夜记梦》的名句，原文是“千</p>\n<p class=\"exam-para\">帆过尽，归来看取，长江如许，便似人生”。这里指人生的变化，也寄托了友情的不变。</p>\n<p class=\"exam-para\">15. 下列对这两首诗的理解和赏析，不正确的一项是（3 分）（ ）</p>\n<p class=\"exam-para\">A. 《花师》一诗以“兰花残”起兴 ，用花朵的凋零比喻爱情的逝去，并借此劝慰友人</p>\n<p class=\"exam-para\">不必执着于过往，应向前看，寻觅新的出路。</p>\n<p class=\"exam-para\">B. 《送李义山入试》一诗描绘了冬日学子赶考的场景，“碎金点点上肩”用比喻描绘</p>\n<p class=\"exam-para\">飘落的银杏叶，既写实又饱含着对友人前程的美好祝愿。</p>\n<p class=\"exam-para\">C. 两首诗的创作背景不同，一为劝慰失恋友人 ，一为勉励应试学子，但都体现了作者</p>\n<p class=\"exam-para\">对友人的真切关怀与人生指引。</p>\n<p class=\"exam-para\">15</p>\n<p class=\"exam-para\">D. 两首诗都运用了典故来增强表达效果，《花师》中的“颊上土”与《送李义山入试》</p>\n<p class=\"exam-para\">中的“乙己九川渡” 均使诗歌意蕴更显含蓄古典。</p>\n<p class=\"exam-para\">16. 两首诗都以“归处”作结，但其内涵和侧重有所不同。请结合全诗，分析两首诗中的“归</p>\n<p class=\"exam-para\">处”分别指什么？体现了作者怎样不同的人生态度？（6 分）</p>\n<p class=\"exam-para\">（五）名篇名句默写（本题共 1 小题，6 分）</p>\n<p class=\"exam-para\">17.补写出下列句子中的空缺部分。</p>\n<p class=\"exam-para\">（1）历史课上，老师在评价一位文治武功都极为卓越的君主时说，他既能以雷霆手段平定</p>\n<p class=\"exam-para\">四方，又能以仁德之心安抚万民。薛在《怀古颂 G》中也有类似的诗句：“_______________，</p>\n<p class=\"exam-para\">_______________” ，生动地刻画了这种收放自如的领袖风范。</p>\n<p class=\"exam-para\">（2）作者在看到自己友人画的一幅意境深远的水墨画后感叹，虽然笔墨有限，但真正的艺</p>\n<p class=\"exam-para\">术在于内心的感悟与想象，胸中自有丘壑万千。这正应了薛《火箭筒·题光辉夜画》中的诗</p>\n<p class=\"exam-para\">句：“_______________，_______________”。</p>\n<p class=\"exam-para\">（3）小说中的主角出身微末，却胸怀统一天下之志，他暗下决心，哪怕忍受一时的屈辱困</p>\n<p class=\"exam-para\">顿，也终将让整个世界臣服于自己脚下。薛在《玄客远居侍主人》中用“_______________，</p>\n<p class=\"exam-para\">_______________” 两句，将这种忍辱负重、图谋天下的雄心壮志表现得淋漓尽致。</p>\n<div class=\"exam-section\">三、语言文字运用（本题共 5 小题，18 分）</div>\n<p class=\"exam-para\">阅读下面的文字，完成下面小题。</p>\n<p class=\"exam-para\">材料一：</p>\n<p class=\"exam-para\">貂蝉本意是色诱董卓借机刺杀，但是董卓白天与貂蝉嬉戏，夜晚却总另宿他处，貂蝉未</p>\n<p class=\"exam-para\">寻得行刺的机会。不得已貂蝉只能搭上吕布意图离间父子，借刀杀人。一日貂蝉同吕布幽会，</p>\n<p class=\"exam-para\">董卓突然回府直奔吕布住处，貂蝉来不及逃走只得屏息匿于屏风后。不想竟看到董卓命吕布</p>\n<p class=\"exam-para\">褪净衣衫，跪伏在地。吕布颤抖着将臀高高翘起，董卓不顾义子的哭求，提剑直捣黄龙……</p>\n<p class=\"exam-para\">漫长的一夜，吕布被折腾得昏死过去几次，涕泪口涎和身下的白浊染湿锦被，神智不清呜呜</p>\n<p class=\"exam-para\">咽咽，董卓这才放过他。吕布发丝都被污浊浸透的凄惨模样却勾得貂蝉血气翻涌。貂蝉是俊</p>\n<p class=\"exam-para\">俏少年郎男扮女装，因其吊缠腰三圈故取花名貂蝉。有董卓前人开拓，貂蝉进入得很顺利，</p>\n<p class=\"exam-para\">直将吕布顶撞得如同浪中摇曳的孤舟。</p>\n<p class=\"exam-para\">材料二：</p>\n<p class=\"exam-para\">吕布的翘臀和大腿，是他驾驭赤兔马的关键。根据真实可靠的野史记载，赤兔马奔跑速</p>\n<p class=\"exam-para\">度极快，绝非常人可以驾驭，但是吕布他天赋异禀，有一对傲人的翘臀，每当他坐上赤兔马</p>\n<p class=\"exam-para\">16</p>\n<p class=\"exam-para\">的背，他便会用自己有力的臀大肌夹住赤兔马，并拢自己的大腿，夹得赤兔马欲仙欲死，便</p>\n<p class=\"exam-para\">忍不住地奔跑起来，速度极快且能跑千里，换做是任何一个人坐上去都会摔下来，但是吕布</p>\n<p class=\"exam-para\">依靠他有力的下半身，成功驾驭了这匹神马，</p>\n<p class=\"exam-para\">材料三：</p>\n<p class=\"exam-para\">为了应对战场多变的情况，吕布的子宫其实是他的暗器，他其实是世上罕有的完全体双</p>\n<p class=\"exam-para\">性人，也就是它他的每个功能都正常。每当吕布遇到无法解决的危机的时候，他就会破开自</p>\n<p class=\"exam-para\">己的肚子，把子宫当成暗器扔出去，来堵住敌方的嘴，在逃得生命之后，他的子宫又会自己</p>\n<p class=\"exam-para\">长出来。</p>\n<p class=\"exam-para\">18. 依次填入下面一段文字横线处的词语，最恰当的一组是（3 分）（ ）</p>\n<p class=\"exam-para\">这几则关于吕布的记述，叙事风格______，完全颠覆了其“人中吕布，马中赤兔”的传</p>\n<p class=\"exam-para\">统英雄形象。作者用______的笔法，将历史人物进行“魔改”，使其行为逻辑______，给读</p>\n<p class=\"exam-para\">者带来了强烈的阅读冲击。</p>\n<p class=\"exam-para\">A. 独树一帜 / 严肃 / 合情合理</p>\n<p class=\"exam-para\">B. 别出心裁 / 戏谑 / 匪夷所思</p>\n<p class=\"exam-para\">C. 平淡无奇 / 写实 / 前后一致</p>\n<p class=\"exam-para\">D. 大同小异 / 夸张 / 顺理成章</p>\n<p class=\"exam-para\">19. 材料二开头写道：“根据真实可靠的野史记载”。从语言表达效果上看，这句话存在着</p>\n<p class=\"exam-para\">怎样的矛盾？这样的写法起到了什么作用？（4 分）</p>\n<p class=\"exam-para\">20. 材料一中画线的句子“直将吕布顶撞得如同浪中摇曳的孤舟”，运用了什么修辞手法？</p>\n<p class=\"exam-para\">请简要分析其表达效果。（4 分）</p>\n<p class=\"exam-para\">21. 请将下面这个句子改写成一个长句，使其风格与材料一、二的描述风格更加贴近，并至</p>\n<p class=\"exam-para\">少使用一种比喻或夸张的修辞手法。（4 分）</p>\n<p class=\"exam-para\">原句：吕布在战场上非常勇猛。</p>\n<p class=\"exam-para\">22. 这三则材料都对历史人物吕布进行了“颠覆性”的重塑。请从创作手法的角度，概括这</p>\n<p class=\"exam-para\">种“颠覆”体现在哪两个方面，并简要说明其目的。（5 分）</p>\n<div class=\"exam-section\">三、写作（60 分）</div>\n<p class=\"exam-para\">23.请从以下四篇作文题（Ⅰ）（Ⅱ）（Ⅲ）（Ⅳ）中选择其中一篇进行作答，并在答题卡</p>\n<p class=\"exam-para\">相应的区域进行填涂。如果多选或不选，则按（Ⅰ）中的题干进行评分。</p>\n<p class=\"exam-para\">（Ⅰ）阅读下面的材料，根据要求写作</p>\n<p class=\"exam-para\">17</p>\n<p class=\"exam-para\">常言道，光阴如骏马加鞭，日月似落花流水。转眼间，2022 年已是三年前的夏日旧梦，</p>\n<p class=\"exam-para\">似乎遥远，却又历历在目，记忆未曾消散。或许，下面这道出自当年全国甲卷的物理压轴题，</p>\n<p class=\"exam-para\">便能瞬间叩开你记忆的门扉：</p>\n<p class=\"exam-para\">它是否勾起了你的诸多回忆？你是否想过，如果能穿越时光，与三年前那个夏天里、正</p>\n<p class=\"exam-para\">埋头于考卷的自己重逢，你会对他/她说些什么呢？</p>\n<p class=\"exam-para\">以上材料对我们颇具启示意义。请结合材料，以“写给过去的一封信”为题写一篇文章，</p>\n<p class=\"exam-para\">体现你的感悟与思考。</p>\n<p class=\"exam-para\">要求: 综合材料内容及含意，选好角度，确定立意，完成写作任务。明确收信人，统一</p>\n<p class=\"exam-para\">以“小陆”为写信人，不得泄密个人信息。</p>\n<p class=\"exam-para\">（Ⅱ）阅读下面的材料，根据要求写作</p>\n<p class=\"exam-para\">材料一：</p>\n<p class=\"exam-para\">“他发动一场伟大的战争，矛头直指历史周期率。他明知会“跌的粉碎”但依然赌上身</p>\n<p class=\"exam-para\">后名作一次演习。他看到昔日战友渐行渐远，只能独自一人承担所有。他发现自己曾经信赖</p>\n<p class=\"exam-para\">的朋友预谋私利，只能长叹：“天要下雨，娘要嫁人”。他看着自己羸弱的躯体，艰难地说：</p>\n<p class=\"exam-para\">“你们不走，我也不好走”。他愤怒于他所解放的人民被新的官僚骑在身下，奋笔写下：“人</p>\n<p class=\"exam-para\">18</p>\n<p class=\"exam-para\">民胜利今何在？”。他看着《念奴娇•登多景楼》，不顾眼疾，先是小声念出，接着声音逐</p>\n<p class=\"exam-para\">渐变高，最后竟放声痛哭。六朝何时？只成门户私计！他说，人民万岁！”</p>\n<p class=\"exam-para\">材料二：</p>\n<p class=\"exam-para\">“徐州地方，历代大规模征战五十余次，是非曲折难以论说，但史家无不注意到，正是</p>\n<p class=\"exam-para\">在这个古战场，决定了多少代王朝的盛衰兴亡、此兴彼落，所以古来就有问鼎中原之说。当</p>\n<p class=\"exam-para\">年先总理令革命军分三路会合徐州，兴师北上，光复徐州的第二天，清帝见大势已去，宣告</p>\n<p class=\"exam-para\">退位。民国十六年四月，也正是在徐州城郊，我有幸亲率数十万健儿征讨北洋军阀孙传芳、</p>\n<p class=\"exam-para\">张宗昌，大获全胜！我不明白，为什么大家都在谈论着项羽被困垓下，仿佛这中原古战场对</p>\n<p class=\"exam-para\">我们注定了凶多吉少。二十年前，我从徐州踏上征途，开始了第二次北伐，中华秋海棠叶遂</p>\n<p class=\"exam-para\">归于一统。本党本军所到之处，民众竭诚欢迎，真可谓占尽天时，那种勃勃生机、万物竞发</p>\n<p class=\"exam-para\">的境界，犹在眼前。短短二十年之后，这里竟至于一变而成为我们的葬身之地了么？无论怎</p>\n<p class=\"exam-para\">么样，会战兵力是以八十万对六十万，优势在我！”</p>\n<p class=\"exam-para\">“看来我不得不离开南京，离开我亲手创建的首都。你们以为，此时此刻，我必定悲伤</p>\n<p class=\"exam-para\">不堪吗？以为我必定有说不出的遗憾吗？不，如果南京有一天陷落，我自应以身殉职，我内</p>\n<p class=\"exam-para\">心是不堪忍受的，是我此去，死无葬身之所啊。”</p>\n<p class=\"exam-para\">材料三：</p>\n<p class=\"exam-para\">“刘亚楼，你记一下。我做如下部署调整。以 4 纵、11 纵，加两个独立师强化塔山防</p>\n<p class=\"exam-para\">线；2、3、7、8、9 五个纵队，加 6 纵 17 师，包打锦州；10 纵加 1 个师，在黑山、大虎山</p>\n<p class=\"exam-para\">一线，阻击廖耀湘兵团；12 纵加 12 个独立师，围困长春；5 纵、6 纵两个师，监视沈阳；1</p>\n<p class=\"exam-para\">纵做总预备队。给我复述一遍。”</p>\n<p class=\"exam-para\">以上材料引发了你怎样的联想与思考？请写一篇文章。</p>\n<p class=\"exam-para\">要求:选准角度，确定立意，明确文体，自拟标题；不要套作，不得抄袭；不得泄露个</p>\n<p class=\"exam-para\">人信息；不少于 800 字。</p>\n<p class=\"exam-para\">（Ⅲ）阅读下面一段对话，根据要求写作。</p>\n<p class=\"exam-para\">问：时间还够吗？小陆同学？</p>\n<p class=\"exam-para\">小陆：够的，兄弟，够的</p>\n<p class=\"exam-para\">问：你知道在为别人打伞时有个傻瓜在默默为你淋雨吗？</p>\n<p class=\"exam-para\">小陆：那傻瓜能不能报个点</p>\n<p class=\"exam-para\">问：鸟为什么会飞呢？生命又是因何而沉睡？</p>\n<p class=\"exam-para\">19</p>\n<p class=\"exam-para\">小陆：鸟飞，是因为它是鸟。生命沉睡，是因为你不想上早八</p>\n<p class=\"exam-para\">问：人生若只如初见，何事秋风悲画扇</p>\n<p class=\"exam-para\">小陆：幸甚至哉，歌以咏志</p>\n<p class=\"exam-para\">问：他还能约会，能坐在副驾，而我什么都没有了</p>\n<p class=\"exam-para\">小陆：可是你还能上课啊</p>\n<p class=\"exam-para\">问：如何让一个人忘掉钻四 38 伤害的故事？</p>\n<p class=\"exam-para\">小陆：当火山喷发的时候没人会注意落下来的火山灰，我的意思是高打低紫甲打蓝甲和 95</p>\n<p class=\"exam-para\">抓钩已足够绚丽</p>\n<p class=\"exam-para\">问：你问我答？</p>\n<p class=\"exam-para\">小陆：我知道你要问什么</p>\n<p class=\"exam-para\">这段对话中，问答之间既有生活琐碎的调侃，也有对情感、认知的独特回应，展现了特</p>\n<p class=\"exam-para\">定语境下的交流方式与思维碰撞。请结合对话内容，从以下角度中任选一个，写一篇文章：</p>\n<p class=\"exam-para\">1 以“对话中的理解与错位”为主题，谈谈你对这段交流的看法；</p>\n<p class=\"exam-para\">2 若你是对话中的 “问者” 或 “小陆”，请以其中一人的视角，补写一段你认为 “未</p>\n<p class=\"exam-para\">说出口的话”，并阐述这样表达的理由；</p>\n<p class=\"exam-para\">3 从对话中的某一组问答出发，提炼其蕴含的生活态度或人生哲理，展开论述。</p>\n<p class=\"exam-para\">要求：选准角度，确定立意，明确文体，自拟标题；不要套作，不得抄袭；不得泄露个</p>\n<p class=\"exam-para\">人信息；不少于 800 字。</p>\n<p class=\"exam-para\">（Ⅳ）阅读下面的材料，根据要求写作。</p>\n<p class=\"exam-para\">1</p>\n<p class=\"exam-para\">K1373 次列车乘客砸窗通风，官方通报事件详情：车内虽然闷热，但没有达到破窗的紧</p>\n<p class=\"exam-para\">急程度，铁路公安已对破窗男子批评教育。</p>\n<p class=\"exam-para\">2</p>\n<p class=\"exam-para\">18 岁女孩因生活压力过大跳江，父亲到场后一顿责骂“还死不死？不死回家！”。</p>\n<p class=\"exam-para\">3 深圳一家甜品店招聘员工，每天上班 16 个小时月休 2 天？劳动部门：可投诉。</p>\n<p class=\"exam-para\">4 “我家三孩子吃不起牛排，但三个孩子照样健康长大，穷养有罪？”网友锐评：“生了</p>\n<p class=\"exam-para\">两个招娣，终于生出太子了”。</p>\n<p class=\"exam-para\">5</p>\n<p class=\"exam-para\">38 岁女子挺八个月孕肚仍坚持高温天送外卖，阳光的笑容感动在场顾客。网友锐评：“这</p>\n<p class=\"exam-para\">不仅是在歌颂苦难，更是在歌颂这个社会的悲哀！”。</p>\n<p class=\"exam-para\">6 月薪 3 万每天工作仅 2 个小时，郑州一海洋公园招“摸鱼官”。“要求颜值高、性格好，</p>\n<p class=\"exam-para\">最重要是海豚喜欢”。网友锐评：“哪位领导叫‘海豚’啊”。、</p>\n<p class=\"exam-para\">20</p>\n<p class=\"exam-para\">请结合上述材料，从中任选一到两个片段进行分析，或综合思考多个现象，谈谈你的看</p>\n<p class=\"exam-para\">法。</p>\n<p class=\"exam-para\">要求：选准角度，确定立意，明确文体，自拟标题；不要套作，不得抄袭；不得泄露个</p>\n<p class=\"exam-para\">人信息；不少于 800 字。</p>\n<p class=\"exam-para\">21</p>\n"}, {"year": "2026", "name": "GLX战队广西卷", "html": "<p class=\"exam-para\">绝密★启用前</p>\n<p class=\"exam-para\">2026 年 GLX 战队招生全国统一考试（广西卷）</p>\n<p class=\"exam-para\">注意事项：</p>\n<p class=\"exam-para\">语 文</p>\n<p class=\"exam-para\">1.答卷前，考生务必将自己的姓名、准考证号填写在答题卡上。</p>\n<p class=\"exam-para\">2.回答选择题时，选出每小题答案后，用铅笔把答题卡上对应题目的答案标号</p>\n<p class=\"exam-para\">涂黑。如需改动，用橡皮擦干净后，再选涂其他答案标号。回答非选择题时，</p>\n<p class=\"exam-para\">将答案写在答题卡上。写在本试卷上无效。</p>\n<p class=\"exam-para\">3.考试结束后，将本试卷和答题卡一并交回。</p>\n<div class=\"exam-section\">一、阅读（77 分）</div>\n<p class=\"exam-para\">（一）阅读Ⅰ（本题共 5 小题，19 分）</p>\n<p class=\"exam-para\">阅读下面的文字，完成下面小题。</p>\n<p class=\"exam-para\">材料一：</p>\n<p class=\"exam-para\">母亲走 30 多年了, 就埋在村头的老坟地里。她的模样, 她的一举一动, 就跟在眼前似</p>\n<p class=\"exam-para\">的。母亲啊, 一辈子就没闲过, 天不亮就起, 摸着黑才歇。家里家外操不完的心, 穿的永远</p>\n<p class=\"exam-para\">是洗的发白、补了又补的衣裳。她心善, 能容人, 跟邻里没红过脸, 有啥好东西, 总先紧着</p>\n<p class=\"exam-para\">别人。</p>\n<p class=\"exam-para\">最让我忘不了的是吃饭, 一大家子人围着桌子, 母亲从来不上桌。她就在灶台边忙活,</p>\n<p class=\"exam-para\">等我们都吃完了, 她才鳅鳅锅里, 剩下了就扒拉两口, 要是没剩, 她就不吃了, 说不饿。那</p>\n<p class=\"exam-para\">会日子都紧巴, 穷富差不了多少, 可人心热乎, 讲情义。母亲, 就是那最厚道的一个, 她包</p>\n<p class=\"exam-para\">的饺子那叫一个香, 是穷日子里最盼的念想。过年是她最累的时候, 洗洗涮涮, 准备年饭,</p>\n<p class=\"exam-para\">累得腰都直不起来, 可脸上总挂着笑，看着我们放炮仗那股高兴劲, 她比我们还乐呵。再破</p>\n<p class=\"exam-para\">的衣裳, 经她的手, 也给我们拾擬的干干净净。</p>\n<p class=\"exam-para\">那时候还是集体 , 一年四季都出不到一点新鲜菜。到秋天就要分口粮, 白天打下谷子,</p>\n<p class=\"exam-para\">晚上分给每家每户 , 这一分就是一个大晚上。农村的秋天还是一个很冷的秋天, 母亲身上</p>\n<p class=\"exam-para\">穿的很薄, 粮食分到家以后, 母亲这一晚上冻得受不了。她那薄薄的被子围在身上一会儿,</p>\n<p class=\"exam-para\">天就亮了, 母亲一天的辛劳又开始了。</p>\n<p class=\"exam-para\">她揉揉眼 , 又得爬起来, 给一大家子弄吃的。家里人多, 那口烧柴火的大铁锅死沉死</p>\n<p class=\"exam-para\">1</p>\n<p class=\"exam-para\">沉, 端上端下,真不是一般人能干的力气活。现在想想, 母亲那瘦小的身子,哪来那么大劲？</p>\n<p class=\"exam-para\">母亲走的时候才五十出头, 是累病的。如今她的坟就在村边, 一个不起眼的小土包。每</p>\n<p class=\"exam-para\">次回村, 我总要去那站站, 跟她说说话。我在城里千了大半辈子苦力，扛水泥、扎钢筋、爬</p>\n<p class=\"exam-para\">脚手架, 手上肩上全是老茧, 累是真累, 可想想母亲当年端那口大铁锅的劲, 想想她冻得</p>\n<p class=\"exam-para\">发抖还咬牙撑到天亮的样子, 我这力气就又上来了。母亲没享过福, 可她教会我的就是这骨</p>\n<p class=\"exam-para\">子里的硬气和对家的担当, 我得把您撑起来的这个家接着撑下去, 撑稳当。</p>\n<p class=\"exam-para\">坟头上的草青了又黄黄了又青, 就像我的念想一样, 一年年总也断不了。我已经当了爸</p>\n<p class=\"exam-para\">爸, 也已经当了爷爷, 但我已经 30 多年没叫过妈妈了。我想着等哪天我扛不动水泥了, 就</p>\n<p class=\"exam-para\">回村里挨着那堆土躺下, 没准那时候我再叫妈妈, 她就能听见了。</p>\n<p class=\"exam-para\">（摘编自农民工《我的母亲》有删改）</p>\n<p class=\"exam-para\">材料二：</p>\n<p class=\"exam-para\">怎么说呢？</p>\n<p class=\"exam-para\">我的一天, 好像大部分时间是在等, 就比如夜了哇, 从早起 4 点开始, 就在火车站一</p>\n<p class=\"exam-para\">直等, 等到 7 点才拉了一个客人。然后这个乃求货中间说我绕路。我绕个乃刀路了, 我绕迎</p>\n<p class=\"exam-para\">泽大街修了两个月路, 我不绕我飞过个, 然后这个方祖货就不给钱。个在那个汽路丫丫上硬</p>\n<p class=\"exam-para\">要打电话报警。我张是黑车, 也没证。看这单也卵不成, 就让他给了五块钱走。</p>\n<p class=\"exam-para\">诶呀, 到现在想起来也 chua 火的。张是夜了跑的第一个单子, 连个油钱也没下。太原</p>\n<p class=\"exam-para\">这个汽路就是个爬长货, 天天修, 管交通的天 天就是瞎了, 铺了刨, 刨了铺, 你一次性抬</p>\n<p class=\"exam-para\">完不能, 真是球也卵不成，张字数也不够哇。</p>\n<p class=\"exam-para\">吃完饭在摩友群里接了个搬家的小活。去山西大学给两个放假的大学生搬铺盖, 大学生</p>\n<p class=\"exam-para\">心善, 还多给了五块钱。要是我那两娃娃也能上大学就好了。哎, 都是让这电脑害的, 天天</p>\n<p class=\"exam-para\">就知道打游戏, 球迷杏眼的, 甚也卵不成。</p>\n<p class=\"exam-para\">夜了黑了还拉了个男的。从千峰路的平安银行到太原汽车站的, 全程七公里, 大概需要</p>\n<p class=\"exam-para\">17 分钟。欧阳娜娜给导的航, 声音听起来挺好听的,就是导的有点日怪。走晋祠路一直堵,</p>\n<p class=\"exam-para\">回了家就是半夜,吃了些剩饭,拾掇一下脚就睡了。这就是我的一天，实在不知道写甚 啦。</p>\n<p class=\"exam-para\">这个生活哇, 也说不上好, 也说不上不好。每天出来挣个饭钱也就够啦。至于说幸不幸</p>\n<p class=\"exam-para\">福, 看你和谁比哇, 和马云比, 那我肯定不幸福, 和老李比, 那我是幸福的, 因为同样开</p>\n<p class=\"exam-para\">摩托, 我是三轮的, 他是两轮的, 我的还能避避雨呢。</p>\n<p class=\"exam-para\">（摘编自车夫《我的一天》）</p>\n<p class=\"exam-para\">1. 下列对材料相关内容的理解和分析，不正确的一项是（3 分）（ ）</p>\n<p class=\"exam-para\">2</p>\n<p class=\"exam-para\">A. 材料一中，母亲的形象是通过一系列生活细节来塑造的，如不上桌吃饭、过年劳累</p>\n<p class=\"exam-para\">却高兴、寒夜里挨冻等，展现了她的勤劳与无私。</p>\n<p class=\"exam-para\">B. 材料一中，叙事者从对母亲的深切怀念中汲取了精神力量，母亲坚韧担当的品格成</p>\n<p class=\"exam-para\">为他面对现实艰辛、撑起家庭的动力。</p>\n<p class=\"exam-para\">C. 材料二中，叙事者的一天充满了各种不顺，如遇到无理的乘客、抱怨交通拥堵、担</p>\n<p class=\"exam-para\">忧沉迷游戏的孩子等，反映了底层劳动者生活的艰辛。</p>\n<p class=\"exam-para\">D. 材料二的结尾，叙事者通过与马云和老李的对比，表达了他对现实的彻底失望，认</p>\n<p class=\"exam-para\">为自己的生活毫无幸福可言。</p>\n<p class=\"exam-para\">2. 两则材料都展现了鲜明的语言风格，下列对此的分析，不正确的一项是（3 分）（ ）</p>\n<p class=\"exam-para\">A. 材料一的语言朴实无华，情感真挚深沉，通过白描式的回忆，在平淡的叙述中蕴含</p>\n<p class=\"exam-para\">了强大的情感力量，催人泪下。</p>\n<p class=\"exam-para\">B. 材料二大量使用方言、俚语乃至粗话（如“乃求货”“球也卵不成”），虽然不“文</p>\n<p class=\"exam-para\">雅”，但生动地还原了人物的身份和真实的喜怒哀乐。</p>\n<p class=\"exam-para\">C. 两则材料在叙事视角上有所不同，材料一侧重于回望过去，以记忆的视角展开；材</p>\n<p class=\"exam-para\">料二侧重于记录当下，以日志的视角展开。</p>\n<p class=\"exam-para\">D. 两则材料都大量运用了复杂的修辞手法，如比喻、排比、象征等，来增强文章的文</p>\n<p class=\"exam-para\">学性和感染力，显示了作者高超的写作技巧。</p>\n<p class=\"exam-para\">3. 下列对两篇材料所揭示的生活态度和精神内核的分析，最恰当的一项是（3 分）（ ）</p>\n<p class=\"exam-para\">A. 两者都展现了对过往艰苦岁月的无限怀念，认为那时的生活虽然贫穷，但人际关系</p>\n<p class=\"exam-para\">更真挚，精神世界更充实。</p>\n<p class=\"exam-para\">B. 材料一体现了理想主义的英雄气概，叙事者将母亲塑造成战胜一切困难的榜样；材</p>\n<p class=\"exam-para\">料二则体现了宿命论的消极悲观，认为个人幸福完全由社会地位决定。</p>\n<p class=\"exam-para\">C. 材料一通过对母亲无私奉献的回忆，传递出一种依靠“向后看”汲取传统美德力量</p>\n<p class=\"exam-para\">的坚韧；材料二通过对当下生活的牢骚与和解，传递出一种“向前看”和“向旁看”的务实</p>\n<p class=\"exam-para\">与通达。</p>\n<p class=\"exam-para\">D. 两者都表达了底层劳动者面对生活重压时的麻木与无奈，最终都选择了逆来顺受，</p>\n<p class=\"exam-para\">放弃了对改变命运的积极追求。</p>\n<p class=\"exam-para\">4. （1）材料一中，“母亲……端那口烧柴火的大铁锅”这个细节反复出现，作者为什么对</p>\n<p class=\"exam-para\">它记忆深刻？请结合文本简要分析这一细节的作用。（2 分）</p>\n<p class=\"exam-para\">（2）材料二结尾，叙事者将自己与马云、老李进行对比，并得出自己“是幸福的”这一</p>\n<p class=\"exam-para\">3</p>\n<p class=\"exam-para\">结论。这种对比反映了人物怎样的生活哲学？（2 分）</p>\n<p class=\"exam-para\">5. 两位叙事者都身处生活的重压之下，但他们获取内心力量或寻求生活慰藉的方式却不尽</p>\n<p class=\"exam-para\">相同。请结合两篇材料，比较并分析二者在精神支撑来源上的差异。（6 分）</p>\n<p class=\"exam-para\">（二）阅读Ⅱ（本题共 4 小题，18 分）</p>\n<p class=\"exam-para\">阅读下面的文字，完成以下小题。</p>\n<p class=\"exam-para\">百城</p>\n<p class=\"exam-para\">薛</p>\n<p class=\"exam-para\">八月十五刚过，百城的暑气还没来得及消散，从蒙古西伯利亚吹来的冷风就先在城镇上</p>\n<p class=\"exam-para\">空聚集起来了，冷热两种不同性质的空气相遇，使百城笼罩在一片淡淡的薄雾中。</p>\n<p class=\"exam-para\">天空是灰蒙蒙的，厚厚的云和惨白色的雾气糅杂着，无法明白地看到太阳的模样，只有</p>\n<p class=\"exam-para\">渐渐地循着地面上异样的光影，仰头眺望，才能在天空的西北部模糊地瞧见一轮京都人祭祀</p>\n<p class=\"exam-para\"
