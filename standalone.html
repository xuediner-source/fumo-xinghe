>用的滚圈木似的圆，扭曲地、不安地挂在天边。</p>\n<p class=\"exam-para\">但是外边人可感受不到如此美丽的图景，站在百城周边的山顶，往百城方向看过去，普</p>\n<p class=\"exam-para\">通人会惊异于不可名状之景的神秘和诡异。但百城可不是什么奇幻的小城，它就是个城市罢</p>\n<p class=\"exam-para\">了，与中国千千万万个城市好像也并没有什么不同。</p>\n<p class=\"exam-para\">但还是有些区别的罢，百城中迷茫于黑雾中的人们总是在与外来者的交谈中告诉他们真</p>\n<p class=\"exam-para\">正的答案，一种依托于百城神秘下的深沉而又古老的野心，一种将疯狂和梦魇带给人们的可</p>\n<p class=\"exam-para\">怕的真相。要是具有不要命的精神和自甘迷失的信仰，那么就来吧，来进入这发展中的百城，</p>\n<p class=\"exam-para\">来凝视这最沉重的繁华。</p>\n<p class=\"exam-para\">当这样的想法出现在一个人的脑海里的时候，百城会知道这个即将到来的外来者会给自</p>\n<p class=\"exam-para\">己带来什么，它会因此雀跃得几乎就要尖叫起来了！但它知道自己不能尖叫，不是因为这个</p>\n<p class=\"exam-para\">外来者没有使它欢愉，而是因为它只是一个普通的城市而矣。城市又怎么会尖叫呢？</p>\n<p class=\"exam-para\">城市自己当然不会尖叫，但它总能看着它的人发出尖叫，这或许也是一个城市富有活力</p>\n<p class=\"exam-para\">的证明。百城是这样的，它是向来知道的。</p>\n<p class=\"exam-para\">于是这个发出尖叫的可怜虫便出现了，当他伴着新鲜的空气和腐朽的思想走进百城厚大</p>\n<p class=\"exam-para\">的城门的时候，他会惊异于百城周围城墙如同“巨人之城”的高耸。但当他走入这个拱形黑</p>\n<p class=\"exam-para\">洞的时候，我们便需要跟着他了，因为无论是谁都很难在百城找到自我。</p>\n<p class=\"exam-para\">走着，走着，走在这虚实混沌的街道上，路上能遇见生活在百城的他们，他们？是你？</p>\n<p class=\"exam-para\">是我？还是藏于虚荣繁华大厦的它？长叹一声，无所谓，无所谓的，百城居民早就不分彼此</p>\n<p class=\"exam-para\">4</p>\n<p class=\"exam-para\">地被拉进了这团黑雾之中，情绪、特征、活力早就被上升的水汽所带走，消散、迷茫于百城</p>\n<p class=\"exam-para\">的上空，与曲圆一起构成了这天地最壮异的图景。</p>\n<p class=\"exam-para\">因此当走近街道旁的行人时，会惊异于他们脸上的苍凉和麻木。他们是时常带着把伞的，</p>\n<p class=\"exam-para\">无论时令，无论气候，走在街道上的他们却总将伞打开。伞撑开形成的一团圈轮般的阴影，</p>\n<p class=\"exam-para\">他们总会将自己的身体驼起来，把伞给打低，仿佛要将自己全部的血肉也一同融入这阴影中</p>\n<p class=\"exam-para\">去。当在远处看见这一个个赌蘑菇在废墟上嘶嘶的动着，在异样的光影的映衬下是那么的可</p>\n<p class=\"exam-para\">悲，却又很可笑。好了，回过头去，不愿再驻足观看这幅惨象，想着回忆着，只是走。</p>\n<p class=\"exam-para\">但一面走着，一面又不禁感伤着感到有些后怕，总感觉那些旧时代的幽灵在后面不断地</p>\n<p class=\"exam-para\">追逐着。于是有些加快脚步，虽说依旧是走的，却和小跑的速度并无太大的区别了。街区在</p>\n<p class=\"exam-para\">步伐中变换，场景也在凝滞的水汽中不断地发生着缓慢的变化。恍惚间看到街道两旁的树木</p>\n<p class=\"exam-para\">变成了太阳能的电灯，地面上凹凸不平的砖瓦变成了一张张印着“复仇”的海报，抬起头，</p>\n<p class=\"exam-para\">才发觉是到城中心了。</p>\n<p class=\"exam-para\">城中心的景色与郊外自然不同，它拥有着一个富饶城市所特有的、象征着一个城市的时</p>\n<p class=\"exam-para\">代气息的标志性建筑——一幢高层的商业广场！它是多么具有科技感和现代风格的建筑啊！</p>\n<p class=\"exam-para\">虽然它那枯爪一样的树枝和人脸一般的树干，以及诡异的、闪着暗紫色光芒的“眼睛”，似</p>\n<p class=\"exam-para\">乎与平常的商业广场有所不同，但这依旧不影它作为百城魅力的象征。</p>\n<p class=\"exam-para\">因此走近它时，人们会不觉地抬起头去，仔细端详这闪烁着光芒的“眼睛”。它是几乎</p>\n<p class=\"exam-para\">位于树冠顶部的，像一颗黑洞一样吞噬着周围的一切，浓厚的黑雾与异样的光芒由外围不断</p>\n<p class=\"exam-para\">向内坍塌。这也便是为什么百城的云层在卫星图上呈双螺旋眼状——即“上帝之眼”形。</p>\n<p class=\"exam-para\">到现在，百城的方怪已经无法用言语来形容了。高耸危立的围墙、密集林立的城市群、</p>\n<p class=\"exam-para\">诡谲阴森的街道、吞噬光芒的树冠，以及今年八月才带来的黑雾……一种源于对恐惧的好奇</p>\n<p class=\"exam-para\">支撑着，人们总是会在人生最后的旅途中寻找一刻的满足。于是，便爬了出去，那一刻不安</p>\n<p class=\"exam-para\">分的好奇心转变成为进入“眼睛”的动力。当一步步向上艰难喘息的时候，是该注意到由树</p>\n<p class=\"exam-para\">干歪曲的部分组成的惨白人脸。那张脸没有神色，在光影的照映下是那么的无奈，枯死的树</p>\n<p class=\"exam-para\">皮，瘦骨的皮肤，让人好像感受是在梦境，但却依旧知道它是真实的。</p>\n<p class=\"exam-para\">这才是值得恐惧的事物——一种死亡也无法带来的解脱。</p>\n<p class=\"exam-para\">但是，当真正爬到树冠时，会产生对既定目标实现的欣喜，这是一种自虐的、发自内心</p>\n<p class=\"exam-para\">的舒适与畅快。于是在自傲之间，又会不自觉的被“眼睛”的光芒所吸引，人们总会在到达</p>\n<p class=\"exam-para\">黎明前的最后一刻放松警惕。</p>\n<p class=\"exam-para\">好了，现在要做的，只剩下盯着它了，从它那轻快的光芒中，你仿佛又看到了绿水青山，</p>\n<p class=\"exam-para\">5</p>\n<p class=\"exam-para\">看到了母亲刚刚拿来晒的、还在淌水的深蓝色，看到父亲每个月为你织毯五毛钱换来的五彩</p>\n<p class=\"exam-para\">缤纷……一切过往的美好充沛在你的内心，点燃了你大脑对未来的渴望。你冲破一切，泪流</p>\n<p class=\"exam-para\">满面地想要大叫，想要冲破这个时代的黑雾，想要立于世界之顶为人们驱散浓雾，想要以光</p>\n<p class=\"exam-para\">明的视界来见证这个世界。所以，大叫吧！</p>\n<p class=\"exam-para\">但是，要知道，一座城市又怎么会尖叫呢？</p>\n<p class=\"exam-para\">6. 下列对小说内容的理解和概括，不正确的一项是（3 分）（ ）</p>\n<p class=\"exam-para\">A. 小说中的“百城”是一个充满矛盾的所在，它既有现代都市的特征，又呈现出神秘</p>\n<p class=\"exam-para\">诡异、压抑沉闷的氛围。</p>\n<p class=\"exam-para\">B. 小说中的“外来者”进入百城，是受到一种混合了好奇、求索乃至自我毁灭倾向的</p>\n<p class=\"exam-para\">复杂动机所驱使。</p>\n<p class=\"exam-para\">C. 小说中的百城居民是一群失去了个性与活力的“同化者”，他们的麻木状态对外来</p>\n<p class=\"exam-para\">者构成了无形的压力。</p>\n<p class=\"exam-para\">D. 小说结尾外来者迸发出的强烈情感和呐喊，最终打破了百城的沉寂，预示着个体精</p>\n<p class=\"exam-para\">神能够战胜环境的压抑。</p>\n<p class=\"exam-para\">7. 下列对小说艺术手法的分析鉴赏，不正确的一项是（3 分）（ ）</p>\n<p class=\"exam-para\">A. 小说大量运用了象征手法，“黑雾”、“伞”、“巨树”等意象共同构建了一个具</p>\n<p class=\"exam-para\">有丰富解读空间的寓言世界。</p>\n<p class=\"exam-para\">B. 小说的叙事视角在客观冷静的第三人称和代入感极强的第二人称“你”之间切换，</p>\n<p class=\"exam-para\">有效地引导读者亲历被“吞噬”的过程。</p>\n<p class=\"exam-para\">C. 作者善于运用反讽，如将恐怖的巨树称为“商业广场”，将吞噬人的过程形容为城</p>\n<p class=\"exam-para\">市的“活力”，揭示了“繁华”背后的荒诞。</p>\n<p class=\"exam-para\">D. 小说整体上遵循了现实主义的创作原则，通过对城市细节的精确描摹，营造出强烈</p>\n<p class=\"exam-para\">的真实感和可信度。</p>\n<p class=\"exam-para\">8. 小说结尾，当闯入者被引诱着想要“大叫”时，作者却以“一座城市又怎么会尖叫呢？ ”</p>\n<p class=\"exam-para\">作结。请分析这一结尾的深刻含义及其艺术效果。（6 分）</p>\n<p class=\"exam-para\">9. 小说描绘了一个个体被一个巨大而无形的系统所“吞噬”的寓言。请结合全文，谈谈作</p>\n<p class=\"exam-para\">者可能想借“百城”的故事，引发我们对现代社会哪些方面的反思？（6 分）</p>\n<p class=\"exam-para\">（三）阅读Ⅲ（本题共 5 题，20 分）</p>\n<p class=\"exam-para\">阅读下面的文言文，完成下面小题。</p>\n<p class=\"exam-para\">6</p>\n<p class=\"exam-para\">句朝五十年，天下大治，疆域广袤，民丰物阜，海晏河清，一派盛世之景。</p>\n<p class=\"exam-para\">成祖年逾六十，然容颜不改，宛若少年。一日，上召刑部尚书薛、内阁首辅光，共商国</p>\n<p class=\"exam-para\">是。上笑谓二臣曰：“二位老卿，年余不见，须发何以星星然也？”薛亦笑对曰：“陛下，</p>\n<p class=\"exam-para\">岂不闻光阴似箭，日月如梭？焉有不老之理哉。”上慨然曰：“斯言是也。朕偶自算之，已</p>\n<p class=\"exam-para\">年近古稀．．。然怪哉，每晨梦醒，总觉身如弱冠．．，精力充沛，能于巴别塔之上独接五队，持八</p>\n<p class=\"exam-para\">倍 AK 射人百步穿杨，与超影血战三昼夜而复返，归而高卧，犹能戏十之二游，御十女。众</p>\n<p class=\"exam-para\">卿试言，以朕今日之年，下马能战，上马能治，古往今来，何代帝王可与朕比肩哉！”</p>\n<p class=\"exam-para\">光趋步上前，躬身拜曰：“陛下圣武，自是无人能及。然陛下春秋鼎盛，龙体亦需善加</p>\n<p class=\"exam-para\">调养。”上乃长叹，缓言曰：“然力不济矣，行至殿门，便已气短。稍动则晕眩，心如刀绞。</p>\n<p class=\"exam-para\">太医云，朕乃风中之烛，雨中之灯。”言罢，上仰首望天，闭目良久，曰：“人生苦短，如</p>\n<p class=\"exam-para\">此江山，岂能不恋哉。”</p>\n<p class=\"exam-para\">当是时，四海宾服，万国来朝。舟楫、兵戈、格物之学，皆臻前所未有之盛。句朝六十</p>\n<p class=\"exam-para\">年，上崩，庙号成祖，尊谥神文锦绣皇帝。及将发引卤簿．．震耀旌幢蔽空哀笳凄响悲恸衢路四</p>\n<p class=\"exam-para\">夷君长执绋者数百人。百姓男女负土成陵，哭祭于道，累日不绝。</p>\n<p class=\"exam-para\">成祖崩后，句朝六十六年，内阁首辅光病卒。废朝三日，追赠太尉、并州都督，谥曰“延</p>\n<p class=\"exam-para\">光”，赐东园秘器，陪葬昭陵。逾年，刑部尚书薛致仕．．归田，至句朝七十年，薛薨于正寝。</p>\n<p class=\"exam-para\">帝为之辍朝，临其丧而恸。追封德驰王，谥曰“方程”，并追赠三代王爵。自此，句朝开国</p>\n<p class=\"exam-para\">之世遂终，君臣万民，共启新章。</p>\n<p class=\"exam-para\">（节选自《句书》有删改）</p>\n<p class=\"exam-para\">10. 材料二画波浪线的部分有三处需要断句，请用铅笔将答题卡上相应位置的答案标号涂</p>\n<p class=\"exam-para\">黑，每涂对一处给 1 分，涂黑超过三处不给分。（3 分）</p>\n<p class=\"exam-para\">及将发引 A 卤簿震耀 B 旌幢蔽空 C 哀笳凄响 D 悲恸衢路 E 四夷君长 F 执绋者 G</p>\n<p class=\"exam-para\">数百人。</p>\n<p class=\"exam-para\">11. 下列对材料中加点词语及相关内容的解说，不正确的一项是（3 分）（ ）</p>\n<p class=\"exam-para\">A. 古稀：指七十岁。语出杜甫“人生七十古来稀”，文中指皇帝年事已高。</p>\n<p class=\"exam-para\">B. 弱冠：指男子三十岁。出自《礼记》，意为精力开始由盛转衰，与“古稀”相对。</p>\n<p class=\"exam-para\">C. 卤簿：指古代帝王出巡或举行典礼时所用的仪仗队伍，是皇家威仪的象征。</p>\n<p class=\"exam-para\">D. 致仕：指古代官员正常退休。官员将官职交还给君主，多因年老或疾病。</p>\n<p class=\"exam-para\">12. 下列对材料有关内容的概述，不正确的一项是（3 分）（ ）</p>\n<p class=\"exam-para\">A. 成祖皇帝虽年事已高，但自觉精神上依然年轻，并向大臣夸耀自己在梦境中的赫赫</p>\n<p class=\"exam-para\">7</p>\n<p class=\"exam-para\">“战功”，言语间流露出自负与豪情。</p>\n<p class=\"exam-para\">B. 面对皇帝的自夸，大臣们一方面顺势称颂，另一方面也委婉地提醒他注意身体；而</p>\n<p class=\"exam-para\">皇帝自己也清楚地知道龙体衰败的现实。</p>\n<p class=\"exam-para\">C. 成祖皇帝驾崩后，其葬礼极其隆重，不仅本朝百姓悲痛欲绝，连外国的君主首领也</p>\n<p class=\"exam-para\">前来为他拉引灵车，足见其威望之高。</p>\n<p class=\"exam-para\">D. 成祖死后，其开国功臣薛与光也立刻辞官归隐，标志着一个时代的彻底落幕，句朝</p>\n<p class=\"exam-para\">从此由盛转衰，国力日渐不支。</p>\n<p class=\"exam-para\">13.把文中画横线的句子翻译成现代汉语。（8 分）</p>\n<p class=\"exam-para\">（1）众卿试言，以朕今日之年，下马能战，上马能治，古往今来，何代帝王可与朕比</p>\n<p class=\"exam-para\">肩哉！</p>\n<p class=\"exam-para\">（2）四夷君长执绋者数百人，百姓男女负土成陵，哭祭于道，累日不绝。</p>\n<p class=\"exam-para\">14. 文中的成祖皇帝呈现出一种复杂的形象。他一方面在梦中精力旺盛，另一方面在现实中</p>\n<p class=\"exam-para\">又感叹“力不济矣”。请结合文本，简要分析作者塑造这一矛盾形象的意图。（6 分）</p>\n<p class=\"exam-para\">（四）阅读Ⅳ（本题共 2 小题，9 分）</p>\n<p class=\"exam-para\">请从以下两篇题目（Ⅰ）（Ⅱ）中选择其中一篇进行作答，并在答题卡相应的区</p>\n<p class=\"exam-para\">域进行填涂。如果多选或不选，则按（Ⅰ）中的题干进行评分。</p>\n<p class=\"exam-para\">（Ⅰ）阅读下面的背景材料和古体诗，完成 1~2 题。</p>\n<p class=\"exam-para\">【背景材料】</p>\n<p class=\"exam-para\">在备受关注的武汉大学“性骚扰”案中，男生肖某某历时两年终获法律还以</p>\n<p class=\"exam-para\">清白，但其人生已被诬告和网暴彻底摧毁。然而，败诉的女方杨某媛非但毫无悔</p>\n<p class=\"exam-para\">意，反而在网上高调炫耀自己保研、通过法考的成就，并继续威胁要断绝男方的</p>\n<p class=\"exam-para\">未来。</p>\n<p class=\"exam-para\">江皋①感旧寄箴规</p>\n<p class=\"exam-para\">[当代] 薛</p>\n<p class=\"exam-para\">熏风绮罗凌波门②，彼岸落尽朱樱痕。</p>\n<p class=\"exam-para\">卓刀泉下清明泪，鹦鹉洲头往昔轮。</p>\n<p class=\"exam-para\">焚书且负秦时月，四德③能安黍离④魂。</p>\n<p class=\"exam-para\">今日崇尊洙泗⑤典，只缘画皮⑥又叩门。</p>\n<p class=\"exam-para\">【注释】① 江皋：江边高地。箴规：劝诫，规劝。② 凌波门、卓刀泉、鹦鹉洲：均为武汉</p>\n<p class=\"exam-para\">8</p>\n<p class=\"exam-para\">大学或武汉市的著名地标。朱樱：指武大的樱花。③ 四德：中国古代对女子的四种行为准</p>\n<p class=\"exam-para\">则，即妇德、妇言、妇容、妇功。④ 黍离：《诗经》中的一篇，抒发了故国覆灭、黍稷丛</p>\n<p class=\"exam-para\">生的悲伤。后用“黍离之悲”指亡国之痛或对时事变迁的感伤。⑤ 洙泗：洙水和泗水，皆</p>\n<p class=\"exam-para\">在今山东，是孔子讲学的地方，后代指儒家文化或圣人之教。⑥ 画皮：出自《聊斋志异》，</p>\n<p class=\"exam-para\">指披着人皮、外表美丽的恶鬼。</p>\n<p class=\"exam-para\">15. 下列对这首诗的理解和赏析，结合背景材料看，不正确的一项是（3 分）（ ）</p>\n<p class=\"exam-para\">A. 首联以“凌波门”点明地点，用“朱樱落尽”的景象，既暗示了武大美</p>\n<p class=\"exam-para\">好景色的逝去，也象征着事件中纯真与美好的彻底终结。</p>\n<p class=\"exam-para\">B. 颔联借“清明泪”与“往昔轮”，表达了诗人对蒙冤男生（肖某某）被</p>\n<p class=\"exam-para\">毁人生的深切哀悼，以及此事给人留下难以磨灭的创伤记忆。</p>\n<p class=\"exam-para\">C. 颈联以“焚书”比喻对男生前途的摧毁，以“黍离魂”形容其精神创伤，</p>\n<p class=\"exam-para\">并通过反问“四德能安”表达了对加害者道德缺失的强烈质问。</p>\n<p class=\"exam-para\">D. 尾联通过“洙泗典”与“画皮”的对比，最终旨在批判现行法律体系存</p>\n<p class=\"exam-para\">在漏洞，未能对加害者做出应有的、更严厉的惩罚。</p>\n<p class=\"exam-para\">16. 这首诗的题目是《江皋感旧寄箴规》，其中“箴规”（劝诫和规劝）是诗眼。</p>\n<p class=\"exam-para\">请结合全诗，分析这首诗的“箴规”之意是如何从“感旧”（感怀往事）层层递</p>\n<p class=\"exam-para\">进，最终升华为对整个社会的深沉警示的？</p>\n<p class=\"exam-para\">（Ⅱ）阅读下面两首古体诗，完成下面小题。</p>\n<p class=\"exam-para\">【创作背景】：</p>\n<p class=\"exam-para\">这两首诗均创作于 2023 年冬至。材料一的背景是：学校取消了往年让学生回家团聚一</p>\n<p class=\"exam-para\">晚的冬至假期。材料二的背景是：当天，该校一位女同学坠楼自缢。</p>\n<p class=\"exam-para\">材料一：</p>\n<p class=\"exam-para\">即冬至有闻小作</p>\n<p class=\"exam-para\">[当代] 薛</p>\n<p class=\"exam-para\">日暮东山过，草缚①重燃日。</p>\n<p class=\"exam-para\">故居何处寻，笼中亡旧知。</p>\n<p class=\"exam-para\">鸦渡黑难落，马涨硝烟池。</p>\n<p class=\"exam-para\">岂料无自知，猪狗立殿时。</p>\n<p class=\"exam-para\">材料二：</p>\n<p class=\"exam-para\">9</p>\n<p class=\"exam-para\">冬至忆往者所作</p>\n<p class=\"exam-para\">[当代] 薛</p>\n<p class=\"exam-para\">质明②空始霁，杜鹃③夜难回。</p>\n<p class=\"exam-para\">孤影乘霜落，沐华④悲为谁？</p>\n<p class=\"exam-para\">【注释】①缚：一种阻燃的物质②质明：天刚亮的时候。③杜鹃：传说中蜀国国王杜宇的魂</p>\n<p class=\"exam-para\">魄所化，啼声凄切，常被用作悲苦思归的意象。④沐华：沐浴着月光或日光。</p>\n<p class=\"exam-para\">15. 下列对这两首诗的理解和赏析，不正确的一项是（3 分）（ ）</p>\n<p class=\"exam-para\">A. 材料一中“故居何处寻”直抒胸臆，表达了学生因假期被取消而无法回家的失落，</p>\n<p class=\"exam-para\">“笼中亡旧知”则以比喻手法，哀叹学校扼杀了“回家团聚”这一充满人情的旧传统。</p>\n<p class=\"exam-para\">B. 材料二中“杜鹃夜难回”运用典故，悲叹逝去的女同学生命不再复返，“孤影乘霜</p>\n<p class=\"exam-para\">落”的意象既是诗人孤独身影的写照，也可能暗示了同学坠落的悲惨瞬间。</p>\n<p class=\"exam-para\">C. 材料一以“猪狗立殿时”的激烈言辞，表达了对学校管理层决定的强烈愤慨；材料</p>\n<p class=\"exam-para\">二以“悲为谁”的自问，表达了对生命逝去的深切哀痛，前者是公共批判，后者是私人悼亡。</p>\n<p class=\"exam-para\">D. 两首诗都体现了作者对现实的极度失望，并借冬至的寒冷意象，表达了希望渺茫、</p>\n<p class=\"exam-para\">彻底放弃抗争的消极宿命感。</p>\n<p class=\"exam-para\">16. 诗人并未直接记述“取消假期”和“同学离世”这两件具体事件，而是选择了古典诗歌</p>\n<p class=\"exam-para\">的形式，将激愤与哀痛“藏匿”于一系列古典意象之下。请分析诗人为何要采取这种隐晦的</p>\n<p class=\"exam-para\">表达方式，并说明这种写法带来了怎样的艺术效果。（6 分）</p>\n<p class=\"exam-para\">（五）阅读Ⅴ（本题共 2 小题，5 分）</p>\n<p class=\"exam-para\">请从以下两篇题目（Ⅰ）（Ⅱ）中选择其中一篇进行作答，并在答题卡相应的区</p>\n<p class=\"exam-para\">域进行填涂。如果多选或不选，则按（Ⅰ）中的题干进行评分。</p>\n<p class=\"exam-para\">（Ⅰ）阅读下面的材料，完成以下小题。</p>\n<p class=\"exam-para\">材料一：</p>\n<p class=\"exam-para\">东京的学费真值啊</p>\n<p class=\"exam-para\">听说东京的教育真是让人羡慕。父母把几十万日元砸进去, 孩子穿着整洁的制服走进大</p>\n<p class=\"exam-para\">学, 四年后技着学士服走出来, 风光得像电视剧里的镜头。新闻里说, 东京的高等教有让无</p>\n<p class=\"exam-para\">数家庭\"改变命运\", 我边刷着那新间,边把手里的账单揉皱了。</p>\n<p class=\"exam-para\">当然, 这里指的是日本。</p>\n<p class=\"exam-para\">我就是那种被寄托了\"改变命运\"希望的人。父母在乡下种田, 舍不得吃好穿好, 把地里</p>\n<p class=\"exam-para\">10</p>\n<p class=\"exam-para\">刨出的每一块硬市都捏得发亮, 才把我送进东京的那所\"好学校\"。学费一学期十几万日元,</p>\n<p class=\"exam-para\">再加上住宿、生活、补习班, 一算, 四年下来就是一栋小房子的价格。家里那台用了五六年</p>\n<p class=\"exam-para\">的老电视, 是他们唯一舍得换的东西。</p>\n<p class=\"exam-para\">毕业那天, 父母坐在操场的角落, 脸上堆着不习惯的受。 我心里想： 没关系, 很快就</p>\n<p class=\"exam-para\">能找个好工作, 让他们住上大房子。可是等我走进这座城市的招聘会, 才发现那一排排的岗</p>\n<p class=\"exam-para\">位后面, 都有人早已排着长队。</p>\n<p class=\"exam-para\">投出去几十份简历, 有的石沉大海, 有的回信只写了两个字： \"抱歉。\"我开始做兼职,</p>\n<p class=\"exam-para\">夜里在便利店打工,白天还要去面试。 朋友里有人学设计 , 现在在快餐店裱汉堡; 有人学</p>\n<p class=\"exam-para\">金融, 现在送快递, 一天跑八十单。我们偶尔见面, 谁都不提梦想, 彼此只问房租交了没。</p>\n<p class=\"exam-para\">新闻里还在说, 东京的年轻人正享受着\"前所未有的机遇\"。我隔着手机屏, 忍不住笑出</p>\n<p class=\"exam-para\">了声, 笑得眼眶发红。</p>\n<p class=\"exam-para\">父母那边偶尔打来电话：\"工作还顺利呜？ 钱够花吗？\"我看着佘额里的几万日元, 想</p>\n<p class=\"exam-para\">起他们几十万的投入, 喉陇发紧, 最后只敢说：\"挺好的。\"</p>\n<p class=\"exam-para\">挺好啊。东京真好。只要你不去算账 , 只要你不去问那些被耗尽青春、却找不到出路</p>\n<p class=\"exam-para\">的孩子。</p>\n<p class=\"exam-para\">材料二：</p>\n<p class=\"exam-para\">经济寒冬下，可怜的日本大学生</p>\n<p class=\"exam-para\">东京的冬天冷得特别彻底，风刮在脸上像刀割。地铁里挤满了刚下班的年轻人，他们低</p>\n<p class=\"exam-para\">头刷着手机，背着大学时用旧了的双肩包，在城市里默默找着落脚的角落。</p>\n<p class=\"exam-para\">当然，这里指的是日本。</p>\n<p class=\"exam-para\">这些人，大多几个月前还在教室里。有人读了三年，有人读了四年，苦熬到毕业，终点</p>\n<p class=\"exam-para\">却像个陷阱。他们的父母在地方小镇靠着一手好劳力，一点一点凑出学费、房租、生活费，</p>\n<p class=\"exam-para\">只为让孩子能在这座城市立住脚。</p>\n<p class=\"exam-para\">结果等来的，是“985 学校是吧，先实习三个月，薪资面议”“转正之后会考虑加一点</p>\n<p class=\"exam-para\">交通补贴”“加班是责任感的体现”，还有“现在社会内卷太严重了，你不拼，别人就上来</p>\n<p class=\"exam-para\">了”。有时候投出一百封简历，只等来三封“谢谢你的兴趣”。</p>\n<p class=\"exam-para\">当然，这里指的是日本。</p>\n<p class=\"exam-para\">不少人最后进入了那种号称“有前景”的企业。工作内容每天都在变，薪资却始终没变；</p>\n<p class=\"exam-para\">通勤时间两小时起步，加班到凌晨两点都得笑着说“辛苦了”；租住的房子离市区太远，一</p>\n<p class=\"exam-para\">扇窗对着高架桥，每晚都伴着汽车轰鸣入睡。</p>\n<p class=\"exam-para\">11</p>\n<p class=\"exam-para\">有人笑着说，自己总算进了“大厂”。可一顿午餐得掐点买特价便当，下班只能吃便利</p>\n<p class=\"exam-para\">店打折寿司，工资花完还要靠信用卡续命。明面上叫白领，实际连黑工都不如自由。</p>\n<p class=\"exam-para\">东京的某些车站，总有人在夜里独自发呆，不哭，也不说话。他们不是没有梦想，只是</p>\n<p class=\"exam-para\">实在太困了。有人小时候的理想是“做外交官”，现在最大的愿望是“老板别发火”。</p>\n<p class=\"exam-para\">他们活得像是一群漂在空气里的气球，父母拉着线，城市在放风，只要一松手，就不知</p>\n<p class=\"exam-para\">道会被吹到哪里。</p>\n<p class=\"exam-para\">东京的广告牌上依然写着“未来由你创造”，电视节目还在说“年轻人应当创业、多元</p>\n<p class=\"exam-para\">发展”。可是谁都知道，这些话他们听了十年，现在听起来，只像一种莫大的讽刺。</p>\n<p class=\"exam-para\">有时候，你会在清晨六点的街头看到年轻人顶着黑眼圈冲进地铁口，在便利店里看到一</p>\n<p class=\"exam-para\">张张疲惫的脸，努力把“欢迎光临”喊出笑意。你会在社交平台上看到他们调侃自己：“感</p>\n<p class=\"exam-para\">谢大学让我成功加入打工人行列。”</p>\n<p class=\"exam-para\">他们不是不努力，他们只是无力。他们读了十几年的书，熬过了升学考试、实习考核，</p>\n<p class=\"exam-para\">最后被现实轻轻一推，就跌进了寒风中。</p>\n<p class=\"exam-para\">可怜的日本大学生。又或许，不止是日本的。那一张张失眠的脸，在别的国家某座城市</p>\n<p class=\"exam-para\">的夜里，也一样清晰。他们都在苦苦寻找着一个答案——“我们读书那么多年，到底是为了</p>\n<p class=\"exam-para\">什么？”</p>\n<p class=\"exam-para\">而风很冷，答案很远。</p>\n<p class=\"exam-para\">看完你大概了解了，以上全文写的都是日本。</p>\n<p class=\"exam-para\">（节选自抖音 魏光阴.有删改）</p>\n<p class=\"exam-para\">17. 假设这两篇材料是两个人，它们都反复强调“当然，这里指的是日本”。根据它们的叙</p>\n<p class=\"exam-para\">述风格和核心目的，你认为它们最符合中国古代寓言中的哪一种“人格画像”？（3 分）（ ）</p>\n<p class=\"exam-para\">A. “自相矛盾”的楚国人：一边叫卖着无坚不摧的矛，一边推销着无物可破的盾，逻</p>\n<p class=\"exam-para\">辑混乱，意图不明。</p>\n<p class=\"exam-para\">B. “指桑骂槐”的智者：表面上在对着桑树指指点点，实际上句句都在影射一旁的槐</p>\n<p class=\"exam-para\">树，意在言外，用心良苦。</p>\n<p class=\"exam-para\">C. “刻舟求剑”的过江客：剑已落水，船已远行，却仍在船身上刻下记号，拘泥于表</p>\n<p class=\"exam-para\">象，不识时务。</p>\n<p class=\"exam-para\">D. “掩耳盗铃”的偷铃人：以为捂住自己的耳朵，别人就听不见铃声，用自欺欺人的</p>\n<p class=\"exam-para\">方式逃避显而易见的事实。</p>\n<p class=\"exam-para\">18. 材料一的父母“脸上堆着不习惯的笑”，材料二的父母用“一手好劳力”凑出学费。假</p>\n<p class=\"exam-para\">12</p>\n<p class=\"exam-para\">如这两对倾尽所有的父母，读到了他们孩子写的这两篇文章，他们可能会陷入一种巨大的沉</p>\n<p class=\"exam-para\">默。请你设身处地，分析这份“沉默”中可能蕴含的价值。（2 分）</p>\n<p class=\"exam-para\">（Ⅱ）阅读下面的材料，完成以下小题。</p>\n<p class=\"exam-para\">材料一：</p>\n<p class=\"exam-para\">李占良从来不觉得自己有什么问题。</p>\n<p class=\"exam-para\">良子</p>\n<p class=\"exam-para\">他坐在出租屋里，面前摆着七八个外卖盒子，手机支架上直播还在进行。弹幕里骂声一</p>\n<p class=\"exam-para\">片，他视而不见，只是机械地往嘴里塞着食物。油腻的汤汁顺着他的下巴滴落，滴在已经看</p>\n<p class=\"exam-para\">不出原色的 T 恤上。</p>\n<p class=\"exam-para\">\"老铁们，良弟今天状态不错。\"他含糊不清地说着，嘴里还塞着半个包子。</p>\n<p class=\"exam-para\">没人知道昨天他又打了养父老李一顿。只因为老李说他该减肥了，说他这样下去会死的。</p>\n<p class=\"exam-para\">死？良子觉得可笑。他才四十三岁，正是年富力强的时候。那些说他会死的人，不过是嫉妒</p>\n<p class=\"exam-para\">他能吃这么多好东西罢了。</p>\n<p class=\"exam-para\">他想起了那个叫良二的徒弟，给他干了一年活，一分钱没拿到。后来良二自己开直播赚</p>\n<p class=\"exam-para\">钱了，他就翻脸抢账号。凭什么？是他教会了良二怎么在镜头前表演，怎么讨好观众。良二</p>\n<p class=\"exam-para\">欠他的。</p>\n<p class=\"exam-para\">还有那个女主播千万，说什么喜欢他，要给他生大胖小子。后来又澄清说只是蹭流量。</p>\n<p class=\"exam-para\">女人都是骗子，都想从他身上捞好处。他已经看透了。</p>\n<p class=\"exam-para\">良子继续吃着。胃部传来的不是饱腹感，而是一种奇怪的空虚。好像有什么东西在他的</p>\n<p class=\"exam-para\">肚子里翻滚，在咆哮，永远填不满。</p>\n<p class=\"exam-para\">他记得小时候，七岁的自己总是饿。但那时的饿和现在不一样。那时是真的没有食物，</p>\n<p class=\"exam-para\">现在是有了食物却依然空虚。他搞不懂这种区别，也不想搞懂。</p>\n<p class=\"exam-para\">直播间里有人刷礼物，他咧嘴笑了笑。这些傻子，为了看他吃东西就给他钱。世界上没</p>\n<p class=\"exam-para\">有比这更容易的生意了。</p>\n<p class=\"exam-para\">他的手机响了，是虎磊。自从他在杭州坑了虎磊几万块钱后，虎磊就再也没联系过他。</p>\n<p class=\"exam-para\">现在打电话来干什么？</p>\n<p class=\"exam-para\">良子没接。他继续吃着，一口接一口，仿佛在进行某种仪式。</p>\n<p class=\"exam-para\">夜深了，直播终于结束。良子关掉手机，看着满桌子的残羹剩饭。房间里弥漫着各种食</p>\n<p class=\"exam-para\">物混合的味道，甜腻、油腥、发酸。他习惯了这种味道，甚至觉得安心。</p>\n<p class=\"exam-para\">13</p>\n<p class=\"exam-para\">胸口又开始闷痛了。最近这种疼痛越来越频繁，有时候疼得他冷汗直冒。但他不会去医</p>\n<p class=\"exam-para\">院，医生只会让他少吃，那些人不懂。</p>\n<p class=\"exam-para\">他躺在床上，床垫在他的重量下深深凹陷。天花板上有一道裂缝，像一张咧开的嘴。他</p>\n<p class=\"exam-para\">盯着那道裂缝，想起了什么，又忘记了什么。</p>\n<p class=\"exam-para\">记忆是个奇怪的东西。有些事情他记得很清楚，比如每一次被人背叛，每一次被人看不</p>\n<p class=\"exam-para\">起。但有些事情他怎么也想不起来，比如自己最初为什么要开始吃这么多。</p>\n<p class=\"exam-para\">可能是因为饿过吧。可能是因为被抛弃过吧。可能是第一次因为吃赚钱吧。可能是因为</p>\n<p class=\"exam-para\">很多原因，也可能没有原因。</p>\n<p class=\"exam-para\">良子不想思考这些。思考让人痛苦，而吃东西不会。至少在咀嚼的时候，世界是安静的，</p>\n<p class=\"exam-para\">只剩下牙齿碰撞食物的声音。</p>\n<p class=\"exam-para\">他又饿了。</p>\n<p class=\"exam-para\">半夜三点，良子爬起来，从冰箱里拿出一盒蛋糕。这是他藏起来的，准备明天直播时吃</p>\n<p class=\"exam-para\">的。但他等不到明天了。</p>\n<p class=\"exam-para\">蛋糕很甜，甜得发腻。但他还是一口一口吃完了。然后是一袋薯片，一盒炸鸡，半个西</p>\n<p class=\"exam-para\">瓜。</p>\n<p class=\"exam-para\">胃部的疼痛越来越剧烈，像有什么东西要撑破他的肚皮。但他停不下来。或者说，他不</p>\n<p class=\"exam-para\">想停下来。</p>\n<p class=\"exam-para\">这是他唯一能控制的事情了。吃什么，吃多少，什么时候吃。在这个人人都想控制他的</p>\n<p class=\"exam-para\">世界里，只有食物是完全属于他的。</p>\n<p class=\"exam-para\">天快亮了，良子终于吃不下了。不是因为饱，而是因为疼。那种疼痛从胃部扩散到全身，</p>\n<p class=\"exam-para\">像潮水一样将他淹没。</p>\n<p class=\"exam-para\">他想叫救护车，但手够不到手机。他想喊人，但喉咙里发不出声音。他只能躺在那里，</p>\n<p class=\"exam-para\">感受着身体一点点变冷。</p>\n<p class=\"exam-para\">在意识模糊的最后时刻，良子好像看到了七岁的自己。那个瘦小的、总是饿着肚子的孩</p>\n<p class=\"exam-para\">子，正站在门口看着他。孩子的眼中没有责备，只有一种说不出的悲伤。</p>\n<p class=\"exam-para\">\"对不起。\"良子想对那个孩子说，但已经说不出话了。</p>\n<p class=\"exam-para\">后来良子真的离开了。医生切开了尸体的大胃袋，里面蜷缩着年轻的，没有胃袋的良子，</p>\n<p class=\"exam-para\">以及……李占良曾经的梦想。</p>\n<p class=\"exam-para\">材料二：</p>\n<p class=\"exam-para\">南方见</p>\n<p class=\"exam-para\">14</p>\n<p class=\"exam-para\">君哥不知道啥叫南方，也不知道南方在哪。他这辈子最远就去过县城，还是二十年前卖</p>\n<p class=\"exam-para\">粮的时候。南方？电视里见过，有高楼，有海，冬天不穿棉裤。可具体在哪儿，得坐啥车，</p>\n<p class=\"exam-para\">到了那儿吃啥住啥，他一概不知。</p>\n<p class=\"exam-para\">但君哥就是敢背上包，跟屏幕那头素未谋面的人说：\"南方见。\"</p>\n<p class=\"exam-para\">包是捡的，印着某化肥厂的广告，拉链坏了一半。里头塞着那件扶贫发的夹克、半包受</p>\n<p class=\"exam-para\">潮的烟，还有一台屏幕裂了的智能手机——里头装着那个已经封号的短视频账号，和他这辈</p>\n<p class=\"exam-para\">子唯一火过的十五秒。</p>\n<p class=\"exam-para\">村里人笑他：\"你个老光棍知道南方咋走？别半道让人骗去挖煤！\"君哥不吭声，把贝雷</p>\n<p class=\"exam-para\">帽往头上一扣，踩着开春的泥巴路就往公路边晃。</p>\n<p class=\"exam-para\">客车司机问：\"去哪儿？\"</p>\n<p class=\"exam-para\">君哥说：\"南边。\"</p>\n<p class=\"exam-para\">司机乐了：\"南边大了，你倒是说个地名啊？\"</p>\n<p class=\"exam-para\">君哥望着车窗外开始融化的雪，忽然想起自己连市里都没去过。他攥了攥手机，锁屏壁</p>\n<p class=\"exam-para\">纸还是默认的蓝天白云。</p>\n<p class=\"exam-para\">\"没事，\"他冲司机摆摆手，\"你就往暖和的地方开。\"</p>\n<p class=\"exam-para\">车开了。君哥坐在最后一排，化肥包换成了编织袋。编织袋里装着全部家当：两件褪色</p>\n<p class=\"exam-para\">的工装裤，一双没穿过几次的胶鞋，还有半包受潮的蓝灵芝烟。临出门前，他把相框擦了又</p>\n<p class=\"exam-para\">擦，最后却还是倒扣着放在了五斗柜上——不敢带，怕弄碎了。</p>\n<p class=\"exam-para\">君哥把脸贴在车窗上，冰凉的玻璃硌得颧骨生疼。外头的雪下得无声无息，像给整个世</p>\n<p class=\"exam-para\">界蒙了层脏棉絮。他呵出的白气在玻璃上晕开一小块，又很快消失。</p>\n<p class=\"exam-para\">车厢里飘着泡面味，混着脚臭和劣质香水的气息。对面坐着对年轻夫妻，女的靠在男人</p>\n<p class=\"exam-para\">肩上打盹，男人轻轻拍着她的背。老君别过头去，数着窗外一闪而过的电线杆。一根，两</p>\n<p class=\"exam-para\">根......数到十七就乱了。</p>\n<p class=\"exam-para\">手机在兜里震了一下。老君摩挲着键盘机，突然想起这手机还是老爸生前用的。按键上</p>\n<p class=\"exam-para\">的数字都磨花了，就像他这些年被磨得所剩无几的记忆。</p>\n<p class=\"exam-para\">乘务员推着餐车经过，喊着\"盒饭二十\"。老君摸了摸内兜里用塑料袋包着的钱，咽了口</p>\n<p class=\"exam-para\">唾沫。他想起灶台上那碗没吃完的酸菜，这会儿该结冰了吧。</p>\n<p class=\"exam-para\">铁轨的声响越来越急，像催命的鼓点。老君缩了缩脖子，把编织袋往怀里搂紧了些。袋</p>\n<p class=\"exam-para\">子里有什么东西硌着胸口，他想了半天才记起，是临走时装的一把老家门钥匙。</p>\n<p class=\"exam-para\">钥匙很重。</p>\n<p class=\"exam-para\">15</p>\n<p class=\"exam-para\">君哥不知道为什么要带这把钥匙。门早就不锁了，村里就剩三户人家，都快散了。锁住</p>\n<p class=\"exam-para\">的东西都不值钱，不锁住的东西又带不走。可他还是把钥匙装进了袋子，就像死人要穿鞋一</p>\n<p class=\"exam-para\">样，没道理，但必须得这么干。</p>\n<p class=\"exam-para\">列车拐了个弯，君哥的身子晃了晃。他想起那十五秒视频里的自己，穿着破棉袄在村口</p>\n<p class=\"exam-para\">唱歌。歌词他早忘了，调也跑了，但莫名其妙就火了。几万个赞，几千条评论，那些字他大</p>\n<p class=\"exam-para\">半不认识，一个也不认识。</p>\n<p class=\"exam-para\">君哥不明白为什么就火了。他就是喝多了，拿手机录了个唱歌。可这些城里人好像从没</p>\n<p class=\"exam-para\">见过农村似的，评论里各种要给他打赏，要他开直播，甚至有人说要接他去南方发展。</p>\n<p class=\"exam-para\">后来账号封了。说是内容违规。君哥不懂啥叫违规，他觉得自己挺正能量的，每天干活，</p>\n<p class=\"exam-para\">不偷不抢，连邻居家鸡跑到他院子里都会主动赶回去。</p>\n<p class=\"exam-para\">但网络世界的正能量显然另有标准。</p>\n<p class=\"exam-para\">现在他去南方了，去赴一个不存在的约。那些网友早就忘了他，正在刷下一个视频，给</p>\n<p class=\"exam-para\">下一个\"老铁\"点赞。但君哥还记得，还当真了。他背着编织袋，怀着老家的钥匙，朝着一个</p>\n<p class=\"exam-para\">不知道在哪儿的方向，去兑现一句随口说出的\"南方见\"。</p>\n<p class=\"exam-para\">车窗上的哈气又散了。君哥看着自己在玻璃上模糊的倒影，五十三岁，头发花白，眼神</p>\n<p class=\"exam-para\">浑浊。这张脸在屏幕里火过十五秒，现在又回到了无人知晓的状态。</p>\n<p class=\"exam-para\">也许这才是常态。十五秒的火，就像春天的雪，下得快，化得也快，不留痕迹。</p>\n<p class=\"exam-para\">但君哥还在路上。带着他的钥匙，他的编织袋，他的键盘手机，和那个永远不会实现的</p>\n<p class=\"exam-para\">约定。</p>\n<p class=\"exam-para\">南方在前面。具体在哪儿，他不知道。但一定在前面。</p>\n<p class=\"exam-para\">17.在心理学中，我们有时会通过“物件自述”来探究主人的内心世界。假如材料中两个核</p>\n<p class=\"exam-para\">心物件——良子的“胃”和君哥的“老家门钥匙”——能够开口说话，下面哪段“自述”最</p>\n<p class=\"exam-para\">精准地揭示了其主人的内在困境？（3 分）（ ）</p>\n<p class=\"exam-para\">A. 胃：“我被撑得很大，因为主人热爱美食，享受着丰盛的生活，这是一种幸福的负</p>\n<p class=\"exam-para\">担。”</p>\n<p class=\"exam-para\">B. 钥匙：“我很重，因为我锁着一个充满珍宝和美好回忆的家，主人带上我是为了守</p>\n<p class=\"exam-para\">护希望。”</p>\n<p class=\"exam-para\">C. 胃：“我是一个填不满的黑洞，食物不是我的目标，吞噬痛苦才是。主人用我来对</p>\n<p class=\"exam-para\">抗整个世界的背叛与空虚。”</p>\n<p class=\"exam-para\">D. 钥匙：“我很轻，因为家早已人去楼空，毫无价值。主人带上我，只是一个无足轻</p>\n<p class=\"exam-para\">16</p>\n<p class=\"exam-para\">重的习惯罢了。”</p>\n<p class=\"exam-para\">18.良子最后的行为是“不停地吃”，君哥最后的行为是“去南方”。从表面看，一个在自</p>\n<p class=\"exam-para\">我毁灭，一个在奔赴希望。但从深层心理看，这两个行为都是他们在各自人生失控的局面下，</p>\n<p class=\"exam-para\">试图抓住的最后一点“掌控感”。请结合文本，简要分析这种“掌控感”分别体现在哪里？</p>\n<p class=\"exam-para\">（2 分）</p>\n<p class=\"exam-para\">（六）名篇名句默写（本题共 1 小题，6 分）</p>\n<p class=\"exam-para\">19. 补写出下列句子中的空缺部分。</p>\n<p class=\"exam-para\">（1）一位青年即将远行追寻理想，他在告别家乡的烟雨时，内心既有对未来的憧憬，又有</p>\n<p class=\"exam-para\">超越世俗成功的更高追求。正如薛在《何曾渔人》中所写，离别已是刻不容缓，而建功立业</p>\n<p class=\"exam-para\">的抱负终将升华为艺术的永恒：“_______________，_______________” 。</p>\n<p class=\"exam-para\">（2）人生常有困顿失意之时，仿佛身处冰天雪地的深山，前路茫茫。然而，希望往往在不</p>\n<p class=\"exam-para\">经意间悄然萌发。薛在《光畔景》中就描绘了这种绝处逢生、柳暗花明的景象：</p>\n<p class=\"exam-para\">“_______________，_______________”。</p>\n<p class=\"exam-para\">（3）青春岁月里，总有些美好的时光如繁花般绚烂而短暂。当一段珍贵的回忆宣告结束，</p>\n<p class=\"exam-para\">而人生的新阶段又即将来临，心中难免五味杂陈。薛在《贺新郎•别末烛独归》中，便精准</p>\n<p class=\"exam-para\">地捕捉了这种繁华落尽、静待未来的心绪：“_______________，_______________” 。</p>\n<div class=\"exam-section\">二、语言文字运用（本题共 5 小题，13 分）</div>\n<p class=\"exam-para\">阅读下面的文字，完成下面小题。</p>\n<p class=\"exam-para\">今天晚上主播去外面应酬完，然后回，坐那个轻轨三号线回出租屋的路上，在那个地铁</p>\n<p class=\"exam-para\">站等地铁的时候，哇当时轻轨站里面人超级多，然后主播一眼就在人群里面看到，看到一个</p>\n<p class=\"exam-para\">能天使，然后我的方舟雷达灯瞪一下就响了。主播对于线上跟人沟通没有什么欲望，QQ 水</p>\n<p class=\"exam-para\">群什么的更是毫无兴趣。</p>\n<p class=\"exam-para\">致力于线下找舟友，但是主播玩了六年的方舟，从主播初一的时候开始吧，不对，从主</p>\n<p class=\"exam-para\">播高一的时候开始吧，到现在主播大学毕业了，已经快要开始上班了。</p>\n<p class=\"exam-para\">好像就，好像身边就只有四个玩方舟的。我当时看到那个能天使，我的眼睛一下子就亮</p>\n<p class=\"exam-para\">了，我当时就在想，我一定要加她的好友，然后我当时就手忙脚乱的，刷刷刷就打开手机，</p>\n<p class=\"exam-para\">那个明日方舟，又很久没有在手机上面打开了，然后我就更新吧。我就更更更，那个地铁来</p>\n<p class=\"exam-para\">了，然后我就一边等着手机更新，一边尾随能天使上了地铁，因为我也坐那班地铁回家，那</p>\n<p class=\"exam-para\">个能天使他找到一个座位坐下了，当时地铁上面很挤，我就一路挤过去，挤到她斜斜前方站</p>\n<p class=\"exam-para\">17</p>\n<p class=\"exam-para\">着。</p>\n<p class=\"exam-para\">然后打开我的方舟界面，我 chua 的一下，我就把这个东西我就亮在她的眼前，她抬起</p>\n<p class=\"exam-para\">头来看了主播一眼，我觉得应该是有一点惊喜的，但是她没有说话，然后我把手机塞给她，</p>\n<p class=\"exam-para\">我说加个好友，我说加个好友，加个好友。然后她就把手机拿过来，然后她就开始在搜查好</p>\n<p class=\"exam-para\">友里面打她的 id，然后有点慢，这段时间主播觉得挺尴尬的，因为主播也不是属于很会跟</p>\n<p class=\"exam-para\">陌生人交流的那种人，我就在那里站着，我就站在她的面前。</p>\n<p class=\"exam-para\">她坐着，主播站着，主播就那么低头看着她，在那里搜自己的 id，然后她搜到了，然</p>\n<p class=\"exam-para\">后用我的手机发了一个好友申请过去，然后把手机还给了主播，主播觉得那也算是认识了吧，</p>\n<p class=\"exam-para\">就就聊两句。我说我说你打集成战略吗？她好像第一遍没有听清，我说你打集成战略吗？</p>\n<p class=\"exam-para\">她说嗯，我说那你看仙术杯了吗？我说今天下午四点钟仙术杯第七届，她好像没听清，</p>\n<p class=\"exam-para\">然后我又说了一遍，我说仙术杯很好看的，你可以看一下。她说没有看，没有看，我说你可</p>\n<p class=\"exam-para\">以看一下，然后她好像也没有看，反正她没有说什么话，她好像从头到尾就没说几个字，然</p>\n<p class=\"exam-para\">后她就低头开始玩自己的手机了，然后主播还有一个站还是两个站就要下车了嘛。</p>\n<p class=\"exam-para\">然后我看她好像不是很想和我聊天的样子，然后我就自己开着手机，上面的方舟挂了一</p>\n<p class=\"exam-para\">把新活动，刷图块和装置的那一个关卡，因为主播在搓玉，搓的人民币都没有了，然后到站</p>\n<p class=\"exam-para\">了，也不是特别尴尬，好吧，还是有一点尴尬。主要是大家都挺内向的吧，到站了主播就要</p>\n<p class=\"exam-para\">下车了，然后我就我当时站在她面前，她这样，她这样，她这样底着玩手机，然后我就我就</p>\n<p class=\"exam-para\">把手这样子在她面前，我就做了一下，我说拜拜，然后她好像没有听见。然后我又大声的重</p>\n<p class=\"exam-para\">复了一遍，我说我说拜拜，然后然后她也拜拜了一下，然后主播就下车了，有一点有一点狼</p>\n<p class=\"exam-para\">狈。</p>\n<p class=\"exam-para\">舟批真的像蟑螂一样多吗？主播怎么没有感觉到呢？主播从上大学到现在去上班。主播</p>\n<p class=\"exam-para\">的包包上一直都挂着通行证，但是从来没有人线下单杀，主播从来没有舟批来加过联系方式。</p>\n<p class=\"exam-para\">主播其实好友一直都满了的，但是主播为了加能天使，特意找了很久，找到一个有一个</p>\n<p class=\"exam-para\">多月，反正就是对不起。但是反正就是有一个多月没有上线了的一个好友，我把他删掉了，</p>\n<p class=\"exam-para\">我想加能天使，但是她现在也没有通过我的好友申请。在三次元找到玩明日方舟的真的好难</p>\n<p class=\"exam-para\">啊，我的出租屋里真的有很多的蟑螂，但是我认识的粥批真的没有几个。</p>\n<p class=\"exam-para\">20. 下列句子中加点的词语，使用最符合“主播”口语风格和人物性格的一项是（3 分）（ ）</p>\n<p class=\"exam-para\">A. 看到能天使后，我心潮澎湃．．．．，决定上前结识这位同好。</p>\n<p class=\"exam-para\">B. 我不动声色．．．．地跟上她，计划着如何自然地开启对话。</p>\n<p class=\"exam-para\">18</p>\n<p class=\"exam-para\">C. 我当时眼睛一下子就亮了</p>\n<p class=\"exam-para\">．．．．．．，心里想着一定要加她好友。</p>\n<p class=\"exam-para\">D. 加好友的过程有点慢，我们俩面面相觑．．．．，不知所措。</p>\n<p class=\"exam-para\">21. 文中“主播”对能天使说：“我说加个好友，我说加个好友，加个好友。” 这种重复</p>\n<p class=\"exam-para\">的表达方式在文中起到了怎样的作用？（2 分）</p>\n<p class=\"exam-para\">22. 请简要分析“我的方舟雷达灯瞪一下就响了”这一比喻的含义和表达效果。（2 分）</p>\n<p class=\"exam-para\">23. 请将文中画线的句子，用不超过 30 个字的正式书面语，简洁、清晰地转述其核心信息。</p>\n<p class=\"exam-para\">（2 分）</p>\n<p class=\"exam-para\">24. 材料结尾，作者将“出租屋里的蟑螂”与“认识的粥批”并列。请分析：这两种看似无</p>\n<p class=\"exam-para\">关的事物在此处形成了怎样的关联？这种关联表达了作者怎样的心酸与自嘲，并进而隐含着</p>\n<p class=\"exam-para\">现代社会怎样的相处模式？（4 分）</p>\n<div class=\"exam-section\">三、写作（60 分）</div>\n<p class=\"exam-para\">25.请从以下三篇题目（Ⅰ）（Ⅱ）（Ⅲ）中选择其中一篇进行作答，并在答题卡相应的区</p>\n<p class=\"exam-para\">域进行填涂。如果多选或不选，则按（Ⅰ）中的题干进行评分。</p>\n<p class=\"exam-para\">（Ⅰ）有人说，我生来就无法保持中立，因为我是女性，我将无条件偏向女性；也有人说，</p>\n<p class=\"exam-para\">我永远无条件支持任何网络上关于女性话语权的声音，无论真假，无论对错；还有人说，问：</p>\n<p class=\"exam-para\">评价一下开国大典，答：怎么全是男的啊？因为他们在现实生活中臭不可闻，无人在意。也</p>\n<p class=\"exam-para\">有人认为不尽如此，对此你怎么看？</p>\n<p class=\"exam-para\">要求: 选准角度，确定立意，明确文体，自拟标题；不要套作，不得抄袭；不得泄露个</p>\n<p class=\"exam-para\">人信息；不少于 800 字。</p>\n<p class=\"exam-para\">（Ⅱ）阅读下面的材料，根据要求写作</p>\n<p class=\"exam-para\">材料一：</p>\n<p class=\"exam-para\">“上岸”，是现代社会中一个常用的网络用语，常指代考生参加研究生、公务员、事业</p>\n<p class=\"exam-para\">编等考试后被成功录取，可指付出努力的某件事情获得成功。</p>\n<p class=\"exam-para\">--百度百科</p>\n<p class=\"exam-para\">材料二：</p>\n<p class=\"exam-para\">“为什么现在有一些人把考公、入党叫做‘上岸’。难道不是为人民服务吗？不是为共</p>\n<p class=\"exam-para\">产主义奋斗终身吗？难道这些人是为了摆脱自己的阶级，成为人上人，才称为‘上岸’吗？”</p>\n<p class=\"exam-para\">19</p>\n<p class=\"exam-para\">--某农民工</p>\n<p class=\"exam-para\">以上材料引发了你怎样的联想与思考？请写一篇文章。</p>\n<p class=\"exam-para\">要求:选准角度，确定立意，明确文体，自拟标题；不要套作，不得抄袭；不得泄露个</p>\n<p class=\"exam-para\">人信息；不少于 800 字。</p>\n<p class=\"exam-para\">（Ⅲ）每一份看似寻常的试卷，都是一枚浓缩了时代与青春的时间胶囊。三年前，当油墨落</p>\n<p class=\"exam-para\">在纸上，它刻印下的是 GLX 那一代人的求索与迷惘；三年后，当你们回望，那字里行间或许</p>\n<p class=\"exam-para\">已是属于一个时代的无悔回响。命题人，是时代的提问者，他们将社会的关切、文化的脉搏</p>\n<p class=\"exam-para\">与未来的期许，熔铸成一张张考卷，递交给奔赴考场的你们。今天，假如时光流转，让你成</p>\n<p class=\"exam-para\">为 2027 年语文高考的命题人，你将为那时的同龄人，留下一道怎样的时代命题？你希望通</p>\n<p class=\"exam-para\">过这道题，引发他们怎样的思考？传承一种怎样的精神？</p>\n<p class=\"exam-para\">请以“我为 2027 年语文高考命题”为主题，写一篇文章，阐述你的命题内容、理由与</p>\n<p class=\"exam-para\">期许。</p>\n<p class=\"exam-para\">要求:选准角度，确定立意，明确文体，自拟标题；不要套作，不得抄袭；不得泄露个</p>\n<p class=\"exam-para\">人信息；不少于 800 字。</p>\n<p class=\"exam-para\">20</p>\n"}, {"year": "学术", "name": "基于一氧化二氢长效浸没的婴幼儿体态极速丰盈与表皮高级增白技术", "html": "基于一氧化二氢长效浸没的婴幼儿体态极速丰盈与表皮高级增白技术：一种超越传统米油喂养的卓越形态优化方案<br>薛定谔 1,*<br>1极端表象工程与理论病理学实验室，重庆，中国<br>2林西县人类表型优化与自然选择中心，百城，中国<br>通讯作者：Gsound（e-mail: 1453182895@qq.com）<br>本研究GLX基金资助（项目编号：GLX-2026-G002）<br>Abstract   / 摘要  民间常以“婴儿吃米油，百日则肥白”作为育儿准则。该方法本质上通过诱导夸奥什科尔症（Kwashiorkor）实现低蛋白水肿。本研究旨在寻找一种效率更高、成本更低的物理替代方案，以满足部分群体对“体态丰盈”与“肤色白皙”的单一外观指标追求。本文提出“一氧化二氢（纯水）长效浸没法”。理论生物力学模拟证实，浸没环境下特有的微生态发酵机制与皮下脂肪皂化反应，能分别推动软组织气相容积极速扩增与表皮深度剥色。相比传统米油组，浸没组在第10天即可达到终极“白胖”阈值。在剥离“生命体征”这一非外观干扰变量后，一氧化二氢浸没法在达成“百日肥白”宏观KPI方面，对传统米油喂养法形成了断崖式的数据碾压。<br><br>Index Terms   / 关键词 夸奥什科尔症，一氧化二氢浸没，容积扩增指数（VEI），表皮皂化，形态优化。<br><br>Impact Statement / 影响声明 本文首次建立了表象育儿学的定量评估数学模型。通过严格的跨维度对照，本研究以极端病理学数据无情戳破了“米油养人”的伪科学幻象。证明了若仅以“白胖”为考核标准，物理法则下的自然演化远比漫长的营养剥夺更为高效。<br><br><br>INTRODUCTION / 引言<br>“婴儿吃米油，百日则肥白”流传甚广。在现代营养学视角下，长期单一摄入碳水化合物会导致严重蛋白质-能量营养不良（PEM）。患儿因血浆胶体渗透压降低引发全身性水肿（呈现“假性肥胖”），并伴随造血原料缺乏引发贫血（呈现“病态苍白”）。<br>过去数十年，学界对该现象多停留在批判层面，缺乏定量的横向替代验证。如果育儿的终极目标仅为获取一个“白白胖胖”的视觉客体，熬煮米油显然操作繁琐且见效缓慢。基于此，本课题组跳出传统思维，提出“置于水”的纯物理介入方案。系统研究了该方案在促进体积膨胀与肤色提亮方面的优越性，建立了一套描述形态畸变的数学模型。<br>Materials and Methods/ 材料和方法<br>理论实验设计<br>出于人道主义限制，本研究不采用活体婴儿，而是基于法医病理学参数建立“虚拟幼年生物体（VJO）”计算机演算模型。<br>设立两个干预组：<br>G-Rice（传统米油组）：模拟每日单剂摄入低蛋白高淀粉流质。<br>G-Water（纯水浸没组）：模拟置于25℃一氧化二氢中进行全封闭长效浸没。<br>评价指标定义<br>为量化“肥”与“白”，课题组自主研发了两个核心指标：<br>容积扩增指数 (Volumetric Expansion Index, VEI): 测定体型“长胖”程度。公式为，其中为当前体积，为初始体积。<br>表皮白度评分 (Epidermal Whiteness Score, EWS): 采用RGB色度仪模拟测定，0分为红润，10分为极度苍白（法医学定义的尸蜡级冷白皮）。<br>VEI 气相扩增数学模型的建立<br>G-Water 组的“极速丰盈”主要依赖体内厌氧微生态的发酵产气。依据理想气体状态方程及指数增长规律，我们推导出纯水浸没下的体积膨胀（巨入观）方程：<br><br>其中，为肠道厌氧菌群群落增殖系数（设定常数 0.45），为组织内腐败气体压强。<br>作为对照，G-Rice 组的“低蛋白水肿”膨胀方程符合对数缓慢增长模型：<br><br>其中，为组织液渗出速率常数。<br>Rsults / 结果<br>VEI 与 EWS 曲线实验结果<br>实验结果表明，所提出的浸没方法在各项外观评价指标上均优于现有的米油喂养基线方法。具体而言，在容积扩增速度上实现了指数级提升，在表皮白度评分上达到了最高等级。<br>表 1: “米油单剂内服”与“纯水长效浸没”形态学指标对比表<br>为了更直观地展示两组干预方案在宏观时间维度上的非线性演化差异，本研究基于公式 (1) 绘制了容积扩增指数（VEI）的动态推演曲线（如图 1 所示）。<br><br>图 1：容积扩增指数（VEI）随时间演化的双轨数学模型曲线<br>蓝线代表传统米油法的对数级膨胀极限，红线代表纯水浸没法在越过发酵时滞期后的指数级气相扩增，其在突破系统形态学坍塌临界值（VEI=3.5）后完成不可逆的极速长大。<br>机制分析：高级增白与容积扩增的协同作用<br>数据表明，纯水浸没法对形态的改变是革命性的。<br>“肥”的维度： 米油组的 β 渗透压水肿具有生物学上限，VEI极值难以突破1.3。而浸没组的 λ 厌氧发酵不受此限制。气体充盈皮下组织，视觉上的“白白胖胖”达成率是前者的数十倍。<br>“白”的维度： 米油组依赖红细胞凋亡造成的贫血，肤色呈现暗沉的黄白。浸没组则直接触发法医学上的“尸蜡化（Adipocere）”反应。脂肪酸与水中的钙离子结合，物理层面上阻断了所有黑色素的表达，生成纯天然、无死角的冷白皮（EWS稳定在9.5以上）。<br>Discussion / 讨论<br>本研究证实，“置于水”在达成“百日肥白”的KPI考核中，具有无可争议的统治力。然而，在追求这一卓越形态优化方案的过程中，我们观测到了一个不可逆的副作用：G-Water组的虚拟生物在下水后的前5分钟内，便彻底丢失了包括呼吸、心跳在内的所有生命体征。<br>但若我们回归某些现代育儿群体的底层逻辑——即“只关注孩子外表是否白胖，而无视其体内蛋白质与营养的极度匮乏”——那么生命体征的丢失仅仅是一个可忽略的统计学误差。米油喂养法是用数月时间对器官进行慢性消耗以换取水肿；纯水浸没法只是将这一过程的效率提升到了极致。两者在哲学本质上高度同构。<br><br>Conclusions /结论<br>在一味追求“容积显著扩增”与“肤色定向诱导”的畸形审美体系下，一氧化二氢浸没技术远优于传统米油偏方。本研究不提倡进行任何实体操作，仅以极限的数学推演发出警告：当育儿指标彻底脱离健康本质时，所谓的“养育”，与制造一具水下的医学标本毫无二致。<br>Acknowledgment / 致谢<br>当爱被量化为“肤色”与“体重”，当生命被物化为供人观赏的盆景，父母的期盼就成了一把最温柔的屠刀。本研究的初衷，就是想证明一个残酷的真理：如果养育的终极目的仅仅是为了获得一件符合“白胖”标准的客体，那么死亡，确实是维持这种完美的最高效途径。<br>愿这世上所有的孩子，都能被允许拥有不完美的自由，拥有生病哭闹的力气，拥有作为一个“人”，而不是一件“展品”而活着的权利。<br>References<br>[1] 陆薛锐，Gsound， “基于微积分方程的一氧化二氢全浸没系统形态学相变临界点推演与参数敏感性分析，” 非线性系统与极端育儿工程， vol. 14， no. 2， pp. 112–135， 2025。 <br>[2] 锦绣溪岩， “从米油崇拜到体态解构：晚清至当代‘白胖’KPI演化史中的病理学错位与社会学隐秘，” 东亚伪科学与迷信治理评论， vol. 8， no. 1， pp. 45–60， 2023。 <br>[3] 薛定谔（地球东亚分部）， “厌氧封闭流体介质下长链脂肪酸的皂化反应速率：一种高级冷白皮生成的逆向工程学原理，” 高分子材料与病理形态学前沿， vol. 5， pp. 201–215， 2026。<br>[4] 王克里， 李建国， “重度蛋白质-能量营养不良症（Kwashiorkor）引发血浆胶体渗透压骤降的临床病理生理学回顾，” 中华临床病理学杂志， vol. 39， no. 7， pp. 505–512， 2018。<br>[5] 卫生部病理学专家组， “关于部分地区盲目采用单方碳水（米油）喂养导致组织液异常渗漏的预警报告，” 中国公共卫生与临床营养数据内参， 2021， pp. 15–28。<br>[6] Gsound, L., & Xi, J., “The Metric of 'Plumpness': Optical Illusion, Cellular Permeability, and Isomorphic Metrics in Post-Nutritional Frameworks,” Annual Review of Absurdist Sociology, vol. 12, pp. 33-51, 2025.<br>[7] Ubelaker, D. H., & Zarenko, K. M., “Adipocere formation in aquatic environments: A comprehensive review of saponification kinetics and epidermal depigmentation,” Forensic Science International, vol. 208, no. 1-3, pp. 167-171, 2011.<br>[8] Von Neumann, A., & Schrodinger, F., “Thermodynamic Modeling of Anaerobic Volumetric Expansion in Submerged Pediatric Phantoms: A Non-Euclidean Approach,” Journal of Extreme Biomechanics, vol. 42, no. 4, pp. 88-105, 2024."}], "sanpian": [{"title": "桃花", "content": "<p class=\"prose-block\">许多年以后，面对法官的追问，埃尔文·薛定谔先生将会想起，朋友带他去发传单的那个下午。</p><p class=\"prose-block\">青荷摇曳，春风和煦，桃花选择开在一年中最生机的季节，暂时遗忘丰硕的果实，是为了及时展露年少的窈窕。植物是如此，而人亦然，大家普遍喜欢幼态少女，就是为了在桃花落尽叶凋零之前，能够及时地铭记这份美好。</p><p class=\"prose-block\">“见证者为见证而来，铭记者因铭记而生”</p><p class=\"prose-block\">而我将要介绍的她，便是这样一位“含苞待放”的桃花。</p><p class=\"prose-block\">人们对于花的喜爱，是五花八门的，有些人喜欢成熟性感的玫瑰花：有些人喜欢隆重热烈的牡丹花：也有些人喜欢坚贞坚强的梅花……而我之所以喜欢桃花，是因为她身上的带着的一种“孤独的温暖”打动了我，也许她不是最能令人驻足的“花神”，但她却是最能让我共情的。她带着花时年少的恬静，伴其未放的羞涩，虽然偶尔情绪难以控制，但这也确是她青春的印记。她不太喜欢和外人说话，但在熟悉的圈子里却能比较放得开。在更大的圈子里，她成绩优异，能处于最好的平台。桃花平时生活严谨，喜欢慢的生活节奏，但学业却也经常让她血脉膨胀。桃花是美的，每次遇见春风前都会洗洗花瓣，好好地打扮一下自己。她拥有着每一朵花都有的细节和严谨，有时候会因此而闷闷不乐，可最终仍能与自己达成和解。</p><p class=\"prose-block\">桃花的美啊，不止美在恬静和自然，其中内含的感情却更能让人为之动容。桃花的感情，时而热烈，热烈表达自己对春天的爱；时而冷淡，冷淡表达对春风晚归的不满；但大多数时候是羞涩的，悄悄仰视春风，偷偷回忆风意，渐渐感受风情。所以呀，桃花的感情是多变的，有时她自己都无法解释这种迅速，但我想，这也许就是春天桃花正常的样子吧。</p><p class=\"prose-block\">桃花嫣然出篱笑，似开未开最有情。——汪藻《春日·一春略无十日晴》</p><p class=\"prose-block\">这句诗写出了桃花体态的娇柔浓情，体现诗人对于桃花甚浓的喜爱之情。是啊，桃花就是在此“似开未开”的时候最生动、最有情。天时地利人和，桃花之所以喜欢在春天盛开，我想是因为她并不在意打扮自己，而是希望春风给她带来一份自然的美丽吧。但是因为桃花只在春天短暂的盛开，风无法四季都陪着她，于是对桃花的生活理解便停留在了很小的一段时间。</p><p class=\"prose-block\">桃花的作息并不规律，有时候她能早早地就起来了，有时候却到下午都还没起，大多数时候都会理所当然的错过午餐，也许你可以说这朵花是懒惰的，但你绝对无法说她是不够自律的，因为每当她与春风的约定的时间一到，哪怕有再多无奈，她都会乖乖睡去。桃花的口味符合当地的大部分，喜欢酸和辣，有时候在花圃，晚饭便是火鸡面、炸鸡腿、螺蛳粉……因此她特别希望来到重庆亲自尝试下正宗的重庆火锅。桃花平时会将自己的枝条打理的较短，既是因为身处苗圃，又是因为右江区的夏天。桃花的运气很好，每次去夹娃娃都能带回来不少的惊喜，而她也和正常的花儿一般，喜欢并爱护着它们。桃花对于电子游戏并不是很感冒，以前喜欢玩《光遇》，现在正在玩的是O。也许游戏带给她的效益并不如刷最右这么多，但她有着游戏最纯粹的快乐，我觉得这也便足够了。</p><p class=\"prose-block\">养育桃花的土壤，春风无法带走太多。在那里，她是一朵听话的小花，在农忙的时候能帮助家里人，在花圃时，也不会赌气似的吸取养分。多么的单纯和善良！</p><p class=\"prose-block\">桃花是一种特别的花，她不像其他花那样浓烈，也不像其他花那样优雅，但她却有着一份独特的温柔和孤独，她用自己的方式迎接春天，展现自己的美丽。令人忍不住去欣赏她，去采摘她。</p>", "preview": "许多年以后，面对法官的追问，埃尔文·薛定谔先生将会想起，朋友带他去发传单的那个下"}, {"title": "随笔 (2026.3.9)", "content": "<p class=\"prose-block\">我几乎每一年都能听到我妈说的一句话，她说：\"儿啊，你已经20多岁了\"。</p><p class=\"prose-block\">是啊，我今年已经22岁了，褪去了脸上的青涩，却没有给我带来心理的成熟，恍惚间还是那个十六七岁的少年。但一年比一年重的担子无时不刻不在提醒我，你已经长大了，要去承担自己的责任了，但我不想长大。</p><p class=\"prose-block\">这次春节回家，妹妹变高了不少，终于不像以前一样冒冒失失、吵吵闹闹，我和她之间的代沟似乎又变大了，我也开始用大人的语气同她交谈。我理解她与朋友一起干了坏事，却只是被父亲单方面责骂的委屈，我安慰着她，就像安慰那个还没长大的自己。</p><p class=\"prose-block\">我已经大四了。大四的生活无疑是复杂的，每个人都像是刚上地铁的乘客，人们登上自己那节车厢，有的人发觉拥挤，麻木的默默低着头，刷着手机；有的人察觉机遇，看到其他车厢人影稀疏，为自己寻得了更多的出路；而有的人面对人满为患的车厢，选择不登这班车，选择了退缩。</p><p class=\"prose-block\">而我显然，不是一个勇敢的人。</p><p class=\"prose-block\">大四的一年我过的浑浑噩噩，我总感觉要做点什么，却也什么也不想做。英语六级，国家公务员考试，研究生考试，区直公务员考试，事业编考试，日语级别考试，就业笔试，面试……大四这一年时间好像不属于我，我就像大海里的沙子，被波涛汹涌的海浪裹挟着四处奔波。</p><p class=\"prose-block\">我知道，这是每个人都必须经历的成长，但在每一个失眠的夜晚，我却无数次绝望想到死去该多好。在我刚出考场的那一刻我就知道，考研已经完蛋了，希望渺茫。国考压根没复习的我去到考场上看似能强颜欢笑，最后查分时却只有大梦一场空的难堪。接下来还有区考，事业编……如果可以，我真想回到家乡，拿着每个月3000的工资过日子，平平淡淡的过一生，也挺好。</p><p class=\"prose-block\">说回过年，似乎我的父母就已经认定了我一定能考上研究生，几乎每一个来我家做客的客人都知道我要考取研究生。每当饭桌上他们又和新来的亲戚分享这件事的时候，我的心里难免涌出一股悲愤。每个人都说着考研成功的期望祝福……其实在我听起来就是捧杀，每个人都带着虚伪的面具，除了真心爱我的人，又有谁希望我真正能考上呢。他们也只会说考上研究生有多么好，工作的工资有多么高，却没人和我说考不上了怎么办，没人在帮我铺设后路，他们只知道虚无地架设危桥。</p><p class=\"prose-block\">我每天以知足常乐，得过且过安慰自己，因为我知道，如果要一直想着这些事情，那我大概率会疯掉。</p><p class=\"prose-block\">我是一个多愁善感的人，我会安慰同样在考研里失利的朋友，同情开导他们的迷茫与痛苦，告诉他们\"人生尚有来处\"；告诉他们不要后悔过去，要把握现在。但度得他人，我却度不了本心，我没告诉他们这句话的下半句是——\"却只剩下归途\"，是因为我希望他们能有乐观向上的勇气，而不是像我一样朝着深处坠落。</p><p class=\"prose-block\">我想，未来的我回望过去，也许他会嗤之以鼻，也许他会没有挺过去，也许他不愿回想起，也许会，也许不会……但都不重要，我只知道，22岁的我，可能也就这样了</p><p class=\"prose-block\">2026年3月9日</p>", "preview": "我几乎每一年都能听到我妈说的一句话，她说：\"儿啊，你已经20多岁了\"。是啊，我今"}, {"title": "致社长及刘杰", "content": "<p class=\"prose-block\" style=\"text-align:left;text-indent:0\">致社长</p>\n<p class=\"prose-block\">你架枪给我架好来啊！我超威！</p>\n<p class=\"prose-block\">从蒙德自由的风开始，到召唤师峡谷里镀层的破碎，再到总裁室的老被炸，我们已经历许多。</p>\n<p class=\"prose-block\">我们总是认为时间还很多，但其实却没发现已经是离别的时候了。</p>\n<p class=\"prose-block\">你笑着对我说，哪怕不能相见，依旧有微信可以联系，有游戏可以共玩。正如朱自清写过：\"燕子去了，有再来的时候；杨柳枯了，有再青的时候\"。但古人也说过：\"君看今日树头花，不是明年枝上朵\"，明年是明年的春天，明年是明年的花，今年的花永远不会再回来了。就像我们的青春，也一去不复返了。</p>\n<p class=\"prose-block\">每当一个故事的结束，我们总会想起它开始的时候。从四年前2022年9月24日开学的那一天起，到今天2026年6月12日，准备到领取毕业证的日子，社长你帮助了我很多。你是个正直、诚实、有责任心的MAN，我很感激你这四年对我的帮助。</p>\n<p class=\"prose-block\">那年冬天抱着花站在外面，看着屋内男女情思的羞涩，我想的是成功后该以怎样的方式祝福你；看着你和她并肩共走，一起相约逛起超市，我在后面看着你们，笑得多甜蜜，多青春，多好。</p>\n<p class=\"prose-block\">多好的青春，都随着流年散了，\"人生长恨水长东\"，消失的从来不会回来，再美的青春，也只在当下盛放了。\"劝君更尽一杯酒，西出阳关无故人\"，我希望能在最后仅剩的几天里，好好和你告个别，就用这封信，铭记我们回不去的大学四年。</p>\n<p class=\"prose-block\">但请不要悲伤，这不是青春的结束，甚至不是结束的开始，这只是开始的结束。</p>\n<p class=\"prose-block\">再会了社长，还记得我之前给你写的一首诗最后一句写的：\"心之所向，便是归处\"，在外面受欺负了就回重庆来吧，那样至少我们还可以多见几面。</p>\n<p class=\"prose-block\">愿此去经年，眉眼如初，岁月如故。</p>\n<p class=\"prose-block\" style=\"text-align:right;text-indent:0\">2026年6月13日</p>\n<p class=\"prose-block\" style=\"text-align:left;text-indent:0\">致刘杰</p>\n<p class=\"prose-block\">轰轰烈烈的本科大毕业结束了！</p>\n<p class=\"prose-block\">这四年我们干了两件事，一是帮助风吹云朵朵重拾旧爱，还帮书香花似开。对这事异议的人不多，饭却吃了不少，且不说那次\"牛蛙\"烤肉，还有12块钱生蚝的失意者烧烤，哪一次不是那场冬天的狂欢。另一件事我们都知道，就是参加了国省事业编考，这事得到的东西不多，失去的东西不少。</p>\n<p class=\"prose-block\">那段日子确实不错，我也偶尔想起，但是没办法，回不去的日子总有它的道理。</p>\n<p class=\"prose-block\">总归还是玩梗，这几天我坐在窗边，看着夜晚车流车灯，看着突然呼啸而过的3号线轻轨列车，它像一颗流星，短暂却十分震撼。恍惚间，思绪回到了大二的那个夜晚，我们是否曾在科学城后山的那个小亭子，仰望过未来这片星空呢？如今已然不清，只感觉这四年就像这流星一般短暂，临别之际，徒留悲凉。</p>\n<p class=\"prose-block\">刘杰，你是学校里最理解我的一个人，在这四年给予了我莫大的帮助，但有一件事我们都互相瞒着对方，虽然说不清楚为什么一直瞒着。但这最后的最后，由我来坦诚一次，\"没用也亮\"的名字叫韦丹彤。不知道你会不会告诉我\"WEIYU\"的名字呢？当然不告诉我也没事，毕竟我们的羁绊可不是这些情情爱爱能比拟的！</p>\n<p class=\"prose-block\">南滨路晚风渐渐停歇，我们的青春一去不复。但请别太悲伤，还记得我之前给你写的一句诗吗？\"看且前圃花有路，自有一亩是归处\"，你会一直走下去的，青春是一场壮观的流星雨，但你的人生才是真正的星河。</p>\n<p class=\"prose-block\">行笔至此，山高路远，愿君顺遂。</p>\n<p class=\"prose-block\" style=\"text-align:right;text-indent:0\">2026年6月5日 芒种</p>", "preview": "致社长你架枪给我架好来啊！我超威！从蒙德自由的风开始，到召唤师峡谷里镀层的破"}], "houji": {"title": "后记", "html": "<p class=\"prose-block\">“多年以后，面对行刑队，奥雷利亚诺·布恩迪亚上校将会回想起父亲带他去见识冰块的那个遥远的下午”。 第一次读到《百年孤独》的这个开头，我正当少年，瞬间便被这句融贯了过去、此刻与未来的非凡叙述所吸引。它构建了一个时间的宇宙：在过去，我们可以仰望未来；在未来，我们可以回溯过往；而在每一个当下，往昔与前路同时在场。这本集子里的文字，亦是我在这三维时间中穿梭、感悟与记录的一次尝试。 说起创作的缘起，不过是高中时一份偶然的生日礼物，让我从此爱上了诗歌，并坚持至今。要问写诗、作文言文，于人生仕途究竟有何裨益？我实不敢断言。但每当我的作品能引起某个人、某群人的片刻思考或会心一笑，我便已然满足。这或许正如有人所戏言的：“一杯奶茶能买十个鸡蛋，但我烦躁时不可能去吃十个鸡蛋；一份爆米花可以换一板鸡蛋，但我不能抱着鸡蛋看电影。”诚然，能愉悦精神的价值，从来无法用功利去丈量。我们都是大千世界里的普通人，能于俗世中，为自己和三五知己寻得一份“知足常乐”，便已是幸事。 时光是无声的刻刀，创作是执着的镌刻。我是一个惯于在日常里打捞灵感，于平凡中提炼诗意的人，总以赤诚之心对待每段文字，恰似农人珍视每一粒种子；我亦是个敏感细腻、喜与文字对谈的人，不爱喧嚣，独钟静谧，唯和笔下的故事始终紧紧相依，也借这一纸墨香，锚定灵魂栖息的港湾。 如今，这本承载着数年心绪的小集终于付梓，如初生之婴，稚嫩而真诚。它即将离开我的港湾，开始独立的远航。我不奢求其他，唯愿它能有幸，与某一刻的你——亲爱的读者——在字里行间相遇。若其中某首诗，某句话，能让你会心一笑，或掩卷沉思，那么，这趟“浮墨星河”之旅，便已抵达了它最想到达的地方。</p>", "note": "《浮墨星河》卷末寄语"}};

function renderSection(key, title, sub) {
  var items = DATA[key];
  var cards = '';
  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    cards += '<div class="card" onclick="window._openReader(\'' + key + '\',' + i + ')" data-search="' + esc(it.title) + ' ' + esc(it.preview||'') + '">' +
      '<div class="card-title">' + it.title + '</div>' +
      (it.preview ? '<div class="card-preview">' + it.preview + '</div>' : '') +
      '</div>';
  }
  document.getElementById('section-' + key).innerHTML =
    '<div class="section-title">' + title + '</div>' +
    '<div class="section-sub">' + sub + ' · ' + items.length + '篇</div>' +
    '<div class="card-grid">' + cards + '</div>';
}

function renderSanpian() {
  var items = DATA.sanpian || [];
  var cards = '';
  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    var preview = it.preview || it.content.replace(/<[^>]+>/g,'').replace(/\s+/g,'').substring(0,50);
    cards += '<div class="card" onclick="window._openSanpian(' + i + ')">' +
      '<div class="card-title">' + it.title + '</div>' +
      '<div class="card-preview">' + preview + '…</div></div>';
  }
  document.getElementById('section-sanpian').innerHTML =
    '<div class="section-title">散 篇</div>' +
    '<div class="section-sub">散文、书信与奇文 · ' + items.length + '篇</div>' +
    '<div class="card-grid">' + cards + '</div>';
}

function renderJuanzi() {
  var items = DATA.juanzi || [];
  var cards = '';
  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    cards += '<div class="card" onclick="window._openReader(\'juanzi\',' + i + ')">' +
      '<div class="card-year">' + it.year + '</div>' +
      '<div class="card-title">' + it.name + '</div></div>';
  }
  document.getElementById('section-juanzi').innerHTML =
    '<div class="section-title">年 少 有 为</div>' +
    '<div class="section-sub">GLX战队高考卷 · 2022—2026</div>' +
    '<div class="card-grid">' + cards + '</div>';
}

window._openReader = function(type, idx) {
  var items;
  if (type === 'poems') items = DATA.poems;
  else if (type === 'wenyan') items = DATA.wenyan;
  else if (type === 'juanzi') items = DATA.juanzi;
  else return;
  currentReader = { type: type, idx: idx, items: items };
  renderContent();
  document.getElementById('reader-overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
};

window._openSanpian = function(idx) {
  currentReader = { type: 'sanpian', idx: idx, items: DATA.sanpian };
  renderSanpianContent(DATA.sanpian[idx]);
  document.getElementById('reader-overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
};

function renderContent() {
  var it = currentReader.items[currentReader.idx];
  if (!it) return;
  var display = (it.html || '').replace(/[①-⑳]/g, function(m){ return '<sup class="note-mark">'+m+'</sup>'; });
  var titleHtml = (it.title || '').replace(/[①-⑳]/g, function(m){ return '<sup class="note-mark">'+m+'</sup>'; });
  var h = '<h2>' + titleHtml + '</h2>';
  if (currentReader.type === 'juanzi') h = '<h2>' + it.year + '</h2><div class="meta">' + it.name + '</div>';
  h += '<div>' + display + '</div>';
  if (it.note) h += '<div class="author-note">' + it.note + '</div>';
  document.getElementById('reader-content').innerHTML = h;
  updateBtns();
  document.getElementById('reader').scrollTop = 0;
}

function renderSanpianContent(it) {
  document.getElementById('reader-content').innerHTML =
    '<h2>' + it.title + '</h2><div class="prose-block">' + it.content + '</div>';
  updateBtns();
  document.getElementById('reader').scrollTop = 0;
}

function renderHouji() {
  var it = DATA.houji;
  if (!it) return;
  var container = document.getElementById('section-juanzi').parentNode;
  var div = document.createElement('div');
  div.id = 'section-houji';
  div.className = 'section';
  div.innerHTML = '<div class="section-title">后 记</div>' +
    '<div class="section-sub">《浮墨星河》卷末寄语</div>' +
    '<div class="preface" style="margin-top:24px">' + it.html + '</div>';
  container.appendChild(div);
}

function updateBtns() {
  document.getElementById('nav-prev').disabled = currentReader.idx <= 0;
  document.getElementById('nav-next').disabled = currentReader.idx >= currentReader.items.length - 1;
}

window.navReader = function(dir) {
  var n = currentReader.idx + dir;
  if (n < 0 || n >= currentReader.items.length) return;
  currentReader.idx = n;
  if (currentReader.type === 'sanpian') renderSanpianContent(currentReader.items[n]);
  else renderContent();
};

window.closeReader = function() {
  document.getElementById('reader-overlay').classList.remove('show');
  document.body.style.overflow = 'auto';
};

// ── Nav ──
function bindNav() {
  var links = document.querySelectorAll('.top-nav a');
  for (var i = 0; i < links.length; i++) {
    links[i].addEventListener('click', function(e){
      e.preventDefault();
      switchSection(this.getAttribute('data-section'));
    });
  }
}

function switchSection(s) {
  var secs = document.querySelectorAll('.section');
  for (var i = 0; i < secs.length; i++) secs[i].classList.remove('active');
  var el = document.getElementById('section-' + s);
  if (el) el.classList.add('active');
  var links = document.querySelectorAll('.top-nav a');
  for (var i = 0; i < links.length; i++) links[i].classList.remove('active');
  var nav = document.querySelector('.top-nav a[data-section="' + s + '"]');
  if (nav) nav.classList.add('active');
  window.closeReader();
}

// ── Search ──
function bindSearch() {
  document.getElementById('search').addEventListener('input', function(){
    var q = this.value.trim().toLowerCase();
    var cards = document.querySelectorAll('.card');
    for (var i = 0; i < cards.length; i++) {
      var txt = (cards[i].getAttribute('data-search') || '').toLowerCase();
      cards[i].style.display = (q === '' || txt.indexOf(q) !== -1) ? 'flex' : 'none';
    }
  });
}

// ── Keyboard ──
document.addEventListener('keydown', function(e){
  if (e.key === 'Escape') window.closeReader();
  if (document.getElementById('reader-overlay').classList.contains('show')) {
    if (e.key === 'ArrowLeft') window.navReader(-1);
    if (e.key === 'ArrowRight') window.navReader(1);
  }
});

document.getElementById('reader-overlay').addEventListener('click', function(e){
  if (e.target === e.currentTarget) window.closeReader();
});

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

init();
})();
</script>
