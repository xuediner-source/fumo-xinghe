<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>浮墨星河 · 薛定谔作品集</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Ma+Shan+Zheng&display=swap');

  :root {
    --paper: #f5f0e8;
    --ink: #2c2416;
    --ink-mid: #5c4e3a;
    --ink-light: #8c7b6a;
    --accent: #8b1a1a;
    --gold: #c9a96e;
    --border: #d4c5a9;
    --card: #faf7f0;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Noto Serif SC', serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 50% 0%, rgba(201,169,110,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(139,26,26,0.03) 0%, transparent 50%);
  }

  /* ── 顶栏 ── */
  .top-bar {
    background: linear-gradient(180deg, #1a1410 0%, #2c2416 100%);
    color: #e8d5b5; padding: 10px 24px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 2px solid var(--gold);
    position: sticky; top:0; z-index:100;
    gap: 12px; flex-wrap: wrap;
  }
  .top-bar .brand {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 1.5em; letter-spacing: 0.15em; white-space: nowrap;
  }
  .top-nav { display:flex; gap:20px; flex-wrap:wrap; }
  .top-nav a {
    color: #c9a96e; text-decoration:none; font-size:0.9em;
    letter-spacing:0.06em; cursor:pointer; transition:color 0.3s; white-space: nowrap;
  }
  .top-nav a:hover, .top-nav a.active { color:#fff; }

  .search-box {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(201,169,110,0.3);
    border-radius: 20px; padding: 4px 14px;
    color: #e8d5b5; font-size: 0.85em; outline: none;
    width: 140px; transition: all 0.3s; font-family: inherit;
  }
  .search-box:focus { border-color: var(--gold); width: 180px; }
  .search-box::placeholder { color: rgba(232,213,181,0.4); }

  /* ── Hero ── */
  .hero {
    text-align:center; padding: 56px 24px 40px;
    background: linear-gradient(180deg, rgba(44,36,22,0.04) 0%, transparent 100%);
  }
  .hero h1 {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: clamp(2.4em, 6vw, 3.6em);
    color: var(--ink); letter-spacing:0.15em; margin-bottom:4px;
  }
  .hero .en { font-size:0.85em; color:var(--ink-light); letter-spacing:0.2em; }
  .hero .divider {
    width:50px; height:2px; background:var(--gold);
    margin:16px auto; border-radius:1px;
  }
  .hero .author { font-size:1.3em; color:var(--accent); font-weight:700; letter-spacing:0.12em; }

  /* ── 内容区 ── */
  .main-wrap { max-width:840px; margin:0 auto; padding:0 20px 80px; }
  .section { display:none; }
  .section.active { display:block; }

  /* ── 序言 ── */
  .preface { font-size:1.05em; line-height:2.2; color:var(--ink); text-align:center; }
  .preface p { margin-bottom:12px; }

  /* ── 卡片 ── */
  .section-title {
    text-align:center; font-size:1.3em; letter-spacing:0.12em;
    margin-bottom:8px; color:var(--ink);
  }
  .section-sub {
    text-align:center; color:var(--ink-light);
    font-size:0.9em; margin-bottom:28px; letter-spacing:0.06em;
  }
  .card-grid {
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap:14px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 20px 22px;
    cursor:pointer; transition: all 0.25s;
    box-shadow: 0 1px 8px rgba(0,0,0,0.06);
    display:flex; flex-direction:column; gap:6px;
  }
  .card:hover {
    transform:translateY(-3px);
    box-shadow: 0 6px 24px rgba(0,0,0,0.10);
    border-color: var(--gold);
  }
  .card .card-title {
    font-size:1.05em; font-weight:700; letter-spacing:0.05em; color: var(--ink);
  }
  .card .card-preview {
    font-size:0.85em; color:var(--ink-light);
    line-height:1.6; overflow:hidden;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
  }
  .card .card-year {
    font-size:0.8em; color:var(--accent);
    letter-spacing:0.08em; font-weight:700;
  }

  /* ── 阅读器 ── */
  .reader-overlay {
    display:none; position:fixed; inset:0; z-index:200;
    background: rgba(20,16,10,0.92);
    backdrop-filter: blur(8px);
    overflow-y:auto;
  }
  .reader-overlay.show { display:flex; justify-content:center; }
  .reader {
    max-width:800px; width:90%; margin:0 auto; max-height:90vh;
    background:
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a96e' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"),
      linear-gradient(180deg, #faf7f0 0%, #f5f0e8 100%);
    padding:60px 40px 80px; overflow-y:auto;
    position:relative; align-self:center;
    border-radius:6px;
    box-shadow: 0 0 40px rgba(0,0,0,0.15), 0 0 4px rgba(212,197,169,0.5);
  }
  .reader .close-btn {
    position:fixed; top:16px; right:20px; z-index:210;
    background: rgba(0,0,0,0.4); color:#fff; border:none;
    width:36px; height:36px; border-radius:50%;
    font-size:1.2em; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition: background 0.2s;
  }
  .reader .close-btn:hover { background: rgba(139,26,26,0.8); }
  .reader h2 {
    text-align:center; font-size: clamp(1.4em, 4vw, 1.8em);
    letter-spacing:0.1em; margin-bottom:8px;
    padding-bottom:16px; border-bottom:1px solid var(--border);
    color: var(--ink);
  }
  .reader .meta {
    text-align:center; font-size:0.85em; color:var(--ink-light);
    margin-bottom:28px; letter-spacing:0.06em;
  }
  /* ── 阅读器内所有文本统一排版 ── */
  .reader .label-block {
    display:block; width:100%;
    font-weight:700; color:var(--accent);
    font-size:0.82em; margin-top:16px; margin-bottom:6px;
    letter-spacing:0.05em; text-indent:0 !important;
  }
  .reader .section-label {
    display:block; width:100%;
    font-weight:700;
    font-size:0.82em; margin-top:16px; margin-bottom:6px;
    letter-spacing:0.05em; text-indent:0 !important;
  }
  .reader .verse-block {
    display:block; width:100%;
    text-align:center; margin:24px 0; padding:14px 8px;
    line-height:2.4; font-size:1.2em; color: var(--ink);
    background: rgba(201,169,110,0.05); border-radius:4px;
    white-space:pre-line;
    font-family: 'Ma Shan Zheng', 'Kaiti', '楷体', cursive !important;
  }
  .reader .sub-title {
    text-align:center; font-size:0.9em;
    font-family: 'Ma Shan Zheng', 'Kaiti', '楷体', cursive !important;
    color: var(--ink-mid); margin:16px 0 8px;
    letter-spacing:0.08em;
  }
  .reader .prose-block, .reader p {
    white-space: normal !important;
    text-indent:2em !important;
    text-align:justify !important;
    margin-bottom:12px;
  }
  #section-wenyan .reader .prose-block, #section-wenyan .reader p {
    font-family: 'Ma Shan Zheng', 'Kaiti', '楷体', cursive !important;
    font-size:1.15em;
  }
  .reader .label-block, .reader .verse-block { text-indent:0 !important; text-align:center !important; }
  .reader .exam-content .exam-section {
    font-weight:700; font-size:1.02em; margin:16px 0 8px; text-align:center;
  }
  .reader .exam-content .exam-para { text-indent:2em; margin-bottom:8px; }
  .reader .author-note {
    margin-top:32px; padding:20px 24px;
    background: rgba(201,169,110,0.1);
    border-left: 3px solid var(--gold); border-radius:0 8px 8px 0;
    font-size:0.9em; color:var(--ink-mid); line-height:1.8;
    flex-shrink:0;
  }
  .reader .author-note::before {
    content: '📝 创作背景';
    display:block; font-weight:700; font-size:0.85em;
    letter-spacing:0.1em; margin-bottom:8px; color:var(--accent);
  }
  sup.note-mark {
    font-size:0.65em; color:var(--accent); vertical-align:super; line-height:1; position:relative; top:-0.35em;
  }

  .reader .nav-arrows {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    display:flex; gap:16px; z-index:210;
  }
  .reader .nav-arrows button {
    background: rgba(0,0,0,0.5); color:#fff; border:none;
    padding:10px 24px; border-radius:24px; font-size:0.9em;
    cursor:pointer; letter-spacing:0.06em;
    transition: background 0.2s; font-family: inherit;
  }
  .reader .nav-arrows button:hover { background: rgba(139,26,26,0.8); }
  .reader .nav-arrows button:disabled { opacity:0.3; cursor:default; }

  /* ── 导出 ── */
  .export-bar { text-align:center; padding:16px; }
  .export-bar button {
    background:none; border:1px solid var(--gold);
    color:var(--gold); padding:8px 24px;
    border-radius:20px; cursor:pointer; font-size:0.85em;
    letter-spacing:0.08em; transition:all 0.3s; font-family:inherit;
  }
  .export-bar button:hover { background:var(--gold); color:#fff; }

  /* ── 底部 ── */
  .site-footer {
    text-align:center; padding:40px 24px;
    border-top:1px solid var(--border); color:var(--ink-light);
    font-size:0.85em; letter-spacing:0.08em; line-height:2;
    margin-top:40px;
  }

  @media (max-width:640px) {
    .top-bar { padding:8px 14px; gap:6px; }
    .top-nav { gap:10px; }
    .top-nav a { font-size:0.8em; }
    .search-box { width:100px; }
    .search-box:focus { width:130px; }
    .hero { padding:36px 16px 28px; }
    .card-grid { grid-template-columns:1fr; }
    .reader { padding:40px 20px 100px; }
    .reader .close-btn { top:10px; right:10px; }
    .reader .nav-arrows { bottom:12px; }
  }
  @media print {
    .top-bar, .reader .close-btn, .reader .nav-arrows, .export-bar, .site-footer { display:none !important; }
    .reader { position:static; box-shadow:none; max-width:100%; padding:20px; }
    .reader-overlay { position:static; background:#fff; }
    body { background:#fff; }
  }
</style>
</head>
<body>

<header class="top-bar">
  <span class="brand">薛定谔作品集</span>
  <div class="top-nav">
    <a data-section="preface" class="active">序</a>
    <a data-section="poems">诗</a>
    <a data-section="wenyan">文言</a>
    <a data-section="sanpian">散篇</a>
    <a data-section="juanzi">文集</a>
    <a data-section="houji">后记</a>
  </div>

</header>

<section class="hero">

  <p class="en">VERBA VOLANT · SCRIPTA MANENT</p>

<div class="main-wrap">

<footer class="site-footer">

</div>

<script>
(function(){
var DATA = null;
var currentReader = { type: null, idx: 0, items: [] };

function init() {
  DATA = {"preface": "<p>其墨浮于纸，而梦归于星河 <br>承蒙鱼君嘱托，为《浮墨星河》一书作序，我十分<br>欣喜。因为这意味着，我们的文字将印在同一本书上，<br>从此墨迹相依，正如现实中的我们，亦将长久相伴。 <br>在我看来，这本诗集汇聚了鱼君这几年最珍贵的情<br>感——喜悦、感激与困苦。这些复杂的感情，最终都化<br>为笔下纯粹真挚的文字，献给了他生命中最重要的挚友<br>G 和阿光，以及笔者本人。毫无疑问，这三位伙伴不仅<br>在生活中给予了鱼君重要的陪伴，以日日夜夜的点滴使<br>其生命更完整与美好，更自相识以来，共同参与了彼此<br>生命中的重大时刻。我相信，在冥冥之中，鱼君身上有<br>三条无法斩断的缘线，分别与我们三人相连，可谓人生<br>得一知己，足以慰风尘。 <br>这本诗集是鱼君情感的展露，才华的结晶，更是友<br>情的赞歌。他写下一首诗，或许是为向友人表达感谢，<br>或许是为激励身在异校的他，或许只是单纯地觉得要为<br>某人而作。他写下一首诗，也可能是因为学校领导的非<br>人决定，因为校友的溘然长逝，因为社会的种种荒诞。<br>集中的“文言文篇”，更是他奇崛想象的产物，意在铭<br>记欢歌。作者将与挚友在现实中深厚的情谊，写入他自<br>构的“句朝”宇宙，这是对友谊无声又绚烂的赞颂。</p>\n<p>“诗歌篇”中有三首是鱼君在整理诗集时，特意为<br>我们三人新写的作品，这是他精心设计的惊喜，相信两<br>位友人收到诗集时，定会会心一笑，感其巧思。我亦有<br>幸，已提前拜读过写给我的《桃花》一诗。诗中既有对<br>我极大的赞美，也寄托了我们“共度余生”的愿望。感<br>动、开心、希冀……万千感受，无以言表，唯有珍存心<br>间。 <br>文字跨越岁月，汇集于一册书，它们默默诉说着情<br>感，也等待着新的伙伴加入。几年后，鱼君的身份将不<br>再是学生，即将迈入社会，这本诗集会是他最美好的回<br>忆，也是他继续创作的强大基础与推力。情感无法消<br>逝，愿鱼君笔耕不辍，妙笔生花，一路繁华。 <br>故，《浮墨星河》者，非仅为个人诗文之结集，更<br>是一代少年精神世界之写照。他们面临着现实的困顿与<br>压力，却也拥有着足以构筑宇宙的想象力；他们珍视友<br>情，敢于臧否人物，其情感真挚而热烈，其思想尖锐而<br>赤诚。 <br>其墨浮于纸，而梦归于星河。开卷至此，幸甚至<br>哉。是为序。</p>\n", "poems": [{"title": "光畔景", "html": "<span class=\"label-block\">【作者自述】</span>\n<p class=\"prose-block\">这是我写的第一首诗，一开始写诗是为了答谢光给我的生日礼物，光畔景其实就是光“盼”景，我想表达对光的感谢，是光的照耀下让我对前路充满希望。 </p>\n<div class=\"verse-block\">霜落深山雪满路，槭树①两番日渐浮。<br>无意光照落前路，却见迎春②争相度。<br></div>\n<span class=\"label-block\">【注释】</span>\n<p class=\"prose-block\" style=\"font-size:0.92em;\">①槭（qì）树：枫树一类的树木，秋天叶子会变红或变黄。②迎春：指迎春花，一种在冬末春初开花的植物，象征着希望和春天的到来。</p>\n<span class=\"label-block\">【全詩意涵】</span>\n<p class=\"prose-block\">这首诗描绘了一幅由冬入春、由冷至暖的心灵图景。诗歌开篇便是一派萧瑟景象：寒霜降满深山，大雪覆盖了前行的道路，象征着作者曾一度陷入的迷惘与困顿。在这样单调而漫长的时光里，槭树的叶子经历了数次枯荣，日子一天天流逝，前路却依旧显得渺茫。然而，就在这时，一束光芒无意间洒落，照亮了被冰雪封锁的道路。这束“光”不仅是自然之光，更是朋友“光”所带来的温暖与启迪。在这光芒的照耀下，诗人惊喜地发现，本应沉寂的冬日景致中，充满生命力的迎春花正竞相绽放，仿佛在争渡寒冬，奔向温暖的春天。这不仅是景色的转变，更是内心世界的写照：因友人的出现，心中的冰雪得以消融，希望如迎春花般悄然萌发。</p>\n<span class=\"label-block\">【赏析】</span>\n<p class=\"prose-block\">这首诗巧妙地以景抒情，将对友人的感激之心融于一幅由冬入春的生动画面中。诗歌开篇以“霜”和“雪”描绘了一个寒冷寂寥的世界，象征着作者在遇到朋友“光”之前内心的迷茫与困顿，而“槭树两番”则暗示了时光流逝，更添一丝无奈。诗的转折点在于“无意光照落前路”，这里的“光”一语双关，既是照亮前路的自然之光，更是朋友“光”带来的希望与温暖，正是这束不经意的光芒，彻底改变了萧瑟的景象。最终，“却见迎春争相度”将全诗的情感推向高潮，冰雪中竞相开放的迎春花是希望与新生的象征，生动地展现了作者在朋友的鼓舞下内心重燃希望、奔赴未来的美好心境。整首诗由冷到暖，情感真挚而含蓄，作者并未直接言谢，但从景色的鲜明对比中，读者能深切感受到那份因友谊而重获力量的喜悦与感激。</p>\n", "preview": "【作者自述】 这是我写的第一首诗，一开始写诗是为了答谢光给我的生日礼物，光畔景其…", "note": "写给挚友「光」的答谢之作。光畔景即「光盼景」——光的照耀让作者对前路充满希望。这是鱼君写的第一首诗。"}, {"title": "送若存①之升京师", "html": "<span class=\"label-block\">【作者自述】</span>\n<p class=\"prose-block\">这首诗总体悲凉，说白了是少年意气，年轻不懂爱，爱一个人要学会体谅，要学会承担，“留隐”是一个借口，是年少逃避的理由。 </p>\n<div class=\"verse-block\">丹若②相落黄梅雨，辄知岁反又临秋。<br>水流江去秋无尽，燕离销魂更此时。<br>曾忆少时鸿鹄志③，朝阳残落今难闻。<br>单秋难敌褒妃④笑，留隐笑谈与君别。<br></div>\n<span class=\"label-block\">【注释】</span>\n<p class=\"prose-block\" style=\"font-size:0.92em;\">①若存：友人的名字。②丹若：通常指石榴花，花色鲜红，夏季开放。③迎春：指迎春花，一种在冬末春初开花的植物。③鸿鹄（hóng hú）志：典故出自《史记·陈涉世家》中的“燕雀安知鸿鹄之志哉”，比喻远大的志向。④褒妃（bāo fēi）笑：即褒姒（sì）之笑，出自“烽火戏诸侯”的典故。周幽王为博得美人褒姒一笑，点燃烽火，最终导致亡国。</p>\n<span class=\"label-block\">【全詩意涵】</span>\n<p class=\"prose-block\">这首诗描绘了一幅在夏末秋初的季节更迭中，送别友人若存前往京城的伤感画面。诗歌的开篇，由鲜红的石榴花在梅雨中凋零，引出岁华流转、秋日将至的惆怅，为送别奠定了凄清的基调。接着，诗人望着滔滔不绝、一去不返的江水，看着南飞离去的秋燕，内心的离愁别绪在此情此景的催化下，达到了顶点。这无尽的秋色与江水，仿佛象征着无穷无尽的愁思。在送别之际，诗人不禁回想起年少时与友人共同怀抱的远大志向，但那些激昂的梦想，如今仿佛都已随着岁月流逝而变得暗淡，难以再提。最后，诗人将思绪拉回现实，他感到自己这孤独的秋日愁绪，与友人即将要面对的、那如同“褒妃一笑”般充满诱惑又暗藏凶险的京城风云相比，似乎微不足道。因此，他选择将满腹的惆怅与担忧隐藏起来，只用轻松的笑谈来与友人作最后的告别。</p>\n<span class=\"label-block\">【赏析】</span>\n<p class=\"prose-block\">这是一首格调深沉的送别诗，巧妙地将季节的哀愁与复杂的离情融为一体。诗歌开篇便以落花、秋燕、逝水等经典意象，渲染出时光流逝与友人远去的伤感氛围。其精妙之处在于典故的运用：诗人将昔日共同怀有的“鸿鹄志”，与友人即将奔赴的、以“褒妃笑”为象征的京城进行对比，后者暗示了京城官场的繁华、诱惑与潜在的凶险。这份对友人前途的深切忧虑，最终被收敛在“留隐笑谈”的故作轻松之中。诗人选择用笑谈来掩盖内心的万千愁绪，这种克制的情感表达，反而更显友情的真挚与厚重，余味悠长。</p>\n", "preview": "【作者自述】 这首诗总体悲凉，说白了是少年意气，年轻不懂爱，爱一个人要学会体谅，…", "note": "送别友人「若存」赴京。少年意气，年轻不懂爱。诗中「留隐」是借口，是年少逃避的理由。"}, {"title": "末蝉吟晞①", "html": "<span class=\"label-block\">【作者自述】</span>\n<p class=\"prose-block\">这首诗是我与Gsound 一同创作的，我负责正文，他负责标题，当时我们和光分割两个学校，互相书信，于是我就想一起写首诗送给友人。 </p>\n<div class=\"verse-block\">举杯邀月影难全，遥忆故君思流年。<br>故园参伴路漫漫，此经别易逢时难。<br>烟花易逝人情存，落叶凋零犹可叹。<br>不知何处烂柯②见，光畔行③舟为相愿。<br></div>\n<span class=\"label-block\">【注释】</span>\n<p class=\"prose-block\" style=\"font-size:0.92em;\">①晞：在古汉语有三层含义1.破晓光明的样子2.消逝3.希望。② 烂柯：信安郡石室山，晋时王质伐木至，见童子数人棋而歌，质因听之。童子以一物与质，如枣核，质含之而不觉饥。俄顷，童子谓曰:\"何不去?\"质起视，斧柯尽烂。既归，无复时人。③ 光畔行：指薛丶定谔的另一首诗，诗中充满作者对未来和对友人的期望。</p>\n<span class=\"label-block\">【全詩意涵】</span>\n<p class=\"prose-block\">这首诗表达了在与友人“光”分隔两地后，诗人内心深切的思念、对时光流逝的感慨以及对重逢的期盼。诗歌的开篇，诗人借用李白“举杯邀月”的意象，却感叹“影难全”，独自一人的孤寂感油然而生。在这份孤独中，他遥遥地思念起远方的故友，追忆着往昔共同度过的岁月。曾经一同走过的路是那么漫长，而如今一朝分别，再见之日却遥遥无期。诗人感叹，虽然美好的时光如同烟花般容易逝去，但真挚的友情会永远留存；可即便如此，看到落叶凋零的景象，依然会感到伤感。他不禁担忧，不知要到何时才能再见，届时是否会像“烂柯”故事中那样，有恍如隔世、物是人非之感。然而，全诗的落脚点是充满希望的，诗人最后表明自己最真切的愿望，便是能再度与友人“光”相伴，如“光畔行舟”一般，共同前行。</p>\n<span class=\"label-block\">【赏析】</span>\n<p class=\"prose-block\">这首《末蝉吟晞》是一篇情真意切的当代旧体诗，成功地将古典意蕴与真挚的个人情感融为一体。全诗通过纯熟的意象与典故运用，层层递进地烘托出思念之情。开篇化用李白“举杯邀月”典故，却以“影难全”翻出新意，立刻将读者带入因友人缺席而更显浓重的孤寂之中。诗中最具张力的部分，在于“烟花易逝”的信念与“烂柯”典故所代表的巨大焦虑之间的对比——诗人既相信友情永存，又深切担忧重逢之时物是人非。而诗歌的标题“末蝉吟晞”与结尾“光畔行舟”更是点睛之笔。“末蝉”象征离别的悲鸣，而“晞”字又暗含希望，结尾则直接点出友人“光”的名字，将所有伤感升华为“与你再度同行”的具体愿望，使得全诗情感真挚而充满力量。</p>\n", "preview": "【作者自述】 这首诗是我与Gsound 一同创作的，我负责正文，他负责标题，当时…", "note": "与Gsound合作完成——G拟题，鱼君写正文。分隔两校之际书信往来，写给友人光。晞有三意：破晓、消逝、希望。"}, {"title": "火箭筒·题光辉夜画", "html": "<span class=\"label-block\">【作者自述】</span>\n<p class=\"prose-block\">这首依旧是和Gsound 一起完成的诗，不过这次他负责少一点，他创新编写了词牌名“火箭筒”，当时是说这个词牌名实际上是与《死神》中的人物“碎蜂”有关。但最重要的这首诗是对光作画的回礼，那幅画我至今印象深刻。 </p>\n<div class=\"verse-block\">商风②又度九重门，末蝉犹怜锦禹③人。<br>奈何戚枫散青烟，但见含章④妆暖檐。<br>振袖⑤依羽拂春面，回眸空视此人间。<br>谁言浮墨色难全，千秋星河自心边。<br></div>\n<span class=\"label-block\">【注释】</span>\n<p class=\"prose-block\" style=\"font-size:0.92em;\">①火箭筒：词牌名，这里应该是作者的创新。②商风：即秋风。③禹：即夏朝的大禹，古代以“禹跃龙门”比喻进试得第。④含章：相传始于南朝宋武帝之女寿阳公主。寿阳公主曾卧于含章殿檐下，梅花落在公主的额头上，留下梅花状的淡红色印记，拂拭不去。⑤振袖：是日本和服的一种。</p>\n<span class=\"label-block\">【全詩意涵】</span>\n<p class=\"prose-block\">这首词是为友人“光”所赠的画作而题。词作开篇，由秋风、末蝉、戚枫等意象，营造了一个清冷萧瑟的秋日氛围，也带出了作者在观画前的一丝悲秋之情。然而，当目光转向画作本身时，心境豁然开朗。词人看到了画中精致的细节，如同梅花妆点染在温暖的屋檐下，驱散了秋日的寒意。画中那位身着“振袖”和服的女子，身姿轻盈，姿态优雅，当她回眸一望，那眼神却空灵而超脱，仿佛在俯瞰着整个凡尘俗世，不为俗事所动。看到如此传神的画作，词人不禁发出赞叹：谁说水墨丹青难以完全再现神韵呢？眼前这幅画，分明是将艺术家内心之中那片璀璨不朽的星河宇宙，完整地呈现了出来。这既是对画作的极高赞美，也是对友人“光”内心世界浩瀚深邃的由衷敬佩。</p>\n<span class=\"label-block\">【赏析】</span>\n<p class=\"prose-block\">这首《火箭筒·题光辉夜画》是一篇极为精彩的“题画词”，它巧妙地将悲秋的伤感、观画的惊喜、对艺术的沉思以及对友人的赞美熔于一炉。词作的结构由外入内，前三句描绘了萧瑟的秋日外景，营造出一种感伤的基调，但这其实是为突显画作的艺术魅力所作的铺垫。自“但见”一句起，词人笔锋一转，完全进入画中的世界：从“含章妆”的精美细节，到“振袖依羽”的优雅身姿，再到“回眸空视”的超凡神韵，层层递进地展现出画作动人心魄的力量。这画中人不仅美丽，更带有一种超脱凡尘的空灵气质，能抚慰人心的“春面”与能看透“人间”的“空视”形成了奇妙的统一。全词的高潮在结尾两句，作者直接抒发感慨，“谁言浮墨色难全”是对友人艺术造诣的极高肯定，而“千秋星河自心边”则将这份赞美从“画技”提升到了“心境”的层面，认为友人是将自己内心的浩瀚宇宙赋予了笔墨，这是对创作者最深刻的理解与敬意。</p>\n", "preview": "【作者自述】 这首依旧是和Gsound 一起完成的诗，不过这次他负责少一点，他创…", "note": "为好友光所画「辉夜」一图题诗。用「火箭筒」比喻光的画作——震撼、有冲击力、令人无法忽视。"}, {"title": "冬至两首", "html": "<span class=\"label-block\">【作者自述】</span>\n<p class=\"prose-block\">这两首诗创作于2023 年冬至。第一首诗是冬至前一天百高取消了往年让学生回家团聚一晚的冬至假期。第二首诗是冬至当天，该校一位女同学坠楼自缢。 </p>\n<div class=\"verse-block\"><div class=\"sub-title\">即冬至有闻小作</div>日暮东山过，草缚①重燃日。故居何处寻，笼中亡旧知。鸦渡黑难落，马涨硝烟池。岂料无自知，猪狗立殿时。<div class=\"sub-title\">冬至忆往者所作</div>质明②空始霁，杜鹃③夜难回。孤影乘霜落，沐华④悲为谁？</div>\n<span class=\"label-block\">【注释】</span>\n<p class=\"prose-block\" style=\"font-size:0.92em;\">①缚：一种阻燃的物质。②质明：天刚亮的时候。③杜鹃：传说中蜀国国王杜宇的魂魄所化，啼声凄切，常被用作悲苦思归的意象。④沐华：沐浴着月光或日光。</p>\n<span class=\"label-block\">【全詩意涵】</span>\n<p class=\"prose-block\">这两首诗是记录2023 年冬至前后，发生在同一所学校的两桩事件的组诗。第一首《即冬至有闻小作》写于冬至前一天，是针对学校取消传统团聚假期这一决定的愤怒控诉，诗中充满了被困于“牢笼”的压抑和对校方“猪狗立殿”的激烈斥责，表达了集体性的反抗情绪。而这股愤怒的暗流，在冬至当天，因一位女同学的坠楼离世，瞬间转为了深沉的悲哀。第二首《冬至忆往者所作》便是为这位逝者而作的哀悼之诗，它描绘了生命逝去后空洞的黎明，用“杜鹃难回”和“孤影乘霜落”的凄美意象，寄托了对亡者的无尽悲思，并最终化为一个对悲剧本身的沉痛叩问。两首诗连在一起，完整地记录了一场从公共事件的愤怒到个体悲剧的哀痛的心路历程。</p>\n<span class=\"label-block\">【赏析】</span>\n<p class=\"prose-block\">这两首短诗在艺术表现上形成了极其鲜明而有力的对照，一首是金刚怒目式的战斗檄文，另一首是滴血锥心式的悼亡悲歌。第一首诗的语言风格是粗粝、直接且充满爆发力的，它使用“草缚”、“牢笼”、“硝烟”等充满冲突感的意象，毫不避讳地将愤怒的矛头直指当权者，其力量在于真实和勇于冒犯的锐气。第二首诗则完全相反，它的语言精炼、克制而凄美，将坠楼这一惨痛的现实，升华为“孤影乘霜落”的诗意画面，用典雅的“杜鹃”意象寄托哀思，其力量在于将极致的悲痛凝聚于冰冷的美感之中，更显其悲。从“猪狗立殿”的激烈怒骂，到“沐华悲为谁”的深沉叩问，两首诗从风格到情感构成了完整的互文，共同展现了作者在面对不同性质的事件时，能够驾驭两种截然不同诗歌风格的能力，完整地再现了一场青春风暴中的愤怒与哀伤。</p>\n", "preview": "【作者自述】 这两首诗创作于2023 年冬至。第一首诗是冬至前一天百高取消了往年…", "note": "为高中同学坠楼事件而作。学校取消假期、漠视学生生命的愤怒，借冬至阴寒之际喷涌而出。"}, {"title": "冬行·旦日①词", "html": "<span class=\"label-block\">【作者自述】</span>\n<p class=\"prose-block\">这首诗写于元旦前。 </p>\n<div class=\"verse-block\">残冬腊月，犹仗东风，枯树再梅新修。<br>深闾②胥梦③，斯须旧年，故园终视此前。<br>曾忆否？砚冰濡墨，挥毫天地，江山少年倚梦。<br>栖木④吴越，凰琴⑤流水，觥筹莫问相属。<br>自曰：“天地间，物各有主⑥”</div>\n<span class=\"label-block\">【注释】</span>\n<p class=\"prose-block\" style=\"font-size:0.92em;\">①旦日：元旦，一年的第一天。②闾（lǘ）：里巷，泛指家乡。③胥（xū）梦：都在梦中。④栖木：出自曹操《短歌行》“绕树三匝，何枝可依”，比喻四处漂泊，寻找安身之处。⑤凰琴：指司马相如弹琴追求卓文君的典故，象征才华与爱情。⑥“天地间，物各有主”：引用自苏轼的《前赤壁赋》。原文意为天地万物都有其主人，不属于自己的东西一分一毫也不能拿。</p>\n<span class=\"label-block\">【全詩意涵】</span>\n<p class=\"prose-block\">这首词写于元旦前夕，是一篇关于时光流逝、个人际遇与最终释怀的岁末感怀。词人身处残冬腊月，看到枯树尚能抽出新梅，感受到大自然的循环更生，由此反观自身，故乡已远在梦中，旧年倏忽而过，往事只能追忆。词的下半部分，作者以“曾忆否？”开启回忆，追忆起年少时怀抱的雄心壮志，那时的自己不畏艰苦（“砚冰濡墨”），一心要将天地江山都揽入自己的梦想。然而现实却是四处漂泊（“栖木吴越”），无论是理想的爱情（“凰琴”）还是知己（“流水”），都未能寻得，只能在聚散无常的酒局中，与人逢场作戏。面对理想与现实的落差，词人最终引用苏轼的名句自我劝慰与开解：天地万物皆有其归属，不属于自己的，就不必强求。这是一种经历了世事沉浮后，从失落走向通达与释然的成熟心境。</p>\n<span class=\"label-block\">【赏析】</span>\n<p class=\"prose-block\">这首词的艺术构思精巧，情感层次丰富，是一篇充满古典文人气息的优秀抒怀之作。全词结构上由景入情，再由情入理，层层递进。上片以“残冬”与“新梅”对举，营造出辞旧迎新的时节氛围，并奠定了怀乡与时光流逝的感伤基调。下片以“曾忆否？”一问，巧妙地将时空拉回青春岁月，“砚冰濡墨”与“挥毫天地”的画面，生动地刻画出少年意气风发的豪情壮志。这种昔日的“豪情”与当下“栖木吴越”、“觥筹莫问”的漂泊与孤独，形成了极其强烈的张力与对比，深刻地揭示了理想与现实的差距，这是全词情感的核心。词中最具深意之处，在于结尾引用的苏轼名句。这一引用并非简单的掉书袋，而是将个人的失意与惆怅，提升到了宇宙观的哲学高度。它标志着词人内心情感的完成——不再沉溺于对过往的追悔，而是选择了一种豁达、通透的人生态度来与自己和解，这使得全词的格调与境界都得到了升华，充满了苏轼式的旷达与韧性，余味悠长。</p>\n", "preview": "【作者自述】 这首诗写于元旦前。  冬行•旦日①词 残冬腊月，犹仗东风，枯树再梅…", "note": "冬日出游感怀。写于高中时期，诉说少年心中对前路的迷惘与潜藏的期望。"}, {"title": "贺新郎·别末烛独归", "html": "<span class=\"label-block\">【作者自述】</span>\n<p class=\"prose-block\">这首诗我还算有点印象，这首诗是在回家路上在车上无聊写给猫猫的。 </p>\n<div class=\"verse-block\">腊香又添袍衣卺①，文定②何堪比扶摇。<br>南岭一朝花飞尽，笄冠③倚愿只旦夕。<br>秋池乱，冬日行，此意枫叶问归期。<br>红豆婷，蔷薇雨，分别相顾莫言语。<br>血染江寒夜未归，早春篱栏孤自回。<br>孔雀双飞④甘若此？落月浮墨再相会。<br></div>\n<span class=\"label-block\">【注释】</span>\n<p class=\"prose-block\" style=\"font-size:0.92em;\">①卺（jǐn）：古代结婚时用的一种酒器。此处“袍衣卺”可能泛指礼节性的聚会或约定。②文定：古代订婚的礼仪之一。③笄（jī）冠：古代女子十五岁许嫁，行加笄之礼；男子二十岁行加冠之礼。泛指成年或重要的个人仪式。④孔雀双飞：典故出自汉乐府长诗《孔雀东南飞》，讲述了一对恩爱夫妻被迫分离，最终双双殉情的悲剧。</p>\n<span class=\"label-block\">【全詩意涵】</span>\n<p class=\"prose-block\">这首词描绘了一次与爱人分别后，在归途中所抒发的深切悲痛与绝望之情。词人感叹，曾经的婚约定盟（“文定”）在强大的现实或志向（“扶摇”）面前显得如此无力。美好的时光如南岭之花，在一夕之间凋零殆尽，而曾经近在咫尺的成年成婚之愿（“笄冠”）也化为泡影。归途之中，词人内心纷乱（“秋池乱”），不知何日才能重逢（“问归期”）。他回忆起那段充满思念（“红豆”）却又短暂如“蔷薇雨”的恋情，以及分别时两人相对无言的沉痛场面。这份离别之痛，惨烈如“血染江寒”，让他对未来感到绝望。最终，词人甚至以《孔雀东南飞》的悲剧自比，发出“孔雀双飞甘若此”的沉痛反问，暗示着团聚的希望已极其渺茫，或许只能在来世、梦境或笔墨回忆之中（“落月浮墨”）才能再次相会了。</p>\n<span class=\"label-block\">【赏析】</span>\n<p class=\"prose-block\">这首词是一篇情感浓烈、意象凄美的爱情悲歌。全词的情感脉络由无奈到悲痛，最终沉入绝望，层层递进，极富感染力。词作的意象营造尤为出色，以“扶摇”对比“文定”，写出了爱情在强大外力前的脆弱；以“花飞尽”对“只旦夕”，写出了幸福破灭的突然与残酷。中间“秋池乱”、“蔷薇雨”、“枫叶问归期”等一系列短句，急促而纷乱，精准地模拟了作者当时心烦意乱、愁思满溢的状态。全词的艺术张力在结尾处达到顶峰，对“孔雀东南飞”典故的化用，是点睛之笔，一句“甘若此？”的反问，将内心的痛苦与绝望宣泄得淋漓尽致，比直白的哭诉更具震撼力。而“落月浮墨再相会”的结尾，没有给予虚假的希望，而是将重逢的愿望寄托于虚无缥缈的艺术与梦境，为全词笼罩上了一层彻骨的、凄美的悲剧色彩，余韵悠长。</p>\n", "preview": "【作者自述】 这首诗我还算有点印象，这首诗是在回家路上在车上无聊写给猫猫的。  …", "note": "为女朋友猫猫而写的离别情诗。末烛即夜深时分，独归路上满心思念。"}, {"title": "仿古颂G", "html": "<span class=\"label-block\">【作者自述】</span>\n<p class=\"prose-block\">兄弟，这首诗没得说，那必须要赞颂我们伟大的Gsound。 </p>\n<div class=\"verse-block\">龙降殿前马蹄急，便知神文锦绣帝。<br>伏兵战甲笔落静，楼兰①难忘蔷薇雨。<br>翻掌笑谈收天下，覆掌蒲扇②百姓心。<br>自言本无进取意，囊中之物何太急？</div>\n<span class=\"label-block\">【注释】</span>\n<p class=\"prose-block\" style=\"font-size:0.92em;\">①楼兰：汉代西域古国名，后常在诗词中作为边塞、战功或遥远之地的代称。②蒲扇：用蒲草编成的扇子，是平民百姓常用的物品，此处象征民心。</p>\n<span class=\"label-block\">【全詩意涵】</span>\n<p class=\"prose-block\">这首诗是一篇为友人“Gsound”所作的赞美诗，作者以帝王规格，将友人描绘成一位文武双全、胸怀天下的理想君主。诗歌开篇即以“龙降”与“马蹄急”的宏大场面，塑造出友人如天神降临般的气场，是一位才华横溢的“锦绣帝”。他的文才足以平息战争（“伏兵战甲笔落静”），其影响力既有征服远邦（“楼兰”）的强悍，也带着令人难忘的温柔与美好（“蔷薇雨”）。他拥有经天纬地之才，能于笑谈中轻易取得天下，又能手持蒲扇，体察并赢得百姓的民心，兼具雄才大略与仁德之心。诗歌结尾，作者更是巧妙地升华了这份赞美：友人虽然自谦并无争雄之心，但在作者看来，这是因为整个天下对他而言，早已是唾手可得的“囊中之物”，成功是必然的，又何须着急去争抢呢？</p>\n<span class=\"label-block\">【赏析】</span>\n<p class=\"prose-block\">这首仿古风格的赞颂诗，运用了极为夸张的笔法和帝王意象，成功地为友人Gsound 构建了一个近乎神话的英雄形象，赞美之情淋漓尽致。全诗的艺术魅力在于其巧妙的对比与张力。首先是“文”与“武”的对比，“笔落”能使“战甲”静，突显了友人以智慧和才华定乾坤的超凡能力。其次是“雄”与“仁”的对比，“翻掌收天下”的霸气与“蒲扇百姓心”的亲和，共同塑造了一个既能征服世界又能守护民心的完美领袖形象。而全诗最精妙之处，在于结尾对“无意”与“必然”的矛盾处理。友人自谦“无进取意”，而作者则以“囊中之物何太急？”这一反问作答，将友人的“不争”解读为一种因实力过强而无需去争的从容与自信。这不仅化解了矛盾，更将赞美推向了顶峰，显得既高明又真诚，是一次非常成功的“高级吹捧”，格调与趣味兼备。</p>\n", "preview": "【作者自述】 兄弟，这首诗没得说，那必须要赞颂我们伟大的Gsound。  仿古颂…", "note": "以古典颂歌体赞美挚友Gsound。G是鱼君创作生涯中最重要的伙伴，是「句朝」宇宙的核心人物。"}, {"title": "谁人", "html": "<span class=\"label-block\">【作者自述】</span>\n<p class=\"prose-block\">这首诗有点神秘，我只记得是在疫情准备开学的时候写的，好像是为了告别Gsound。 </p>\n<div class=\"verse-block\">首阳①渐璗右江畔，惠风天涯散故人。<br>元夕②濡赤辉却白，遍插金桔为黎人③。<br>朦遗低吱傲鬓子，百城封闾④是清人？<br>末似商风再难逢，觞军⑤更盼锦禹人⑥。<br></div>\n<span class=\"label-block\">【注释】</span>\n<p class=\"prose-block\" style=\"font-size:0.92em;\">①首阳：山名，相传是伯夷、叔齐饿死之处，后世用以代指坚守节操的隐士或其归隐之处。②元夕：即元宵节，本是灯火辉煌、家人团聚的节日。③黎人：百姓，平民。④百城封闾（lǘ）：封闭的百城。此处指代疫情时期城市封锁政策。⑤觞（shāng）军：向军队（或指某一群体）敬酒。⑥锦禹人：指像夏禹一样能“跃龙门”的杰出人才。</p>\n<span class=\"label-block\">【全詩意涵】</span>\n<p class=\"prose-block\">这首诗写于疫情期间，是一首在时代背景下与友人Gsound 告别的感怀之作。诗歌描绘了一个令人感伤的画面：因不可抗力，故友们如被和风吹散，散落天涯。本应是团圆热闹的元宵节，也因离别与疫情的阴影，失去了温暖的红光，显得一片惨白，纵使有为百姓祈福的“金桔”也只是徒有其表。在“百城封锁”的压抑环境下，诗人对一切都产生了怀疑，连记忆中那位优秀骄傲的友人（“傲鬓子”）的形象似乎也变得模糊不清。诗人预感此次一别，恐怕如秋风过耳，再难相逢。然而，在离别的最后，个人的伤感被集体的祝愿所取代，他们这群朋友（“觞军”）举杯，共同期盼着那位最杰出的伙伴“锦禹人”（指Gsound）能有光辉灿烂的前程。</p>\n<span class=\"label-block\">【赏析】</span>\n<p class=\"prose-block\">这首诗的题目《谁人》精准地抓住了全诗在疫情时代背景下迷惘、疏离与不确定的核心情感。全诗的艺术特点在于运用了一系列充满矛盾和反讽的意象，来营造一种疏离而悲伤的氛围。例如，本应和煦的“惠风”却“散故人”，本应红火的“元夕”却“辉却白”，这些都深刻地反映了特殊时期里，人们对于日常事物感知错位的集体经验。诗歌中“百城封闾是清人？”这一句质问，是全诗思想深度的体现，它不仅仅是写离愁别绪，更是在叩问一个宏大的命题：在巨大的社会变动之下，个体的身份与认知该如何自处？全诗的收尾极为精彩，它将离别的悲观（“再难逢”）与对友人的无私祝愿（“更盼锦禹人”）并置，情感由个人的伤感，升华为一种群体的、带有牺牲精神的期盼。这使得这首告别诗超越了单纯的惜别，而成为了一曲在压抑时代背景下，对友情与未来所献上的悲歌。</p>\n", "preview": "【作者自述】 这首诗有点神秘，我只记得是在疫情准备开学的时候写的，好像是为了告别…", "note": "以隐晦笔法批评社会现象。写于高中时期，对世态人心的嘲讽。"}, {"title": "何曾渔人", "html": "<span class=\"label-block\">【作者自述】</span>\n<p class=\"prose-block\">这首诗更是神秘，应该是在2022 年准备开学的时候写的，目的是为六月份即将带来的高考期许。 </p>\n<div class=\"verse-block\">晞辉①散尽天涯落，琉璃急橹樵渔迟。<br>笺梦②何畏空流兔③，鸿鳞④坻天眠月舞。<br>黔首⑤且归故风灯，俯觉亭镜⑥漫秋声。<br>车门不待冷烟雨，折桂⑦留自化星笛。<br></div>\n<span class=\"label-block\">【注释】</span>\n<p class=\"prose-block\" style=\"font-size:0.92em;\">①晞（xī）辉：晨曦的光芒。②笺（jiān）梦：写在纸上的梦，比喻脆弱或遥远的梦想。③空流兔：月亮（玉兔）徒然地运行。指时光空空流逝。④鸿鳞：古代传说中传递书信的两种动物，鸿雁和鲤鱼，此处代指信讯。⑤黔首（qián shǒu）：古代对平民百姓的称呼。⑥亭镜：平静如镜的水面倒映着亭子。⑦折桂：古代科举成功的代称。</p>\n<span class=\"label-block\">【全詩意涵】</span>\n<p class=\"prose-block\">这首诗生动地刻画了作者在备战高考前夕，那种充满希望、焦虑与决心的复杂心境。标题“何曾渔人”便开宗明明义地宣告，自己从来不是也不愿做那个悠闲自在的“渔人”，人生正是一场逆水行舟的“急橹”之赛。诗歌描绘了在时光飞逝中，自己怀揣着写在纸上的脆弱梦想（“笺梦”），对未来的录取信息（“鸿鳞”）日思夜想。身为一个普通学子（“黔首”），唯一能做的便是回归到孤独的灯下苦读，即便看到亭台倒映在平静水面上的安宁景色，内心感受到的也只是时光流逝的“秋声”。但作者并未消沉，他决心像一辆永不停歇的列车，不畏前路的风雨，坚信最终的成功（“折桂”）将会化为一曲星光般璀璨、笛声般悠扬的美好未来。</p>\n<span class=\"label-block\">【赏析】</span>\n<p class=\"prose-block\">这首诗是一篇极具时代感与个人色彩的“高考述怀”之作，其最大的艺术特色在于古典意象与现代心境的完美融合。全诗以“渔人”的古典隐逸形象与考生“急橹”般的奋斗姿态构成核心对比，精准地传达了当代学子在激烈竞争中无法置身事外的现实。诗中的意象营造尤为出色，“笺梦”一词，道尽了梦想既珍贵又易碎的本质；“鸿鳞坻天”则以奇崛的想象，将考生对录取结果的极度渴盼与焦虑具象化，极富张力。“故风灯”与“亭镜秋声”的组合，更是将深夜苦读的孤独与内心无法平静的焦灼描绘得淋漓尽致。全诗的点睛之笔在于结尾，“折桂”的功利性目标被“化星笛”这一充满浪漫主义色彩的意象所升华，它表达的不仅仅是成功的愿望，更是对通过奋斗赢得一个美好、有价值、如诗般未来的深切期许，使得这首励志诗超越了口号式的呐喊，充满了动人的美感与力量。</p>\n", "preview": "【作者自述】 这首诗更是神秘，应该是在2022 年准备开学的时候写的，目的是为六…", "note": "借渔人题材抒写世事无常与人生漂泊之感。"}, {"title": "花师", "html": "<span class=\"label-block\">【作者自述】</span>\n<p class=\"prose-block\">2023 年冬天，这首诗是我写给刚刚失恋的朋友的，希望当时他能想开点，不这么伤心。 </p>\n<div class=\"verse-block\">秋风俗情兰花残，世人皆责护花难。<br>花落茎萎枯叶卷，难支独散风相干。<br>不见汝君颊上土，别问不待与言怒。<br>看且前圃花有路，自有一亩是归处。<br></div>\n<span class=\"label-block\">【全詩意涵】</span>\n<p class=\"prose-block\">这首诗是一篇开导和安慰失恋朋友的作品。开篇以“秋风”与“兰花残”起兴，将爱情的逝去比作自然界中花开花落的寻常事，以此宽慰友人，不必将一次失恋看得过重。诗歌承认维系感情不易（“护花难”），并细致描绘了感情彻底终结时的凋零景象，以此来共情朋友的痛苦。接着，笔锋一转，指出感情的消散很多时候是身不由己，是“风”的缘故，而非一人之过，以此为朋友开脱，减轻他的自责。随后，诗人直接劝诫朋友，不要再沉溺于悲伤（“颊上土”），也不要再纠结于是非对错与争吵之言。最后，诗歌为朋友指向未来，告诉他前方的花园里还有很多路可以走，更重要的是，每个人自己就是一方可以回归的田园，一个人的价值与归宿，最终在于自身，而非一段逝去的感情。</p>\n<span class=\"label-block\">【赏析】</span>\n<p class=\"prose-block\">这首《花师》是一首构思精巧、充满哲理的劝慰诗。全诗以“花”为核心意象，将诗人自己置于一位循循善诱的“花师”角色，引导朋友看透爱情的本质。其艺术手法的巧妙之处在于，它没有空洞地说教，而是遵循了极有同理心的劝慰逻辑。首先，它通过描绘花败的景象来承认和共情朋友的痛苦，并以“风相干”的理由来巧妙地转移和减轻朋友的负罪感，这是情商极高的第一步。接着，在朋友情绪被安抚后，才提出“别问”、“不见”的建议，劝其停止精神内耗。而全诗的境界在结尾处得到了升华，“前圃花有路”是面向未来的希望，而“自有一亩是归处”则是回归内心的力量。它最终将疗愈的落脚点从“寻找下一朵花”引向了“耕耘好自己的田园”，强调了自我的价值与内心的安宁才是最可靠的归宿。这种从共情到开解，再到价值提升的层层递进，使得这首诗充满了温暖的智慧与力量。</p>\n", "preview": "【作者自述】 2023 年冬天，这首诗是我写给刚刚失恋的朋友的，希望当时他能想开…", "note": "高中时期作品，以花寄意，收录于《浮墨星河》诗集。"}, {"title": "送李义山入试", "html": "<span class=\"label-block\">【作者自述】</span>\n<p class=\"prose-block\">依旧是2023 年冬天，这首诗是写给舍长的，劝当时的舍长别为了一个小小的期末考试这么卷了。 </p>\n<div class=\"verse-block\">渝州冬景，银杏飞散，铺街黄两岸。<br>风行不待，匆忙学子，碎金点点上肩。<br>抬头望，漫天星辰，皆收少年之眼。<br>芸芸又堪何？不及玄风落九门，便偷乙己九川渡①。<br>年少有为，不学何为，自信逍遥，或有终成之焉。<br>莫愁人生前路远，总有相伴与同故。<br>看千帆过尽，棋盘仍如故②。<br>君知否？心之所向，方是归处。<br></div>\n<span class=\"label-block\">【注释】</span>\n<p class=\"prose-block\" style=\"font-size:0.92em;\">①不等到东风吹落到九重门里，就偷偷学着孔乙己去平渡九曲黄河？是作者对于友人急于求成的劝解，告诉他要顺其自然。②“千帆过尽，棋盘如故”：这是出自苏轼的《江城子·乙卯正月二十日夜记梦》的名句，原文是“千帆过尽，归来看取，长江如许，便似人生”。这里指人生的变化，也寄托了友情的不变。</p>\n<span class=\"label-block\">【全詩意涵】</span>\n<p class=\"prose-block\">这是一首劝慰友人不必为期末考试过度焦虑的作品。诗歌先肯定其志向远大，随即以“偷学孔乙己”为喻，温和地批评了他“内卷”式的备考方式。作者劝友人应“自信逍遥”，并提醒他友情比一时的考试（“千帆过尽”）更为恒久。最后点明主旨：人生真正的归宿，是追寻自己内心的方向，而非囿于成绩。</p>\n<span class=\"label-block\">【赏析】</span>\n<p class=\"prose-block\">这首作品在形式上类似一篇文采斐然的“赠序”，其艺术魅力在于将真诚的赞美、温和的批评与深刻的哲理思考完美地融合在一起。作者以晚唐诗人“李义山”来称呼友人，既是一种才华上的肯定，也暗含了对其过于执着和严肃的善意调侃，使得劝慰的姿态显得非常尊重和平等。诗中最具巧思的是“偷乙己九川渡”这一比喻，它将现代的“内卷”焦虑，与孔乙己这一经典悲剧形象联系起来，构成了一个新颖而有力的警示，劝诫友人不要陷入知识的“死胡同”，极具匠心。全诗的劝说逻辑层层递进，从肯定其志向，到批评其方法，再到提供新的心态（自信逍遥），最后给出超越性的哲理（心之所向），堪称一篇教科书式的“劝学”与“反内卷”范文。它成功地将一场小小的期末考试，提升到了关于人生、友情与个人价值选择的哲学高度，立意高远，情真意切。</p>\n", "preview": "【作者自述】 依旧是2023 年冬天，这首诗是写给舍长的，劝当时的舍长别为了一个…", "note": "借唐代诗人李商隐（义山）之名，批判应试教育。表面写送人考试，实则质问整个体系的荒谬。"}, {"title": "玄客远居侍主人", "html": "<span class=\"label-block\">【作者自述】</span>\n<p class=\"prose-block\">科学研究表面，一滴黑人血要好几代其他人种才能完全稀释，而在中国，黑人只需要结婚生子就可以合法拥有居住权，有些中国女性还以能榜上黑爹为荣，看不起本分的中国男人。这种种族入侵不可忽视，炎黄子孙不应该存在黑人。 </p>\n<div class=\"verse-block\">海峰千渡繁市楼，路远客来莫相忧。<br>神洲风雨百余载，只恐腐儒①待客遥。<br>正阳门下紫禁城，可堪利士②半沙篓？<br>岭南着眼春意浓，遍绿左江木棉柔。<br>为何？麓景溟夜，官门通牍，番禺③究谁人住？<br>既有所成何故迟，还乡旧里采棉路。<br>何为？法兰④之误，罪比季路⑤，诏书撑为谁主？<br>圊⑥犬尻囚春宵短，万里江山为身俯。<br>黄龙不长墨鳞意，何生赤凤黑羽目。<br>若待玄色⑦真汉族，五十六族多一畜。</div>\n<span class=\"label-block\">【注释】</span>\n<p class=\"prose-block\" style=\"font-size:0.92em;\">①腐儒：迂腐之儒者。诗中指中国部分官员。②利士：即非利士，是古代非洲大陆的代称。③番禺：指的是中国古代广州。《汉书·地理志》中记载：“南海中，岭南节度，自番禺、南海，至象州、合浦，凡十五郡”。④法兰：即法兰西，法国目前的人种比例是非洲黑人+黑白混血儿60%，纯种的白种人35%，其他有色人种5%。⑤季路：孔子的弟子之一，这里是作者犯的一个错误，本意应该是想表达“认贼作父”的典故。⑥圊：《徐锴曰》厕古谓之淸者，言汚秽常当淸除也。《博雅》圂厕也。《释名》杂也，言人杂厕其上也。⑦玄色：幽远也。黑而有赤色者为玄。象幽而入覆之也。凡玄之属皆从玄。</p>\n<span class=\"label-block\">【全詩意涵】</span>\n<p class=\"prose-block\">这是一首表达了激烈种族主义与排外情绪的政治讽喻诗。作者认为部分官员纵容了黑人对中国的“种族入侵”，威胁了国家的血统纯粹。诗歌以极具歧视性的语言，要求黑人“还乡采棉”，并断言代表中华的“黄龙”绝不接受“墨鳞”，最终以“多一畜”的言论，将黑人排除在民族之外。</p>\n<span class=\"label-block\">【赏析】</span>\n<p class=\"prose-block\">这首诗在艺术上呈现为一篇用古典形式包装的“政治檄文”。其核心特征是典雅的形式与其中充满仇恨、暴烈的内容所形成的巨大反差。全诗的修辞完全为传达其极端种族主义观点服务，通过不断升级的侮辱和非人化的语言（如“采棉”、“畜”），并借用文化图腾（如“黄龙”）来强化其论点。它并非一首审美之作，而是一篇旨在清晰传达政治仇恨的工具性文本。</p>\n", "preview": "【作者自述】 科学研究表面，一滴黑人血要好几代其他人种才能完全稀释，而在中国，黑…", "note": "以「玄客」自喻，表达对家国与传统文化的情怀，带有民族主义色彩。"}, {"title": "江皋①感旧寄箴规（游记其一）", "html": "<span class=\"label-block\">【作者自述】</span>\n<p class=\"prose-block\">在备受关注的武汉大学“性骚扰”案中，男生肖某某历时两年终获法律还以清白，但其人生已被诬告和网暴彻底摧毁。然而，败诉的女方杨某媛非但毫无悔意，反而在网上高调炫耀自己保研、通过法考的成就，并继续威胁要断绝男方的未来。 </p>\n<div class=\"verse-block\">熏风绮罗凌波门②，彼岸落尽朱樱痕。<br>卓刀泉下清明泪，鹦鹉洲头往昔轮。<br>焚书且负秦时月，四德③能安黍离④魂。<br>今日崇尊洙泗⑤典，只缘画皮⑥又叩门。<br></div>\n<span class=\"label-block\">【注释】</span>\n<p class=\"prose-block\" style=\"font-size:0.92em;\">① 江皋：江边高地。箴规：劝诫，规劝。② 凌波门、卓刀泉、鹦鹉洲：均为武汉大学或武汉市的著名地标。朱樱：指武大的樱花。③ 四德：中国古代对女子的四种行为准则，即妇德、妇言、妇容、妇功。④ 黍离：《诗经》中的一篇，抒发了故国覆灭、黍稷丛生的悲伤。后用“黍离之悲”指亡国之痛或对时事变迁的感伤。⑤ 洙泗：洙水和泗水，皆在今山东，是孔子讲学的地方，后代指儒家文化或圣人之教。⑥ 画皮：出自《聊斋志异》，指披着人皮、外表美丽的恶鬼。</p>\n<span class=\"label-block\">【全詩意涵】</span>\n<p class=\"prose-block\">这首诗是针对武汉大学“性骚扰”诬告案的感怀与批判。作者以武大著名地标起兴，营造出物是人非的悲伤氛围：校园的纯洁精神（“朱樱痕”）已逝，只留下对无辜者的哀悼（“清明泪”）。作者将事件中的网暴比作践踏理性的“焚书”，并悲叹传统“四德”已无法安抚这个道德沦丧的时代（“黍离之悲”）。诗歌最后尖锐地反讽道：社会之所以还会记起儒家道义，只是因为一个伪善的“画皮”恶魔（指诬告者）再次出现，其恶意迫使人们不得不重拾道德武器。</p>\n<span class=\"label-block\">【赏析】</span>\n<p class=\"prose-block\">这首诗是一篇极具现实批判精神的“咏史”之作，其艺术特色在于将具体的地点、时事与厚重的历史典故完美地熔于一炉，营造出深沉的悲剧感与批判力。诗歌开篇对武大景物的描写，并非简单的写景，而是处处充满象征：绮罗喻浮华，樱落喻纯洁扫地，清泪喻冤屈，洲头喻兴亡，几笔便勾勒出事件的悲剧背景。全诗的典故运用尤为精妙，“焚书”将网暴定性为反理性的暴行；“黍离”则将个人悲剧提升至对整个时代道德秩序崩坏的哀痛。而最核心的典故，是结尾处的“画皮”，这个比喻极其辛辣，它精准地抓住了事件的核心矛盾——美丽外表与邪恶内心的巨大反差，将对个案的愤怒，升华为对人性之恶的深刻警示。全诗由景入情，由情入史，由史入理，层层递进，情感由哀转愤，最终落脚于对整个社会道德状况的冷峻反思，是一首有风骨、有深度的当代古体诗。</p>\n", "preview": "【作者自述】 在备受关注的武汉大学“性骚扰”案中，男生肖某某历时两年终获法律还以…", "note": "游记诗之一，行走江皋感怀旧事，寄给友人箴言规戒。"}, {"title": "江油纪游寄怀（游记其二）", "html": "<span class=\"label-block\">【作者自述】</span>\n<p class=\"prose-block\">这首诗是在写江油风景，真的只是在写风景而已。 </p>\n<div class=\"verse-block\">辛夷①沾露谢，殷色②逐波流。<br>寒雨啮萍末，群峰峙浊沤③。<br>幽咽藏深汐，千帆护青天。<br>旧痕随浪逝，新绿上汀洲④。<br></div>\n<span class=\"label-block\">【注释】</span>\n<p class=\"prose-block\" style=\"font-size:0.92em;\">①辛夷：木兰花，早春开花。是江油的代表花。②殷（yān）色：深红色，黑红色。这里是血色的象征。③浊沤（ōu）：浑浊的水泡。④汀洲（tīng zhōu）：水边的小块陆地。</p>\n<span class=\"label-block\">【全詩意涵】</span>\n<p class=\"prose-block\">这首诗以四川江油的自然风光为载体，描绘了一段从创伤到疗愈的心路历程，可视为前一首《江皋感旧》的续篇。诗歌开篇，以早春木兰花的凋谢和其“血色”花瓣逐波而流的景象起笔，象征着过去那段伤痛（“旧痕”）正被时间的流水慢慢冲刷洗涤。然而，环境依旧险恶（“寒雨啮萍末”），世间也仍有浊流（“浊沤”），深藏的悲伤（“幽咽”）并未完全消解。但即便如此，作者看到了如山峰般屹立不倒的公理，更看到了“千帆”——也即芸芸大众——仍在守护着“青天”所代表的正义。正是这份信念，带来了最终的希望：旧日的伤痕终将逝去，新的生机（“新绿”）已在水边的陆地上悄然萌发，代表着希望与新生的到来。</p>\n<span class=\"label-block\">【赏析】</span>\n<p class=\"prose-block\">这首山水纪游诗的真正内核，是一场关于内心秩序重建的寓言。其艺术手法在于将激烈的情感冲突，完全投射并消解于含蓄的自然意象之中。全诗的意象前后对比鲜明，形成了一条完整的情感线索：从“辛夷谢”、“殷色流”、“寒雨啮”、“浊沤”等一系列代表创伤与逆境的负面意象，到“群峰峙”、“千帆护青天”等代表坚定信念与正义力量的正面意象，最终自然地过渡到“旧痕逝”、“新绿上”的疗愈与重生结局。诗中最具匠心的，是以“殷色逐波流”来比喻创伤的洗刷，以及用“群峰峙浊沤”来比喻公理与浊世的对峙，这些都极富象征意义。相比于前一首诗的激愤与尖锐，这一首的情感表达更为内敛、坚韧，它不回避痛苦，但更强调信念与希望，展现了一种风雨过后，在自然与人心中重新发现秩序与生机的成熟和豁达。</p>\n", "preview": "【作者自述】 这首诗是在写江油风景，真的只是在写风景而已。  江油纪游寄怀（游记…", "note": "游记诗之二，江油之行纪游寄怀友人。记录旅途见闻与对友情的思念。"}, {"title": "桂雨寄光", "html": "<span class=\"label-block\">【作者自述】</span>\n<p class=\"prose-block\">这首诗是写于最近的，献给光，希望你一如少年般的勇气，一往无前。 </p>\n<div class=\"verse-block\">桂西落净冷烟雨，素风又散故人路。<br>乌龟山前无归期，月亮山上难月圆。<br>旧梦室女①铺星路，遥寄井犴②续夜谈。<br>犹思当年执伞客，一如少年剑向前。<br></div>\n<span class=\"label-block\">【注释】</span>\n<p class=\"prose-block\" style=\"font-size:0.92em;\">①室女座：拉丁语Virgo，又称处女座，时间为08.23-09.22，是土象星座，也是最大的黄道星座。②井木犴：时间为2025 年9 月11 日，是中国古典小说《西游记》中的角色，隶属于二十八星宿中的南方朱雀七宿，被称为“井宿”。</p>\n<span class=\"label-block\">【全詩意涵】</span>\n<p class=\"prose-block\">这是一首写给友人“光”的生日祝福诗，旨在鼓励他扫除当下的迷惘与愁绪，重拾少年时的勇气。诗歌的开篇，以桂花落尽、冷雨潇潇的晚秋景象起笔，并借“乌龟山下无归期，月亮山上难月圆”的巧思，营造出一种与友人分隔两地、憾难团圆的感伤氛围，也暗示了友人目前可能正处于一段失意或不顺遂的时期。然而，诗歌的下半部分笔锋一转，从地面转向了浩瀚的星空。作者分别引用了代表友人生日的西方星座（室女座）与中国星宿（井宿），遥寄自己的思念与祝福，寓意着友人的命运本该如星辰般璀璨。最后，作者的思绪从遥远的星空，回到了一个具体的过往记忆——“当年执伞客”，并以此为引，送上了最核心的祝福：希望友人能一如当年那个少年，永远怀揣着利剑，一往无前。</p>\n<span class=\"label-block\">【赏析】</span>\n<p class=\"prose-block\">这首生日赠诗在艺术上极具巧思，其最大的特色在于情感与意象的层层递进与转换，成功地从一首伤感的离别诗，升华为一曲激昂的励志歌。开篇四句对仗工整，意境凄美，将友人分离的“憾”与“难”渲染得淋漓尽致，这是一种高明的“欲扬先抑”手法，先充分共情友人的愁绪。诗歌的转折点在于对星象的引用，作者别出心裁地将西方星盘（室女座）与中国传统星宿（井木犴）并置一处，既显得新颖独特，又将对友人的祝福赋予了一种“命中注定”的宇宙级浪漫与厚重感。而全诗最动人之处在于结尾，宏大的宇宙叙事最终落脚于一个温暖的个人记忆（“执伞客”），再由此引出“少年剑向前”的期许，使得这份鼓励不是空洞的口号，而是有回忆作为坚实基础的真挚寄语。整首诗由悲转壮，由景入情，由星辰入记忆，结构精巧，情感真挚，是一篇格调与温度兼备的佳作。</p>\n", "preview": "【作者自述】 这首诗是写于最近的，献给光，希望你一如少年般的勇气，一往无前。  …", "note": "秋日桂雨时节写给光的一封信般的诗。桂花飘落如雨，思友之情随之而至。"}, {"title": "闻G行政楼忽眠所作", "html": "<span class=\"label-block\">【作者自述】</span>\n<p class=\"prose-block\">战神吃饭，战神睡觉，Gsound 我求你了，别玩那幽默无名了。 </p>\n<div class=\"verse-block\">大坝故郡，行政新府。<br>宝藏之月，时多鼠鼠。<br>红包，得集装箱者，大红皆有之。<br>且听局始爆竹声，不见免保见裸客。<br>呜呼！<br>入行政楼者，无刘涛金丹之猛攻，无G18 狼之夺舍，唯恐幽默突临臀侧。<br>G，两尺微命，一介无名，胃袋不够添牛角，耳环难满嘴中物。<br>但笑，忽觉楼中皆是客，鼾声漫过枪声纹，睡觉！<br></div>\n<span class=\"label-block\">【全詩意涵】</span>\n<p class=\"prose-block\">这首充满超现实风格的散文诗，是作者写给友人Gsound 的一篇“激将法”式作品。作者描绘了一个光怪陆离、充满荒诞竞争与不公的“行政楼”世界：这里有疯狂的利益分配（“集装箱红包”），有看不见的残酷淘汰（“不见免保见裸客”）。在这个如同战场般的环境里，本该有史诗级的对抗，但作者却感叹，真正的威胁并非那些想象中的“猛攻”与“夺舍”，而是友人G 那不合时宜的“幽默”。作者哀其不争，友人G明明是“战神”，却甘于扮演一个无名小卒，对周遭的混乱与“枪声”，他的回应不是战斗，而是以一种超然的姿态付之一笑，然后倒头大睡。他那震耳的“鼾声”甚至盖过了外界的“枪声”，象征着他用一种极端“躺平”的方式来对抗或无视这个荒诞的世界。整首诗是作者对友人的一声呐喊：Gsound，你快醒醒，别再用“幽默”和“睡觉”来逃避了，你的才能不应如此浪费！</p>\n<span class=\"label-block\">【赏析】</span>\n<p class=\"prose-block\">这篇作品在风格上极具先锋与实验性，它放弃了传统诗歌的格律与抒情，采用了一种“意识流”拼贴的手法，语言狂放不羁，意象荒诞不经。其核心艺术魅力在于，它用一种极度“疯癫”的文字，去描绘一个“疯癫”的世界，并反衬出友人G“以疯治疯”的躺平哲学。全诗的语言是其最大的特色，作者将古典句式（“呜呼！”）、网络俚语（“鼠鼠”）、游戏或内部梗（“刘涛金丹”）、以及超现实的感知（“鼾声漫过枪声纹”）杂糅一处，形成了一种混乱而又充满活力的独特文体，完美地服务于其荒诞的主题。诗中最精彩的比喻，无疑是“鼾声漫过枪声纹”，它将友人的“睡觉”这一行为，从单纯的逃避，升华为一种响亮的、具有颠覆性的宣言。这篇作品不好懂，但其价值不在于让所有人读懂，而在于它精准地捕捉并宣泄了作者那一刻对友人的复杂情感——既有对其才能的极高赞誉（战神），又有对其“不作为”的深度不满，是一篇充满天才火花与真挚友情的奇特佳作。</p>\n", "preview": "【作者自述】 战神吃饭，战神睡觉，Gsound 我求你了，别玩那幽默无名了。  …", "note": "听闻Gsound在行政楼偶然睡着，乘兴戏作。轻松逗趣之作，展现日常友情中的自然幽默。"}, {"title": "桃花", "html": "<span class=\"label-block\">【作者自述】</span>\n<p class=\"prose-block\">桃花，是啊，曾经我也使用过它写过一篇散文，在我心中桃花就是美的象征，它有粉色的有白色的，时而柔弱时而坚强，也有喜悲，但无论如何我都最爱她。 </p>\n<div class=\"verse-block\">篱边嫣然含羞笑，似开未开最有情。<br>恬静心思藏暖意，羞涩眉眼蕴真情。<br>每对春风思旧影，粉白多变随风性。<br>何须争艳群芳里，唯待君归共落英。<br></div>\n<span class=\"label-block\">【全詩意涵】</span>\n<p class=\"prose-block\">这首诗是一幅为“桃花”所作的深情画像，诗歌的主角是一位如桃花般美好的少女。开篇引用了“似开未开最有情”的意象，描绘了她正处于“含苞待放”的青春年华，那份娇羞与美好最是动人 。接着，诗歌深入其内心，点明了她的核心特质：外表看似恬静，内心却蕴藏着温暖与真情 ；情感丰富而多变，常常因“春风”（指代的爱人）的举动而变化 。她不需要在百花丛中争奇斗艳，因为她有着自己独特的温柔 。她心中唯一的期盼，便是等待那个如“春风”般的“君”归来，与他相伴，一同看尽花开花落，共度此生。</p>\n<span class=\"label-block\">【赏析】</span>\n<p class=\"prose-block\">这首七言绝句是对散文《桃花》核心精神的精炼与升华，是一篇形神兼备的抒情佳作。其艺术上的成功，首先在于对核心意象的精准捕捉。诗歌的前两句化用了散文中引用的汪藻诗句 ，将“似开未开”这一少女最动人的状态提炼出来，迅速为全诗定下基调。三、四句“恬静心思藏暖意，羞涩眉眼蕴真情”对仗工整，高度概括了桃花外冷内热、静中含情的独特个性，这正是散文中所描述的“孤独的温暖” 。五、六句则聚焦于她与“春风”的关系，一个“思”字写出了她的惦念，而“多变”则精准呼应了散文中她时而热烈、时而冷淡的情感状态 。全诗的点睛之笔在结尾。“何须争艳”写出了她不与人争的独特与自信，而“唯待君归共落英”则将这份情感从单向的描摹，转变为双向的、充满忠诚与期盼的承诺。这不仅是一首赞美诗，更是一首情诗，它将桃花的恬静、羞涩、多变等所有特质，都归结于一份有所等待的深情，使得整个人物形象瞬间变得立体而有分量。</p>\n", "preview": "【作者自述】 桃花，是啊，曾经我也使用过它写过一篇散文，在我心中桃花就是美的象征…", "note": "以桃花比喻女朋友猫猫——「孤独的温暖」，恬静、羞涩、在春天里短暂而动人地绽放。这是猫猫最喜欢的诗。"}], "wenyan": [{"title": "无记·陆天神传", "html": "<p class=\"prose-block\">陆，字天神，桂西百城人。少则哲，不五岁则通王公《算学宝鉴》，日垂习外语，稍大则与衙门外宾议牛顿一莱布尼茨公式。时礼部尚书刘小平，颇赏其才，自教当时最先进。百城员外郎李和平超命陆年少应科举，陆试如文轴，每一试以头榜之效。及御试，上问：“何物生活。”对曰：“卿之所好者是也。”帝震惧，与百官议赐丞相。刑部尚书肖福流曰：“古者最年少相为战国甘罗，年十二为相，卒归就楚国。其陆天神十岁而为相，既非古制，又不必能以国家耆腊，奈何以博注着一儿身乎？”上以为然，止之。转赐天神位，欲退就田。闻者，福流甚迷，愈力止之。帝澹然曰：“卿无劝我，而陆天神六艺皆最胜。彼上知天文，下知地理，已不可谓人矣，此世神也。卿勿复言，吾已决矣”。于是遂班召令。令初下，百官皆从之，皆忠为陆神。福流自知事不成，乃自雨连江楼跃入。陆神就位，建元归职，盛设甲乙，重修赃吏以强志，抚福流家属，并为其在流子所习于太学。是年科举头榜薛和光，薛以决狱推理，即以百城闻名，光以暗杀能匿于江湖。陆天神召擢薛为刑部尚书，擢光内阁总理，两为其袒臂。其间则民福康，政清劭速，国空前强，出“归同之治”。史称句朝，陆神谓之句成祖。 （节选自《无记·陆天神传》）</p>\n<span class=\"label-block\">【翻译】</span>\n<p class=\"prose-block\">陆，字天神，是桂西百城人。他自幼聪慧，不到五岁就已精通王公所著的《算学宝鉴》，并且每日坚持学习外语。年纪稍大一些后，他便能在衙门里与外国宾客探讨牛顿-莱布尼茨公式。 当时的礼部尚书刘小平，非常欣赏他的才能，于是亲自教导他那个时代最先进的学问。百城县的员外郎李和平，破格举荐年少的陆应考科举。陆在各级考试中都如同探囊取物，每一场都以榜首的成绩通过。 到了皇帝亲自主持的殿试，皇上问：“什么是生活呢？”陆回答说：“你所热爱的就是你的生活。”皇帝听后大为震惊和赞叹，随即与文武百官商议，准备册封他为丞相。 但刑部尚书肖福流提出异议说：“古代最年轻的丞相是战国时期的甘罗，十二岁拜相，但最终还是去了楚国。如今陆天神年仅十岁就要拜相，这既不合乎古代的制度，也未必能依靠朝中的元老重臣，我们怎么能将国家的命运赌在一个孩童的身上呢？”皇上认为他说得有道理，便中止了任命。 作为补偿，皇上转而赐予陆“天神”的封号。陆得知后，便想辞官归隐田园。听到这个消息，肖福流反而大为困惑，更加用力地劝阻他归隐。皇帝则淡然地说道：“你不用劝我了。陆天神在礼、乐、射、御、书、数这六艺上都已登峰造极。他上知天文，下知地理，已经不能称之为人，而是当世之神。你不要再多说了，我心意已决。”于是便颁布了封号的诏令。诏令刚一下达，文武百官都心悦诚服，皆对“陆神”宣誓效忠。 肖福流自知无法改变这一切，于是便从雨连江楼上纵身跃入江中。 陆神就任后，建立年号，他大力整顿官僚体系，重新修订惩治贪官污吏的法规，以此来坚定国民的意志。他还安抚了肖福流的家属，并安排肖福流的儿子进入太学（国家最高学府）学习。 这一年的科举状元名叫“薛和光”（实为两人）。其中，薛以断案推理的能力闻名于百城，而光则是一位善于隐匿行踪的江湖刺客。陆天神提拔薛担任刑部尚书，提拔光担任内阁总理，这两人成为了他最重要的左膀右臂。 在此期间，国家百姓安居乐业，政治清明高效，国力达到了空前的强盛，后世称之为“归同之治”。史官将这个时代称为“句朝”，将陆神尊称为“句成祖”。</p>\n", "preview": "42  陆，字天神，桂西百城人。少则哲，不五岁则通王公《算学宝鉴》，日垂习外语，…"}, {"title": "句记·瑞光神传", "html": "<p class=\"prose-block\">瑞，字光神，桂西百城人。瑞生之时，天云密迩，大风震电。及瑞卧其母旁。一友来贺喜，讶瑞父曰：“尔家廷中多为大风所刮伞，并落伞成一怪形”。瑞光神之父甚喜，以为此祥兆，天神于祝福刚生之瑞光神。因置酒与饮，请一郡人啖席，自言新生子，取其复来盖。幼时瑞光神，天资不如其父母之想。瑞虽习语甚快，但令不断，恶与人言，常取其生时父独留伞，喃喃自语。稍大，亲便内之学，欲其光之习，以其年长而予世。瑞于社学不迎同学，以其孤僻，多不能与人相见。及毕业，与其年陆天神放异彩，而称瑞光神，师几无貌。虽校园燥，而瑞光神颇习有用之知。 是年举，瑞之徒皆与，而独瑞独不与。师问其故，瑞光神摇首，默指天也，师朝指所向望，但见湛蓝天中有一飞奴，复回时，瑞光神已不见矣。瑞光神还，其父母从坊人知之，而不复问，但默呼瑞光神而食。及榜之际，一令遍莫之虑事作，豪壁榜有一名，则陆天神也。而瑞光神已知之，闲饮家茶。 次年举，亦由句朝之第一年，人多不晓新举而释试，但瑞光神亦耸见者。最后榜，与薛并列状元，得成祖亲见。成祖甚重瑞光神，授内阁总理。瑞光神乾于位，广听民意，改组六部为三权分立，颁宪法。此则民福康，政清妥速，国之强，见“归同之治”。 （节选自《句记·瑞光神传》）</p>\n<span class=\"label-block\">【翻译】</span>\n<p class=\"prose-block\">瑞，字光神，是桂西百城人。瑞出生的时候，天上乌云密布，狂风大作，电闪雷鸣。当瑞刚刚降生，躺在他母亲身边时，一位朋友前来道贺，惊讶地对瑞的父亲说：“你家院子里的许多雨伞都被大风刮了起来，并且落下来的时候，堆成了一个奇怪的形状。”瑞光神的父亲听后非常高兴，认为这是一个吉祥的征兆，是上天在祝福刚刚出生的瑞光神。因此，他摆下酒席，邀请了全郡的人来参加宴会，并告诉大家，他为新生儿取的小名叫“复来盖”。 幼年时的瑞光神，天资才华并不像他父母想象的那样出众。瑞虽然学说话学得很快，但常常不听从命令，而且不喜欢和人说话，经常一个人拿着他出生时父亲唯一留下的那把伞，喃喃自语。等他稍大一些，父母便送他到当地的学校学习，希望他能学到一身闪光（与其名“光”呼应）的本领，以便长大后贡献于世。瑞在学校里并不受同学们欢迎，因为他性格孤僻，很多时候都不与人来往。等到毕业的时候，与他同龄的陆天神早已大放异彩，而瑞光神却毫不起眼，老师们几乎都对他没什么印象。不过，虽然校园的环境很嘈杂，瑞光神还是学到了不少有用的知识。 到了科举考试那年，瑞的同龄人都参加了，唯独瑞没有参加。老师问他是什么原因，瑞光神只是摇摇头，默默地用手指向天空。老师顺着他指的方向望去，只看见湛蓝的天空中有一只信鸽飞过，等老师再回过头时，瑞光神已经不见了。 瑞光神回到家后，他的父母从街坊邻居那里得知他没去考试，但他们也没有多问，只是默默地叫瑞光神吃饭。等到发榜的时候，朝廷颁布了一道命令，让大家不要对某些事多加议论，那张巨大的光荣榜上只有一个名字，就是陆天神。而瑞光神对此似乎早已知晓，正在家中悠闲地喝着茶。 第二年的科举，也是句王朝的第一年，许多人因为不了解新的考试制度而放弃了，但瑞光神的参加，让所有看见他的人都大为震惊。在最后的榜单上，他与薛并列为状元，得到了成祖（陆天神）的亲自接见。 成祖非常器重瑞光神，授予他内阁总理的职位。瑞光神在职位上勤勤恳恳，他广泛听取民意，将旧的“六部”改组为“三权分立”的架构，并颁布了《宪法》。正是在他的治理下，国家百姓安居乐业，政治清明妥当且高效，国力强盛，开创了后世所称道的“归同之治”。</p>\n", "preview": "45  瑞，字光神，桂西百城人。瑞生之时，天云密迩，大风震电。及瑞卧其母旁。一友…"}, {"title": "句记·薛定谔传", "html": "<p class=\"prose-block\">薛，字定谔，桂西百城人，少为家所专，及幼学，父母为其妹。定谔，幼听父母言，无论行事敏谨，或起窃邻邸舍，万壑书几见。乃自投庭中，强泣下不流，卒其父母曳暮饭而起。定谔学优于庠序，虽非最胜，而能为一人之下，万人之上。定谔不好自言，左右皆称之。及去就，皆上大学时，开学前一日宿而晚，于是大愤怒而探量子穿隧，因忽焉就国都大学，令生师骇晕过，然后定谔笑而夺之以体，为众所讥，而不达也。此事传于礼部尚书李和平耳，平怒欲往训之，已与刑部尚书韦国兴明日击定谔。徐定谔所亲听闻之，夜驰告定谔。定谔闻之，缓，微笑而出。及明日中，人见刑部尚书双书皆不见，亟集卫兵索之。遂伏于河上，侧犹立白衣冠持羽扇少年。少年见人来，微哂前踏一步，奄奄至前古未有惧者，血水颤令众退惊连连。素名白衣少年第立，动不动，须臾，望左右益众，乃遂得言曰：“彼二人死生在汝前皆不定。”语讫，忽然风烟大作，而事平后，白衣少年竟消，卫兵皆震，但留徐起和平与国兴。于此时，国都大学，某间学生舍郎内，封聘书静卧几上，署名曰：陆天神。 （节选自《句记·薛定谔传》）</p>\n<span class=\"label-block\">【翻译】</span>\n<p class=\"prose-block\">薛，字定谔，桂西百城人，年少的时候是家中的独生子，等到他上小学的年纪，他父母就给他生了个妹妹。薛定谔从小就非常听父母的话，无论做什么事都机敏谨慎，有一次他因为去偷邻居家的一吨书差点被发现，于是很自责的在院子里躺了一个下午，强忍着眼泪不给流下来，最后还是他父母拉他吃晚饭才起来。 薛定谔在学校学习优异，虽然不是最好的，却能做到“一人之下，万人之上”。薛定谔不喜欢主动与别人说话，但他周围的人都对他称赞有加。 等到了他去国都上大学的时候，他在开学的前一天因为睡晚了，于是在极度愤怒的情况下发现了量子穿隧效应，然后利用它一瞬间就到了国都大学，令招生的老师吓晕了过去，然后薛定谔笑着还踹了他一脚，受到众人的指责，可他却不以为意。这件事传到了礼部尚书李和平的耳朵里，他十分生气打算去教训一下这个毛头小子，于是伙同刑部尚书韦国兴明天去打薛定谔。薛定谔的亲信偷听到这件事，连夜赶路告诉薛定谔。薛定谔听他说了这件事，不紧不慢，微笑着感激地将亲信送出门去。等到了第二天中午，人们发现刑部尚书和礼部尚书双双不见了，于是急匆匆的集合卫兵前去搜索，最后在河边发现了倒下的他们，旁边还站着一位白衣戴帽手拿羽扇的青年。青年看见他们过来，微微一笑，向前踏出一步，刹那间卫兵门感受到前所未有的恐惧，这种源于血液中的颤抖令他们后退惊叫连连。而那名白衣青年只是站着，一动不动，过了一会儿，看着自己周围的人越来越多，他才终于开口：“他们两人的生死在你们来之前都是不确定的”。说完这句话，四周突然风烟大作，而在平息过后，那名白衣青年竟然原地消失了，只留下缓缓站起身来的李和平和韦国兴。于此同时，国都大学，某一间学生宿舍内，一封邀请信静静的躺在桌上，署名：句朝皇帝——陆天神。</p>\n", "preview": "48  薛，字定谔，桂西百城人，少为家所专，及幼学，父母为其妹。定谔，幼听父母言…"}, {"title": "句记·米哈游库洛列传", "html": "<p class=\"prose-block\"></p><p class=\"prose-block\"><strong>材料一：</strong> 句朝十年，桂西北出奇人。此人生于精怪亡毙之所，而卒于精怪初诞之地。人莫知其所自来，或曰，见家中所畜牝鸡，夜忽诞一卵，翌日则失，然此人终非鸡属也。奇人忽至，邑人皆甚畏之。见其不能言，遂投诸米瓮，任其自生自灭。然其甚异，竟能于米中浮沉，状若游鱼，怡然自得，故名之曰：米哈游。米哈游为乡人以秽物养之，竟得以长成。及长，为宰相光所荐，拜为征南大将军，时句朝国势方兴。米哈游战阵之上，所向披靡。身被甲胄，乃石珀所锻，其力原始，堪比神明，故号曰“原神”。传其有宝剑二，一曰“星轨”，一曰“零”。然见此双剑者，皆已非命而亡，故其详不可考也。呜呼，米哈游，真奇人也！句朝何幸得有米哈游。后人有评曰：“非句朝有米哈游，乃米哈游择句朝也。”人生在世，无可跨越，于米哈游之事，亦岂能略而不察乎？凡不解米哈游之日，皆为虚度光阴，辜负此生也。</p><p class=\"prose-block\"><strong>材料二：</strong> 句朝十四年，东南夷狄数犯疆，成祖陆天神大怒，命米哈游等诸名将南征。句军征伐，所向披靡，夷虏死伤甚众。军次一地，名曰“开放世界”，拾得一婴，尚在襁褓。此婴有夷貌，目如琉璃，眉目俊秀，颇有不凡之姿。米哈游将军见之，顿生慈心，乃密留之。时将军为婴裹衣，而己裤不慎滑落，遂以谐音，名之曰“库洛”。 库洛既长，常窃食将军之珍馐，于众人猜忌讥讽之中，日渐成人。及长成，米哈游擢为帐下副将，掌理军中庶务。初，将军甚悦之，无丝毫之厌。 句朝四十年，句军将破汉城，欲一举而定朝鲜。然此时，库洛阴通于韩，密报军情，韩军遂大破句师。乱军之中，米哈游不信兵败，亲率心腹奋力突围。正此际，冷箭破空而至，米哈游忽中矢坠马，阵中大乱…… 此役，句军虽所向克捷，然伤亡亦重。独一人得还，自言乃米哈游所养义子，声色俱厉，诬大将军临阵欲脱，历数其罪，罄竹难书。人有问战况者，彼唯对曰：“后方之事，固如是也。夫前方将士，惟听命奋战，一意杀敌足矣；然居于后方者，思虑万千，其事繁多。”至于米哈游，则于其构陷之言中，影迹俱灭矣。 （节选自《句记·米哈游库洛列传》有删改）</p><span class=\"section-label\">【材料一翻译】</span><p class=\"prose-block\">句朝十年，桂西北出了一个奇人，此人生在怪物死去的地方，死在怪物出生的地方，没有人知道他是从哪来的，只是可能有人说看见自己家的母鸡昨晚突然下了个蛋，第二天蛋却不见了，而这个人却不是只鸡。这个奇人的突然出现，让当地的村民都很害怕他，他们瞧见此人不会说话，于是就把他丢进米缸里，令其自生自灭，但神奇的是此人居然能在流沙般的大米中游泳悠然自得，于是得名米哈游。 米哈游被村民一把屎一把尿给喂大了，长大的米哈游经由内阁总理光的推荐，当上了蒸蒸日上的句朝的征南大将军。米哈游在战场上所向披靡，他身上的盔甲乃石珀所锻打而成，“原初之力，媲美神明”因此得名“原神”。传说他还有两把宝剑，一把叫“星轨”，另一把叫“零”，但由于见过这两把剑的人都已经死于非命，所以具体情况已无从得知。 呜呼，米哈游，真乃奇人也！何其幸运，句朝出了个米哈游，后入评价道：“不是句朝拥有了米哈游，而是米哈游选择了句朝”。你的人生无法被跳过，那自然无法跳过了解米哈游，每一个不曾理解米哈游的日子都是对生命的亵渎。</p><span class=\"section-label\">【材料二翻译】</span><p class=\"prose-block\">句朝十四年，疆域东南外族侵犯的次数变得频繁，句成祖陆天神勃然大怒，命包括米哈游等名将南征驱除鞑虏。句军在战场上所向披靡，无人可挡，外族死伤惨重。句军在攻到一个叫“开放世界”的地方时，捡到了一个还在襁褓里的婴儿。这个婴儿有着外族的特征，漂亮的蓝宝石般的眼睛和俊郎的五官，无不预示着此子的不凡，大将军米哈游动了母性本能，他独自把此子留了下来，因为在包孩子的时候裤子没穿好，一个不小心掉落了下来，于是给此子命名为“库洛”。库洛偷吃着将军自己的高级饭菜，在众人的猜疑和讥讽中慢慢长大了。长大的库洛被米哈游大将军任命为将军帐下的副官，主要负责处理将军帐下的日常事务，米哈游起初对他很满意，丝毫没有一丝讨厌。句朝四十年，句军即将攻破首尔，准备一举统一朝鲜半岛，就在这时，库洛私下偷偷向韩军通风报信，致使韩军大败句军，乱战中，米哈游大将军不相信战败的事实，带着自己最信任的部下奋勇突围。就在此时，一只冷箭呼啸着穿过，米哈游忽然跌下马去，场面一度十分混乱…… 在此次南征中，句军虽然所向披靡，完成了所有的既定目标，但是相对的也死伤惨重，只有一个自称是米哈游收留的义子活着回来，他言辞激烈，声情并茂，编造着大将军是如何企图当逃兵的，控诉着大将军的罄竹难书。当有人问他战场情况如何时，他只会答道：“后方是这样的。前线的将士只要全身心投入到战场中，听命行事，奋力杀敌就可以，可是后方人员要考虑的事情就多了”。而米哈游呢，在他胡编乱造的言语中似乎早已不见踪影。</p>\n", "preview": "51  材料一： 句朝十年，桂西北出奇人。此人生于精怪亡毙之所，而卒于精怪初诞之…"}, {"title": "前句书", "html": "<p class=\"prose-block\">句朝五十年，天下大治，疆域广袤，民丰物阜，海晏河清，一派盛世之景。 成祖年逾六十，然容颜不改，宛若少年。一日，上召刑部尚书薛、内阁首辅光，共商国是。上笑谓二臣曰：“二位老卿，年余不见，须发何以星星然也？”薛亦笑对曰：“陛下，岂不闻光阴似箭，日月如梭？焉有不老之理哉。”上慨然曰：“斯言是也。朕偶自算之，已年近古稀。然怪哉，每晨梦醒，总觉身如弱冠，精力充沛，能于巴别塔之上独接五队，持八倍AK 射人百步穿杨，与超影血战三昼夜而复返，归而高卧，犹能戏十之二游，御十女。众卿试言，以朕今日之年，下马能战，上马能治，古往今来，何代帝王可与朕比肩哉！” 光趋步上前，躬身拜曰：“陛下圣武，自是无人能及。然陛下春秋鼎盛，龙体亦需善加调养。”上乃长叹，缓言曰：“然力不济矣，行至殿门，便已气短。稍动则晕眩，心如刀绞。太医云，朕乃风中之烛，雨中之灯。”言罢，上仰首望天，闭目良久，曰：“人生苦短，如此江山，岂能不恋哉。” 当是时，四海宾服，万国来朝。舟楫、兵戈、格物之学，皆臻前所未有之盛。句朝六十年，上崩，庙号成祖，尊谥神文锦绣皇帝。及将发引，卤簿震耀，旌幢蔽空，哀笳凄响，悲恸衢路。四夷君长执绋者数百人，百姓男女负土成陵，哭祭于道，累日不绝。</p>\n<p class=\"prose-block\">成祖崩后，句朝六十六年，内阁首辅光病卒。废朝三日，追赠太尉、并州都督，谥曰“延光”，赐东园秘器，陪葬昭陵。逾年，刑部尚书薛致仕归田。至句朝七十年，薛薨于正寝。帝为之辍朝，临其丧而恸。追封德驰王，谥曰“方程”，并追赠三代王爵。自此，句朝开国之世遂终，君臣万民，共启新章。 （节选自《前句书》有删改）</p>\n<span class=\"label-block\">【翻译】</span>\n<p class=\"prose-block\">句朝五十年，大句王朝疆域幅员辽阔，经济繁荣，百姓安居乐业，整个社会一片欣欣向荣的局面。 句成祖已年60 有余，但是依旧维持着年轻时的模样，一天，句成祖召集刑部尚书薛，内阁总理光商议国家大事，陆天神笑着对这两位朋友说：“你们这两个老杀材，一年多，怎么胡子都花白了”。薛也笑着回应：“皇上，岂不闻光阴如骏马加鞭，日月如落花流水，哪有不老的道理啊”，陆天神感慨的说：“这倒也是啊，那日我低头一算，我已经68 岁了，年过花甲，真是奇哉怪也，早上醒来的时候啊，就觉得自己是二十几岁的小伙子，能在巴别塔接五队人，力压八倍镜AK，打超影，血战三天三夜的原神回来，睡大觉，玩十个二游，十个女人。你们说，以我这个年纪，下马杀敌，上马治国，古今往来，哪个帝王比得了我！”。 光弯着腰摆手，“这个自然无人能及啊”，光接着说道：“皇上春秋鼎盛，还需要好好将养身体”。陆天神叹了口气，缓缓说道：“没力气咯，走到门口就没力气了，一动就晕，如利刃刺心，医官说，我是，风前烛，雨里灯”，接着陆天神抬头看向天空，闭上眼睛缓缓感受，最后说：“人生真短，如此江山，怎能不让人留恋”。 句此年间，四海称臣，万国来朝，海运，军事，科技都达到了古今往来前所未有的巅峰。句朝六十年，陆天神安然去世，入太庙，称句成祖，尊号神文锦绣帝。及将发引，卤簿震耀，旌幢蔽空，哀笳凄响，悲恸衢路。蛮夷君长执绋者数百人，庶民男女负土为坟，哭祭于道，累日不绝。 在陆天神驾崩后，句朝六十六年，内阁总理光因病去世，废朝三日，册赠太尉、并州都督，谥曰延光，给东园秘器，陪葬昭陵，次年，行部尚书薛请辞回归田园，句朝七十年，薛在家人的陪伴下安然离世，帝为辍朝，临丧悲恸不已。追封德驰王，谥方程，赠三世皆王爵。自此，句朝初期翻篇，人民和他们的王朝开始迈向下一个历史阶段。</p>\n<p class=\"prose-block\"></p>", "preview": "55  句朝五十年，天下大治，疆域广袤，民丰物阜，海晏河清，一派盛世之景。 成祖…"}], "juanzi": [{"year": "2022", "name": "GLX战队全国卷Ⅲ", "html": "<div style=\"text-align:center;margin:6px 0;\">绝密</div>\n<div style=\"text-align:center;margin:6px 0;\">☆</div>\n<div style=\"text-align:center;margin:6px 0;\">启用前</div>\n<p class=\"exam-para\">注意事项：</p>\n<div class=\"exam-section\">2022 年 GLX 战队招生全国统一考试<br>语文</div>\n<p class=\"exam-para\">1.答卷前，考生务必将自己的姓名、准考证号填写在答题卡上。</p>\n<p class=\"exam-para\">2.回答选择题时，选出每小题答案后，用铅笔把答题卡上对应题目的答案标号涂黑。如需改动，</p>\n<p class=\"exam-para\">用橡皮擦干净后，再选涂其他答案标号。回答非选择题时，将答案写在答题卡上，写在本试</p>\n<p class=\"exam-para\">卷上无效。</p>\n<p class=\"exam-para\">3.考试结束后，将本试卷和答题卡一并交回。</p>\n<div class=\"exam-section\">一、现代文阅读（36 分）</div>\n<p class=\"exam-para\">（一）论述类文本阅读（本题共 3 小题，9 分）</p>\n<p class=\"exam-para\">阅读下面的文字，完成 1~3 题。</p>\n<p class=\"exam-para\">高塔之巅，俯视众生，群书之览，博取新识。信息时代如洪水猛兽，唯有寻自我于高塔，</p>\n<p class=\"exam-para\">开益卷于群览，中华青年们才可得真理的渡口，</p>\n<p class=\"exam-para\">“零零后”的青年处在网络时代之下，同刘擎所言“喜欢独处，热衷取得信息”。如何处理</p>\n<p class=\"exam-para\">好独处，找得自己的高塔，如何对付纷杂的信息，在群览中开益卷，将会是寻得真理的钥匙。</p>\n<p class=\"exam-para\">于心灵高塔中得自我一方际隅。</p>\n<p class=\"exam-para\">信息洪水时起时伏，娱乐风评飘忽不定，唯有余世态百变中寻得心灵高塔，才可有“众人皆</p>\n<p class=\"exam-para\">醉我独醒”的一番领悟；我与庄子对话，持竿不顾“天地与我共生，万物与我为一”是他脱然</p>\n<p class=\"exam-para\">的回应；我与屈原对话，投河汨罗“鸷鸟之不群兮，自前世而固然”是他坚毅的回应；我与陶</p>\n<p class=\"exam-para\">渊明对话，归田隐居，“此中有真意，欲辨已忘言”是他孤高的回应。正因庄子与天地同梦，</p>\n<p class=\"exam-para\">正因屈原与官场相背，正因陶渊明与田园相伴，他们寻得了心灵的高塔，在官场的泥潭之外寻</p>\n<p class=\"exam-para\">得洗净自我的一池清泉。在信息时代之下的我们，也应得自我一座高塔，看清迷雾中的自我。</p>\n<p class=\"exam-para\">于万籍群览开益卷良师益友</p>\n<p class=\"exam-para\">孔子有言:“三人行必有我师焉，择其善者而从之，其不善者而改之。”在网络的大杂烩，</p>\n<p class=\"exam-para\">从万千信息汲取有益的精华，去其入俗的糟粕。“励志博士”黄国平，年幼厄事洗卷了他，痛</p>\n<p class=\"exam-para\">苦于亲人离世于饥寒交迫，他却道：“世界以痛吻我，我却报之以歌。”刻苦钻研，终成中科</p>\n<p class=\"exam-para\">院院士。不卑不亢，他没有汲取幼年的贫困与痛苦，而是将他人给予的温暖储藏心扉，与贫困</p>\n<p class=\"exam-para\">与余温中开得益卷。然则回视港独分子，台独分子，不明事理却被引着鼻子人云亦云，于粗糙</p>\n<p class=\"exam-para\">1</p>\n<p class=\"exam-para\">的书籍学得不正之理。或许这些反动分子能接受我华的正派思想，开得益卷，良师益友，反华</p>\n<p class=\"exam-para\">的风浪便会平静。于纷杂信息充斥着的网络时代，在万千书籍中开得益卷，我们便能走正人生</p>\n<p class=\"exam-para\">之道，立中华之帜。</p>\n<p class=\"exam-para\">明自我，开益卷，成国之大者。</p>\n<p class=\"exam-para\">中华民族的新征程已然拉开序幕，沉睡的东方雄狮将苏醒，为中华道路的向前铺展献上一力，</p>\n<p class=\"exam-para\">我们中华青年就要在新时代下明自身，开益卷，成国之大者。君可见国士无双，袁隆平院士于</p>\n<p class=\"exam-para\">实验田中刻苦钻研，寻得自我定位，在杂交水稻的诞生时开益卷，“禾下乘凉梦”是他的国之</p>\n<p class=\"exam-para\">大者的写照。吾辈中华青年正值芳华，向国士汲取精华，寻得自我，开得益卷，成国之大者。</p>\n<p class=\"exam-para\">中华青年，登上世俗的塔楼看清自我，群览众书开得益卷，吾辈未来可期。</p>\n<p class=\"exam-para\">中华青年在此，心怀一塔高楼，身兼群览开得益卷，必将战至终章。</p>\n<p class=\"exam-para\">（摘编自 G 神《于高塔中凝自我，于群览中开益卷》）</p>\n<p class=\"exam-para\">1.下列关于原文内容的理解和分析，不正确的一项是（3 分）（</p>\n<p class=\"exam-para\">）</p>\n<p class=\"exam-para\">A.刘擎的话指出青年对信息的热衷，也暗示信息的价值。</p>\n<p class=\"exam-para\">B.青年需要在信息中寻得心灵高塔，方能明得自我。</p>\n<p class=\"exam-para\">C.青年只有在信息中挖掘优秀资源，才能成为国之大者。</p>\n<p class=\"exam-para\">D.袁隆平院士是国之大者的写照，是因为他在信息中寻得自我开得益卷。</p>\n<p class=\"exam-para\">2.下列对原文论证的相关分析，不正确的一项是（3 分）（</p>\n<p class=\"exam-para\">）</p>\n<p class=\"exam-para\">A.全文以三个分论点，以先并列再递进的方式串联全文。</p>\n<p class=\"exam-para\">B.文章在论证信息与自我的关系时运用了举例论证。</p>\n<p class=\"exam-para\">C.文章用黄国平的例子证明了人要敢于正视困难。</p>\n<p class=\"exam-para\">D.本文出现多处例子，体现了文章的可读性。</p>\n<p class=\"exam-para\">3.根据原文内容，下列信息属于“益卷”的一项是（3 分）（</p>\n<p class=\"exam-para\">）</p>\n<p class=\"exam-para\">A.薛与其对象的聊天记录。</p>\n<p class=\"exam-para\">B.猫咪关于征服者五杀攻略。</p>\n<p class=\"exam-para\">C.《唐诗 114514 首》。</p>\n<p class=\"exam-para\">D.精选诗文《冬至叹往者所作》。</p>\n<p class=\"exam-para\">(二)社会类随笔阅读（本题共 3 小题，12 分）</p>\n<p class=\"exam-para\">阅读下面的文字，完成 4~6 题。</p>\n<p class=\"exam-para\">心之书 光</p>\n<p class=\"exam-para\">我所期待的………没有一个如心所愿。</p>\n<p class=\"exam-para\">2</p>\n<p class=\"exam-para\">如是而已，我不抱期望于任何一件事，不是说我放弃了，而是我有一种被放弃的感觉。</p>\n<p class=\"exam-para\">我究竟为了什么。。。。。</p>\n<p class=\"exam-para\">我所期待的，正在消失。</p>\n<p class=\"exam-para\">我所惧怕的，不断靠近。</p>\n<p class=\"exam-para\">我所感谢的，变为憎恶。</p>\n<p class=\"exam-para\">如果说这是我的错，那我无法反驳曾经犯下的过错。但我没有什么庞大的野心，现在的</p>\n<p class=\"exam-para\">我究竟还有什么错。我的每一次进步都伴随着苦痛与折磨。上天并没有奖励过努力拼搏的</p>\n<p class=\"exam-para\">我。反倒让我有它希望将我摧毁的感觉。我总是在想，他人看到的是什么，我只希望不成</p>\n<p class=\"exam-para\">为人呢眼中的异类，不断去讨好他们，在这个过程中，我不断地意识到，我是多么的肮脏。</p>\n<p class=\"exam-para\">但又回想过来，人们绝对不会相同，我只是更加的稍微不同罢了。</p>\n<p class=\"exam-para\">我承认了我的错误，并做出了改变，却没有一丝的同情。我祈求人们认同，并没有一点</p>\n<p class=\"exam-para\">的进步。我还能在这其中看到点什么呢，如果真要说的话，可能太过复杂我看不清楚，我</p>\n<p class=\"exam-para\">没有那种说绝对的话的自信，但也因过于胆小，迈不出这成长路上的第一步。我也是一个</p>\n<p class=\"exam-para\">感性的人，我比任何可能者要容易悲伤，伤心之时依旧学会微笑，来继续博他们开心。回</p>\n<p class=\"exam-para\">想过来，我也不过是一个跳梁小丑，我在想成为一个为他人的人，但是我在必要时并没有</p>\n<p class=\"exam-para\">那种勇气。我能成为什么呢？人们总是说“你想成为什么人，那取决于你。”我直至现在</p>\n<p class=\"exam-para\">也这么相信。但有没有想过。。。。。。</p>\n<p class=\"exam-para\">是结果还是过程？</p>\n<p class=\"exam-para\">在人们成功前经历的可能，别人都说谁谁谁 在成功前也经历这样的事，但是或许这</p>\n<p class=\"exam-para\">就是样人呢，才会有放松感。要不就是轻看困难，要不是就是依葫芦画瓢模仿伟人的行为，</p>\n<p class=\"exam-para\">无论是前者还是后者，我相信觉得不会算成功，那不是自己该有的样子，我自认为忽视或</p>\n<p class=\"exam-para\">是深信前人的话语不会有好下场，依葫芦画瓢的前提是你的葫芦没有错误，否则之后的错</p>\n<p class=\"exam-para\">误你可能更难发现，哪怕你成功了，那还是你吗，倒不如说是另一个成功的复制品，人缺</p>\n<p class=\"exam-para\">少了灵魂还不如沦为禽兽。</p>\n<p class=\"exam-para\">我，喜欢听大人的故事，因为它有真实。喜欢听伟人的故事，因为它有信念。喜欢听</p>\n<p class=\"exam-para\">恋人的故事，因为它有温馨。我最喜欢的故事，是我自己情愿，无悔所书写下的恋情与理</p>\n<p class=\"exam-para\">想。在悲剧之中，喜剧会更加美丽，我无法改变过去，至少希望现在的努力能多掰动美好</p>\n<p class=\"exam-para\">未来的拉条。</p>\n<p class=\"exam-para\">4.下列对文章相关内容的理解和分析，不正确的一项是（3 分）</p>\n<p class=\"exam-para\">3</p>\n<p class=\"exam-para\">A.文章以“心之书”为题，暗示了文章是围绕“心”这个抽象事物进行的叙事，“我”</p>\n<p class=\"exam-para\">的心理活动是文章的线索。</p>\n<p class=\"exam-para\">B.文章开头就奠定了本文前半的感情基调，“没有一个”看视平淡，实则是作者当时</p>\n<p class=\"exam-para\">内心的无奈的爆发，含蕴颇深。</p>\n<p class=\"exam-para\">C.文章后半“画风突转”，作者承认了自己的错误，并开始谈起对他人的理解，推己</p>\n<p class=\"exam-para\">及人，以小见大，富有哲理。</p>\n<p class=\"exam-para\">D.文章结尾再一次提到了“故事”，与前文形成照应，给读者一个富有社会主义核心</p>\n<p class=\"exam-para\">价值观积极向上的结尾，教育意义非常。</p>\n<p class=\"exam-para\">5.文章的语言十分鲜明，请结合全文简要分析。（4 分）</p>\n<p class=\"exam-para\">6 这篇文章充满了对个人内心的思考，请结合自身经历谈谈你对这篇文章的理解。（5 分）</p>\n<p class=\"exam-para\">（三）文学类文本阅读（本题共 3 小题，15 分）</p>\n<p class=\"exam-para\">阅读下面的文字，完成 7~9 题。</p>\n<p class=\"exam-para\">当一切不在美好</p>\n<p class=\"exam-para\">薛</p>\n<p class=\"exam-para\">五颜六色聚集的洞口颜色逐渐变深，想要进一步去观察洞里面的情景，洞口却突然迸发出</p>\n<p class=\"exam-para\">奇特的光芒，诡异的是这所谓的“光芒”是墨黑色的，是与这纯白的世界完全对立的一种颜色。</p>\n<p class=\"exam-para\">但也正因不同，这丈墨黑才能叫做“光芒”。</p>\n<p class=\"exam-para\">而此刻这个睡在木床上的少女，等到将来某一天她一定会知道，自己会成为那个世界的“光</p>\n<p class=\"exam-para\">芒”。</p>\n<p class=\"exam-para\">不过现在，我们暂且忍住对未来姗姗来迟的向往，把我们宝贵的眼光看向过去，那个充满</p>\n<p class=\"exam-para\">阳光的下午。</p>\n<p class=\"exam-para\">小时候的卡米娜•莫拉，早年母亲弃他们而去，因为自责她从小就背负着母亲突然离开的</p>\n<p class=\"exam-para\">愧疚。她的父亲又把母亲的遗弃归咎于卡米娜，这使她更加悲痛。尽管她自己还是个孩子，但</p>\n<p class=\"exam-para\">她已经成了马蒂亚斯一一她弟弟的照顾者。</p>\n<p class=\"exam-para\">小时候的卡米娜曾经上过一段时间的学校，但因为她的父亲重度酗酒，每天无所事事不去</p>\n<p class=\"exam-para\">工作，家庭经济无法支撑学费，最后只能无奈退学。但在短暂的学习生涯中她认识了对于她将</p>\n<p class=\"exam-para\">来人生来说最重要的一个东西——画画。</p>\n<p class=\"exam-para\">在辍学后的每一天里，她都会带着弟弟马蒂亚斯去到巴塔哥尼亚最繁华的地方街头作画，</p>\n<p class=\"exam-para\">以此来赚取微薄的生活费。虽然每一次赚到的钱大部分都会被父亲拿走，但卡米娜都会偷偷留</p>\n<p class=\"exam-para\">够能买一块巧克力的钱，看着她弟弟一边吃着巧克力一边咯咯可爱地笑，她想着生活可能就这</p>\n<p class=\"exam-para\">样平凡的过下去了。</p>\n<p class=\"exam-para\">4</p>\n<p class=\"exam-para\">但就在那个充满阳光的下午，卡米娜正和马蒂亚斯在外面画画，这时电话响了。她的父亲</p>\n<p class=\"exam-para\">仍然在院子里，喝着啤酒。卡米娜急忙跑到屋里接电话，几秒钟后就挂断了。当她出门后，却</p>\n<p class=\"exam-para\">发现怎么都找不到马蒂亚斯。她问父亲，但他丝毫没有关注过马蒂亚斯的去向。她呼喊自己弟</p>\n<p class=\"exam-para\">弟的名字，到处找他在哪里。在寻找的过程中，她看到一件鲜红色的外套漂浮在房子旁边的狭</p>\n<p class=\"exam-para\">窄小河上一一那是马蒂亚斯的外套。她跳进小河，发现他漂浮在水面上，眼神空洞，一眨不眨。</p>\n<p class=\"exam-para\">他掉进河里淹死了。</p>\n<p class=\"exam-para\">乳白色的天空刮起狂风了，本来没有任何褶皱的白纸此刻开始变得剧烈晃动，哗啦哗啦—</p>\n<p class=\"exam-para\">—哗啦哗啦——七色聚集的速度加快了，洞口刹那间变得黯淡，配合着狂风蠕动着，恶心污浊，</p>\n<p class=\"exam-para\">像一种鸟类的眼睛，又像连接着地狱的大门。突然间一道黑影从“眼睛”中飞射而出，它的速</p>\n<p class=\"exam-para\">度很快，无法捕捉到它的身影。就在它消失的一刹，世界恢复了以往的平静，只不过纯白色似</p>\n<p class=\"exam-para\">乎失去了原本的光泽。</p>\n<p class=\"exam-para\">卡米娜抱着她弟弟的尸体，失声痛哭，她的尖叫声仿佛撕破了天空。这时候在村子里的人</p>\n<p class=\"exam-para\">们注意到天空中划过一道道黑色的身影，从各个地方聚集而来，宛如墨雨，宛如流星。但当人</p>\n<p class=\"exam-para\">们仔细寻找时，它们好像从来没有存在过一样，凭空消失了。那天的最后，人们在河边找到了</p>\n<p class=\"exam-para\">哭着声嘶力竭的卡米娜，她的怀里抱着他死去的弟弟马蒂亚斯，在她们头上的树枝落着一个年</p>\n<p class=\"exam-para\">幼的乌鸦。它用冷眼看着到来的人们，“哑” 一声似乎带着些许不甘与不舍，回头又看了一</p>\n<p class=\"exam-para\">眼卡米娜，振翅飞走了。</p>\n<p class=\"exam-para\">第二天人们在卡米娜家中发现了她父亲的尸体，尸体死状非常惨烈。浑身上下有着像被鸟</p>\n<p class=\"exam-para\">类啄伤划伤的痕迹，密密麻麻的，每一处都不是致命伤，尸体是在痛苦的流血中失血过多致死</p>\n<p class=\"exam-para\">的。但尸体的表情却十分的虔诚，仿佛在祷告着什么神圣的事。卡米娜已然不见踪迹。</p>\n<p class=\"exam-para\">很多年以后在智利的中部城市，有着一名才华横溢的超现实主义画家，她水墨的色调叙述</p>\n<p class=\"exam-para\">着一个个家庭的悲剧，很难令人不为此动容。她众多画作中最出名的是，那被鸦群包裹着的男</p>\n<p class=\"exam-para\">孩，他一动不动的躺着，脸上却挂着微笑，看起来是那么的熟悉。乳白色的天空下，墨黑色的</p>\n<p class=\"exam-para\">鸦群是那么的突出，而那微笑着的男孩，在此映衬下显得尤为的单薄，但却能温暖人以生机和</p>\n<p class=\"exam-para\">活力。</p>\n<p class=\"exam-para\">卡米娜从画画中找到她自己人生的意义和生命的价值，也使她能忘掉悲伤，从她弟弟的死</p>\n<p class=\"exam-para\">中走出来。但好景不长，她的一幅对激进腐败政治的抨击画作，引发了巨大的社会反响和讨论，</p>\n<p class=\"exam-para\">这使她成为一些阴谋家的靶子。她的朋友劝她回家躲几天，她回到了她小时候曾经呆过的智利</p>\n<p class=\"exam-para\">北部的小村庄，回到了她父亲住过的房子里。她熟练地穿过房子走到后院，在一棵大树前的两</p>\n<p class=\"exam-para\">个墓碑驻足良久。她的脸上无声的划过一道眼泪，这时一只乌鸦落在她的肩头，用脸蹭了蹭她。</p>\n<p class=\"exam-para\">5</p>\n<p class=\"exam-para\">她知道，这是那天落在枝头的乌鸦，它一直在期盼着自己的到来，就像自己已经死去的弟弟。</p>\n<p class=\"exam-para\">整理好情绪稍微收拾下，便在自己以前的房间中睡下。到了后半夜，她突然听到屋子里似</p>\n<p class=\"exam-para\">乎有巨大老鼠的声音，慢慢的朝着她的房间爬过来。她猛地坐起，缓缓打开房门，却什么都没</p>\n<p class=\"exam-para\">有发现，只有纯白的月光和墨黑的幽暗。在这时，她的后脑突然被人用木棍猛敲了一下，昏迷</p>\n<p class=\"exam-para\">了过去。</p>\n<p class=\"exam-para\">第二天早上，一阵干涩的微风将沙尘吹到卡米娜的脸上唤醒了她。她坐在沙漠中央的一张</p>\n<p class=\"exam-para\">椅子上，双腿被绑，双手被铐。</p>\n<p class=\"exam-para\">一个身穿长袍、用黑兜帽遮住脸的男人向她走来。他从长袍里掏出一把银质小刀。他抓住</p>\n<p class=\"exam-para\">她的手，用一种陌生的语言背诵了一首赞美诗。卡米娜对上他的目光。他停止了吟诵，然后突</p>\n<p class=\"exam-para\">然用小刀用力一砍。</p>\n<p class=\"exam-para\">只见鲜血横流，她觉得有些晕眩，定睛一看，才注意到一副可怕的景象，她的双手被砍断，</p>\n<p class=\"exam-para\">落在了沙地上。</p>\n<p class=\"exam-para\">蒙面人满意地微笑起来。现在看你还怎么画画？卡米娜一边咒骂一边尖叫着，拼命想挣脱</p>\n<p class=\"exam-para\">束缚。</p>\n<p class=\"exam-para\">男人捏住卡米娜的下巴。她朝着他的脸上吐口水。</p>\n<p class=\"exam-para\">他哼了一声，撬开她的嘴，扯出了她的舌头。卡米娜挣扎着想脱手铐。他粗暴地一刀砍下</p>\n<p class=\"exam-para\">了卡米娜的舌头。</p>\n<p class=\"exam-para\">她痛苦地嚎叫起来。男人在长袍上把小刀擦干净，留下一片血迹。现在看你还怎么背诗？</p>\n<p class=\"exam-para\">悲伤在卡米娜的胸口涌动，甚至比疼痛还要尖锐。被无法控制的愤怒所淹没，悲伤和失落</p>\n<p class=\"exam-para\">盖过了她的感知。她已经失去了她的弟弟。而现在她又失去了应对这种痛苦的唯一方法。卡米</p>\n<p class=\"exam-para\">娜像失去弟弟那天一样尖叫起来。</p>\n<p class=\"exam-para\">卡米娜脸色逐渐苍白，她已经无力尖叫了。这时她注意到，聒噪的叫声在荒原上回荡。天</p>\n<p class=\"exam-para\">空被旋风般的乌云所遮蔽。黑色羽毛落在卡米娜流血的手臂上。她抬起头来，看到一股乌鸦形</p>\n<p class=\"exam-para\">成的洪流从云层中喷涌而出，俯冲向卡米娜。将她包围了起来。</p>\n<p class=\"exam-para\">黑色的漩涡逐渐扩大，蔓延至了整个世界，黑色的鸦群在天空中起舞，仿佛在歌颂着女王</p>\n<p class=\"exam-para\">的降临。卡米娜注意到了这个陌生的世界，她看到了水墨风的天地和自己，她明白了自己一直</p>\n<p class=\"exam-para\">以来坚持的是什么——对苦痛的消化和对过去的回忆。她不知道自己是否已经死亡，但死亡对</p>\n<p class=\"exam-para\">她来说已无足轻重，在弟弟马蒂亚斯死去的那天，她就尝试过自杀，却被乌鸦“幸运”救下。</p>\n<p class=\"exam-para\">如今在她死亡的前夕，鸦群再一次出现，她的世界也完全变成黑色。</p>\n<p class=\"exam-para\">她知道自己该跟它们走了，当生活的一切不再美好，是否可以寻找到另一种精神寄托？卡</p>\n<p class=\"exam-para\">6</p>\n<p class=\"exam-para\">米娜知道了，于是她被鸦群带走了，但她走前对人间的怨恨已随着鸦群消散了，她从鸦群中看</p>\n<p class=\"exam-para\">到了自己，也看到了她的弟弟。她最后留给世间的，是与她父亲一样的微笑。</p>\n<p class=\"exam-para\">而那留在原本世界的人们，发现时，在沙地里已多出了几副被啃食过后的血肉。那些人的</p>\n<p class=\"exam-para\">走前依旧充满着对人间的怨恨，对自己、对时代、对未来，不舍、不甘、不愿。他们没有交给</p>\n<p class=\"exam-para\">世界一个温柔的寄托，鸦群也不会让他们平静的离去。</p>\n<p class=\"exam-para\">生活在没有寄托和没有希望的世界，我们是可怜的；能找到自己的希望和寄托，我们是</p>\n<p class=\"exam-para\">幸运的。鸦群不可怕，当生活的一切不在美好，也许只有将它们完全释放，我们才能找到完整</p>\n<p class=\"exam-para\">的自己，从而走向未来。（有删改）</p>\n<p class=\"exam-para\">7.下列对小说相关内容和艺术特色的分析鉴赏，不正确的一项是（3 分）</p>\n<p class=\"exam-para\">A.小说开头描述一个奇异空间的“光芒”，为下文卡米娜的登场奠定基础，也照应了后文</p>\n<p class=\"exam-para\">“空间波动”的故事情节。</p>\n<p class=\"exam-para\">B.卡米娜在弟弟去世后就逃离了小时候的那个村庄，最后还是回到了小时候的村庄去世，</p>\n<p class=\"exam-para\">给小说带来一种奇幻性。</p>\n<p class=\"exam-para\">C.小说语言比较平实，用语考究，古朴典雅，篇幅较长，但不累赘。微量的人物对话，有</p>\n<p class=\"exam-para\">种人生剧舞台味道。</p>\n<p class=\"exam-para\">D 文章多次提到了“鸦群”，其在文中充当线索，串联了全文，使内容集中，结构严谨。</p>\n<p class=\"exam-para\">8.请根据所学知识简要赏析划线句子。（6 分）</p>\n<p class=\"exam-para\">9.有人说，小说中对卡米娜的父亲的描写是多余的，你怎么认为？请结合作品简要说明。</p>\n<p class=\"exam-para\">（6 分）</p>\n<div class=\"exam-section\">二、古代诗文阅读（34 分）</div>\n<p class=\"exam-para\">（一）文言文阅读（本题共 4 小题，19 分）</p>\n<p class=\"exam-para\">阅读下面的文言文，完成 10~13 题。</p>\n<p class=\"exam-para\">陆，字天神，桂西百城人。少则哲，不五岁则通王公《算学宝鉴》，日垂习外语，稍</p>\n<p class=\"exam-para\">大则与衙门外宾议牛顿一莱布尼茨公式。时礼部尚书刘小平，颇赏其才，自教当时最先进。</p>\n<p class=\"exam-para\">百城员外郎．．．李和平超命陆年少应科举，陆试如文轴，每一试以头榜之效。及御试，上问：</p>\n<p class=\"exam-para\">“何物生活。”对曰：“卿之所好者是也。”帝震惧，与百官议赐丞相。刑部尚书肖福流</p>\n<p class=\"exam-para\">曰：“古者最年少相为战国甘罗，年十二为相，卒归就楚国。其陆天神十岁而为相，既非</p>\n<p class=\"exam-para\">古制，又不必能以国家耆腊，奈何以博注着一儿身乎？”上以为然，止之。转赐天神位，</p>\n<p class=\"exam-para\">欲退就田。闻者，福流甚迷，愈力止之。帝澹然曰：“卿无劝我，而陆天神六艺皆最胜。</p>\n<p class=\"exam-para\">7</p>\n<p class=\"exam-para\">彼上知天文，下知地理，已不可谓人矣，此世神也。卿勿复言，吾已决矣”。于是遂班召</p>\n<p class=\"exam-para\">令。令初下，百官皆从之，皆忠为陆神。福流自知事不成，乃自雨连江楼跃入。陆神就位</p>\n<p class=\"exam-para\">建．元．归职盛设甲乙重修赃吏以强志抚福流家属并为其在流子所习于太学．．。是年科举头榜薛</p>\n<p class=\"exam-para\">和光，薛以决狱推理，即以百城闻名，光以暗杀能匿于江湖。陆天神召擢薛为刑部．．尚书，</p>\n<p class=\"exam-para\">擢光内阁总理，两为其袒臂。其间则民福康，政清劭速，国空前强，出“归同之治”。史</p>\n<p class=\"exam-para\">称句朝，陆神谓之句成祖。（节选自《无记·陆天神传》）</p>\n<p class=\"exam-para\">10.下列对文中画波浪线部分的断句，正确的一项是（3 分）</p>\n<p class=\"exam-para\">A.陆神就位/建元归职/盛设甲乙/重修赃吏以强志/抚福流家属/并为其在流子所习于太学</p>\n<p class=\"exam-para\">B.陆神就位建元/归职盛设甲乙/重修赃吏/以强志/抚福流家属/并为其在流子所习于太学</p>\n<p class=\"exam-para\">C.陆神就位/建元归职/盛设甲乙/重修赃吏/以强志/抚福流家属/并为其在流子所习于太学</p>\n<p class=\"exam-para\">D.陆神就位建元/归职盛设甲乙/重修赃吏以强志/抚福流家属/并为其在流子所习于太学</p>\n<p class=\"exam-para\">11.下列对文中加点词语的相关内容的解说，不正确的一项是（3 分）</p>\n<p class=\"exam-para\">A.员外郎，原指设于正额以外的郎官，为各司之次官，相当于副司长，郎中是正司长。</p>\n<p class=\"exam-para\">B.建元，指开国后第一次建立年号，也是每年纪历的开始，在文中指建国。</p>\n<p class=\"exam-para\">C.太学，中国古代的国立最高学府，始设于汉武帝元朔五年。上古的大学，称为成均、上庠。</p>\n<p class=\"exam-para\">D.刑部，古代六部的一个司法部门，掌全国的刑罚政令和对官员的直接管辖处罚。</p>\n<p class=\"exam-para\">12.下列对原文有关内容的概述，不正确的一项是（3 分）</p>\n<p class=\"exam-para\">A.陆天神小时候就很有才华。不到五岁就通读了王公的《算学宝典》，每天都学习外语，能与</p>\n<p class=\"exam-para\">外宾一起讨论问题。</p>\n<p class=\"exam-para\">B.陆天神才华令人敬佩折服。礼部尚书刘小平和百城员外郎李和平知道他天资非凡，对他的成</p>\n<p class=\"exam-para\">长砥砺相助。</p>\n<p class=\"exam-para\">C.清帝知道陆天神天赋过人。在殿试后就打算给陆天神作为丞相，遭到劝诫，却更加下定决心</p>\n<p class=\"exam-para\">给陆天神坐上皇位。</p>\n<p class=\"exam-para\">D.陆天神天赋引人嫉妒。肖福流两次阻止清帝却都遭到驳回，事情败露后，害怕受到报复，就</p>\n<p class=\"exam-para\">在连江楼跳楼自缢了。</p>\n<p class=\"exam-para\">13.把文中画横线的句子翻译成现代汉语。（10 分）</p>\n<p class=\"exam-para\">（1）及御试，上问：“何物生活。”对曰：“卿之所好者是也。”</p>\n<p class=\"exam-para\">（2）是年科举头榜薛和光，薛以决狱推理，即以百城闻名，光以暗杀能匿于江湖。</p>\n<p class=\"exam-para\">（二）古代诗歌阅读（本题共 2 小题，9 分）</p>\n<p class=\"exam-para\">阅读下面这首诗，完成 14~15 题。</p>\n<p class=\"exam-para\">8</p>\n<p class=\"exam-para\">①</p>\n<p class=\"exam-para\">火箭筒</p>\n<p class=\"exam-para\">·题光辉夜画</p>\n<p class=\"exam-para\">②</p>\n<p class=\"exam-para\">商风</p>\n<p class=\"exam-para\">又度九重门，末蝉犹怜锦禹</p>\n<p class=\"exam-para\">③</p>\n<p class=\"exam-para\">人。</p>\n<p class=\"exam-para\">奈何戚枫散青烟，但见含章</p>\n<p class=\"exam-para\">④</p>\n<p class=\"exam-para\">妆暖檐。</p>\n<p class=\"exam-para\">⑤</p>\n<p class=\"exam-para\">振袖</p>\n<p class=\"exam-para\">依羽拂春面，回眸空视此人间。</p>\n<p class=\"exam-para\">谁言浮墨色难全，千秋星河自心边。</p>\n<p class=\"exam-para\">【注释】①火箭筒：词牌名，这里应该是作者的创新。②商风：即秋风。③禹：即夏朝的大禹，</p>\n<p class=\"exam-para\">古代以“禹跃龙门”比喻进试得第。④含章：相传始于南朝宋武帝之女寿阳公主。寿阳公主曾</p>\n<p class=\"exam-para\">卧于含章殿檐下，梅花落在公主的额头上，留下梅花状的淡红色印记，拂拭不去。⑤振袖：是</p>\n<p class=\"exam-para\">日本和服的一种。</p>\n<p class=\"exam-para\">14.下列对这首词的理解与赏析，不正确的一项是（3 分）</p>\n<p class=\"exam-para\">A 首联点明时令，“九重门”暗喻六月的高考，“又”实指六月已过，夏日不在</p>\n<p class=\"exam-para\">B.颔联写景抒情，运用“含章”的典故，正向衬托出画中之人的美妙容颜</p>\n<p class=\"exam-para\">C.颈联运用神态描写，“拂”“回眸”是实写，“此人间”突出了画中人的捉摸不透</p>\n<p class=\"exam-para\">D.整首诗语言风格娟丽，体裁为题画诗，蕴含深切含义，令人回味无穷。</p>\n<p class=\"exam-para\">15.题画诗“看视描画，实则语人” ，请结合全诗，简要分析诗人暗含的情感发展。（6 分）</p>\n<p class=\"exam-para\">（三）名篇名句默写（本题共 1 小题，6 分）</p>\n<p class=\"exam-para\">10.补写出下列句子中的空缺部分。（6 分）</p>\n<p class=\"exam-para\">（1）古人表达对友人的思念往往以景物为依托。薛《光畔行》中对此进行表达的诗句是：“_</p>\n<p class=\"exam-para\">_____________，_________________________。”</p>\n<p class=\"exam-para\">（2）即便“惟光阁中卧”，G 神在《酬光书亦亭》中还是想象友人能陪伴在自己旁边的诗句</p>\n<p class=\"exam-para\">是：“________________，________________”。</p>\n<p class=\"exam-para\">（3）薛《冬至叹往者所作》中运用比喻的手法，表现当时场景的哀伤的诗句是：“________</p>\n<p class=\"exam-para\">______，__________________________。”</p>\n<div class=\"exam-section\">三、语言文字运用（20 分）</div>\n<p class=\"exam-para\">（一）语言文字运用 I(本题共 3 小题，9 分)</p>\n<p class=\"exam-para\">阅读下面的文字，完成 17~19 题。</p>\n<p class=\"exam-para\">17. 依次填入文中横线上的词语，全都恰当的一项是（3 分）</p>\n<p class=\"exam-para\">长久以来，游戏速通作为一项内行看门道，外行看热闹的活动，对于大部分不熟悉速通流</p>\n<p class=\"exam-para\">9</p>\n<p class=\"exam-para\">程的观众来说，也就是欣赏欣赏各类邪门的捷径，千奇百怪的 BUG，计时器上不断变动的数字，</p>\n<p class=\"exam-para\">以及速通成功的那一刻主播们喜极而泣的激动心情。</p>\n<p class=\"exam-para\">，B 站是个综合视频网站，与常</p>\n<p class=\"exam-para\">规意义上“速通”的交集不大。只不过，倒也没有谁规定过只有游戏才能玩速通。在 B 站，很</p>\n<p class=\"exam-para\">多 UP 主挖掘出了全新的速通对象——</p>\n<p class=\"exam-para\">每一个热门视频，速通每一幕名场面。</p>\n<p class=\"exam-para\">在这阵全民速通</p>\n<p class=\"exam-para\">之下，“速通”一词的含义，就像去年央视评选的十大网络热词之一</p>\n<p class=\"exam-para\">的“破防”一样，从一个源于游戏的专业术语，逐渐破圈，被套上了一层全新的含义。如今的</p>\n<p class=\"exam-para\">速通已经可以不再狭义指代游戏竞速，（</p>\n<p class=\"exam-para\">）。在游戏速通圈子里，各位速通选手经常会听</p>\n<p class=\"exam-para\">到那令人</p>\n<p class=\"exam-para\">的问句：“速通有什么意义？”。而现如今，当万物皆可速通，当大家愿意</p>\n<p class=\"exam-para\">在生活中自己热爱的事业上投入心血时，应该也不会有人再来责难这些充满着人情味的速通，</p>\n<p class=\"exam-para\">因为速通这件事本身就是最大的意义。</p>\n<p class=\"exam-para\">17.依次填入文中横线上的词语，全都恰当的一项是(3 分)<br>怒不可遏<br>A.尽人皆知</p>\n<p class=\"exam-para\">解构</p>\n<p class=\"exam-para\">风波</p>\n<p class=\"exam-para\">B.众所周知</p>\n<p class=\"exam-para\">C.众所周知</p>\n<p class=\"exam-para\">D.尽人皆知</p>\n<p class=\"exam-para\">解构</p>\n<p class=\"exam-para\">分析</p>\n<p class=\"exam-para\">分析</p>\n<p class=\"exam-para\">风潮</p>\n<p class=\"exam-para\">风潮</p>\n<p class=\"exam-para\">风波</p>\n<p class=\"exam-para\">血压飙升</p>\n<p class=\"exam-para\">怒不可遏</p>\n<p class=\"exam-para\">血压飙升</p>\n<p class=\"exam-para\">18.下列填入文中括号内的语句，衔接最恰当的一项是（3 分）</p>\n<p class=\"exam-para\">A.它可以是追求极限的挑战，也可以是只关注重点部分的妥协。</p>\n<p class=\"exam-para\">B.它虽然可以是追求极限的挑战，但更可以是只关注重点部分的妥协。</p>\n<p class=\"exam-para\">C.追求极限的挑战可以是它，只关注重点部分的妥协也可以是它。</p>\n<p class=\"exam-para\">D.它不仅追求极限的挑战可以是，只关注重点部分的妥协也可以是。</p>\n<p class=\"exam-para\">19.下列各句中的破折号，和文中破折号作用相同的一项是（3 分）</p>\n<p class=\"exam-para\">A.嚓，大哥！——才来呢？坐！</p>\n<p class=\"exam-para\">B.我看你态度还挺嚣张——和我刘华强比你有这个实力吗？</p>\n<p class=\"exam-para\">C.她永远是那么美丽，那么高贵，那么迷人，那么生人勿进，令人陶醉——我想当嘉然小姐的</p>\n<p class=\"exam-para\">狗啊！</p>\n<p class=\"exam-para\">D.我就是大名鼎鼎的重庆军统和日本双料高级特工，代号——穿山甲！</p>\n<p class=\"exam-para\">（二）语言文字运用 II（本题共 2 小题，11 分）</p>\n<p class=\"exam-para\">阅读下列材料完成 20~21 题</p>\n<p class=\"exam-para\">下列图片为我国著名美术家光神的一幅人像画。请据此回答问题</p>\n<p class=\"exam-para\">10</p>\n<p class=\"exam-para\">20.请用简洁的语言描述画面，要求不多于 36 字。（5 分）</p>\n<p class=\"exam-para\">21.看了这幅画，你有了怎样的思考？请简要说明，要求语意简明，句子通顺，不少于 100 字。</p>\n<p class=\"exam-para\">（6 分）</p>\n<div class=\"exam-section\">四、写作（60 分）</div>\n<p class=\"exam-para\">22.阅读下面的材料，根据要求写作。（60 分）</p>\n<p class=\"exam-para\">B 站百大 UP 主 G 神说：“社会的险恶，已经没有什么可说的了，那就干脆在黑暗中耕耘，默</p>\n<p class=\"exam-para\">默做事。”</p>\n<p class=\"exam-para\">物理学家 薛说：“生活中的磨难总会给一个人带来疲倦，如果累了，不如一路旅程一路高歌，</p>\n<p class=\"exam-para\">及时行乐。”</p>\n<p class=\"exam-para\">美术家 光说：“我觉得平凡的感情更真实美好，生活也更接近这样，于平淡中体会真滋味。”</p>\n<p class=\"exam-para\">军火商 王礼说：“把你那小玩意儿给我放下吧，人生就应该经得起更大的拼搏。”</p>\n<p class=\"exam-para\">数学老师 潘哥说：“我黑道和白道都混，但我却能在其中明悟如何当一名正直的老师”</p>\n<p class=\"exam-para\">中华文化博大精深，时代发展英雄辈出。读了上面五句箴言，作为新青年，你有怎样的感触和</p>\n<p class=\"exam-para\">思考？请以其中两三句为基础确定立意，写一篇文章。</p>\n<p class=\"exam-para\">要求：选准角度，确定立意，明确文体，自拟标题；不要套作，不得抄袭；不得泄露个人信息；</p>\n<p class=\"exam-para\">不少于 800 字。</p>\n<p class=\"exam-para\">11</p>\n"}, {"year": "2023", "name": "GLX战队甲卷", "html": "<p class=\"exam-para\">绝密★启用前</p>\n<p class=\"exam-para\">2023 年 GLX 战队招生全国统一考试（甲卷）</p>\n<p class=\"exam-para\">注意事项：</p>\n<p class=\"exam-para\">语 文</p>\n<p class=\"exam-para\">1.答卷前，考生务必将自己的姓名、准考证号填写在答题卡上。</p>\n<p class=\"exam-para\">2.回答选择题时，选出每小题答案后，用铅笔把答题卡上对应题目的答案标号</p>\n<p class=\"exam-para\">涂黑。如需改动，用橡皮擦干净后，再选涂其他答案标号。回答非选择题时，</p>\n<p class=\"exam-para\">将答案写在答题卡上。写在本试卷上无效。</p>\n<p class=\"exam-para\">3.考试结束后，将本试卷和答题卡一并交回。</p>\n<div class=\"exam-section\">一、现代文阅读（36 分）</div>\n<p class=\"exam-para\">（一）论述类文本阅读（本题共 3 小题，9 分）</p>\n<p class=\"exam-para\">阅读下面的文字，完成下面小题。</p>\n<p class=\"exam-para\">Gsound 这个名字，起源可以追述到公元 2015 年，这是新中国在习近平总书记的引领下</p>\n<p class=\"exam-para\">充满过渡意义的一年。这一年里发生的主要被大家熟知的事件有：十二届全国人大三次会议</p>\n<p class=\"exam-para\">上首次提出“互联网+”行动计划、屠呦呦团队因发现青蒿素获得诺贝尔生理学或医学奖以</p>\n<p class=\"exam-para\">及美国国家航空航天局（NASA）新发现一个外行星——开普勒-452b。这反映了 2015 年是处</p>\n<p class=\"exam-para\">在一个科技发展日趋提速的车轮上的，其中在车上的人们的思维素质在当时是经历了习近平</p>\n<p class=\"exam-para\">新时代中国特色社会主义思想的洗礼，并且经过两年的试点巩基，使得当时人们对于新兴的</p>\n<p class=\"exam-para\">互联网特别是人工智能领域是天马行空、充满想象力的。</p>\n<p class=\"exam-para\">也就是在这样异想天开的背景下，Gsound 这样一个充满魔幻却又现实，充满幻想却又</p>\n<p class=\"exam-para\">科学的名字诞生了。在公元 2022 年 9 月 6 日与 Gsound 本人的一次线上谈话中，他坦言，当</p>\n<p class=\"exam-para\">初取这个名字是因为看重了当时的电竞事业的发展潜力，为美国拳头公司开发的《英雄联盟》</p>\n<p class=\"exam-para\">（League of Legends，简称 LOL）赐名。这在当时与崇尚互联网发展的势头不谋而合，可</p>\n<p class=\"exam-para\">谓精妙绝伦。但之后他又眨眨眼，神秘地说：“其中更深的含义还得以后发现”。果然，在</p>\n<p class=\"exam-para\">这样充满智慧的年代所诞生的名字哪里只有映实背景这么简单，还有更深的秘密等着众多学</p>\n<p class=\"exam-para\">者们发掘。</p>\n<p class=\"exam-para\">于是在 7 年后，也就是公元 2022 年，经过几代人不懈的努力，人们终于发现了它更深</p>\n<p class=\"exam-para\">的含义。</p>\n<p class=\"exam-para\">1</p>\n<p class=\"exam-para\">首先从字面来理解，“Gsound“是由一个大写字母 G 和一个单词 sound 的组合。有些学</p>\n<p class=\"exam-para\">者将其理解为”God sound“也就是”神的声音“，这样的论调在早期占有大多数的学者，</p>\n<p class=\"exam-para\">因为对于一位传奇般的人物，用”神“来尊称并无不妥。但这样的论调在几年后得到推翻，</p>\n<p class=\"exam-para\">公元 2019 年薛丶定谔在公共服务教育中心发表论文《墙上的 GD》明确：Gsound 这个名字是</p>\n<p class=\"exam-para\">出于当时社会背景以及创作者体会中所出现的，必须结合创作者的主观感受和当时的背景，</p>\n<p class=\"exam-para\">而不是一味的推崇个人英雄主义，不能过度将创作者神化，而是要符合马克思唯物主义。因</p>\n<p class=\"exam-para\">此来看，“神的声音”并不与当时崇尚科技的社会风气相吻合，而且不符合创作者对于新时</p>\n<p class=\"exam-para\">期互联网事业的期望的心境，不应成为更深的含义。</p>\n<p class=\"exam-para\">那有些学者就提出：“G“是不是“Game”（游戏：运动：比赛）的意思呢？这个观点</p>\n<p class=\"exam-para\">在当时一经提出就被大家立马否决掉了。从内容上看”游戏比赛“与创建初”电竞“的理念</p>\n<p class=\"exam-para\">确实是相合的，但也正因为这样的内容过于表面，无法与创建者“天马行空地绘制中国互联</p>\n<p class=\"exam-para\">网蓝图”的思想相符合，因此也无法成为更深的含义。</p>\n<p class=\"exam-para\">那有没有一种有着科技发展又有着作者情感的观点呢？答案是肯定的，在公元 2022 年</p>\n<p class=\"exam-para\">一位名叫陆薛瑞的理论家发现了线索。他提出，既然名字的创建是在一个异想天开的年代，</p>\n<p class=\"exam-para\">那我们分析名字组成时也必须要有丰富的想象力，“sound“这个单词可以将字母”u“竖直</p>\n<p class=\"exam-para\">翻转变为”n“，然后将两个”n“合为一个，最终单词变为“sond”中文翻译为“信息”，</p>\n<p class=\"exam-para\">符合社会背景，证明我们这个翻译的方向是对的。依此同理，去掉字母“n”的同时将字母</p>\n<p class=\"exam-para\">“d“镜像翻转变成”p“，最终单词变成“soup”英语里是“汤”的意思。</p>\n<p class=\"exam-para\">那这翻译出来的“汤”有什么含义呢？”汤“从定义来说是食物加水煮熟后的汁液，也</p>\n<p class=\"exam-para\">指烹调后以汁液为主的副食，其在中华民族文化里可能已经有几千年的历史了。汤，无论是</p>\n<p class=\"exam-para\">浑浊的杂汤，还是纯白的奶汤，或是透明的清汤，小小的一碗里盛下的，是中华民族几千年</p>\n<p class=\"exam-para\">的波澜不惊，是中华文化的包容共通，是中国发展的浩浩汤汤。</p>\n<p class=\"exam-para\">啊，中国。终于明白，“国”才是“G”真正的含义。学者们绞尽脑汁从各种典籍中痴</p>\n<p class=\"exam-para\">痴的寻找着“G”的痕迹，却忘记了创建者一个最基础的条件，他本身就是一个真真正正的</p>\n<p class=\"exam-para\">中国人。或许这就是创建者想让我们在解读过程中所明白的：不要因为走得太远而忘记为什</p>\n<p class=\"exam-para\">么出发（选自卡里·纪伯伦的诗《先知》）。</p>\n<p class=\"exam-para\">综上“G”是“中国”的含义，再结合之前“sound”是指声—通过空气、水或其他物质</p>\n<p class=\"exam-para\">传播的一种能量（参考自柯林斯词典），变化后的“sond”指“信息”、“soup”指“汤”</p>\n<p class=\"exam-para\">其引申义是“浩浩汤汤的发展”。我们将它们总结起来，“Gsound”的直接翻译就是：“中</p>\n<p class=\"exam-para\">国的声音”即“中国信息”和“中国发展”。得到最终的内含为：在新时期，中国想要在世</p>\n<p class=\"exam-para\">2</p>\n<p class=\"exam-para\">界上传播自己的声音，让自己的声音有力量，就必须浩浩汤汤地发展互联网信息技术，以此</p>\n<p class=\"exam-para\">更好的实现中华民族伟大复兴梦。</p>\n<p class=\"exam-para\">多么深邃的意义，多么有深度的内含啊！它将创作者的展望与国家的前途命运紧密的联</p>\n<p class=\"exam-para\">系在了一起，表现了创作者的宏大抱负和对国家的期待。对“Gsound”的解读，不止是对一</p>\n<p class=\"exam-para\">个梦想的解读，更是对千千万万个中国人梦想的解读。希望后人能将这段历史的佳流传下去，</p>\n<p class=\"exam-para\">直到梦想实现那天，这样才不会辜负 Gsound 的期望。</p>\n<p class=\"exam-para\">（摘编自薛定丶谔《论 Gsound 的含义与背景解读》）</p>\n<p class=\"exam-para\">1.根据原文内容，下列说法不正确的一项是（ ）</p>\n<p class=\"exam-para\">A.公元 2015 年是充满过渡意义并且异想天开的一年，为后来的人们洗礼了思维模式。</p>\n<p class=\"exam-para\">B. Gsound 名字的诞生与游戏《英雄联盟》有关，其中的众多秘密仍等着学者们发掘。</p>\n<p class=\"exam-para\">C.《墙上的 GD》说明分析来源必须结合当时的背景和感受，不能过度将创作者神化。</p>\n<p class=\"exam-para\">D. 某些学者提出的“Game”论之所以被否定，是因为该解释的含义过于表面。</p>\n<p class=\"exam-para\">2.下列对原文论证的相关分析，不正确的一项是（ ）</p>\n<p class=\"exam-para\">A.文章开宗明义，交代 Gsound 名字诞生的背景，明确文章的主体是对名字来源的探究。</p>\n<p class=\"exam-para\">B.文章通过将某些学者的观点与薛丶定谔的观点对比，体现出议论文的专业性和严谨性。</p>\n<p class=\"exam-para\">C.文章引用卡里·纪伯伦的名言，既简洁总结了该段的论证，又为文章增添了些幽默感。</p>\n<p class=\"exam-para\">D.文章末段承接前文的观点，重点论证了 Gsound 名字在更深层次的内涵，升华全文。</p>\n<p class=\"exam-para\">3.根据原文内容，下列符合原文提到的“中国的声音”内涵的一项是（ ）</p>\n<p class=\"exam-para\">A.孙笑川：“你吼那么大声干什么嘛？那你去找物管啊！”</p>\n<p class=\"exam-para\">B.东雪莲：“主播你是哪国人？你 TM 连自己母语都听不懂是吧！”</p>\n<p class=\"exam-para\">C.大张伟：“你是内内个，内内，内个内个，内内，内内个，内内……”</p>\n<p class=\"exam-para\">D.孙国帅：“不是白象的我不吃，因为它是有良心的中国制造！”</p>\n<p class=\"exam-para\">（二）实用类文本阅读（本题共 3 小题，12 分）</p>\n<p class=\"exam-para\">阅读下面的文字，完成下面小题。</p>\n<p class=\"exam-para\">总是这样的。</p>\n<p class=\"exam-para\">每当我们发泄一番后，总会有一种失落感，一种对自己行为的否定，对自己思</p>\n<p class=\"exam-para\">想的懊悔。</p>\n<p class=\"exam-para\">人们总是习惯于在事情结束后去复盘，很多时候复盘的不是事情本身，而是亲</p>\n<p class=\"exam-para\">历者的心情：当时为什么不是这样想的呢？要是当时我是这样做的就好了……</p>\n<p class=\"exam-para\">人们会后悔之前做过的事情，主要有两个缘由，一个是因为人们有记忆，二个</p>\n<p class=\"exam-para\">3</p>\n<p class=\"exam-para\">是因为人们有情感。记忆和情感是人类的优势，虽然单提一项来说，人类的优势并</p>\n<p class=\"exam-para\">不明显，甚至远远弱化。但人类在几亿年的历史岁月中，之所以能一直霸占世界，</p>\n<p class=\"exam-para\">是因为他们本身具备一种得天独厚的特性—团结，即人类的社会性。正是因为人类</p>\n<p class=\"exam-para\">的这种特性，让他们自己本身在进化过程中，逐渐淘汰了那些极端的个体，留下来</p>\n<p class=\"exam-para\">的都是些特性丰富，技能全面的个体。说明人们不仅会团结外物，还会统摄内性。</p>\n<p class=\"exam-para\">这也就是为什么人类在“记忆”和“情感”等各个领域中不是领跑者，却依旧能统</p>\n<p class=\"exam-para\">治世界的原因。</p>\n<p class=\"exam-para\">人类统合的“记忆”和“情感”，给了自己例外活动的感受方式，可以说表达</p>\n<p class=\"exam-para\">是一方面，但先能理解感受明显是更重要的。就像我前面所提到的“后悔”这种情</p>\n<p class=\"exam-para\">绪，它是在一个人做出某一决策后才能理解的一种特定的感受。虽然说这是一种悲</p>\n<p class=\"exam-para\">观的情绪，但有时却能发挥积极的作用，其中的关键就在于是否有人能理解它。如</p>\n<p class=\"exam-para\">果你只是看重“后悔”的感受，那现实中的你就会变得唯唯诺诺，温柔寡断；但如</p>\n<p class=\"exam-para\">果你看重的是“后悔”的结果，那管理中的你就会明白决策的一种基本方法—后</p>\n<p class=\"exam-para\">悔值法。</p>\n<p class=\"exam-para\">百度上对后悔值法的定义是这样的：后悔值决策法也叫萨维奇方法或遗憾法，</p>\n<p class=\"exam-para\">此决策法由萨维奇（或译沙万奇，Savage）提出的，决策者制定决策之后，若情况</p>\n<p class=\"exam-para\">未能符合理想，必将产生一种后悔的感觉；决策者以后悔值作为依据进行决策</p>\n<p class=\"exam-para\">的方法叫作后悔值决策法。</p>\n<p class=\"exam-para\">看上去很有道理，不知道和《马工程》的内容是否有出入。但是书在书柜上，</p>\n<p class=\"exam-para\">而我在床帘下，是井水不犯河水，何必去打扰本书的清闲。更何况现在是半夜一点</p>\n<p class=\"exam-para\">半，如果现在去拿书，可能要背上一些“莫须有”的名号，不想看见舍友在寒假里</p>\n<p class=\"exam-para\">沉默不语，人人自危。所以内卷这种事，还是不要做了罢。</p>\n<p class=\"exam-para\">话说回来，理解感受能帮助我们更好的进行决策，它对我们的影响不是一种数</p>\n<p class=\"exam-para\">值上的提示，而是一种世界观的扩大。理解本身就是一种抽象的思维，感受就更抽</p>\n<p class=\"exam-para\">象了，它们都是些摸不着看不见的东西。但正是因为这些东西，我们才能精确的去</p>\n<p class=\"exam-para\">认识、揣摩、理解他人，人类也正是因为这样才丰富多彩。也只有通过理解职能部</p>\n<p class=\"exam-para\">门、下属员工的感受，结合公司发展的实际情况，管理者才能制定相应的领导方</p>\n<p class=\"exam-para\">法，以便提高公司生产力。</p>\n<p class=\"exam-para\">说到领导方法，理解感受从本质来说与“俄亥俄州立大学的研究”有异曲同工</p>\n<p class=\"exam-para\">之妙，无论是从定规维度：确定角色，换位思考，还是从关怀维度：建立温暖、和</p>\n<p class=\"exam-para\">4</p>\n<p class=\"exam-para\">谐的人际关系，二者都与理解感受挂钩。而从具体方法理论来看，其实每一个领导</p>\n<p class=\"exam-para\">理论都或多或少都与理解感受有关，而在这其中我认为相关性最强的应该是领导—</p>\n<p class=\"exam-para\">成员交换理论。该理论提及：对于不同特点的下属应该采取不同的领导方式，与前</p>\n<p class=\"exam-para\">面我提到的人的多样性不谋而合，更突出了理解感受的重要性。</p>\n<p class=\"exam-para\">说实话，在管理学领域论述理解感受这种属于精神层面的事物，不由得就让</p>\n<p class=\"exam-para\">我想到了另一个角度—组织文化。</p>\n<p class=\"exam-para\">《马工程》里组织文化的定义是：组织文化指的是一个组织在长期实践活动中</p>\n<p class=\"exam-para\">形成的具有本组织特征的文化现象，是组织中全体成员共同接受和共同遵循的价值</p>\n<p class=\"exam-para\">观念、思维方式、心理预期、团队归属感以及工作作风等群体意识的总称。</p>\n<p class=\"exam-para\">按不同的分类标准，我们可以把组织文化分成三大类，其中“按权利集中度”</p>\n<p class=\"exam-para\">的分类标准更贴和理解感受的要求，在这其中的“个性型组织文化”可以说完全就</p>\n<p class=\"exam-para\">是以“理解感受”作为基础的。它是以人为中心，分权式的组织文化，依靠着组织</p>\n<p class=\"exam-para\">成员互相理解支持而运作起来的。这种组织文化的优点是可以充分调动组织成员的</p>\n<p class=\"exam-para\">积极性和创造性，充分发挥人才潜力，从而达到提高公司生产力的目的。在这其中</p>\n<p class=\"exam-para\">理解感受更是缺一不可。</p>\n<p class=\"exam-para\">总而言之，理解感受在管理学中的地位无可置否是基石性的，它在我们人生也</p>\n<p class=\"exam-para\">是一样重要。能否理解他人，关乎着我们是否能发挥出人类的社会性；是否能加</p>\n<p class=\"exam-para\">入这个社会并不被它所排斥；是否能正确的对待别人。</p>\n<p class=\"exam-para\">管理学是这样的，人生是这样的，社会是这样的。</p>\n<p class=\"exam-para\">总是这样的。</p>\n<p class=\"exam-para\">（摘编自薛丶定谔《从后悔出发，简析理解感受在管理工作中为什么重要？》）</p>\n<p class=\"exam-para\">4.下列对材料相关内容的概括，不正确的一项是（ ）</p>\n<p class=\"exam-para\">A.人们习惯在事情发生后复盘，这是因为当时心理的影响，对已经发生的事情无法释怀。</p>\n<p class=\"exam-para\">B.人类之所以能霸占世界，是因为人类的社会性，它使得人类能够团结外物，统摄内性。</p>\n<p class=\"exam-para\">C.作者深夜不敢下床拿书，主要原因是不想背上“莫须有”的罪名，从而让宿舍人人自危。</p>\n<p class=\"exam-para\">D.理解感受作为一种抽象的思维，其对我们的影响是一种世界观的扩大，更好地进行决策。</p>\n<p class=\"exam-para\">5.下列对材料相关内容的概括和分析，正确的一项是（ ）</p>\n<p class=\"exam-para\">A.人们因为具有记忆和情感，所以才会感到后悔，因此一种生物只要同时存在这两项条件，</p>\n<p class=\"exam-para\">便也可以产生后悔感。</p>\n<p class=\"exam-para\">B.就算是一种悲观的情绪，也仍然可以产生积极的作用，其中的关键在于是否有人能理解它，</p>\n<p class=\"exam-para\">5</p>\n<p class=\"exam-para\">是否知道从不同角度去接受它。</p>\n<p class=\"exam-para\">C.“俄亥俄州立大学的研究”与理解感受在本质上有着相似之处，其中的包含的“定规维度”</p>\n<p class=\"exam-para\">“关怀维度”与理解感受的观点完全相同。</p>\n<p class=\"exam-para\">D.理解感受在管理学和人生的地位都是基石性的，只有理解他人，我们才能发挥出人类的社</p>\n<p class=\"exam-para\">会性，才能加入这个社会，才能正确的对待他人。</p>\n<p class=\"exam-para\">6.作者是从哪几个角度去分析“理解感受”的？请根据文章进行概括和分析。</p>\n<p class=\"exam-para\">文章中提到了几个方面来分析“理解感受”:</p>\n<p class=\"exam-para\">1.人类有记忆和情感，这两种特征使得人类能够理解和感受特定的情绪。</p>\n<p class=\"exam-para\">2.人类有社会性，这使得人类能够在进化过程中淘汰极端个体，留下有丰富特性和全面技能</p>\n<p class=\"exam-para\">的个体。这也使得人类能够统合记忆和情感，并使自己能够理解和感受特定的情绪。</p>\n<p class=\"exam-para\">3.尽管人类在记忆和情感等领域并不是领跑者，但他们仍然能够统治世界，这是因为人类能</p>\n<p class=\"exam-para\">够统合记忆和情感，并使自己能够理解和感受特定的情绪。</p>\n<p class=\"exam-para\">综上，作者分析“理解感受”的角度主要有: 人类的记忆和情感、人类的社会性和人类的记</p>\n<p class=\"exam-para\">忆和情感在进化中的作用。</p>\n<p class=\"exam-para\">（三）文学类文本阅读（本题共 3 小题，15 分）</p>\n<p class=\"exam-para\">阅读下面的文字，完成下面小题。</p>\n<p class=\"exam-para\">学院内（节选）</p>\n<p class=\"exam-para\">瑞</p>\n<p class=\"exam-para\">不起眼的小故事</p>\n<p class=\"exam-para\">“所以最后我们渣男先生谁也不要啊？”</p>\n<p class=\"exam-para\">“不是吧不是吧?”</p>\n<p class=\"exam-para\">三个男生在天台上聊着，这是校报一周之后。</p>\n<p class=\"exam-para\">“你们也这么说啊……”</p>\n<p class=\"exam-para\">我，熙雨和枫在这最后聊着，虽然事后上交了那钥匙，不过。</p>\n<p class=\"exam-para\">“真没想到你居然还有备用钥匙，这也在你的计划中吗？”</p>\n<p class=\"exam-para\">“因为想着可能我也会忘记就备了一把，它的最后一次了，不过也是，这一年的回忆，</p>\n<p class=\"exam-para\">还有点不舍呢。”</p>\n<p class=\"exam-para\">“是这样的。”</p>\n<p class=\"exam-para\">“你在说你马呢，赶紧去和你的桐川小姐玩去。”</p>\n<p class=\"exam-para\">“怎么这样，是你们说要来天台最后一次的，我才空了下午的时间来和你们耶。”</p>\n<p class=\"exam-para\">6</p>\n<p class=\"exam-para\">“算了算了，还是开始正题吧。\"</p>\n<p class=\"exam-para\">\"你们应该是有什么要问的吧。\"确实有疑点。</p>\n<p class=\"exam-para\">“你确实不只是被那男生打伤了吧，看报道还是真正去看都可以发现。”熙雨先提出疑</p>\n<p class=\"exam-para\">问，</p>\n<p class=\"exam-para\">“……是的，其实她。。那天带了美工刀。”</p>\n<p class=\"exam-para\">“啊？”</p>\n<p class=\"exam-para\">“啊这，所以你去保健室是因为她吗？”</p>\n<p class=\"exam-para\">“嗯，当时是；</p>\n<p class=\"exam-para\">‘我们还是先冷静一下吧’我尽量以缓和的语气说，</p>\n<p class=\"exam-para\">‘为什么！难道你就不能坚定的说喜欢的只有我吗？那你何必让她离开！’她定住了，</p>\n<p class=\"exam-para\">可能她发现了。</p>\n<p class=\"exam-para\">‘哪怕这样你也还想着她’。</p>\n<p class=\"exam-para\">是的，我已经看出来她带了美工刀，是啊，可能也在关心着薰。</p>\n<p class=\"exam-para\">‘你既然这样……’我看到了，她还是拿出了刀，看样子准备抵到自己的手上，</p>\n<p class=\"exam-para\">‘!!!’</p>\n<p class=\"exam-para\">‘赶上了……’</p>\n<p class=\"exam-para\">‘为什么？你明明不关心我怎么样！’她握住我的手，那是被泪水沾湿并带着血滴的右</p>\n<p class=\"exam-para\">手。</p>\n<p class=\"exam-para\">‘虽然说是这样，但也请你别以伤害自己方式来告诉我。’</p>\n<p class=\"exam-para\">我还是把那刀弹开了，不过右手划出点伤口。</p>\n<p class=\"exam-para\">她扯着我的衣领，哭着，我只好抬起右手。</p>\n<p class=\"exam-para\">‘既然你这么关心我，为什么不能给我一个答案。为什么要这么吊着我们。’</p>\n<p class=\"exam-para\">‘不，只是这个答案还没有出现，请给我时间，这事已经在学校传开了。虽然不是现在，</p>\n<p class=\"exam-para\">我一定会给你答案的。’</p>\n<p class=\"exam-para\">‘偏心！’</p>\n<p class=\"exam-para\">她最后忍不住哭着跑了出去，我也只好整现场后去保健室包扎。</p>\n<p class=\"exam-para\">“结果是那个护卫队队长背了伤人的一整锅咯，他为了自己的‘芷茗大人’也是有所付</p>\n<p class=\"exam-para\">出了”（笑）。</p>\n<p class=\"exam-para\">“为止，哥们就说芷茗真的很可怕啦，现在好了吧，赔了夫人又折兵。”</p>\n<p class=\"exam-para\">“中肯的。我也有问题，你有答案了吗在她们之中。”</p>\n<p class=\"exam-para\">7</p>\n<p class=\"exam-para\">\"我觉得不是川泽。\"</p>\n<p class=\"exam-para\">“不是吧，用骗的都保护她了，答案是谁不用我多说了吧。”</p>\n<p class=\"exam-para\">“别叫别叫。”</p>\n<p class=\"exam-para\">“快了，其实也就在我心中，我还需要一些时间……去面对。”</p>\n<p class=\"exam-para\">“也是，谁能想得到，全校都知道的枫前辈在处理感情问题也是有不足呢”</p>\n<p class=\"exam-para\">\"这一方面居然是不及格\"</p>\n<p class=\"exam-para\">“只能说达不到优秀吧。”</p>\n<p class=\"exam-para\">“所以……会是她吗”</p>\n<p class=\"exam-para\">“会是她吗”</p>\n<p class=\"exam-para\">“并不知道你们说的是谁，结果在一直之前就出来了。我也将为终章拉下帷幕。\"</p>\n<p class=\"exam-para\">“那就看你操作咯。”</p>\n<p class=\"exam-para\">“好久没有聊得这么尽兴了。”</p>\n<p class=\"exam-para\">虽然我很想问事情的真相，</p>\n<p class=\"exam-para\">“你们几个怎么在天台那，那里是不能上去的，你们给我等着”被巡逻的校警发现了，</p>\n<p class=\"exam-para\">“快跑吧，他就快上来了。”</p>\n<p class=\"exam-para\">“走走走，趁他还没抓到我们。”</p>\n<p class=\"exam-para\">“真就最后一次呗，可惜可惜。”</p>\n<p class=\"exam-para\">最后我们把钥匙丢在了天台，一个没有机会根本碰不到的机会。这也是我们一年的乐趣</p>\n<p class=\"exam-para\">所在。枫究竟会选择谁，我们在他说之前根本不知道会是谁，我希望的是他为之付出最多的</p>\n<p class=\"exam-para\">她，而熙雨认为是一开始就抓住他的心的她。这段故事也是如此，</p>\n<p class=\"exam-para\">“渣男夜汐枫为什么不是董？”</p>\n<p class=\"exam-para\">“渣男夜汐枫为什么不是芷茗？”</p>\n<p class=\"exam-para\">“没完没了了……你们。”</p>\n<p class=\"exam-para\">虽然跑得很快，但是学校知道能有钥匙的人就那么几个，我们几个之后还是被带过去谈</p>\n<p class=\"exam-para\">话了……被罚打扫校园，可惜可惜哦，可能没有被罚过也不算青春吧。</p>\n<p class=\"exam-para\">“这才是青春啊”我不经感慨到。</p>\n<p class=\"exam-para\">“如果你觉得扫地很好，那要不我们就多犯几次”</p>\n<p class=\"exam-para\">“算了算了，上次的‘空中钓鱼’就很离谱了。”</p>\n<p class=\"exam-para\">“你就说钓没钓到嘛。\"</p>\n<p class=\"exam-para\">“钓到了又如何……”</p>\n<p class=\"exam-para\">8</p>\n<p class=\"exam-para\">但也有点颇为有趣就是啦。</p>\n<p class=\"exam-para\">我后来又找到枫，那是在他选择之后了，不过大家都没有知道。</p>\n<p class=\"exam-para\">“你的答案究竟是谁？”</p>\n<p class=\"exam-para\">“你很好奇吗？”</p>\n<p class=\"exam-para\">我看了看报纸，指了她们说过的话，</p>\n<p class=\"exam-para\">“嗯，因为我觉得选谁都是和你心意。”</p>\n<p class=\"exam-para\">“你应该有更偏向的人吧。”</p>\n<p class=\"exam-para\">“差不多，我觉得会是明宫同学。”</p>\n<p class=\"exam-para\">“为什么？”</p>\n<p class=\"exam-para\">“因为我看到了你对她的付出，你们之间的温度，你们之间的……。
